<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerno — Bookings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; }
    .slot-row:hover { background: #eff6ff !important; cursor: pointer; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const WORKER      = "https://morning-mud-283c.moreno-a64.workers.dev";
    const SESSION_KEY = "kerno_session";
    const SLOT_H      = 28;
    const COLORS       = ["#3b82f6","#8b5cf6","#ec4899","#f59e0b","#10b981","#ef4444","#06b6d4","#84cc16"];
    const STATUS_COLOR = { pending:"#f59e0b", approved:"#10b981", rejected:"#ef4444" };
    const STATUS_BG    = { pending:"#fff7ed", approved:"#f0fdf4", rejected:"#fff5f5" };

    const SLOT_DURATIONS = [
      { label: "30 min",      value: 30  },
      { label: "1 hour",      value: 60  },
      { label: "2 hours",     value: 120 },
      { label: "4 hours",     value: 240 },
      { label: "Full day only", value: 0 },
    ];

    function getSlots(slotMinutes) {
      const mins  = slotMinutes || 30;
      const count = Math.floor((24 * 60) / mins);
      return Array.from({ length: count }, (_, i) => {
        const total = i * mins;
        const h = Math.floor(total / 60);
        const m = total % 60;
        return { h, m, mins, label: `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}` };
      });
    }

    // ── Session ──────────────────────────────────────────────────────────────
    function getSession() {
      const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
      if (!s || Date.now() > new Date(s.expires).getTime()) {
        localStorage.removeItem(SESSION_KEY);
        window.location.href = "index.html?expired=1";
        return null;
      }
      return s;
    }

    const authHeaders = () => ({
      "Content-Type": "application/json",
      "X-Session-Token": getSession()?.token || "",
    });

    const safeFetch = async (url, opts = {}) => {
      const res = await fetch(url, opts);
      if (res.status === 401) { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html?expired=1"; return null; }
      const text = await res.text();
      try { return text ? JSON.parse(text) : {}; } catch { return {}; }
    };

    const api = {
      getResources:  ()        => safeFetch(`${WORKER}/resources`,        { headers: authHeaders() }),
      saveResource:  (r)       => r.id
        ? safeFetch(`${WORKER}/resources/${r.id}`, { method:"PUT",    headers: authHeaders(), body: JSON.stringify(r) })
        : safeFetch(`${WORKER}/resources`,         { method:"POST",   headers: authHeaders(), body: JSON.stringify(r) }),
      deleteResource:(id)      => safeFetch(`${WORKER}/resources/${id}`,  { method:"DELETE", headers: authHeaders() }),
      getBookings:   ()        => safeFetch(`${WORKER}/bookings?limit=200`, { headers: authHeaders() }),
      saveBooking:   (b)       => safeFetch(`${WORKER}/bookings`,         { method:"POST",   headers: authHeaders(), body: JSON.stringify(b) }),
      updateBooking: (id,data) => safeFetch(`${WORKER}/bookings/${id}`,   { method:"PUT",    headers: authHeaders(), body: JSON.stringify(data) }),
      deleteBooking: (id)      => safeFetch(`${WORKER}/bookings/${id}`,   { method:"DELETE", headers: authHeaders() }),
      getSettings:   (key)     => safeFetch(`${WORKER}/settings/${key}`,  { headers: authHeaders() }),
      saveSettings:  (key,val) => safeFetch(`${WORKER}/settings/${key}`,  { method:"POST",   headers: authHeaders(), body: JSON.stringify(val) }),
      getMembers:    ()        => safeFetch(`${WORKER}/members`,          { headers: authHeaders() }),
      updateMember:  (id,data) => safeFetch(`${WORKER}/members/${id}`,    { method:"PUT",    headers: authHeaders(), body: JSON.stringify(data) }),
      requestAccess: (resId)   => safeFetch(`${WORKER}/request-access`,   { method:"POST",   headers: authHeaders(), body: JSON.stringify({ resource_id: resId }) }),
    };

    const fmt        = (d) => d.toISOString().split("T")[0];
    const addDays    = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
    const minsToTime = (m) => `${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;
    const slotIndex  = (time, slotMins=30) => { const [h,m]=time.split(":").map(Number); return Math.floor((h*60+m)/slotMins); };

    // ── Options tag editor ───────────────────────────────────────────────────
    function OptionsEditor({ options, onChange }) {
      const [input, setInput] = useState("");
      const add = () => {
        const v = input.trim();
        if (!v || options.includes(v)) return;
        onChange([...options, v]); setInput("");
      };
      return (
        <div className="mt-1">
          <div className="flex flex-wrap gap-1 mb-1.5">
            {options.map(o=>(
              <span key={o} className="inline-flex items-center gap-1 text-[11px] bg-blue-50 text-blue-600 border border-blue-200 rounded-full px-2 py-0.5">
                {o}
                <button onMouseDown={()=>onChange(options.filter(x=>x!==o))}
                  className="bg-transparent border-none cursor-pointer text-blue-300 text-xs leading-none p-0">×</button>
              </span>
            ))}
          </div>
          <div className="flex gap-1">
            <input value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"||e.key===","){e.preventDefault();add();}}}
              placeholder="Type option, press Enter…"
              className="flex-1 text-xs px-2 py-1 rounded-md border border-slate-300 outline-none focus:ring-2 focus:ring-blue-500"/>
            <button onMouseDown={add}
              className="text-xs px-2.5 py-1 rounded-md bg-blue-600 text-white border-none cursor-pointer hover:bg-blue-700">Add</button>
          </div>
        </div>
      );
    }

    // ── Navbar ───────────────────────────────────────────────────────────────
    function Navbar({ user }) {
      const logout = () => { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html"; };
      const isAdmin = user.role === "admin";
      return (
        <div className="bg-slate-900 px-4 sm:px-6 py-3 flex items-center gap-3 flex-wrap shrink-0">
          <a href="dashboard.html" className="text-[15px] font-bold text-white no-underline">⚙️ Kerno</a>
          <span className="text-slate-600">›</span>
          <span className="text-[13px] text-slate-400">Bookings</span>
          <div className="ml-auto flex gap-2 items-center flex-wrap">
            <a href="kanban.html"   className="text-[11px] px-2.5 py-1 rounded-md border border-slate-700 bg-slate-800 text-slate-400 no-underline hover:bg-slate-700">📋 Kanban</a>
            <a href="booking.html"  className="text-[11px] px-2.5 py-1 rounded-md border border-blue-600 bg-blue-600 text-white no-underline">📅 Bookings</a>
            <a href="requests.html" className="text-[11px] px-2.5 py-1 rounded-md border border-slate-700 bg-slate-800 text-slate-400 no-underline hover:bg-slate-700">📝 Requests</a>
            {isAdmin && <a href="users.html" className="text-[11px] px-2.5 py-1 rounded-md border border-slate-700 bg-slate-800 text-slate-400 no-underline hover:bg-slate-700">👥 Users</a>}
            <span className="text-xs text-slate-500">
              👤 {user.username}
              {isAdmin && <span className="ml-1.5 text-[10px] bg-blue-600 text-white rounded-full px-1.5 py-0.5">admin</span>}
            </span>
            <a href="profile.html" className="text-[11px] px-2.5 py-1 rounded-md border border-slate-700 bg-slate-800 text-slate-400 no-underline hover:bg-slate-700">🔑 Password</a>
            <button onClick={logout} className="text-[11px] px-2.5 py-1 rounded-md border border-slate-700 bg-slate-800 text-slate-400 cursor-pointer font-[inherit] hover:bg-slate-700">Sign out</button>
          </div>
        </div>
      );
    }

    // ── Booking Form Modal ───────────────────────────────────────────────────
    function BookingModal({booking, resource, fields, onSave, onDelete, onClose, isAdmin, username, initialSlot, initialDate}) {
      const isNew     = !booking?.id;
      const slotMins  = resource?.slot_duration || 30;
      const defaultStart = initialSlot != null ? minsToTime(initialSlot * slotMins) : (booking?.start_time || "09:00");
      const defaultEnd   = initialSlot != null ? minsToTime((initialSlot + 1) * slotMins) : (booking?.end_time || minsToTime(slotMins === 0 ? 60 : slotMins));

      const [date,      setDate]      = useState(booking?.date      || initialDate || fmt(new Date()));
      const [startTime, setStartTime] = useState(defaultStart);
      const [endTime,   setEndTime]   = useState(defaultEnd);
      const [fullDay,   setFullDay]   = useState(booking?.full_day  || slotMins === 0);
      const [notes,     setNotes]     = useState(booking?.notes     || "");
      const [meta,      setMeta]      = useState(booking?.metadata  || {});
      const [status,    setStatus]    = useState(booking?.status    || (resource?.approval_required ? "pending" : "approved"));
      const [saving,    setSaving]    = useState(false);
      const [saveError, setSaveError] = useState(null);

      const save = async () => {
        setSaving(true); setSaveError(null);
        const payload = {
          resource_id: resource.id, username, date,
          full_day: fullDay,
          start_time: fullDay ? null : startTime,
          end_time:   fullDay ? null : endTime,
          notes, metadata: meta, status,
        };
        const res = isNew ? await api.saveBooking(payload) : await api.updateBooking(booking.id, payload);
        if (res?.error || res?.code === "OVERLAP") {
          setSaveError(res?.code === "OVERLAP" ? "This time slot is already booked — please choose another." : res.error || "Could not save booking.");
          setSaving(false); return;
        }
        setSaving(false); onSave();
      };

      const del = async () => {
        if (!confirm("Delete this booking?")) return;
        await api.deleteBooking(booking.id); onDelete();
      };

      const canEdit = isAdmin || !booking?.id || booking?.username === username;

      const inputCls = "w-full text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-50 disabled:text-slate-400";
      const labelCls = "text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-1.5";

      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" onMouseDown={onClose}>
          <div className="bg-white rounded-2xl p-6 w-[440px] max-h-[85vh] overflow-y-auto shadow-2xl" onMouseDown={e=>e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <div>
                <div className="text-[15px] font-bold text-slate-900">{isNew?"New Booking":resource?.name}</div>
                {!isNew&&<div className="text-xs text-slate-500 mt-0.5">{booking.username}</div>}
                {resource?.approval_required&&isNew&&<div className="text-[11px] text-orange-600 mt-1">⚠ Requires admin approval</div>}
              </div>
              <button onClick={onClose} className="text-lg bg-transparent border-none cursor-pointer text-slate-400 leading-none hover:text-slate-600">✕</button>
            </div>

            <div className="mb-3">
              <label className={labelCls}>DATE</label>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)} disabled={!canEdit} className={inputCls}/>
            </div>

            {resource?.booking_type!=="fullday" && slotMins !== 0 && (
              <label className="flex items-center gap-2 text-sm text-slate-500 mb-3 cursor-pointer">
                <input type="checkbox" checked={fullDay} onChange={e=>setFullDay(e.target.checked)} disabled={!canEdit}/>
                Full day
              </label>
            )}

            {!fullDay && slotMins !== 0 && (
              <div className="flex gap-2.5 mb-3">
                <div className="flex-1">
                  <label className={labelCls}>START</label>
                  <input type="time" value={startTime} onChange={e=>setStartTime(e.target.value)} disabled={!canEdit} className={inputCls}/>
                </div>
                <div className="flex-1">
                  <label className={labelCls}>END</label>
                  <input type="time" value={endTime} onChange={e=>setEndTime(e.target.value)} disabled={!canEdit} className={inputCls}/>
                </div>
              </div>
            )}

            {fields.map(f=>(
              <div key={f.id} className="mb-3">
                <label className={labelCls}>{f.label.toUpperCase()}</label>
                {f.type==="dropdown"
                  ? <select value={meta[f.id]||""} onChange={e=>setMeta({...meta,[f.id]:e.target.value})} disabled={!canEdit} className={inputCls}>
                      <option value="">Select…</option>
                      {(f.options||[]).map(o=><option key={o} value={o}>{o}</option>)}
                    </select>
                  : <input value={meta[f.id]||""} onChange={e=>setMeta({...meta,[f.id]:e.target.value})} disabled={!canEdit} className={inputCls}/>
                }
              </div>
            ))}

            <div className="mb-4">
              <label className={labelCls}>NOTES</label>
              <textarea value={notes} onChange={e=>setNotes(e.target.value)} disabled={!canEdit} rows={3}
                className={`${inputCls} resize-y`}/>
            </div>

            {isAdmin && !isNew && (
              <div className="mb-4">
                <label className={labelCls}>STATUS</label>
                <select value={status} onChange={e=>setStatus(e.target.value)} className={inputCls}>
                  <option value="pending">Pending</option>
                  <option value="approved">Approved</option>
                  <option value="rejected">Rejected</option>
                </select>
              </div>
            )}

            {saveError && (
              <div className="flex items-center gap-2 bg-red-50 border border-red-100 rounded-xl px-4 py-2.5 text-sm text-red-600 mb-3">
                ⚠ {saveError}
              </div>
            )}

            {canEdit && (
              <div className="flex gap-2">
                <button onClick={save} disabled={saving}
                  className={`flex-1 text-sm py-2.5 rounded-xl bg-blue-600 text-white border-none cursor-pointer font-semibold hover:bg-blue-700 transition-colors ${saving?"opacity-70":""}`}>
                  {saving?"Saving…":isNew?"Create Booking":"Save Changes"}
                </button>
                {!isNew&&<button onClick={del}
                  className="text-sm px-3.5 py-2.5 rounded-xl border border-red-200 bg-red-50 text-red-500 cursor-pointer hover:bg-red-100 transition-colors">Delete</button>}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Admin Panel ──────────────────────────────────────────────────────────
    function AdminPanel({resources, members, onUpdate, onClose}) {
      const [tab,          setTab]           = useState("resources");
      const [editRes,      setEditRes]       = useState(null);
      const [allFields,    setAllFields]     = useState({});
      const [saving,       setSaving]        = useState(false);
      const [selectedResId,setSelectedResId] = useState(null);

      useEffect(()=>{
        (async()=>{ const f = await api.getSettings("booking-fields") || {}; setAllFields(f); })();
      },[]);

      const currentFields    = selectedResId ? (allFields[selectedResId]||[]) : [];
      const setCurrentFields = (fields) => setAllFields({...allFields,[selectedResId]:fields});

      const saveResource = async () => {
        if(!editRes?.name?.trim()) return;
        setSaving(true); await api.saveResource(editRes); setSaving(false); setEditRes(null); onUpdate();
      };
      const saveFields = async () => {
        setSaving(true); await api.saveSettings("booking-fields", allFields); setSaving(false); onUpdate();
      };
      const togglePerm = async (m, resourceId) => {
        const perms   = m.permissions||[];
        const updated = perms.includes(resourceId) ? perms.filter(p=>p!==resourceId) : [...perms, resourceId];
        await api.updateMember(m.id,{permissions:updated}); onUpdate();
      };
      const addField    = ()       => setCurrentFields([...currentFields,{id:`f${Date.now()}`,label:"New Field",type:"text",options:[]}]);
      const updateField = (id,k,v) => setCurrentFields(currentFields.map(f=>f.id===id?{...f,[k]:v}:f));
      const removeField = (id)     => setCurrentFields(currentFields.filter(f=>f.id!==id));

      const inputCls  = "w-full text-xs px-2.5 py-1.5 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-blue-500 mb-2";
      const labelCls  = "text-[11px] font-semibold text-slate-500 uppercase tracking-wider block mb-1";

      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" onMouseDown={onClose}>
          <div className="w-[580px] max-h-[85vh] flex flex-col bg-white rounded-2xl shadow-2xl" onMouseDown={e=>e.stopPropagation()}>
            {/* Header */}
            <div className="flex items-center justify-between px-5 py-4 border-b border-slate-200">
              <div className="text-[15px] font-bold text-slate-900">⚙️ Admin</div>
              <button onClick={onClose} className="text-lg bg-transparent border-none cursor-pointer text-slate-400 hover:text-slate-600">✕</button>
            </div>
            {/* Tab bar */}
            <div className="flex border-b border-slate-200">
              {["resources","fields","permissions"].map(t=>(
                <button key={t} onClick={()=>setTab(t)}
                  className={`flex-1 text-xs py-2.5 border-none cursor-pointer capitalize transition-colors
                    ${tab===t
                      ? "border-b-2 border-blue-600 text-blue-600 font-semibold bg-transparent"
                      : "border-b-2 border-transparent text-slate-500 font-normal bg-transparent hover:text-slate-700"}`}>
                  {t}
                </button>
              ))}
            </div>
            {/* Content */}
            <div className="flex-1 overflow-y-auto p-5">

              {tab==="resources"&&(
                <div>
                  <div className="flex justify-between items-center mb-3">
                    <div className="text-[13px] font-semibold text-slate-800">Resources</div>
                    <button onClick={()=>setEditRes({name:"",description:"",booking_type:"both",slot_duration:30,approval_required:false})}
                      className="text-xs px-3 py-1 rounded-lg bg-blue-600 text-white border-none cursor-pointer hover:bg-blue-700">+ Add</button>
                  </div>
                  {editRes&&(
                    <div className="bg-slate-50 border border-slate-200 rounded-xl p-4 mb-3">
                      <input value={editRes.name||""} onChange={e=>setEditRes({...editRes,name:e.target.value})} placeholder="Resource name" className={inputCls}/>
                      <input value={editRes.description||""} onChange={e=>setEditRes({...editRes,description:e.target.value})} placeholder="Description" className={inputCls}/>
                      <label className={labelCls}>BOOKING TYPE</label>
                      <select value={editRes.booking_type||"both"} onChange={e=>setEditRes({...editRes,booking_type:e.target.value})} className={inputCls}>
                        <option value="timeslot">Time slots only</option>
                        <option value="fullday">Full days only</option>
                        <option value="both">Both</option>
                      </select>
                      <label className={labelCls}>SLOT DURATION</label>
                      <select value={editRes.slot_duration ?? 30} onChange={e=>setEditRes({...editRes,slot_duration:Number(e.target.value)})} className={inputCls}>
                        {SLOT_DURATIONS.map(d=><option key={d.value} value={d.value}>{d.label}</option>)}
                      </select>
                      <label className="flex items-center gap-2 text-xs text-slate-500 mb-3 cursor-pointer">
                        <input type="checkbox" checked={editRes.approval_required||false} onChange={e=>setEditRes({...editRes,approval_required:e.target.checked})}/>
                        Requires admin approval
                      </label>
                      <label className={labelCls}>MAX DAYS AHEAD (0 = unlimited)</label>
                      <input type="number" min="0" value={editRes.max_days_ahead ?? 0}
                        onChange={e=>setEditRes({...editRes,max_days_ahead:Number(e.target.value)})}
                        className={inputCls}/>
                      <label className={labelCls}>CALENDAR ADMIN</label>
                      <select value={editRes.admin_username||""} onChange={e=>setEditRes({...editRes,admin_username:e.target.value})} className={inputCls}>
                        <option value="">— None —</option>
                        {members.map(m=><option key={m.id} value={m.username}>{m.username}</option>)}
                      </select>
                      <div className="flex gap-2">
                        <button onClick={saveResource} disabled={saving}
                          className="text-xs px-3.5 py-1.5 rounded-lg bg-blue-600 text-white border-none cursor-pointer hover:bg-blue-700 disabled:opacity-70">Save</button>
                        <button onClick={()=>setEditRes(null)}
                          className="text-xs px-3 py-1.5 rounded-lg bg-slate-100 border border-slate-200 cursor-pointer text-slate-500 hover:bg-slate-200">Cancel</button>
                      </div>
                    </div>
                  )}
                  {resources.map(r=>(
                    <div key={r.id} className="flex items-center justify-between p-3 bg-white rounded-xl border border-slate-200 mb-2">
                      <div>
                        <span className="text-[13px] font-semibold text-slate-800">{r.name}</span>
                        <span className="text-[11px] text-slate-400 ml-2">{r.booking_type} · {SLOT_DURATIONS.find(d=>d.value===(r.slot_duration??30))?.label||"30 min"} · {r.approval_required?"approval":"auto"} · {r.max_days_ahead ? `${r.max_days_ahead}d ahead` : "any time"} · admin: {r.admin_username||"—"}</span>
                      </div>
                      <div className="flex gap-1.5">
                        <button onClick={()=>setEditRes(r)}
                          className="text-[11px] px-2 py-0.5 rounded border border-slate-200 bg-slate-50 cursor-pointer text-slate-500 hover:bg-slate-100">Edit</button>
                        <button onClick={()=>{if(confirm(`Delete "${r.name}"?`)){api.deleteResource(r.id);onUpdate();}}}
                          className="text-[11px] px-2 py-0.5 rounded border border-red-200 bg-red-50 cursor-pointer text-red-500 hover:bg-red-100">Delete</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {tab==="fields"&&(
                <div>
                  <div className="text-[13px] font-semibold text-slate-800 mb-3">Fields per Resource</div>
                  <div className="flex gap-2 mb-4 flex-wrap">
                    {resources.map(r=>(
                      <button key={r.id} onClick={()=>setSelectedResId(r.id)}
                        className={`text-xs px-3 py-1.5 rounded-lg border cursor-pointer transition-colors
                          ${selectedResId===r.id
                            ? "border-blue-500 bg-blue-50 text-blue-600"
                            : "border-slate-200 bg-white text-slate-500 hover:bg-slate-50"}`}>
                        {r.name}
                      </button>
                    ))}
                  </div>
                  {selectedResId ? (
                    <>
                      <div className="flex justify-between items-center mb-2.5">
                        <div className="text-xs text-slate-500">Fields for <strong>{resources.find(r=>r.id===selectedResId)?.name}</strong></div>
                        <button onClick={addField}
                          className="text-xs px-2.5 py-1 rounded-lg bg-blue-600 text-white border-none cursor-pointer hover:bg-blue-700">+ Add field</button>
                      </div>
                      {currentFields.map(f=>(
                        <div key={f.id} className="bg-slate-50 border border-slate-200 rounded-xl p-3 mb-2">
                          <div className={`flex gap-2 ${f.type!=="text"?"mb-2":""}`}>
                            <input value={f.label} onChange={e=>updateField(f.id,"label",e.target.value)} placeholder="Field label"
                              className="flex-[2] text-xs px-2 py-1.5 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-blue-500"/>
                            <select value={f.type} onChange={e=>updateField(f.id,"type",e.target.value)}
                              className="flex-1 text-xs px-2 py-1.5 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-blue-500">
                              <option value="text">Text</option>
                              <option value="dropdown">Dropdown</option>
                            </select>
                            <button onClick={()=>removeField(f.id)}
                              className="text-xs px-2 py-0.5 rounded border border-red-200 bg-red-50 text-red-500 cursor-pointer hover:bg-red-100">✕</button>
                          </div>
                          {f.type==="dropdown"&&(
                            <OptionsEditor options={f.options||[]} onChange={opts=>updateField(f.id,"options",opts)}/>
                          )}
                        </div>
                      ))}
                      <button onClick={saveFields} disabled={saving}
                        className="w-full text-sm py-2 rounded-xl bg-blue-600 text-white border-none cursor-pointer font-semibold hover:bg-blue-700 mt-2 disabled:opacity-70">
                        {saving?"Saving…":"Save Fields"}
                      </button>
                    </>
                  ) : <div className="text-xs text-slate-400">Select a resource above to configure its fields.</div>}
                </div>
              )}

              {tab==="permissions"&&(
                <div>
                  <div className="text-[13px] font-semibold text-slate-800 mb-3">Booking Permissions per Resource</div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs border-collapse">
                      <thead>
                        <tr className="border-b border-slate-200">
                          <th className="text-left py-2 pr-4 text-slate-500 font-semibold">User</th>
                          {resources.map(r=>(
                            <th key={r.id} className="text-center py-2 px-3 text-slate-500 font-semibold whitespace-nowrap">{r.name}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {members.map(m=>(
                          <tr key={m.id} className="border-b border-slate-100">
                            <td className="py-2.5 pr-4">
                              <span className="text-[13px] font-semibold text-slate-800">{m.username}</span>
                              {m.role==="admin"&&<span className="ml-1.5 text-[10px] bg-blue-600 text-white rounded-full px-1.5 py-0.5">admin</span>}
                            </td>
                            {resources.map(r=>(
                              <td key={r.id} className="text-center py-2.5 px-3">
                                <input type="checkbox"
                                  checked={m.role==="admin"||(m.permissions||[]).includes(r.id)}
                                  disabled={m.role==="admin"}
                                  onChange={()=>togglePerm(m, r.id)}/>
                              </td>
                            ))}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── Weekly Calendar ──────────────────────────────────────────────────────
    function WeeklyCalendar({resource, weekStart, bookings, fields, user, isAdmin, canBook, onRefresh, onRequestAccess}) {
      const [modal,     setModal]     = useState(null);
      const [requested, setRequested] = useState(false);
      const [requesting,setRequesting]= useState(false);
      const days        = Array.from({length:7},(_,i)=>addDays(weekStart,i));
      const color       = "#3b82f6";
      const slotMins    = resource?.slot_duration || 30;
      const SLOTS       = slotMins === 0 ? [] : getSlots(slotMins);
      const fullDayOnly = slotMins === 0 || resource?.booking_type === "fullday";

      const getTop = (b) => {
        if (b.full_day) return 0;
        const [h,m] = b.start_time.split(":").map(Number);
        return Math.floor((h*60+m)/slotMins) * SLOT_H;
      };
      const getHeight = (b) => {
        if (b.full_day) return SLOTS.length * SLOT_H;
        const [sh,sm] = b.start_time.split(":").map(Number);
        const [eh,em] = b.end_time.split(":").map(Number);
        return Math.max(((eh*60+em)-(sh*60+sm))/slotMins, 1) * SLOT_H;
      };

      const handleRequestAccess = async () => {
        setRequesting(true);
        const res = await onRequestAccess(resource.id);
        setRequesting(false);
        if (res?.success) setRequested(true);
      };

      return (
        <div className="flex-1 overflow-y-auto overflow-x-auto">
          {!canBook && resource && (
            <div className="m-4 flex items-center justify-between gap-4 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3">
              <span className="text-sm text-amber-800">
                You don't have permission to book <strong>{resource.name}</strong>.
                {resource.admin_username && <> Please ask <strong>{resource.admin_username}</strong> for access.</>}
              </span>
              {resource.admin_username && !requested && (
                <button onClick={handleRequestAccess} disabled={requesting}
                  className="shrink-0 text-xs px-3.5 py-1.5 rounded-lg bg-amber-600 text-white border-none cursor-pointer hover:bg-amber-700 disabled:opacity-60">
                  {requesting ? "Sending…" : "Request access"}
                </button>
              )}
              {requested && <span className="shrink-0 text-xs text-green-600 font-semibold">✓ Request sent!</span>}
            </div>
          )}
          {modal && (
            <BookingModal
              booking={modal.booking||{}} resource={resource} fields={fields}
              isAdmin={isAdmin} username={user.username}
              initialSlot={modal.slot} initialDate={modal.date}
              onSave={()=>{setModal(null);onRefresh();}}
              onDelete={()=>{setModal(null);onRefresh();}}
              onClose={()=>setModal(null)}
            />
          )}

          {/* Day headers */}
          <div style={{display:"grid",gridTemplateColumns:"60px repeat(7,1fr)",minWidth:600}} className="sticky top-0 z-10 bg-white border-b-2 border-slate-200">
            <div className="p-2"/>
            {days.map((day,i)=>{
              const isToday = fmt(day)===fmt(new Date());
              return (
                <div key={i} className="py-2 px-1 text-center border-l border-slate-200">
                  <div className="text-[11px] text-slate-400">{day.toLocaleDateString("en",{weekday:"short"})}</div>
                  <div style={{width:26,height:26,lineHeight:"26px",margin:"2px auto 0",borderRadius:"50%",background:isToday?"#eff6ff":"transparent"}}
                    className={`text-[13px] font-bold ${isToday?"text-blue-600":"text-slate-800"}`}>
                    {day.getDate()}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Full-day row */}
          <div style={{display:"grid",gridTemplateColumns:"60px repeat(7,1fr)",minWidth:600}} className="border-b-2 border-slate-200 bg-slate-50">
            <div className="px-2 py-1 text-[10px] text-slate-400 flex items-center">All day</div>
            {days.map((day,di)=>{
              const dateStr = fmt(day);
              const fdBookings = bookings.filter(b=>b.date===dateStr&&b.full_day);
              return (
                <div key={di} className="border-l border-slate-200 min-h-[24px] p-0.5"
                  onClick={()=>fullDayOnly&&canBook&&setModal({booking:null,slot:null,date:dateStr})}>
                  {fdBookings.map(b=>(
                    <div key={b.id}
                      style={{fontSize:10,fontWeight:600,background:STATUS_BG[b.status],color:STATUS_COLOR[b.status],borderRadius:3,padding:"2px 6px",marginBottom:2,cursor:"pointer",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}
                      onClick={e=>{e.stopPropagation();setModal({booking:b,slot:null,date:null});}}>
                      {b.username} · {b.status}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>

          {/* Time grid — hidden for full-day-only resources */}
          {!fullDayOnly && (
            <div style={{display:"grid",gridTemplateColumns:"60px repeat(7,1fr)",minWidth:600}}>
              {SLOTS.map((slot,si)=>(
                <React.Fragment key={si}>
                  <div style={{height:SLOT_H,borderBottom:"1px solid #f1f5f9"}} className="flex items-start justify-end pr-2 pt-0.5">
                    {slot.m===0&&<span className="text-[10px] text-slate-400">{slot.label}</span>}
                  </div>
                  {days.map((day,di)=>{
                    const dateStr   = fmt(day);
                    const dBookings = si===0 ? bookings.filter(b=>b.date===dateStr&&!b.full_day) : [];
                    return (
                      <div key={di} className="slot-row"
                        style={{height:SLOT_H,borderBottom:`1px solid ${slot.m===0?"#e2e8f0":"#f8fafc"}`,borderLeft:"1px solid #e2e8f0",position:"relative",background:"#fff"}}
                        onClick={()=>canBook&&setModal({booking:null,slot:si,date:dateStr})}>
                        {si===0&&dBookings.map(b=>(
                          <div key={b.id}
                            style={{position:"absolute",top:getTop(b)+1,left:2,right:2,height:getHeight(b)-2,background:color+"22",borderLeft:`3px solid ${STATUS_COLOR[b.status]||"#94a3b8"}`,borderRadius:4,padding:"2px 6px",zIndex:5,overflow:"hidden",cursor:"pointer"}}
                            onClick={e=>{e.stopPropagation();setModal({booking:b,slot:null,date:null});}}>
                            <div style={{fontSize:10,fontWeight:700,color:"#1e293b",lineHeight:1.3}}>{b.username}</div>
                            <div style={{fontSize:9,color:"#64748b"}}>{b.start_time}–{b.end_time}</div>
                            {Object.entries(b.metadata||{}).slice(0,1).map(([k,v])=>(
                              <div key={k} style={{fontSize:9,color:"#64748b",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{v}</div>
                            ))}
                            <div style={{position:"absolute",top:2,right:4,fontSize:9,background:STATUS_BG[b.status],color:STATUS_COLOR[b.status],borderRadius:3,padding:"1px 4px",fontWeight:600,textTransform:"capitalize"}}>{b.status}</div>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </React.Fragment>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [user] = useState(() => {
        const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
        if (!s || Date.now() > new Date(s.expires).getTime()) {
          localStorage.removeItem(SESSION_KEY); window.location.href = "index.html?expired=1"; return null;
        }
        return { username: s.username, role: s.role, token: s.token };
      });

      const [resources,   setResources]   = useState([]);
      const [selectedRes, setSelectedRes] = useState(null);
      const [bookings,    setBookings]    = useState([]);
      const [members,     setMembers]     = useState([]);
      const [allFields,   setAllFields]   = useState({});
      const [loading,     setLoading]     = useState(true);
      const [loadError,   setLoadError]   = useState(null);
      const [showAdmin,   setShowAdmin]   = useState(false);
      const [weekStart,   setWeekStart]   = useState(()=>{
        const d=new Date(); d.setDate(d.getDate()-d.getDay()); d.setHours(0,0,0,0); return d;
      });

      const isAdmin = user?.role === "admin";
      const currentMember = members.find(m => m.username === user?.username);
      const canBook = isAdmin || (selectedRes != null && Array.isArray(currentMember?.permissions) && currentMember.permissions.includes(selectedRes.id));

      const loadBase = async () => {
        setLoadError(null);
        try {
          const [r,m,f] = await Promise.all([api.getResources(), api.getMembers(), api.getSettings("booking-fields")]);
          const resList = Array.isArray(r) ? r : [];
          setResources(resList);
          setMembers(Array.isArray(m) ? m : []);
          setAllFields(f && typeof f==="object" ? f : {});
          setSelectedRes(s => s || resList[0] || null);
          setLoading(false);
        } catch { setLoadError("Could not load data. Please refresh."); setLoading(false); }
      };

      const loadBookings = async () => {
        if (!selectedRes) return;
        try {
          const b = await api.getBookings();
          setBookings(Array.isArray(b) ? b.filter(bk=>bk.resource_id===selectedRes.id) : []);
        } catch { setBookings([]); }
      };

      useEffect(()=>{ if(user) loadBase(); else setLoading(false); }, []);
      useEffect(()=>{ if(selectedRes) loadBookings(); }, [selectedRes, weekStart]);

      if (!user)     return null;
      if (loading)   return <div className="p-8 text-slate-400">Loading…</div>;
      if (loadError) return (
        <div className="p-8 flex flex-col gap-3 items-start">
          <div className="text-red-500">{loadError}</div>
          <button onClick={loadBase} className="text-sm px-3.5 py-1.5 rounded-lg bg-blue-600 text-white border-none cursor-pointer hover:bg-blue-700">Retry</button>
        </div>
      );

      const currentFields = selectedRes ? (allFields[selectedRes.id]||[]) : [];
      const weekLabel = `${weekStart.toLocaleDateString("en",{month:"short",day:"numeric"})} – ${addDays(weekStart,6).toLocaleDateString("en",{month:"short",day:"numeric",year:"numeric"})}`;

      return (
        <div className="font-sans h-screen flex flex-col">
          {showAdmin && <AdminPanel resources={resources} members={members} onUpdate={()=>{loadBase();loadBookings();}} onClose={()=>setShowAdmin(false)}/>}

          <Navbar user={user} />

          {/* Week toolbar */}
          <div className="bg-slate-800 px-4 sm:px-6 py-2 flex items-center gap-2 shrink-0">
            <button onClick={()=>setWeekStart(addDays(weekStart,-7))}
              className="text-[13px] px-2.5 py-1 rounded-md border border-slate-600 bg-slate-700 text-slate-300 cursor-pointer hover:bg-slate-600">‹</button>
            <span className="text-xs text-slate-100 font-semibold min-w-[180px] text-center">{weekLabel}</span>
            <button onClick={()=>setWeekStart(addDays(weekStart,7))}
              className="text-[13px] px-2.5 py-1 rounded-md border border-slate-600 bg-slate-700 text-slate-300 cursor-pointer hover:bg-slate-600">›</button>
            <button onClick={()=>{const d=new Date();d.setDate(d.getDate()-d.getDay());d.setHours(0,0,0,0);setWeekStart(d);}}
              className="text-[11px] px-2.5 py-1 rounded-md border border-slate-600 bg-slate-700 text-slate-300 cursor-pointer hover:bg-slate-600">Today</button>
            {isAdmin && (
              <button onClick={()=>setShowAdmin(true)}
                className="text-[11px] px-2.5 py-1 rounded-md border border-slate-600 bg-slate-700 text-slate-300 cursor-pointer hover:bg-slate-600 ml-2">⚙ Admin</button>
            )}
          </div>

          <div className="flex flex-1 overflow-hidden">
            {/* Resource sidebar */}
            <div className="bg-slate-800 w-48 shrink-0 py-3 overflow-y-auto">
              <div className="px-3.5 pb-2 text-[11px] font-bold text-slate-500 uppercase tracking-wider">Resources</div>
              {resources.length===0 && <div className="px-3.5 text-xs text-slate-500">No resources yet.</div>}
              {resources.map((r,i)=>(
                <div key={r.id} onClick={()=>setSelectedRes(r)}
                  style={{borderLeft:`3px solid ${selectedRes?.id===r.id ? COLORS[i%COLORS.length] : "transparent"}`}}
                  className={`px-3.5 py-2.5 cursor-pointer transition-colors ${selectedRes?.id===r.id?"bg-slate-700":"hover:bg-slate-700/50"}`}>
                  <div className={`text-xs font-semibold ${selectedRes?.id===r.id?"text-slate-100":"text-slate-400"}`}>{r.name}</div>
                  {r.description&&<div className="text-[11px] text-slate-500 mt-0.5">{r.description}</div>}
                  <div className="text-[10px] text-slate-500 mt-0.5">
                    {SLOT_DURATIONS.find(d=>d.value===(r.slot_duration??30))?.label||"30 min"}
                  </div>
                  <div className={`text-[10px] mt-0.5 ${r.approval_required?"text-orange-400":"text-green-400"}`}>
                    {r.approval_required?"⚠ Approval required":"✓ Auto-confirm"}
                  </div>
                  {r.max_days_ahead > 0 && (
                    <div className="text-[10px] text-slate-500 mt-0.5">📅 Up to {r.max_days_ahead} days ahead</div>
                  )}
                  {r.admin_username && (
                    <div className="text-[10px] text-slate-500 mt-0.5">👤 {r.admin_username}</div>
                  )}
                </div>
              ))}
            </div>

            {selectedRes
              ? <WeeklyCalendar key={selectedRes.id} resource={selectedRes} weekStart={weekStart} bookings={bookings}
                  fields={currentFields} user={user} isAdmin={isAdmin} canBook={canBook} onRefresh={loadBookings}
                  onRequestAccess={api.requestAccess}/>
              : <div className="flex-1 flex items-center justify-center text-slate-400 text-sm">
                  {isAdmin
                    ? <span>No resources yet. <button onClick={()=>setShowAdmin(true)} className="text-blue-500 bg-transparent border-none cursor-pointer text-sm hover:underline">Add one →</button></span>
                    : "No resources available."}
                </div>
            }
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
