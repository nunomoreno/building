<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerno — Bookings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>if (typeof marked !== 'undefined') marked.use({ gfm: true });</script>
  <style>
    .md-content h1{font-size:1.15em;font-weight:700;margin-bottom:.4em}
    .md-content h2{font-size:1em;font-weight:700;margin-bottom:.3em}
    .md-content p{margin-bottom:.5em}
    .md-content ul{list-style-type:disc;padding-left:1.2em;margin-bottom:.5em}.md-content ol{list-style-type:decimal;padding-left:1.2em;margin-bottom:.5em}
    .md-content code{background:#f1f5f9;padding:1px 4px;border-radius:3px;font-size:.85em}
    .md-content strong{font-weight:700}
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; min-height: 100vh; }
    .slot-row:hover { background: #eff6ff !important; cursor: pointer; }
    .drag-over { background: #dbeafe !important; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    /* ── Button system ───────────────────────────────────────────────── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:1px solid transparent;border-radius:8px;font-weight:500;line-height:1.2;transition:background .12s,border-color .12s;font-family:inherit;white-space:nowrap}
    .btn:disabled,.btn[disabled]{opacity:.55;cursor:not-allowed;pointer-events:none}
    .btn-xs{font-size:11px;padding:4px 10px} .btn-sm{font-size:12px;padding:6px 13px}
    .btn-md{font-size:13px;padding:9px 18px;font-weight:600} .btn-block{width:100%;justify-content:center}
    .btn-primary{background:#2563eb;color:#fff} .btn-primary:hover{background:#1d4ed8}
    .btn-secondary{background:#fff;color:#475569;border-color:#e2e8f0} .btn-secondary:hover{background:#f8fafc;border-color:#cbd5e1}
    .btn-danger{background:#fef2f2;color:#dc2626;border-color:#fecaca} .btn-danger:hover{background:#fee2e2;border-color:#fca5a5}
    .btn-danger-fill{background:#dc2626;color:#fff} .btn-danger-fill:hover{background:#b91c1c}
    .btn-warning{background:#fffbeb;color:#b45309;border-color:#fde68a} .btn-warning:hover{background:#fef3c7}
    .btn-success{background:#059669;color:#fff} .btn-success:hover{background:#047857}
    .btn-amber-fill{background:#d97706;color:#fff} .btn-amber-fill:hover{background:#b45309}
    .btn-violet{background:#7c3aed;color:#fff} .btn-violet:hover{background:#6d28d9}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const WORKER      = "https://morning-mud-283c.moreno-a64.workers.dev";
    const SESSION_KEY = "kerno_session";
    const SLOT_H      = 28;
    const COLORS       = ["#3b82f6","#8b5cf6","#ec4899","#f59e0b","#10b981","#ef4444","#06b6d4","#84cc16"];
    const STATUS_COLOR = { pending:"#f59e0b", approved:"#10b981", rejected:"#ef4444" };
    const STATUS_BG    = { pending:"#fff7ed", approved:"#f0fdf4", rejected:"#fff5f5" };

    const SLOT_DURATIONS = [
      { label: "30 min",      value: 30  },
      { label: "1 hour",      value: 60  },
      { label: "2 hours",     value: 120 },
      { label: "4 hours",     value: 240 },
      { label: "Full day only", value: 0 },
    ];

    function getSlots(slotMinutes) {
      const mins  = slotMinutes || 30;
      const count = Math.floor((24 * 60) / mins);
      return Array.from({ length: count }, (_, i) => {
        const total = i * mins;
        const h = Math.floor(total / 60);
        const m = total % 60;
        return { h, m, mins, label: `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}` };
      });
    }

    // ── Session ──────────────────────────────────────────────────────────────
    function getSession() {
      const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
      if (!s || Date.now() > new Date(s.expires).getTime()) {
        localStorage.removeItem(SESSION_KEY);
        window.location.href = "index.html?expired=1";
        return null;
      }
      return s;
    }

    const authHeaders = () => ({
      "Content-Type": "application/json",
      "X-Session-Token": getSession()?.token || "",
    });

    const safeFetch = async (url, opts = {}) => {
      const res = await fetch(url, opts);
      if (res.status === 401) { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html?expired=1"; return null; }
      const text = await res.text();
      try { return text ? JSON.parse(text) : {}; } catch { return {}; }
    };

    const api = {
      getResources:  ()        => safeFetch(`${WORKER}/resources`,        { headers: authHeaders() }),
      saveResource:  (r)       => r.id
        ? safeFetch(`${WORKER}/resources/${r.id}`, { method:"PUT",    headers: authHeaders(), body: JSON.stringify(r) })
        : safeFetch(`${WORKER}/resources`,         { method:"POST",   headers: authHeaders(), body: JSON.stringify(r) }),
      deleteResource:(id)      => safeFetch(`${WORKER}/resources/${id}`,  { method:"DELETE", headers: authHeaders() }),
      getBookings:   ()        => safeFetch(`${WORKER}/bookings?limit=500`, { headers: authHeaders() }),
      saveBooking:   (b)       => safeFetch(`${WORKER}/bookings`,         { method:"POST",   headers: authHeaders(), body: JSON.stringify(b) }),
      updateBooking: (id,data) => safeFetch(`${WORKER}/bookings/${id}`,   { method:"PUT",    headers: authHeaders(), body: JSON.stringify(data) }),
      deleteBooking: (id)      => safeFetch(`${WORKER}/bookings/${id}`,   { method:"DELETE", headers: authHeaders() }),
      getSettings:   (key)     => safeFetch(`${WORKER}/settings/${key}`,  { headers: authHeaders() }),
      saveSettings:  (key,val) => safeFetch(`${WORKER}/settings/${key}`,  { method:"POST",   headers: authHeaders(), body: JSON.stringify(val) }),
      getGrants:     ()        => safeFetch(`${WORKER}/grants`,            { headers: authHeaders() }),
      getMembers:    ()        => safeFetch(`${WORKER}/members`,          { headers: authHeaders() }),
      updateMember:  (id,data) => safeFetch(`${WORKER}/members/${id}`,    { method:"PUT",    headers: authHeaders(), body: JSON.stringify(data) }),
      requestAccess: (resId)   => safeFetch(`${WORKER}/request-access`,              { method:"POST",   headers: authHeaders(), body: JSON.stringify({ resource_id: resId }) }),
      grantAccess:   (resId, memberId) => safeFetch(`${WORKER}/resources/${resId}/grant`,           { method:"POST",   headers: authHeaders(), body: JSON.stringify({ member_id: memberId }) }),
      revokeAccess:  (resId, memberId) => safeFetch(`${WORKER}/resources/${resId}/grant/${memberId}`,{ method:"DELETE", headers: authHeaders() }),
    };

    const fmt        = (d) => d.toISOString().split("T")[0];
    const addDays    = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
    const minsToTime = (m) => `${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;
    const slotIndex  = (time, slotMins=30) => { const [h,m]=time.split(":").map(Number); return Math.floor((h*60+m)/slotMins); };

    // ── Metadata heuristic mapper ────────────────────────────────────────────
    function mapMetadata(sourceFields, targetFields, sourceMeta) {
      const result = {};
      for (const tf of targetFields) {
        const tLabel = tf.label.toLowerCase().trim();
        let sf = sourceFields.find(f => f.label.toLowerCase().trim() === tLabel);
        if (!sf) sf = sourceFields.find(f => {
          const s = f.label.toLowerCase().trim();
          return s.includes(tLabel) || tLabel.includes(s);
        });
        if (sf && sourceMeta[sf.id] != null && sourceMeta[sf.id] !== "") {
          if (tf.type === "dropdown" && tf.options?.length) {
            if ((tf.options).includes(sourceMeta[sf.id])) result[tf.id] = sourceMeta[sf.id];
          } else {
            result[tf.id] = sourceMeta[sf.id];
          }
        }
      }
      return result;
    }

    // ── Repeat date generator ────────────────────────────────────────────────
    function generateDates(startStr, mode, untilStr) {
      if (!startStr || !untilStr || !mode || mode === "none") return startStr ? [startStr] : [];
      const dates = [];
      const cur   = new Date(startStr + "T00:00:00");
      const until = new Date(untilStr  + "T00:00:00");
      if (isNaN(cur.getTime()) || isNaN(until.getTime()) || cur > until) return [];
      const cap = new Date(cur); cap.setFullYear(cap.getFullYear() + 1);
      const end = until < cap ? until : cap;
      const step = mode === "daily" ? 1 : 7;
      while (cur <= end && dates.length < 366) {
        dates.push(fmt(new Date(cur)));
        cur.setDate(cur.getDate() + step);
      }
      return dates;
    }

    // ── Options tag editor ───────────────────────────────────────────────────
    function OptionsEditor({ options, onChange }) {
      const [input, setInput] = useState("");
      const add = () => {
        const v = input.trim();
        if (!v || options.includes(v)) return;
        onChange([...options, v]); setInput("");
      };
      return (
        <div className="mt-1">
          <div className="flex flex-wrap gap-1 mb-1.5">
            {options.map(o=>(
              <span key={o} className="inline-flex items-center gap-1 text-[11px] bg-blue-50 text-blue-600 border border-blue-200 rounded-full px-2 py-0.5">
                {o}
                <button onMouseDown={()=>onChange(options.filter(x=>x!==o))}
                  className="bg-transparent border-none cursor-pointer text-blue-300 text-xs leading-none p-0">×</button>
              </span>
            ))}
          </div>
          <div className="flex gap-1">
            <input value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"||e.key===","){e.preventDefault();add();}}}
              placeholder="Type option, press Enter…"
              className="flex-1 text-xs px-2 py-1 rounded-md border border-slate-300 outline-none focus:ring-2 focus:ring-blue-500"/>
            <button onMouseDown={add} className="btn btn-xs btn-primary">Add</button>
          </div>
        </div>
      );
    }

    // ── Markdown editor ──────────────────────────────────────────────────────
    function MdEditor({ value, onChange, placeholder, rows = 4 }) {
      const [preview, setPreview] = React.useState(false);
      const ref = React.useRef(null);
      const b = "flex items-center justify-center min-w-[22px] h-[22px] px-1 rounded hover:bg-slate-200 cursor-pointer text-slate-500 hover:text-slate-800 border-none bg-transparent font-sans transition-colors text-[11px] select-none";
      const sep = <span style={{width:1,height:12,background:"#e2e8f0",margin:"0 2px",display:"inline-block",alignSelf:"center"}}/>;

      const wrap = (before, after, ph) => {
        const el = ref.current; if (!el) return;
        const s = el.selectionStart, e = el.selectionEnd;
        const sel = value.slice(s, e) || ph || "";
        onChange(value.slice(0, s) + before + sel + after + value.slice(e));
        requestAnimationFrame(() => { el.focus(); el.setSelectionRange(s + before.length, s + before.length + sel.length); });
      };
      const line = (prefix) => {
        const el = ref.current; if (!el) return;
        const pos = el.selectionStart;
        const ls = value.lastIndexOf('\n', pos - 1) + 1;
        const has = value.slice(ls).startsWith(prefix);
        onChange(has ? value.slice(0, ls) + value.slice(ls + prefix.length) : value.slice(0, ls) + prefix + value.slice(ls));
        requestAnimationFrame(() => el.focus());
      };
      const md = e => e.preventDefault();
      const html = () => typeof marked !== 'undefined'
        ? marked.parse((value || "").replace(/==(.+?)==/g, '<mark>$1</mark>'))
        : (value || "");

      return (
        <div style={{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:1,background:"#f8fafc",padding:"3px 4px",borderBottom:"1px solid #e2e8f0"}}>
            <button className={b} title="Bold"          onMouseDown={e=>{md(e);wrap("**","**","bold")}}><strong>B</strong></button>
            <button className={b} title="Italic"        onMouseDown={e=>{md(e);wrap("_","_","italic")}} style={{fontStyle:"italic"}}>I</button>
            <button className={b} title="Strikethrough" onMouseDown={e=>{md(e);wrap("~~","~~","text")}} style={{textDecoration:"line-through"}}>S</button>
            {sep}
            <button className={b} title="Heading 1"    onMouseDown={e=>{md(e);line("# ")}}  style={{fontWeight:700}}>H1</button>
            <button className={b} title="Heading 2"    onMouseDown={e=>{md(e);line("## ")}} style={{fontWeight:700,fontSize:10}}>H2</button>
            {sep}
            <button className={b} title="Bullet list"   onMouseDown={e=>{md(e);line("- ")}}  style={{letterSpacing:-1}}>• —</button>
            <button className={b} title="Numbered list" onMouseDown={e=>{md(e);line("1. ")}} style={{letterSpacing:-1}}>1. —</button>
            {sep}
            <button className={b} title="Inline code"  onMouseDown={e=>{md(e);wrap("`","`","code")}} style={{fontFamily:"monospace",fontWeight:600}}>&lt;/&gt;</button>
            <button className={b} title="Blockquote"   onMouseDown={e=>{md(e);line("> ")}} style={{fontWeight:700,fontSize:13}}>&ldquo;</button>
            <button className={b} title="Highlight"    onMouseDown={e=>{md(e);wrap("==","==","text")}} style={{background:"#fef08a",color:"#713f12"}}>★</button>
            <div style={{flex:1}}/>
            <button className={b} title={preview?"Switch to edit":"Preview rendered"} onMouseDown={e=>{md(e);setPreview(p=>!p);}}
              style={preview?{background:"#eff6ff",color:"#2563eb"}:{}}>
              {preview ? "Edit" : "Preview"}
            </button>
          </div>
          {preview
            ? <div className="md-content" style={{padding:"8px 12px",fontSize:13,color:"#334155",minHeight:80}} dangerouslySetInnerHTML={{ __html: html() }}/>
            : <textarea ref={ref} value={value || ""} onChange={e => onChange(e.target.value)}
                rows={rows} placeholder={placeholder}
                style={{width:"100%",fontSize:13,padding:"6px 10px",outline:"none",resize:"vertical",border:"none",boxSizing:"border-box"}}/>
          }
        </div>
      );
    }

    // ── Navbar ───────────────────────────────────────────────────────────────
    function Navbar({ user }) {
      const [menuOpen, setMenuOpen] = React.useState(false);
      const logout = () => { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html"; };
      const isAdmin = user.role === "admin";
      React.useEffect(() => {
        if (!menuOpen) return;
        const h = () => setMenuOpen(false);
        document.addEventListener("click", h);
        return () => document.removeEventListener("click", h);
      }, [menuOpen]);
      const nav  = "text-xs px-3.5 py-1.5 rounded-full border border-slate-700 text-slate-300 hover:text-white hover:border-slate-500 transition no-underline";
      const navA = "text-xs px-3.5 py-1.5 rounded-full bg-blue-600 border border-blue-500 text-white no-underline";
      const drop = "flex items-center gap-2 px-3 py-2 text-xs text-slate-300 hover:bg-slate-700 hover:text-white no-underline transition-colors";
      return (
        <div className="bg-slate-900 px-4 sm:px-6 py-3 flex items-center gap-3 shrink-0">
          <a href="dashboard.html" className="text-[15px] font-bold text-white no-underline">⚙️ Kerno</a>
          <span className="text-slate-600 hidden sm:inline">›</span>
          <span className="text-[13px] text-slate-400 hidden sm:inline">Bookings</span>
          <div className="ml-auto flex gap-2 items-center">
            <a href="kanban.html"   className={`${nav} hidden sm:inline-flex`}>📋 Kanban</a>
            <a href="booking.html"  className={`${navA} hidden sm:inline-flex`}>📅 Bookings</a>
            <a href="requests.html" className={`${nav} hidden sm:inline-flex`}>📝 Requests</a>
            <div className="relative" onClick={e => e.stopPropagation()}>
              <button onClick={() => setMenuOpen(o => !o)}
                className="flex items-center gap-1.5 text-xs px-3.5 py-1.5 rounded-full border border-slate-700 text-slate-300 hover:text-white hover:border-slate-500 transition cursor-pointer font-[inherit]">
                {user.avatar_url
                  ? <img src={user.avatar_url} className="w-5 h-5 rounded-full object-cover" alt="" />
                  : <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-slate-600 text-slate-200 font-bold text-[10px]">{user.username[0].toUpperCase()}</span>}
                <span className="hidden sm:inline">{user.display_name || user.username}</span>
                {isAdmin && <span className="text-[9px] bg-blue-600 text-white rounded-full px-1.5 py-0.5 hidden sm:inline">admin</span>}
                <span className="text-[10px] text-slate-600">▾</span>
              </button>
              {menuOpen && (
                <div className="absolute right-0 top-full mt-1 w-48 bg-slate-800 border border-slate-700 rounded-xl shadow-xl z-50 overflow-hidden">
                  <a href="profile.html" className={drop}>👤 My Profile</a>
                  <a href="guide.html"   className={drop}>📖 User Guide</a>
                  <div className="border-t border-slate-700 sm:hidden" />
                  <a href="kanban.html"   className={`${drop} sm:hidden`}>📋 Kanban</a>
                  <a href="booking.html"  className={`${drop} sm:hidden`}>📅 Bookings</a>
                  <a href="requests.html" className={`${drop} sm:hidden`}>📝 Requests</a>
                  {isAdmin && <div className="border-t border-slate-700" />}
                  {isAdmin && <a href="users.html"   className={drop}>👥 Users & Groups</a>}
                  {isAdmin && <a href="pricing.html" className={drop}>💰 Pricing</a>}
                  {isAdmin && <a href="grants.html"  className={drop}>🏛 Grants</a>}
                  {isAdmin && <a href="domains.html" className={drop}>🗂 Domains</a>}
                </div>
              )}
            </div>
            <button onClick={logout} className="text-xs px-3.5 py-1.5 rounded-full border border-slate-700 text-slate-300 hover:text-white hover:border-slate-500 transition cursor-pointer font-[inherit]">Sign out</button>
          </div>
        </div>
      );
    }

    // ── Booking Form Modal ───────────────────────────────────────────────────
    const TIER_LABELS = { internal: "Internal", cracs: "CRACs", academia: "Academia", industry: "Industry" };

    function BookingModal({
      booking, resource, fields, onSave, onDelete, onClose,
      isAdmin, username, initialStart, initialEnd, initialDate, grants,
      allBookings, pricing,
      moveFromId, moveFromName,
    }) {
      const isNew    = !booking?.id;
      const isMoveOp = !!moveFromId;
      const slotMins = resource?.slot_duration || 30;

      const [date,       setDate]       = useState(booking?.date      || initialDate || fmt(new Date()));
      const [startTime,  setStartTime]  = useState(initialStart || booking?.start_time || "09:00");
      const [endTime,    setEndTime]    = useState(initialEnd   || booking?.end_time   || minsToTime(slotMins === 0 ? 60 : slotMins));
      const [fullDay,    setFullDay]    = useState(booking?.full_day  || slotMins === 0);
      const [notes,      setNotes]      = useState(booking?.notes     || "");
      const [meta,       setMeta]       = useState(booking?.metadata  ? Object.fromEntries(Object.entries(booking.metadata).filter(([k])=>k!=="__series_id")) : {});
      const [grantId,    setGrantId]    = useState(booking?.grant_id || "");
      const [status,     setStatus]     = useState(booking?.status    || (resource?.approval_required ? "pending" : "approved"));
      const [saving,     setSaving]     = useState(false);
      const [saveError,  setSaveError]  = useState(null);
      const [repeatMode, setRepeatMode] = useState("none");
      const [repeatUntil,setRepeatUntil]= useState("");

      // Series info
      const seriesId            = booking?.metadata?.__series_id;
      const seriesBookings      = seriesId ? (allBookings||[]).filter(b => b.metadata?.__series_id === seriesId) : [];
      const todayStr            = fmt(new Date());
      const futureSeriesBookings= seriesBookings.filter(b => b.date >= todayStr);

      const maxRepeatDate = (() => {
        const d = date ? new Date(date + "T00:00:00") : new Date();
        d.setFullYear(d.getFullYear() + 1);
        return fmt(d);
      })();

      const repeatDates  = (repeatMode !== "none" && repeatUntil) ? generateDates(date, repeatMode, repeatUntil) : null;
      const repeatCount  = repeatDates ? repeatDates.length : 1;

      const save = async () => {
        setSaving(true); setSaveError(null);
        const payload = {
          resource_id: resource.id, username, date,
          full_day: fullDay,
          start_time: fullDay ? null : startTime,
          end_time:   fullDay ? null : endTime,
          notes, grant_id: grantId || null, status,
        };

        if ((isNew || isMoveOp) && repeatMode !== "none" && repeatUntil && repeatDates?.length) {
          const sid = `s${Date.now().toString(36)}${Math.random().toString(36).slice(2,6)}`;
          let errors = [];
          for (const d of repeatDates) {
            const r = await api.saveBooking({...payload, date: d, metadata: {...meta, __series_id: sid}});
            if (r?.error || r?.code === "OVERLAP") errors.push(d);
          }
          if (moveFromId) await api.deleteBooking(moveFromId);
          if (errors.length) {
            setSaveError(`${errors.length} booking(s) could not be created (overlap or error). Others were saved.`);
            setSaving(false); return;
          }
        } else {
          const prevSeriesId = booking?.metadata?.__series_id;
          const metaFull = prevSeriesId ? {...meta, __series_id: prevSeriesId} : meta;
          const r = isNew || isMoveOp
            ? await api.saveBooking({...payload, metadata: metaFull})
            : await api.updateBooking(booking.id, {...payload, metadata: metaFull});
          if (r?.error || r?.code === "OVERLAP") {
            setSaveError(r?.code === "OVERLAP" ? "This time slot is already booked — please choose another." : r.error || "Could not save booking.");
            setSaving(false); return;
          }
          if (moveFromId) await api.deleteBooking(moveFromId);
        }

        setSaving(false); onSave();
      };

      const del = async () => {
        if (!confirm("Delete this booking?")) return;
        setSaving(true);
        const r = await api.deleteBooking(booking.id);
        setSaving(false);
        if (r?.code === "DELETE_TOLERANCE") { setSaveError(r.error); return; }
        onDelete();
      };

      const delSingle = async () => {
        if (!confirm("Delete only this entry from the series?")) return;
        setSaving(true); await api.deleteBooking(booking.id); setSaving(false); onDelete();
      };

      const delSeries = async (scope) => {
        const toDelete = scope === "all" ? seriesBookings : futureSeriesBookings;
        if (!toDelete.length) return;
        const label = scope === "all" ? `all ${toDelete.length}` : `${toDelete.length} future`;
        if (!confirm(`Delete ${label} booking(s) in this series?`)) return;
        setSaving(true);
        for (const b of toDelete) await api.deleteBooking(b.id);
        setSaving(false); onDelete();
      };

      const release = async () => {
        if (!confirm("Release this booking? It stays in the financial report but frees the slot.")) return;
        setSaving(true); await api.updateBooking(booking.id, { status: "released" }); setSaving(false); onSave();
      };

      const canEdit = isAdmin || !booking?.id || booking?.username === username;

      const toleranceHours = resource?.delete_tolerance_hours || 0;
      const inToleranceWindow = toleranceHours > 0 && booking?.id && booking?.date && booking?.start_time && !booking?.full_day && (() => {
        const cutoff = new Date(new Date(`${booking.date}T${booking.start_time}`).getTime() - toleranceHours * 3_600_000);
        return new Date() > cutoff;
      })();

      const inputCls = "w-full text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-50 disabled:text-slate-400";
      const labelCls = "text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-1.5";

      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" onMouseDown={onClose}>
          <div className="bg-white rounded-t-2xl sm:rounded-2xl p-5 sm:p-6 w-full sm:w-[460px] max-h-[90vh] overflow-y-auto shadow-2xl" onMouseDown={e=>e.stopPropagation()}>

            {/* Header */}
            <div className="flex justify-between items-center mb-4">
              <div>
                <div className="text-[15px] font-bold text-slate-900">
                  {isMoveOp ? `Move to ${resource?.name}` : isNew ? "New Booking" : resource?.name}
                </div>
                {!isNew && !isMoveOp && <div className="text-xs text-slate-500 mt-0.5">{booking.username}</div>}
                {resource?.approval_required && (isNew || isMoveOp) && <div className="text-[11px] text-orange-600 mt-1">⚠ Requires admin approval</div>}
                {seriesId && !isNew && (
                  <div className="text-[11px] text-violet-600 mt-0.5">↻ Series · {seriesBookings.length} total · {futureSeriesBookings.length} future</div>
                )}
              </div>
              <button onClick={onClose} className="text-lg bg-transparent border-none cursor-pointer text-slate-400 leading-none hover:text-slate-600">✕</button>
            </div>

            {/* Move banner */}
            {isMoveOp && moveFromName && (
              <div className="flex items-center gap-2 bg-blue-50 border border-blue-100 rounded-xl px-4 py-2.5 text-xs text-blue-700 mb-4">
                ↔ Moving from <strong>{moveFromName}</strong> — confirm details and fill any required fields.
              </div>
            )}

            {/* Date */}
            <div className="mb-3">
              <label className={labelCls}>DATE</label>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)} disabled={!canEdit} className={inputCls}/>
            </div>

            {resource?.booking_type !== "fullday" && slotMins !== 0 && (
              <label className="flex items-center gap-2 text-sm text-slate-500 mb-3 cursor-pointer">
                <input type="checkbox" checked={fullDay} onChange={e=>setFullDay(e.target.checked)} disabled={!canEdit}/>
                Full day
              </label>
            )}

            {!fullDay && slotMins !== 0 && (
              <div className="flex gap-2.5 mb-3">
                <div className="flex-1">
                  <label className={labelCls}>START</label>
                  <select value={startTime} onChange={e=>setStartTime(e.target.value)} disabled={!canEdit} className={inputCls}>
                    {getSlots(slotMins).map(s=><option key={s.label} value={s.label}>{s.label}</option>)}
                  </select>
                </div>
                <div className="flex-1">
                  <label className={labelCls}>END</label>
                  <select value={endTime} onChange={e=>setEndTime(e.target.value)} disabled={!canEdit} className={inputCls}>
                    {getSlots(slotMins).map(s=><option key={s.label} value={s.label}>{s.label}</option>)}
                    <option value="24:00">24:00</option>
                  </select>
                </div>
              </div>
            )}

            {/* Estimated cost */}
            {(() => {
              const sku = (pricing?.skus || []).find(s => s.id === resource?.sku_id);
              if (!sku) return null;
              let hours = 0;
              if (fullDay) {
                hours = 8;
              } else {
                const [sh, sm] = (startTime || "00:00").split(":").map(Number);
                const [eh, em] = (endTime   || "00:00").split(":").map(Number);
                hours = Math.max(0, ((eh * 60 + em) - (sh * 60 + sm)) / 60);
              }
              if (hours <= 0) return null;
              const tier  = grantId ? ((grants||[]).find(g => g.id === grantId)?.tier || "internal") : "internal";
              const price = parseFloat(sku[tier] || 0);
              const cost  = price * hours;
              return (
                <div className="mb-3 flex items-center gap-2 flex-wrap text-[11px]">
                  <span className="bg-violet-50 border border-violet-100 rounded-lg px-2.5 py-1 font-semibold text-violet-700">
                    Estimated: €{cost.toFixed(2)}
                  </span>
                  <span className="text-slate-400">{sku.name} · {hours}h × €{price.toFixed(2)} / {TIER_LABELS[tier]||tier}</span>
                </div>
              );
            })()}

            {(grants||[]).length > 0 && (
              <div className="mb-3">
                <label className={labelCls}>GRANT</label>
                <select value={grantId} onChange={e=>setGrantId(e.target.value)} disabled={!canEdit} className={inputCls}>
                  <option value="">— none —</option>
                  {grants.map(g=>(
                    <option key={g.id} value={g.id}>{g.code} · {g.name}</option>
                  ))}
                </select>
                {grantId && (() => { const g = grants.find(x=>x.id===grantId); return g ? (
                  <div className="mt-1.5 text-[11px] text-slate-500 flex gap-3 flex-wrap">
                    <span className="bg-slate-100 rounded px-1.5 py-0.5">Tier: <strong>{TIER_LABELS[g.tier]||g.tier}</strong></span>
                    {g.funds > 0 && (() => {
                      const remaining = g.funds - (g.spent || 0);
                      const over = remaining < 0;
                      return (
                        <span className={`rounded px-1.5 py-0.5 ${over ? "bg-red-50 text-red-600" : "bg-slate-100"}`}>
                          Available: <strong>€{remaining.toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2})}</strong>
                          <span className="text-slate-400 ml-1">of €{g.funds.toLocaleString()}</span>
                        </span>
                      );
                    })()}
                  </div>
                ) : null; })()}
              </div>
            )}

            {fields.map(f=>(
              <div key={f.id} className="mb-3">
                <label className={labelCls}>{f.label.toUpperCase()}</label>
                {f.type==="dropdown"
                  ? <select value={meta[f.id]||""} onChange={e=>setMeta({...meta,[f.id]:e.target.value})} disabled={!canEdit} className={inputCls}>
                      <option value="">Select…</option>
                      {(f.options||[]).map(o=><option key={o} value={o}>{o}</option>)}
                    </select>
                  : <input value={meta[f.id]||""} onChange={e=>setMeta({...meta,[f.id]:e.target.value})} disabled={!canEdit} className={inputCls}/>
                }
              </div>
            ))}

            <div className="mb-3">
              <label className={labelCls}>NOTES</label>
              <textarea value={notes} onChange={e=>setNotes(e.target.value)} disabled={!canEdit} rows={3}
                className={`${inputCls} resize-y`}/>
            </div>

            {/* Repeat (new / move operations) */}
            {(isNew || isMoveOp) && canEdit && (
              <div className="mb-3 bg-slate-50 rounded-xl p-3 border border-slate-200">
                <label className={labelCls}>REPEAT</label>
                <div className="flex items-center gap-2 flex-wrap">
                  <select value={repeatMode} onChange={e=>{setRepeatMode(e.target.value);setRepeatUntil("");}}
                    className="text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 bg-white outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="none">No repeat</option>
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                  </select>
                  {repeatMode !== "none" && (
                    <>
                      <span className="text-xs text-slate-500">until</span>
                      <input type="date" value={repeatUntil} onChange={e=>setRepeatUntil(e.target.value)}
                        min={date || fmt(new Date())} max={maxRepeatDate}
                        className="text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 bg-white outline-none focus:ring-2 focus:ring-blue-500 flex-1"/>
                    </>
                  )}
                </div>
                {repeatMode !== "none" && repeatUntil && repeatDates && (
                  <div className="text-[11px] text-violet-600 mt-1.5">
                    ↻ {repeatDates.length} booking{repeatDates.length!==1?"s":""} will be created · max 1 year ahead
                  </div>
                )}
              </div>
            )}

            {isAdmin && !isNew && !isMoveOp && (
              <div className="mb-4">
                <label className={labelCls}>STATUS</label>
                <select value={status} onChange={e=>setStatus(e.target.value)} className={inputCls}>
                  <option value="pending">Pending</option>
                  <option value="approved">Approved</option>
                  <option value="rejected">Rejected</option>
                </select>
              </div>
            )}

            {saveError && (
              <div className="flex items-center gap-2 bg-red-50 border border-red-100 rounded-xl px-4 py-2.5 text-sm text-red-600 mb-3">
                ⚠ {saveError}
              </div>
            )}

            {canEdit && (
              <div className="flex gap-2 flex-wrap">
                <button onClick={save} disabled={saving} className="btn btn-md btn-primary" style={{flex:"1 1 auto"}}>
                  {saving ? "Saving…"
                    : isMoveOp ? "Confirm Move"
                    : isNew
                      ? (repeatDates && repeatDates.length > 1 ? `Create ${repeatDates.length} Bookings` : "Create Booking")
                      : "Save Changes"}
                </button>

                {!isNew && !isMoveOp && (
                  seriesId ? (
                    <>
                      <button onClick={delSingle} disabled={saving} title="Delete only this entry" className="btn btn-md btn-danger">
                        This
                      </button>
                      {futureSeriesBookings.length > 0 && (
                        <button onClick={()=>delSeries("future")} disabled={saving}
                          title={`Delete ${futureSeriesBookings.length} future entries from today`}
                          className="btn btn-md btn-danger-fill">
                          Future ({futureSeriesBookings.length})
                        </button>
                      )}
                      {isAdmin && seriesBookings.length > 0 && (
                        <button onClick={()=>delSeries("all")} disabled={saving}
                          title={`Delete all ${seriesBookings.length} entries in series (including past)`}
                          className="btn btn-md btn-danger-fill">
                          All ({seriesBookings.length})
                        </button>
                      )}
                    </>
                  ) : inToleranceWindow ? (
                    <button onClick={release} disabled={saving} title={`Within ${toleranceHours}h tolerance window`}
                      className="btn btn-md btn-warning">Release</button>
                  ) : (
                    <button onClick={del} disabled={saving} className="btn btn-md btn-danger">Delete</button>
                  )
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Admin Panel ──────────────────────────────────────────────────────────
    function AdminPanel({resources, members, pricing, onUpdate, onClose, isGlobalAdmin, myAdminResources, domains, resourceDomains: initResDomains}) {
      const visibleResources = isGlobalAdmin ? resources : myAdminResources;
      const [tab,          setTab]           = useState(isGlobalAdmin ? "resources" : "permissions");
      const [editRes,      setEditRes]       = useState(null);
      const [editResDomain,setEditResDomain] = useState(""); // domain_id for the resource being edited
      const [allFields,    setAllFields]     = useState({});
      const [saving,       setSaving]        = useState(false);
      const [selectedResId,setSelectedResId] = useState(null);

      useEffect(()=>{
        (async()=>{ const f = await api.getSettings("booking-fields") || {}; setAllFields(f); })();
      },[]);

      const currentFields    = selectedResId ? (allFields[selectedResId]||[]) : [];
      const setCurrentFields = (fields) => setAllFields({...allFields,[selectedResId]:fields});

      const saveResource = async () => {
        if(!editRes?.name?.trim()) return;
        setSaving(true);
        const saved = await api.saveResource(editRes);
        // Update resource-domains setting
        const resId = editRes.id || (saved?.id || null);
        if (resId) {
          const currentMap = initResDomains || {};
          const newMap = { ...currentMap };
          if (editResDomain) newMap[resId] = editResDomain;
          else delete newMap[resId];
          await api.saveSettings("resource-domains", newMap);
        }
        setSaving(false); setEditRes(null); setEditResDomain(""); onUpdate();
      };
      const saveFields = async () => {
        setSaving(true); await api.saveSettings("booking-fields", allFields); setSaving(false); onUpdate();
      };
      const togglePerm = async (m, resourceId) => {
        const perms = m.permissions||[];
        if (perms.includes(resourceId)) await api.revokeAccess(resourceId, m.id);
        else                            await api.grantAccess(resourceId, m.id);
        onUpdate();
      };
      const addField    = ()       => setCurrentFields([...currentFields,{id:`f${Date.now()}`,label:"New Field",type:"text",options:[]}]);
      const updateField = (id,k,v) => setCurrentFields(currentFields.map(f=>f.id===id?{...f,[k]:v}:f));
      const removeField = (id)     => setCurrentFields(currentFields.filter(f=>f.id!==id));

      const inputCls  = "w-full text-xs px-2.5 py-1.5 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-blue-500 mb-2";
      const labelCls  = "text-[11px] font-semibold text-slate-500 uppercase tracking-wider block mb-1";

      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" onMouseDown={onClose}>
          <div className="w-full sm:w-[580px] max-h-[90vh] flex flex-col bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl" onMouseDown={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-4 border-b border-slate-200">
              <div className="text-[15px] font-bold text-slate-900">⚙️ Admin</div>
              <button onClick={onClose} className="text-lg bg-transparent border-none cursor-pointer text-slate-400 hover:text-slate-600">✕</button>
            </div>
            <div className="flex border-b border-slate-200">
              {(isGlobalAdmin ? ["resources","fields","permissions"] : ["permissions"]).map(t=>(
                <button key={t} onClick={()=>setTab(t)}
                  className={`flex-1 text-xs py-2.5 border-none cursor-pointer capitalize transition-colors
                    ${tab===t
                      ? "border-b-2 border-blue-600 text-blue-600 font-semibold bg-transparent"
                      : "border-b-2 border-transparent text-slate-500 font-normal bg-transparent hover:text-slate-700"}`}>
                  {t}
                </button>
              ))}
            </div>
            <div className="flex-1 overflow-y-auto p-5">

              {tab==="resources"&&(
                <div>
                  <div className="flex justify-between items-center mb-3">
                    <div className="text-[13px] font-semibold text-slate-800">Resources</div>
                    <button onClick={()=>{ setEditRes({name:"",description:"",booking_type:"both",slot_duration:30,approval_required:false}); setEditResDomain(""); }}
                      className="btn btn-xs btn-primary">+ Add</button>
                  </div>
                  {editRes&&(
                    <div className="bg-slate-50 border border-slate-200 rounded-xl p-4 mb-3">
                      <input value={editRes.name||""} onChange={e=>setEditRes({...editRes,name:e.target.value})} placeholder="Resource name" className={inputCls}/>
                      <label className={labelCls}>DESCRIPTION (markdown, shown via ⓘ in calendar)</label>
                      <div className="mb-2">
                        <MdEditor value={editRes.description||""} onChange={v=>setEditRes({...editRes,description:v})} placeholder="Describe this resource… (markdown supported)" rows={3}/>
                      </div>
                      <label className={labelCls}>BOOKING TYPE</label>
                      <select value={editRes.booking_type||"both"} onChange={e=>setEditRes({...editRes,booking_type:e.target.value})} className={inputCls}>
                        <option value="timeslot">Time slots only</option>
                        <option value="fullday">Full days only</option>
                        <option value="both">Both</option>
                      </select>
                      <label className={labelCls}>SLOT DURATION</label>
                      <select value={editRes.slot_duration ?? 30} onChange={e=>setEditRes({...editRes,slot_duration:Number(e.target.value)})} className={inputCls}>
                        {SLOT_DURATIONS.map(d=><option key={d.value} value={d.value}>{d.label}</option>)}
                      </select>
                      <label className="flex items-center gap-2 text-xs text-slate-500 mb-3 cursor-pointer">
                        <input type="checkbox" checked={editRes.approval_required||false} onChange={e=>setEditRes({...editRes,approval_required:e.target.checked})}/>
                        Requires admin approval
                      </label>
                      <label className={labelCls}>MAX DAYS AHEAD (0 = unlimited)</label>
                      <input type="number" min="0" value={editRes.max_days_ahead ?? 0}
                        onChange={e=>setEditRes({...editRes,max_days_ahead:Number(e.target.value)})}
                        className={inputCls}/>
                      <label className={labelCls}>DELETE TOLERANCE (hours before booking, 0 = no limit)</label>
                      <input type="number" min="0" value={editRes.delete_tolerance_hours ?? 0}
                        onChange={e=>setEditRes({...editRes,delete_tolerance_hours:Number(e.target.value)})}
                        className={inputCls}/>
                      <label className={labelCls}>CALENDAR ADMIN</label>
                      <select value={editRes.admin_username||""} onChange={e=>setEditRes({...editRes,admin_username:e.target.value})} className={inputCls}>
                        <option value="">— None —</option>
                        {members.map(m=><option key={m.id} value={m.username}>{m.username}</option>)}
                      </select>
                      <label className={labelCls}>PRICING SKU (per hour)</label>
                      <select value={editRes.sku_id||""} onChange={e=>setEditRes({...editRes,sku_id:e.target.value})} className={inputCls}>
                        <option value="">— No pricing —</option>
                        {(pricing?.skus||[]).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                      </select>
                      {(domains||[]).length > 0 && (
                        <>
                          <label className={labelCls}>DOMAIN</label>
                          <select value={editResDomain} onChange={e=>setEditResDomain(e.target.value)} className={inputCls}>
                            <option value="">— None —</option>
                            {(domains||[]).map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
                          </select>
                        </>
                      )}
                      <div className="flex gap-2">
                        <button onClick={saveResource} disabled={saving} className="btn btn-sm btn-primary">Save</button>
                        <button onClick={()=>{ setEditRes(null); setEditResDomain(""); }} className="btn btn-sm btn-secondary">Cancel</button>
                      </div>
                    </div>
                  )}
                  {resources.map(r=>(
                    <div key={r.id} className="flex items-center justify-between p-3 bg-white rounded-xl border border-slate-200 mb-2">
                      <div>
                        <span className="text-[13px] font-semibold text-slate-800">{r.name}</span>
                        <span className="text-[11px] text-slate-400 ml-2">{r.booking_type} · {SLOT_DURATIONS.find(d=>d.value===(r.slot_duration??30))?.label||"30 min"} · {r.approval_required?"approval":"auto"} · admin: {r.admin_username||"—"}</span>
                      </div>
                      <div className="flex gap-1.5">
                        <button onClick={()=>{ setEditRes(r); setEditResDomain((initResDomains||{})[r.id]||""); }} className="btn btn-xs btn-secondary">Edit</button>
                        <button onClick={()=>{if(confirm(`Delete "${r.name}"?`)){api.deleteResource(r.id);onUpdate();}}}
                          className="btn btn-xs btn-danger">Delete</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {tab==="fields"&&(
                <div>
                  <div className="text-[13px] font-semibold text-slate-800 mb-3">Fields per Resource</div>
                  <div className="flex gap-2 mb-4 flex-wrap">
                    {resources.map(r=>(
                      <button key={r.id} onClick={()=>setSelectedResId(r.id)}
                        className={`text-xs px-3 py-1.5 rounded-lg border cursor-pointer transition-colors
                          ${selectedResId===r.id
                            ? "border-blue-500 bg-blue-50 text-blue-600"
                            : "border-slate-200 bg-white text-slate-500 hover:bg-slate-50"}`}>
                        {r.name}
                      </button>
                    ))}
                  </div>
                  {selectedResId ? (
                    <>
                      <div className="flex justify-between items-center mb-2.5">
                        <div className="text-xs text-slate-500">Fields for <strong>{resources.find(r=>r.id===selectedResId)?.name}</strong></div>
                        <button onClick={addField} className="btn btn-xs btn-primary">+ Add field</button>
                      </div>
                      {currentFields.map(f=>(
                        <div key={f.id} className="bg-slate-50 border border-slate-200 rounded-xl p-3 mb-2">
                          <div className={`flex gap-2 ${f.type!=="text"?"mb-2":""}`}>
                            <input value={f.label} onChange={e=>updateField(f.id,"label",e.target.value)} placeholder="Field label"
                              className="flex-[2] text-xs px-2 py-1.5 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-blue-500"/>
                            <select value={f.type} onChange={e=>updateField(f.id,"type",e.target.value)}
                              className="flex-1 text-xs px-2 py-1.5 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-blue-500">
                              <option value="text">Text</option>
                              <option value="dropdown">Dropdown</option>
                            </select>
                            <button onClick={()=>removeField(f.id)} className="btn btn-xs btn-danger">✕</button>
                          </div>
                          {f.type==="dropdown"&&(
                            <OptionsEditor options={f.options||[]} onChange={opts=>updateField(f.id,"options",opts)}/>
                          )}
                        </div>
                      ))}
                      <button onClick={saveFields} disabled={saving} className="btn btn-md btn-primary btn-block mt-2">
                        {saving?"Saving…":"Save Fields"}
                      </button>
                    </>
                  ) : <div className="text-xs text-slate-400">Select a resource above to configure its fields.</div>}
                </div>
              )}

              {tab==="permissions"&&(
                <div>
                  <div className="text-[13px] font-semibold text-slate-800 mb-3">Booking Permissions per Resource</div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs border-collapse">
                      <thead>
                        <tr className="border-b border-slate-200">
                          <th className="text-left py-2 pr-4 text-slate-500 font-semibold">User</th>
                          {visibleResources.map(r=>(
                            <th key={r.id} className="text-center py-2 px-3 text-slate-500 font-semibold whitespace-nowrap">{r.name}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {members.filter(m => m.role !== "admin").map(m=>(
                          <tr key={m.id} className="border-b border-slate-100">
                            <td className="py-2.5 pr-4">
                              <span className="text-[13px] font-semibold text-slate-800">{m.username}</span>
                            </td>
                            {visibleResources.map(r=>(
                              <td key={r.id} className="text-center py-2.5 px-3">
                                <input type="checkbox"
                                  checked={(m.permissions||[]).includes(r.id)}
                                  onChange={()=>togglePerm(m, r.id)}/>
                              </td>
                            ))}
                          </tr>
                        ))}
                        {isGlobalAdmin && (
                          <tr>
                            <td colSpan={visibleResources.length+1} className="py-2 text-[11px] text-slate-400 italic">
                              Admin users have automatic access to all resources and are not shown above.
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── Weekly Calendar (multi-resource) ─────────────────────────────────────
    function WeeklyCalendar({ resources, weekStart, allBookings, allFields, user, isAdmin, canBookResource, onRefresh, onRequestAccess, grants, pricing }) {
      const [modal,      setModal]      = useState(null);   // { booking, startTime, endTime, date, resId }
      const [dropModal,  setDropModal]  = useState(null);   // { prefill, targetResource, targetFields, moveFromId, moveFromName }
      const [showDesc,   setShowDesc]   = useState(false);
      const [requested,  setRequested]  = useState({});
      const [requesting, setRequesting] = useState({});
      const dragRef = useRef(null);

      const numRes   = resources.length;
      const resource = resources[0];  // for single-resource helpers

      // Display grid always uses 30-min rows so multi-resource with different slot_durations aligns
      const displaySlotMins = 30;
      const fullDayOnly = numRes === 1 && (resource?.slot_duration === 0 || resource?.booking_type === "fullday");
      const DISPLAY_SLOTS = fullDayOnly ? [] : getSlots(displaySlotMins);

      const days = Array.from({ length: 7 }, (_, i) => addDays(weekStart, i));

      // Pixel helpers based on 30-min display scale
      const minutesToPx = (m) => m / displaySlotMins * SLOT_H;
      const getTop    = (b) => {
        if (b.full_day) return 0;
        const [h, m] = b.start_time.split(":").map(Number);
        return minutesToPx(h * 60 + m);
      };
      const getHeight = (b) => {
        if (b.full_day) return minutesToPx(24 * 60);
        const [sh, sm] = b.start_time.split(":").map(Number);
        const [eh, em] = b.end_time.split(":").map(Number);
        const dur = (eh * 60 + em) - (sh * 60 + sm);
        return Math.max(minutesToPx(Math.max(dur, 15)), SLOT_H * 0.6);
      };

      // ── Drag handlers ────────────────────────────────────────────────────
      const handleDragStart = (e, booking, resId) => {
        dragRef.current = { booking, resId };
        e.dataTransfer.effectAllowed = "move";
        e.stopPropagation();
      };

      const finishDrop = (e, targetDate, slotIdx, targetResId, dropFullDay) => {
        e.preventDefault();
        e.currentTarget.classList.remove("drag-over");
        const drag = dragRef.current; dragRef.current = null;
        if (!drag || !canBookResource(targetResId)) return;

        const targetRes    = resources.find(r => r.id === targetResId);
        const sourceFields = allFields[drag.resId] || [];
        const targetFields = allFields[targetResId] || [];
        const mappedMeta   = mapMetadata(sourceFields, targetFields, drag.booking.metadata || {});

        const targetSlotMins = targetRes?.slot_duration || 30;
        let newStart = drag.booking.start_time || "09:00";
        let newEnd   = drag.booking.end_time   || minsToTime(targetSlotMins);

        if (slotIdx != null && !drag.booking.full_day) {
          const dropMins    = slotIdx * displaySlotMins;
          const [sh, sm]    = newStart.split(":").map(Number);
          const [eh, em]    = newEnd.split(":").map(Number);
          const origDur     = Math.max((eh * 60 + em) - (sh * 60 + sm), targetSlotMins);
          const snappedStart = Math.round(dropMins / targetSlotMins) * targetSlotMins;
          newStart = minsToTime(snappedStart);
          newEnd   = minsToTime(snappedStart + origDur);
        }

        const sourceResName = drag.resId !== targetResId
          ? resources.find(r => r.id === drag.resId)?.name || null
          : null;

        setDropModal({
          prefill: {
            date:      targetDate,
            start_time: newStart,
            end_time:   newEnd,
            full_day:   dropFullDay || (drag.booking.full_day && slotIdx == null),
            notes:      drag.booking.notes || "",
            metadata:   mappedMeta,
            grant_id:   drag.booking.grant_id || "",
          },
          targetResource: targetRes,
          targetFields,
          moveFromId:   drag.booking.id,
          moveFromName: sourceResName,
        });
      };

      const dragOver = e => { e.preventDefault(); e.currentTarget.classList.add("drag-over"); };
      const dragLeave= e => e.currentTarget.classList.remove("drag-over");

      // ── Open regular modal ───────────────────────────────────────────────
      const openModal = (booking, slotIdx, dateStr, resId) => {
        const res          = resources.find(r => r.id === resId) || resource;
        const targetSlotMins = res?.slot_duration || 30;
        let initialStart = null, initialEnd = null;
        if (slotIdx != null) {
          const snapStart = Math.round(slotIdx * displaySlotMins / targetSlotMins) * targetSlotMins;
          initialStart = minsToTime(snapStart);
          initialEnd   = minsToTime(snapStart + targetSlotMins);
        }
        setModal({ booking: booking || null, initialStart, initialEnd, date: dateStr, resId });
      };

      // Request access handlers
      const handleRequestAccess = async (resId) => {
        setRequesting(p => ({...p, [resId]: true}));
        const r = await onRequestAccess(resId);
        setRequesting(p => ({...p, [resId]: false}));
        if (r?.success) setRequested(p => ({...p, [resId]: true}));
      };

      const gridCols = `60px repeat(${7 * numRes}, 1fr)`;
      const minW     = 60 + 7 * numRes * (numRes > 1 ? 85 : 90);

      const modalResource = modal ? resources.find(r => r.id === modal.resId) || resource : null;
      const modalFields   = modal ? (allFields[modal.resId] || []) : [];

      return (
        <div className="flex-1 overflow-y-auto overflow-x-auto">

          {/* No-permission banners */}
          {resources.filter(r => !canBookResource(r.id)).map(r => (
            <div key={r.id} className="mx-4 mt-3 flex items-center justify-between gap-4 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3">
              <span className="text-sm text-amber-800">
                No permission to book <strong>{r.name}</strong>.
                {r.admin_username ? <> Ask <strong>{r.admin_username}</strong> for access.</> : <> Ask an administrator.</>}
              </span>
              {!requested[r.id] && (
                <button onClick={()=>handleRequestAccess(r.id)} disabled={requesting[r.id]} className="btn btn-sm btn-amber-fill shrink-0">
                  {requesting[r.id] ? "Sending…" : "Request access"}
                </button>
              )}
              {requested[r.id] && <span className="shrink-0 text-xs text-green-600 font-semibold">✓ Sent!</span>}
            </div>
          ))}

          {/* Regular booking modal */}
          {modal && (
            <BookingModal
              booking={modal.booking || {}}
              resource={modalResource}
              fields={modalFields}
              isAdmin={isAdmin}
              username={user.username}
              initialStart={modal.initialStart}
              initialEnd={modal.initialEnd}
              initialDate={modal.date}
              grants={grants || []}
              allBookings={allBookings}
              pricing={pricing}
              onSave={() => { setModal(null); onRefresh(); }}
              onDelete={() => { setModal(null); onRefresh(); }}
              onClose={() => setModal(null)}
            />
          )}

          {/* Drag-drop move modal */}
          {dropModal && (
            <BookingModal
              booking={dropModal.prefill}
              resource={dropModal.targetResource}
              fields={dropModal.targetFields}
              isAdmin={isAdmin}
              username={user.username}
              initialStart={dropModal.prefill?.start_time}
              initialEnd={dropModal.prefill?.end_time}
              initialDate={dropModal.prefill?.date}
              grants={grants || []}
              allBookings={allBookings}
              pricing={pricing}
              moveFromId={dropModal.moveFromId}
              moveFromName={dropModal.moveFromName}
              onSave={() => { setDropModal(null); onRefresh(); }}
              onDelete={() => { setDropModal(null); onRefresh(); }}
              onClose={() => setDropModal(null)}
            />
          )}

          {/* ── Day header row ── */}
          <div style={{display:"grid", gridTemplateColumns:gridCols, minWidth:minW}}
            className="sticky top-0 z-10 bg-white border-b-2 border-slate-200">
            <div className="p-2 flex items-start justify-center pt-2.5">
              {numRes === 1 && (
                <button onClick={() => setShowDesc(d => !d)}
                  title={resource?.description ? "Resource description" : "No description set — admin can add one in ⚙ Admin"}
                  style={{fontSize:18,lineHeight:1,background:"none",border:"none",cursor:"pointer",padding:2,borderRadius:"50%",transition:"color .15s"}}
                  className={showDesc ? "text-blue-500" : "text-slate-400 hover:text-blue-500"}>ⓘ</button>
              )}
            </div>
            {days.map((day, di) => {
              const isToday = fmt(day) === fmt(new Date());
              return (
                <div key={di} style={{gridColumn:`span ${numRes}`}} className="py-2 px-1 text-center border-l border-slate-200">
                  <div className="text-[11px] text-slate-400">{day.toLocaleDateString("en",{weekday:"short"})}</div>
                  <div style={{width:26,height:26,lineHeight:"26px",margin:"2px auto 0",borderRadius:"50%",background:isToday?"#eff6ff":"transparent"}}
                    className={`text-[13px] font-bold ${isToday?"text-blue-600":"text-slate-800"}`}>
                    {day.getDate()}
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── Resource sub-headers (multi-view only) ── */}
          {numRes > 1 && (
            <div style={{display:"grid", gridTemplateColumns:gridCols, minWidth:minW}} className="bg-white border-b border-slate-200 sticky top-[56px] z-10">
              <div/>
              {days.flatMap((_, di) =>
                resources.map((res, ri) => (
                  <div key={`${di}-${ri}`} style={{
                    borderLeft: ri === 0 ? "1px solid #e2e8f0" : "1px solid #f1f5f9",
                    padding: "3px 4px",
                    fontSize: 10,
                    fontWeight: 700,
                    color: COLORS[ri % COLORS.length],
                    textAlign: "center",
                    overflow: "hidden",
                    whiteSpace: "nowrap",
                    textOverflow: "ellipsis",
                    background: COLORS[ri % COLORS.length] + "0d",
                  }}>
                    {res.name}
                  </div>
                ))
              )}
            </div>
          )}

          {/* ── Description panel (single-view) ── */}
          {numRes === 1 && showDesc && (
            resource?.description
              ? <div className="mx-4 mt-3 mb-1 px-4 py-3 bg-blue-50 border border-blue-100 rounded-xl text-sm text-slate-700 md-content"
                  dangerouslySetInnerHTML={{ __html: typeof marked !== 'undefined'
                    ? marked.parse(resource.description.replace(/==(.+?)==/g, '<mark>$1</mark>'))
                    : resource.description }}/>
              : <div className="mx-4 mt-3 mb-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-400 italic">
                  No description set. Admins can add one in ⚙ Admin → edit the resource.
                </div>
          )}

          {/* ── Full-day row ── */}
          <div style={{display:"grid", gridTemplateColumns:gridCols, minWidth:minW}} className="border-b-2 border-slate-200 bg-slate-50">
            <div className="px-2 py-1 text-[10px] text-slate-400 flex items-center">All day</div>
            {days.flatMap((day, di) =>
              resources.map((res, ri) => {
                const dateStr   = fmt(day);
                const fdBookings = allBookings.filter(b =>
                  b.resource_id === res.id && b.date === dateStr && b.full_day && b.status !== "released"
                );
                const resColor     = COLORS[ri % COLORS.length];
                const canCreate    = res.booking_type !== "timeslot";
                return (
                  <div key={`${di}-${ri}`}
                    className="border-l border-slate-200 min-h-[24px] p-0.5"
                    style={{borderLeftColor: ri === 0 ? "#e2e8f0" : "#f1f5f9"}}
                    onDragOver={dragOver}
                    onDragLeave={dragLeave}
                    onDrop={e => finishDrop(e, dateStr, null, res.id, true)}
                    onClick={() => canCreate && canBookResource(res.id) && openModal(null, null, dateStr, res.id)}>
                    {fdBookings.map(b => (
                      <div key={b.id}
                        draggable={isAdmin || b.username === user.username}
                        onDragStart={e => handleDragStart(e, b, res.id)}
                        style={{
                          fontSize:10, fontWeight:600,
                          background: STATUS_BG[b.status],
                          color: STATUS_COLOR[b.status],
                          borderLeft: `3px solid ${resColor}`,
                          borderRadius:3, padding:"2px 6px", marginBottom:2,
                          cursor:"grab", overflow:"hidden",
                          whiteSpace:"nowrap", textOverflow:"ellipsis",
                        }}
                        onClick={e => {e.stopPropagation(); openModal(b, null, null, res.id);}}>
                        {b.username} · {b.status}
                        {b.metadata?.__series_id && <span style={{marginLeft:3,opacity:.6}}>↻</span>}
                      </div>
                    ))}
                  </div>
                );
              })
            )}
          </div>

          {/* ── Time grid ── */}
          {!fullDayOnly && (
            <div style={{display:"grid", gridTemplateColumns:gridCols, minWidth:minW}}>
              {DISPLAY_SLOTS.map((slot, si) => (
                <React.Fragment key={si}>
                  {/* Time label */}
                  <div style={{height:SLOT_H, borderBottom:"1px solid #f1f5f9"}} className="flex items-start justify-end pr-2 pt-0.5">
                    {slot.m === 0 && <span className="text-[10px] text-slate-400">{slot.label}</span>}
                  </div>

                  {/* Day × Resource cells */}
                  {days.flatMap((day, di) =>
                    resources.map((res, ri) => {
                      const dateStr   = fmt(day);
                      const resColor  = COLORS[ri % COLORS.length];
                      const isTimeslotRes = res.slot_duration !== 0 && res.booking_type !== "fullday";
                      // Only render booking chips in the first slot row (si===0), positioned absolutely
                      const dBookings = si === 0
                        ? allBookings.filter(b =>
                            b.resource_id === res.id && b.date === dateStr &&
                            !b.full_day && b.status !== "released"
                          )
                        : [];
                      return (
                        <div key={`${di}-${ri}`}
                          className="slot-row"
                          style={{
                            height: SLOT_H,
                            borderBottom: `1px solid ${slot.m === 0 ? "#e2e8f0" : "#f8fafc"}`,
                            borderLeft: `1px solid ${ri === 0 ? "#e2e8f0" : "#f1f5f9"}`,
                            position: "relative",
                            background: "#fff",
                          }}
                          onDragOver={dragOver}
                          onDragLeave={dragLeave}
                          onDrop={e => finishDrop(e, dateStr, si, res.id, false)}
                          onClick={() => isTimeslotRes && canBookResource(res.id) && openModal(null, si, dateStr, res.id)}>
                          {si === 0 && dBookings.map(b => (
                            <div key={b.id}
                              draggable={isAdmin || b.username === user.username}
                              onDragStart={e => handleDragStart(e, b, res.id)}
                              style={{
                                position: "absolute",
                                top: getTop(b) + 1,
                                left: 2, right: 2,
                                height: getHeight(b) - 2,
                                background: resColor + "22",
                                borderLeft: `3px solid ${STATUS_COLOR[b.status] || "#94a3b8"}`,
                                borderRadius: 4, padding: "2px 6px",
                                zIndex: 5, overflow: "hidden", cursor: "grab",
                              }}
                              onClick={e => {e.stopPropagation(); openModal(b, null, null, res.id);}}>
                              <div style={{fontSize:10,fontWeight:700,color:"#1e293b",lineHeight:1.3}}>{b.username}</div>
                              <div style={{fontSize:9,color:"#64748b"}}>{b.start_time}–{b.end_time}</div>
                              {Object.entries(b.metadata||{}).filter(([k])=>k!=="__series_id").slice(0,1).map(([k,v])=>(
                                <div key={k} style={{fontSize:9,color:"#64748b",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{v}</div>
                              ))}
                              <div style={{position:"absolute",top:2,right:4,fontSize:9,background:STATUS_BG[b.status],color:STATUS_COLOR[b.status],borderRadius:3,padding:"1px 4px",fontWeight:600,textTransform:"capitalize"}}>{b.status}</div>
                              {b.metadata?.__series_id && <div style={{position:"absolute",bottom:2,right:4,fontSize:9,color:"#94a3b8",lineHeight:1}}>↻</div>}
                            </div>
                          ))}
                        </div>
                      );
                    })
                  )}
                </React.Fragment>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [user] = useState(() => {
        const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
        if (!s || Date.now() > new Date(s.expires).getTime()) {
          localStorage.removeItem(SESSION_KEY); window.location.href = "index.html?expired=1"; return null;
        }
        return { username: s.username, role: s.role, token: s.token, avatar_url: s.avatar_url || null, display_name: s.display_name || null };
      });

      const [resources,      setResources]      = useState([]);
      const [selectedResIds, setSelectedResIds] = useState([]);
      const [allBookings,    setAllBookings]    = useState([]);
      const [members,        setMembers]        = useState([]);
      const [allFields,      setAllFields]      = useState({});
      const [pricing,        setPricing]        = useState({ skus: [] });
      const [grants,         setGrants]         = useState([]);
      const [loading,        setLoading]        = useState(true);
      const [loadError,      setLoadError]      = useState(null);
      const [showAdmin,      setShowAdmin]      = useState(false);
      const [resourceSearch, setResourceSearch] = useState("");
      const [domains,        setDomains]        = useState([]);
      const [resourceDomains,setResourceDomains]= useState({}); // { [resource_id]: domain_id }
      const [domainFilter,   setDomainFilter]   = useState("all");
      const [weekStart, setWeekStart] = useState(() => {
        const param = new URLSearchParams(location.search).get("date");
        const d = param ? new Date(param) : new Date();
        d.setDate(d.getDate() - d.getDay()); d.setHours(0,0,0,0); return d;
      });

      const isAdmin          = user?.role === "admin";
      const currentMember    = members.find(m => m.username === user?.username);
      const myAdminResources = resources.filter(r => r.admin_username === user?.username);
      const isCalendarAdmin  = myAdminResources.length > 0;

      const canBookResource = (resId) =>
        isAdmin ||
        myAdminResources.some(r => r.id === resId) ||
        (Array.isArray(currentMember?.permissions) && currentMember.permissions.includes(resId));

      const toggleResource = (resId) => {
        setSelectedResIds(prev =>
          prev.includes(resId) ? prev.filter(id => id !== resId) : [...prev, resId]
        );
      };

      const loadBase = async () => {
        setLoadError(null);
        try {
          const [r, m, f, p, g, b, dom, resDom] = await Promise.all([
            api.getResources(), api.getMembers(), api.getSettings("booking-fields"),
            api.getSettings("pricing"), api.getGrants(), api.getBookings(),
            safeFetch(`${WORKER}/domains`, { headers: authHeaders() }),
            api.getSettings("resource-domains"),
          ]);
          const resList = Array.isArray(r) ? r : [];
          const bList   = Array.isArray(b) ? b : [];
          setResources(resList);
          setAllBookings(bList);
          setMembers(Array.isArray(m) ? m : []);
          setAllFields(f && typeof f === "object" ? f : {});
          setPricing(p && Array.isArray(p.skus) ? p : { skus: [] });
          const allGrants = Array.isArray(g) ? g : [];
          setGrants(user?.role === "admin" ? allGrants : allGrants.filter(gr => (gr.members||[]).includes(user?.username)));
          setDomains(Array.isArray(dom) ? dom : []);
          setResourceDomains(resDom && typeof resDom === "object" && !Array.isArray(resDom) ? resDom : {});
          setSelectedResIds(prev => {
            const valid = prev.filter(id => resList.some(r => r.id === id));
            return valid.length > 0 ? valid : resList.length > 0 ? [resList[0].id] : [];
          });
          setLoading(false);
        } catch { setLoadError("Could not load data. Please refresh."); setLoading(false); }
      };

      const refreshBookings = async () => {
        try {
          const b = await api.getBookings();
          setAllBookings(Array.isArray(b) ? b : []);
        } catch {}
      };

      useEffect(() => { if (user) loadBase(); else setLoading(false); }, []);

      if (!user)     return null;
      if (loading)   return <div className="p-8 text-slate-400">Loading…</div>;
      if (loadError) return (
        <div className="p-8 flex flex-col gap-3 items-start">
          <div className="text-red-500">{loadError}</div>
          <button onClick={loadBase} className="text-sm px-3.5 py-1.5 rounded-lg bg-blue-600 text-white border-none cursor-pointer hover:bg-blue-700">Retry</button>
        </div>
      );

      // Usage-sorted + search-filtered + domain-filtered resource list
      const usageCount  = allBookings.reduce((acc, b) => { acc[b.resource_id] = (acc[b.resource_id]||0)+1; return acc; }, {});
      const sortedRes   = [...resources].sort((a, b) => (usageCount[b.id]||0) - (usageCount[a.id]||0));
      const searchLower = resourceSearch.trim().toLowerCase();
      // Apply domain filter first
      const domainFilteredRes = domainFilter === "all"
        ? sortedRes
        : sortedRes.filter(r => resourceDomains[r.id] === domainFilter);
      const filteredRes = searchLower
        ? domainFilteredRes.filter(r => r.name.toLowerCase().includes(searchLower) || (r.description||"").toLowerCase().includes(searchLower))
        : domainFilteredRes.slice(0, 20);
      const hasMore = !searchLower && domainFilteredRes.length > 20;

      const selectedResources = resources.filter(r => selectedResIds.includes(r.id) && (domainFilter === "all" || resourceDomains[r.id] === domainFilter));
      const compareMode       = selectedResIds.length > 1;

      const weekLabel = `${weekStart.toLocaleDateString("en",{month:"short",day:"numeric"})} – ${addDays(weekStart,6).toLocaleDateString("en",{month:"short",day:"numeric",year:"numeric"})}`;

      return (
        <div className="font-sans h-screen flex flex-col bg-slate-50">
          {showAdmin && (
            <AdminPanel resources={resources} members={members} pricing={pricing}
              onUpdate={() => { loadBase(); }}
              onClose={() => setShowAdmin(false)}
              isGlobalAdmin={isAdmin} myAdminResources={myAdminResources}
              domains={domains} resourceDomains={resourceDomains}/>
          )}

          <Navbar user={user} />

          {/* Resource selector bar */}
          <div className="bg-white border-b border-slate-200 px-4 sm:px-6 py-3 shrink-0">
            <div className="flex items-center justify-between gap-3 mb-2.5">
              <div>
                <h1 className="text-base font-bold text-slate-900">Bookings</h1>
                <p className="text-xs text-slate-400">
                  {compareMode
                    ? <span>Comparing <strong>{selectedResIds.length}</strong> calendars — click a pill to toggle.</span>
                    : "Click a resource to view its calendar. Select multiple to compare side by side."}
                </p>
              </div>
              <div className="flex items-center gap-2">
                {resources.length > 4 && (
                  <input value={resourceSearch} onChange={e => setResourceSearch(e.target.value)}
                    placeholder="Search resources…"
                    className="text-xs px-3 py-1.5 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 w-36 sm:w-48"/>
                )}
                {compareMode && (
                  <button onClick={() => setSelectedResIds(prev => [prev[0]])}
                    className="btn btn-xs btn-secondary">
                    Single view
                  </button>
                )}
                {(isAdmin || isCalendarAdmin) && (
                  <button onClick={() => setShowAdmin(true)} className="btn btn-sm btn-secondary">
                    ⚙ {isAdmin ? "Admin" : "Calendars"}
                  </button>
                )}
              </div>
            </div>
            {/* Domain filter — small toggles on the right */}
            {domains.length > 0 && resources.length > 0 && (
              <div className="flex items-center gap-3 mb-2.5 flex-wrap justify-end">
                {domains.map(d => (
                  <label key={d.id} className="flex items-center gap-1.5 cursor-pointer select-none text-xs text-slate-500">
                    <div onClick={() => setDomainFilter(domainFilter === d.id ? "all" : d.id)}
                      className="relative inline-block w-7 h-3.5 rounded-full transition-colors cursor-pointer"
                      style={{ background: domainFilter === d.id ? (d.color || "#6366f1") : "#e2e8f0" }}>
                      <span className={`absolute top-0.5 left-0.5 w-2.5 h-2.5 rounded-full bg-white shadow transition-transform ${domainFilter === d.id ? "translate-x-3" : ""}`} />
                    </div>
                    <span style={{ color: domainFilter === d.id ? (d.color || "#6366f1") : undefined }}>{d.name}</span>
                  </label>
                ))}
              </div>
            )}
            {resources.length === 0
              ? <div className="text-sm text-slate-400">
                  {isAdmin
                    ? <span>No resources yet. <button onClick={() => setShowAdmin(true)} className="text-blue-500 bg-transparent border-none cursor-pointer text-sm hover:underline">Add one →</button></span>
                    : "No resources available."}
                </div>
              : <div className="flex gap-2 flex-wrap">
                  {filteredRes.map(r => {
                    const isSelected = selectedResIds.includes(r.id);
                    const resIdx     = resources.indexOf(r);
                    const color      = COLORS[resIdx % COLORS.length];
                    return (
                      <button key={r.id} onClick={() => toggleResource(r.id)}
                        className={`text-sm px-4 py-1.5 rounded-full border transition font-medium cursor-pointer whitespace-nowrap ${
                          isSelected
                            ? "text-white font-semibold"
                            : "border-slate-200 bg-white text-slate-500 hover:border-slate-300"}`}
                        style={isSelected ? {background: color, borderColor: color} : {}}>
                        {compareMode && isSelected && <span style={{marginRight:4,opacity:.8}}>✓</span>}
                        {r.name}
                        {r.approval_required && <span className="ml-1.5 text-[10px] opacity-70">⚠</span>}
                        {(usageCount[r.id]||0) > 0 && !isSelected && <span className="ml-1.5 text-[10px] text-slate-400">{usageCount[r.id]}</span>}
                      </button>
                    );
                  })}
                  {hasMore && (
                    <span className="text-xs text-slate-400 self-center pl-1">+{sortedRes.length-20} more — use search</span>
                  )}
                  {searchLower && filteredRes.length === 0 && (
                    <span className="text-xs text-slate-400 self-center">No resources match "{resourceSearch}"</span>
                  )}
                </div>
            }
          </div>

          {/* Week navigation toolbar */}
          <div className="bg-white border-b border-slate-200 px-4 sm:px-6 py-2 flex items-center gap-2 shrink-0">
            <button onClick={() => setWeekStart(addDays(weekStart,-7))} className="btn btn-sm btn-secondary">‹</button>
            <span className="text-sm font-semibold text-slate-700 min-w-[140px] sm:min-w-[200px] text-center">{weekLabel}</span>
            <button onClick={() => setWeekStart(addDays(weekStart,7))} className="btn btn-sm btn-secondary">›</button>
            <button onClick={() => { const d=new Date(); d.setDate(d.getDate()-d.getDay()); d.setHours(0,0,0,0); setWeekStart(d); }} className="btn btn-xs btn-secondary">Today</button>
          </div>

          {/* Calendar area */}
          <div className="flex-1 overflow-hidden bg-white mx-4 sm:mx-6 my-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col">
            {selectedResources.length > 0
              ? <WeeklyCalendar
                  key={selectedResIds.join(",")}
                  resources={selectedResources}
                  weekStart={weekStart}
                  allBookings={allBookings}
                  allFields={allFields}
                  user={user}
                  isAdmin={isAdmin}
                  canBookResource={canBookResource}
                  onRefresh={refreshBookings}
                  onRequestAccess={api.requestAccess}
                  grants={grants}
                  pricing={pricing}
                />
              : <div className="flex-1 flex items-center justify-center text-slate-400 text-sm">
                  Select a resource above to view its calendar.
                </div>
            }
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
