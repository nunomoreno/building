<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerno — Bookings</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; }
    .slot-row:hover { background: #eff6ff !important; cursor: pointer; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const WORKER      = "https://morning-mud-283c.moreno-a64.workers.dev";
    const SESSION_KEY = "kerno_session";
    const SLOT_H      = 28;
    const SLOTS       = Array.from({length:48},(_,i)=>({
      h:Math.floor(i/2), m:i%2===0?0:30,
      label:`${String(Math.floor(i/2)).padStart(2,"0")}:${i%2===0?"00":"30"}`
    }));
    const COLORS       = ["#3b82f6","#8b5cf6","#ec4899","#f59e0b","#10b981","#ef4444","#06b6d4","#84cc16"];
    const STATUS_COLOR = { pending:"#f59e0b", approved:"#10b981", rejected:"#ef4444" };
    const STATUS_BG    = { pending:"#fff7ed", approved:"#f0fdf4", rejected:"#fff5f5" };

    // ── Session ──────────────────────────────────────────────────────────────
    function getSession() {
      const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
      if (!s || Date.now() > new Date(s.expires).getTime()) {
        localStorage.removeItem(SESSION_KEY);
        window.location.href = "index.html?expired=1";
        return null;
      }
      return s;
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    const fmt        = (d) => d.toISOString().split("T")[0];
    const addDays    = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
    const minsToTime = (m) => `${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;
    const slotIndex  = (time) => { const [h,m]=time.split(":").map(Number); return Math.floor((h*60+m)/30); };

    // ── API ───────────────────────────────────────────────────────────────────
    const authHeaders = () => ({
      "Content-Type": "application/json",
      "X-Session-Token": getSession()?.token || "",
    });

    const safeFetch = async (url, opts = {}) => {
      const res = await fetch(url, opts);
      if (res.status === 401) {
        localStorage.removeItem(SESSION_KEY);
        window.location.href = "index.html?expired=1";
        return null;
      }
      const text = await res.text();
      try { return text ? JSON.parse(text) : {}; }
      catch { return {}; }
    };

    const api = {
      getResources:  ()          => safeFetch(`${WORKER}/resources`,           { headers: authHeaders() }),
      saveResource:  (r)         => r.id
        ? safeFetch(`${WORKER}/resources/${r.id}`, { method:"PUT",    headers: authHeaders(), body: JSON.stringify(r) })
        : safeFetch(`${WORKER}/resources`,         { method:"POST",   headers: authHeaders(), body: JSON.stringify(r) }),
      deleteResource:(id)        => safeFetch(`${WORKER}/resources/${id}`,     { method:"DELETE", headers: authHeaders() }),
      getBookings:   ()          => safeFetch(`${WORKER}/bookings?limit=200`,  { headers: authHeaders() }),
      saveBooking:   (b)         => safeFetch(`${WORKER}/bookings`,            { method:"POST",   headers: authHeaders(), body: JSON.stringify(b) }),
      updateBooking: (id, data)  => safeFetch(`${WORKER}/bookings/${id}`,      { method:"PUT",    headers: authHeaders(), body: JSON.stringify(data) }),
      deleteBooking: (id)        => safeFetch(`${WORKER}/bookings/${id}`,      { method:"DELETE", headers: authHeaders() }),
      getSettings:   (key)       => safeFetch(`${WORKER}/settings/${key}`,     { headers: authHeaders() }),
      saveSettings:  (key, val)  => safeFetch(`${WORKER}/settings/${key}`,     { method:"POST",   headers: authHeaders(), body: JSON.stringify(val) }),
      getMembers:    ()          => safeFetch(`${WORKER}/members`,             { headers: authHeaders() }),
      updateMember:  (id, data)  => safeFetch(`${WORKER}/members/${id}`,       { method:"PUT",    headers: authHeaders(), body: JSON.stringify(data) }),
    };

    // ── Options tag editor ────────────────────────────────────────────────────
    function OptionsEditor({ options, onChange }) {
      const [input, setInput] = useState("");
      const add = () => {
        const v = input.trim();
        if (!v || options.includes(v)) return;
        onChange([...options, v]); setInput("");
      };
      return (
        <div style={{marginTop:4}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:5}}>
            {options.map(o=>(
              <span key={o} style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,background:"#eff6ff",color:"#2563eb",border:"1px solid #bfdbfe",borderRadius:99,padding:"2px 8px"}}>
                {o}
                <button onMouseDown={()=>onChange(options.filter(x=>x!==o))}
                  style={{background:"none",border:"none",cursor:"pointer",color:"#93c5fd",fontSize:12,lineHeight:1,padding:0}}>×</button>
              </span>
            ))}
          </div>
          <div style={{display:"flex",gap:4}}>
            <input value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"||e.key===","){e.preventDefault();add();}}}
              placeholder="Type option, press Enter…"
              style={{flex:1,fontSize:12,padding:"4px 7px",borderRadius:5,border:"1px solid #cbd5e1"}}/>
            <button onMouseDown={add}
              style={{fontSize:12,padding:"4px 10px",borderRadius:5,background:"#2563eb",color:"#fff",border:"none",cursor:"pointer"}}>Add</button>
          </div>
        </div>
      );
    }

    // ── Navbar ────────────────────────────────────────────────────────────────
    function Navbar({ user }) {
      const logout  = () => { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html"; };
      const isAdmin = user.role === "admin";
      const btn    = { fontSize:11, padding:"4px 10px", borderRadius:5, border:"1px solid #334155", background:"#1e293b", color:"#94a3b8", textDecoration:"none", cursor:"pointer", fontFamily:"inherit" };
      const active = { ...btn, background:"#2563eb", color:"#fff", border:"1px solid #2563eb" };
      return (
        <div style={{ background:"#0f172a", padding:"10px 24px", display:"flex", alignItems:"center", gap:12, flexShrink:0 }}>
          <a href="dashboard.html" style={{ fontSize:15, fontWeight:700, color:"#fff", textDecoration:"none" }}>⚙️ Kerno</a>
          <span style={{ color:"#475569" }}>›</span>
          <span style={{ fontSize:13, color:"#94a3b8" }}>Bookings</span>
          <div style={{ marginLeft:"auto", display:"flex", gap:8, alignItems:"center" }}>
            <a href="kanban.html"   style={btn}>📋 Kanban</a>
            <a href="booking.html"  style={active}>📅 Bookings</a>
            <a href="requests.html" style={btn}>📝 Requests</a>
            {isAdmin && <a href="users.html" style={btn}>👥 Users</a>}
            <span style={{ fontSize:12, color:"#64748b" }}>
              👤 {user.username}
              {isAdmin && <span style={{ marginLeft:5, fontSize:10, background:"#2563eb", color:"#fff", borderRadius:99, padding:"1px 6px" }}>admin</span>}
            </span>
            <a href="profile.html" style={btn}>🔑 Password</a>
            <button onClick={logout} style={btn}>Sign out</button>
          </div>
        </div>
      );
    }

    // ── Booking Form Modal ────────────────────────────────────────────────────
    function BookingModal({booking, resource, fields, onSave, onDelete, onClose, isAdmin, username, initialSlot, initialDate}) {
      const isNew = !booking?.id;
      const [date,      setDate]      = useState(booking?.date       || initialDate || fmt(new Date()));
      const [startTime, setStartTime] = useState(booking?.start_time || (initialSlot!=null ? minsToTime(initialSlot*30)    : "09:00"));
      const [endTime,   setEndTime]   = useState(booking?.end_time   || (initialSlot!=null ? minsToTime((initialSlot+2)*30) : "10:00"));
      const [fullDay,   setFullDay]   = useState(booking?.full_day   || false);
      const [notes,     setNotes]     = useState(booking?.notes      || "");
      const [meta,      setMeta]      = useState(booking?.metadata   || {});
      const [status,    setStatus]    = useState(booking?.status     || (resource?.approval_required ? "pending" : "approved"));
      const [saving,    setSaving]    = useState(false);
      const [saveError, setSaveError] = useState(null);

      const save = async () => {
        setSaving(true); setSaveError(null);
        const payload = {
          resource_id: resource.id, username, date,
          full_day: fullDay,
          start_time: fullDay ? null : startTime,
          end_time:   fullDay ? null : endTime,
          notes, metadata: meta, status,
        };
        const res = isNew
          ? await api.saveBooking(payload)
          : await api.updateBooking(booking.id, payload);
        if (res?.error || res?.code === "OVERLAP") {
          setSaveError(res?.code === "OVERLAP"
            ? "This time slot is already booked — please choose another."
            : res.error || "Could not save booking.");
          setSaving(false); return;
        }
        setSaving(false); onSave();
      };

      const del = async () => {
        if (!confirm("Delete this booking?")) return;
        await api.deleteBooking(booking.id); onDelete();
      };

      const canEdit = isAdmin || !booking?.id || booking?.username === username;

      return (
        <div style={{position:"fixed",inset:0,background:"#0008",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onMouseDown={onClose}>
          <div style={{background:"#fff",borderRadius:12,padding:24,width:440,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 8px 32px #0004"}} onMouseDown={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:"#0f172a"}}>{isNew?"New Booking":resource?.name}</div>
                {!isNew&&<div style={{fontSize:12,color:"#64748b"}}>{booking.username}</div>}
                {resource?.approval_required&&isNew&&<div style={{fontSize:11,color:"#ea580c",marginTop:2}}>⚠ Requires admin approval</div>}
              </div>
              <button onClick={onClose} style={{fontSize:18,background:"none",border:"none",cursor:"pointer",color:"#94a3b8",lineHeight:1}}>✕</button>
            </div>

            <div style={{marginBottom:12}}>
              <label style={{fontSize:11,fontWeight:600,color:"#475569",display:"block",marginBottom:4}}>DATE</label>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)} disabled={!canEdit}
                style={{width:"100%",fontSize:13,padding:"7px 10px",borderRadius:6,border:"1px solid #cbd5e1",boxSizing:"border-box"}}/>
            </div>

            {resource?.booking_type!=="fullday" && (
              <label style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#475569",marginBottom:12,cursor:"pointer"}}>
                <input type="checkbox" checked={fullDay} onChange={e=>setFullDay(e.target.checked)} disabled={!canEdit}/>
                Full day
              </label>
            )}

            {!fullDay && (
              <div style={{display:"flex",gap:10,marginBottom:12}}>
                <div style={{flex:1}}>
                  <label style={{fontSize:11,fontWeight:600,color:"#475569",display:"block",marginBottom:4}}>START</label>
                  <input type="time" value={startTime} onChange={e=>setStartTime(e.target.value)} disabled={!canEdit}
                    style={{width:"100%",fontSize:13,padding:"7px 10px",borderRadius:6,border:"1px solid #cbd5e1"}}/>
                </div>
                <div style={{flex:1}}>
                  <label style={{fontSize:11,fontWeight:600,color:"#475569",display:"block",marginBottom:4}}>END</label>
                  <input type="time" value={endTime} onChange={e=>setEndTime(e.target.value)} disabled={!canEdit}
                    style={{width:"100%",fontSize:13,padding:"7px 10px",borderRadius:6,border:"1px solid #cbd5e1"}}/>
                </div>
              </div>
            )}

            {fields.map(f=>(
              <div key={f.id} style={{marginBottom:12}}>
                <label style={{fontSize:11,fontWeight:600,color:"#475569",display:"block",marginBottom:4}}>{f.label.toUpperCase()}</label>
                {f.type==="dropdown"
                  ? <select value={meta[f.id]||""} onChange={e=>setMeta({...meta,[f.id]:e.target.value})} disabled={!canEdit}
                      style={{width:"100%",fontSize:13,padding:"7px 10px",borderRadius:6,border:"1px solid #cbd5e1"}}>
                      <option value="">Select…</option>
                      {(f.options||[]).map(o=><option key={o} value={o}>{o}</option>)}
                    </select>
                  : <input value={meta[f.id]||""} onChange={e=>setMeta({...meta,[f.id]:e.target.value})} disabled={!canEdit}
                      style={{width:"100%",fontSize:13,padding:"7px 10px",borderRadius:6,border:"1px solid #cbd5e1",boxSizing:"border-box"}}/>
                }
              </div>
            ))}

            <div style={{marginBottom:16}}>
              <label style={{fontSize:11,fontWeight:600,color:"#475569",display:"block",marginBottom:4}}>NOTES</label>
              <textarea value={notes} onChange={e=>setNotes(e.target.value)} disabled={!canEdit} rows={3}
                style={{width:"100%",fontSize:13,padding:"7px 10px",borderRadius:6,border:"1px solid #cbd5e1",resize:"vertical",boxSizing:"border-box"}}/>
            </div>

            {isAdmin && !isNew && (
              <div style={{marginBottom:16}}>
                <label style={{fontSize:11,fontWeight:600,color:"#475569",display:"block",marginBottom:4}}>STATUS</label>
                <select value={status} onChange={e=>setStatus(e.target.value)}
                  style={{width:"100%",fontSize:13,padding:"7px 10px",borderRadius:6,border:"1px solid #cbd5e1"}}>
                  <option value="pending">Pending</option>
                  <option value="approved">Approved</option>
                  <option value="rejected">Rejected</option>
                </select>
              </div>
            )}

            {saveError && (
              <div style={{fontSize:12,color:"#dc2626",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:6,padding:"8px 10px",marginBottom:12}}>
                ⚠ {saveError}
              </div>
            )}

            {canEdit && (
              <div style={{display:"flex",gap:8}}>
                <button onClick={save} disabled={saving} style={{flex:1,fontSize:13,padding:"9px",borderRadius:7,background:"#2563eb",color:"#fff",border:"none",cursor:"pointer",fontWeight:600,opacity:saving?0.7:1}}>
                  {saving?"Saving…":isNew?"Create Booking":"Save Changes"}
                </button>
                {!isNew&&<button onClick={del} style={{fontSize:13,padding:"9px 14px",borderRadius:7,border:"1px solid #fecaca",background:"#fff5f5",color:"#ef4444",cursor:"pointer"}}>Delete</button>}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Admin Panel ───────────────────────────────────────────────────────────
    function AdminPanel({resources, members, onUpdate, onClose}) {
      const [tab,           setTab]           = useState("resources");
      const [editRes,       setEditRes]       = useState(null);
      const [allFields,     setAllFields]     = useState({});
      const [saving,        setSaving]        = useState(false);
      const [selectedResId, setSelectedResId] = useState(null);

      useEffect(()=>{
        (async()=>{
          const f = await api.getSettings("booking-fields") || {};
          setAllFields(f);
        })();
      },[]);

      const currentFields    = selectedResId ? (allFields[selectedResId]||[]) : [];
      const setCurrentFields = (fields) => setAllFields({...allFields,[selectedResId]:fields});

      const saveResource = async () => {
        if(!editRes?.name?.trim()) return;
        setSaving(true);
        await api.saveResource(editRes);
        setSaving(false); setEditRes(null); onUpdate();
      };

      const saveFields = async () => {
        setSaving(true);
        await api.saveSettings("booking-fields", allFields);
        setSaving(false); onUpdate();
      };

      const togglePerm = async (m) => {
        const perms   = m.permissions||[];
        const updated = perms.includes("bookings") ? perms.filter(p=>p!=="bookings") : [...perms,"bookings"];
        await api.updateMember(m.id,{permissions:updated});
        onUpdate();
      };

      const addField    = ()       => setCurrentFields([...currentFields,{id:`f${Date.now()}`,label:"New Field",type:"text",options:[]}]);
      const updateField = (id,k,v) => setCurrentFields(currentFields.map(f=>f.id===id?{...f,[k]:v}:f));
      const removeField = (id)     => setCurrentFields(currentFields.filter(f=>f.id!==id));

      return (
        <div style={{position:"fixed",inset:0,background:"#0008",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onMouseDown={onClose}>
          <div style={{background:"#fff",borderRadius:12,width:580,maxHeight:"85vh",display:"flex",flexDirection:"column"}} onMouseDown={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:"1px solid #e2e8f0"}}>
              <div style={{fontSize:15,fontWeight:700,color:"#0f172a"}}>⚙️ Admin</div>
              <button onClick={onClose} style={{fontSize:18,background:"none",border:"none",cursor:"pointer",color:"#94a3b8"}}>✕</button>
            </div>
            <div style={{display:"flex",borderBottom:"1px solid #e2e8f0"}}>
              {["resources","fields","permissions"].map(t=>(
                <button key={t} onClick={()=>setTab(t)} style={{flex:1,fontSize:12,padding:"10px",border:"none",borderBottom:`2px solid ${tab===t?"#2563eb":"transparent"}`,background:"none",cursor:"pointer",color:tab===t?"#2563eb":"#64748b",fontWeight:tab===t?600:400,textTransform:"capitalize"}}>{t}</button>
              ))}
            </div>
            <div style={{flex:1,overflowY:"auto",padding:20}}>

              {tab==="resources"&&(
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#1e293b"}}>Resources</div>
                    <button onClick={()=>setEditRes({name:"",description:"",booking_type:"both",approval_required:false})}
                      style={{fontSize:12,padding:"4px 12px",borderRadius:6,background:"#2563eb",color:"#fff",border:"none",cursor:"pointer"}}>+ Add</button>
                  </div>
                  {editRes&&(
                    <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:14,marginBottom:12}}>
                      <input value={editRes.name||""} onChange={e=>setEditRes({...editRes,name:e.target.value})} placeholder="Resource name"
                        style={{width:"100%",fontSize:12,padding:"6px 9px",borderRadius:6,border:"1px solid #cbd5e1",marginBottom:8,boxSizing:"border-box"}}/>
                      <input value={editRes.description||""} onChange={e=>setEditRes({...editRes,description:e.target.value})} placeholder="Description"
                        style={{width:"100%",fontSize:12,padding:"6px 9px",borderRadius:6,border:"1px solid #cbd5e1",marginBottom:8,boxSizing:"border-box"}}/>
                      <select value={editRes.booking_type||"both"} onChange={e=>setEditRes({...editRes,booking_type:e.target.value})}
                        style={{width:"100%",fontSize:12,padding:"6px 9px",borderRadius:6,border:"1px solid #cbd5e1",marginBottom:8}}>
                        <option value="timeslot">Time slots only</option>
                        <option value="fullday">Full days only</option>
                        <option value="both">Both</option>
                      </select>
                      <label style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#475569",marginBottom:12,cursor:"pointer"}}>
                        <input type="checkbox" checked={editRes.approval_required||false} onChange={e=>setEditRes({...editRes,approval_required:e.target.checked})}/>
                        Requires admin approval
                      </label>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={saveResource} disabled={saving} style={{fontSize:12,padding:"5px 14px",borderRadius:6,background:"#2563eb",color:"#fff",border:"none",cursor:"pointer"}}>Save</button>
                        <button onClick={()=>setEditRes(null)} style={{fontSize:12,padding:"5px 10px",borderRadius:6,background:"#f1f5f9",border:"1px solid #e2e8f0",cursor:"pointer",color:"#64748b"}}>Cancel</button>
                      </div>
                    </div>
                  )}
                  {resources.map(r=>(
                    <div key={r.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:"#fff",borderRadius:8,border:"1px solid #e2e8f0",marginBottom:8}}>
                      <div>
                        <span style={{fontSize:13,fontWeight:600,color:"#1e293b"}}>{r.name}</span>
                        <span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>{r.booking_type} · {r.approval_required?"approval":"auto"}</span>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>setEditRes(r)} style={{fontSize:11,padding:"2px 8px",borderRadius:4,border:"1px solid #e2e8f0",background:"#f8fafc",cursor:"pointer",color:"#475569"}}>Edit</button>
                        <button onClick={()=>{if(confirm(`Delete "${r.name}"?`)){api.deleteResource(r.id);onUpdate();}}}
                          style={{fontSize:11,padding:"2px 8px",borderRadius:4,border:"1px solid #fecaca",background:"#fff5f5",cursor:"pointer",color:"#ef4444"}}>Delete</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {tab==="fields"&&(
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:"#1e293b",marginBottom:12}}>Fields per Resource</div>
                  <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
                    {resources.map(r=>(
                      <button key={r.id} onClick={()=>setSelectedResId(r.id)}
                        style={{fontSize:12,padding:"5px 12px",borderRadius:6,border:`1px solid ${selectedResId===r.id?"#2563eb":"#e2e8f0"}`,background:selectedResId===r.id?"#eff6ff":"#fff",color:selectedResId===r.id?"#2563eb":"#475569",cursor:"pointer"}}>
                        {r.name}
                      </button>
                    ))}
                  </div>
                  {selectedResId ? (
                    <>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                        <div style={{fontSize:12,color:"#64748b"}}>Fields for <strong>{resources.find(r=>r.id===selectedResId)?.name}</strong></div>
                        <button onClick={addField} style={{fontSize:12,padding:"3px 10px",borderRadius:6,background:"#2563eb",color:"#fff",border:"none",cursor:"pointer"}}>+ Add field</button>
                      </div>
                      {currentFields.map(f=>(
                        <div key={f.id} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:12,marginBottom:8}}>
                          <div style={{display:"flex",gap:8,marginBottom:f.type!=="text"?8:0}}>
                            <input value={f.label} onChange={e=>updateField(f.id,"label",e.target.value)} placeholder="Field label"
                              style={{flex:2,fontSize:12,padding:"5px 8px",borderRadius:5,border:"1px solid #cbd5e1"}}/>
                            <select value={f.type} onChange={e=>updateField(f.id,"type",e.target.value)}
                              style={{flex:1,fontSize:12,padding:"5px 8px",borderRadius:5,border:"1px solid #cbd5e1"}}>
                              <option value="text">Text</option>
                              <option value="dropdown">Dropdown</option>
                            </select>
                            <button onClick={()=>removeField(f.id)} style={{fontSize:12,padding:"2px 8px",borderRadius:4,border:"1px solid #fecaca",background:"#fff5f5",color:"#ef4444",cursor:"pointer"}}>✕</button>
                          </div>
                          {f.type==="dropdown"&&(
                            <OptionsEditor options={f.options||[]} onChange={opts=>updateField(f.id,"options",opts)}/>
                          )}
                        </div>
                      ))}
                      <button onClick={saveFields} disabled={saving} style={{width:"100%",fontSize:13,padding:"8px",borderRadius:7,background:"#2563eb",color:"#fff",border:"none",cursor:"pointer",fontWeight:600,marginTop:8}}>
                        {saving?"Saving…":"Save Fields"}
                      </button>
                    </>
                  ) : <div style={{fontSize:12,color:"#94a3b8"}}>Select a resource above to configure its fields.</div>}
                </div>
              )}

              {tab==="permissions"&&(
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:"#1e293b",marginBottom:12}}>Booking Permissions</div>
                  {members.map(m=>(
                    <div key={m.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:"#fff",borderRadius:8,border:"1px solid #e2e8f0",marginBottom:8}}>
                      <div style={{fontSize:13,fontWeight:600,color:"#1e293b"}}>
                        {m.username}
                        {m.role==="admin"&&<span style={{marginLeft:6,fontSize:10,background:"#2563eb",color:"#fff",borderRadius:99,padding:"1px 7px"}}>admin</span>}
                      </div>
                      <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#475569",cursor:"pointer"}}>
                        <input type="checkbox" checked={m.role==="admin"||(m.permissions||[]).includes("bookings")} disabled={m.role==="admin"} onChange={()=>togglePerm(m)}/>
                        Can book
                      </label>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── Weekly Calendar ───────────────────────────────────────────────────────
    function WeeklyCalendar({resource, weekStart, bookings, fields, user, isAdmin, canBook, onRefresh}) {
      const [modal, setModal] = useState(null);
      const days  = Array.from({length:7},(_,i)=>addDays(weekStart,i));
      const color = "#3b82f6";

      const dayBookings = (dateStr) => bookings.filter(b=>b.date===dateStr);
      const getTop      = (b) => b.full_day ? 0 : slotIndex(b.start_time)*SLOT_H;
      const getHeight   = (b) => {
        if(b.full_day) return 48*SLOT_H;
        const s=slotIndex(b.start_time), e=slotIndex(b.end_time);
        return Math.max((e-s)*SLOT_H,SLOT_H);
      };

      return (
        <div style={{flex:1,overflowY:"auto",overflowX:"auto"}}>
          {modal && (
            <BookingModal
              booking={modal.booking||{}}
              resource={resource}
              fields={fields}
              isAdmin={isAdmin}
              username={user.username}
              initialSlot={modal.slot}
              initialDate={modal.date}
              onSave={()=>{setModal(null);onRefresh();}}
              onDelete={()=>{setModal(null);onRefresh();}}
              onClose={()=>setModal(null)}
            />
          )}
          <div style={{display:"grid",gridTemplateColumns:`60px repeat(7,1fr)`,minWidth:600,position:"sticky",top:0,zIndex:10,background:"#fff",borderBottom:"2px solid #e2e8f0"}}>
            <div style={{padding:"8px 4px"}}/>
            {days.map((day,i)=>{
              const isToday = fmt(day)===fmt(new Date());
              return (
                <div key={i} style={{padding:"8px 4px",textAlign:"center",borderLeft:"1px solid #e2e8f0"}}>
                  <div style={{fontSize:11,color:"#94a3b8"}}>{day.toLocaleDateString("en",{weekday:"short"})}</div>
                  <div style={{fontSize:13,fontWeight:700,color:isToday?"#2563eb":"#1e293b",background:isToday?"#eff6ff":"transparent",borderRadius:"50%",width:26,height:26,lineHeight:"26px",margin:"2px auto 0"}}>{day.getDate()}</div>
                </div>
              );
            })}
          </div>
          <div style={{display:"grid",gridTemplateColumns:`60px repeat(7,1fr)`,minWidth:600,borderBottom:"2px solid #e2e8f0",background:"#f8fafc"}}>
            <div style={{padding:"4px 8px",fontSize:10,color:"#94a3b8",display:"flex",alignItems:"center"}}>All day</div>
            {days.map((day,di)=>{
              const dateStr         = fmt(day);
              const fullDayBookings = bookings.filter(b=>b.date===dateStr&&b.full_day);
              return (
                <div key={di} style={{borderLeft:"1px solid #e2e8f0",minHeight:24,padding:"2px 3px"}}>
                  {fullDayBookings.map(b=>(
                    <div key={b.id}
                      style={{fontSize:10,fontWeight:600,background:STATUS_BG[b.status],color:STATUS_COLOR[b.status],borderRadius:3,padding:"2px 6px",marginBottom:2,cursor:"pointer",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}
                      onClick={e=>{e.stopPropagation();setModal({booking:b,slot:null,date:null});}}>
                      {b.username} · {b.status}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
          <div style={{display:"grid",gridTemplateColumns:`60px repeat(7,1fr)`,minWidth:600}}>
            {SLOTS.map((slot,si)=>(
              <React.Fragment key={si}>
                <div style={{height:SLOT_H,borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"flex-start",justifyContent:"flex-end",paddingRight:8,paddingTop:2}}>
                  {slot.m===0&&<span style={{fontSize:10,color:"#94a3b8"}}>{slot.label}</span>}
                </div>
                {days.map((day,di)=>{
                  const dateStr   = fmt(day);
                  const dBookings = si===0 ? dayBookings(dateStr) : [];
                  return (
                    <div key={di} className="slot-row"
                      style={{height:SLOT_H,borderBottom:`1px solid ${slot.m===0?"#e2e8f0":"#f8fafc"}`,borderLeft:"1px solid #e2e8f0",position:"relative",background:"#fff"}}
                      onClick={()=>canBook&&setModal({booking:null,slot:si,date:dateStr})}>
                      {si===0&&dBookings.filter(b=>!b.full_day).map(b=>(
                        <div key={b.id}
                          style={{position:"absolute",top:getTop(b)+1,left:2,right:2,height:getHeight(b)-2,background:color+"22",borderLeft:`3px solid ${STATUS_COLOR[b.status]||"#94a3b8"}`,borderRadius:4,padding:"2px 6px",zIndex:5,overflow:"hidden",cursor:"pointer"}}
                          onClick={e=>{e.stopPropagation();setModal({booking:b,slot:null,date:null});}}>
                          <div style={{fontSize:10,fontWeight:700,color:"#1e293b",lineHeight:1.3}}>{b.username}</div>
                          {!b.full_day&&<div style={{fontSize:9,color:"#64748b"}}>{b.start_time}–{b.end_time}</div>}
                          {Object.entries(b.metadata||{}).slice(0,1).map(([k,v])=>(
                            <div key={k} style={{fontSize:9,color:"#64748b",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{v}</div>
                          ))}
                          <div style={{position:"absolute",top:2,right:4,fontSize:9,background:STATUS_BG[b.status],color:STATUS_COLOR[b.status],borderRadius:3,padding:"1px 4px",fontWeight:600,textTransform:"capitalize"}}>{b.status}</div>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [user] = useState(() => {
        const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
        if (!s || Date.now() > new Date(s.expires).getTime()) {
          localStorage.removeItem(SESSION_KEY);
          window.location.href = "index.html?expired=1";
          return null;
        }
        return { username: s.username, role: s.role, token: s.token };
      });

      const [resources,   setResources]   = useState([]);
      const [selectedRes, setSelectedRes] = useState(null);
      const [bookings,    setBookings]    = useState([]);
      const [members,     setMembers]     = useState([]);
      const [allFields,   setAllFields]   = useState({});
      const [loading,     setLoading]     = useState(true);
      const [loadError,   setLoadError]   = useState(null);
      const [showAdmin,   setShowAdmin]   = useState(false);
      const [weekStart,   setWeekStart]   = useState(()=>{
        const d=new Date(); d.setDate(d.getDate()-d.getDay()); d.setHours(0,0,0,0); return d;
      });

      const isAdmin = user?.role === "admin";
      const canBook = isAdmin || true; // booking permission check can be refined via member.permissions

      const loadBase = async () => {
        setLoadError(null);
        try {
          const [r,m,f] = await Promise.all([api.getResources(), api.getMembers(), api.getSettings("booking-fields")]);
          const resList = Array.isArray(r) ? r : [];
          setResources(resList);
          setMembers(Array.isArray(m) ? m : []);
          setAllFields(f && typeof f==="object" ? f : {});
          setSelectedRes(s => s || resList[0] || null);
          setLoading(false);
        } catch {
          setLoadError("Could not load data. Please refresh.");
          setLoading(false);
        }
      };

      const loadBookings = async () => {
        if (!selectedRes) return;
        try {
          const b = await api.getBookings();
          setBookings(Array.isArray(b) ? b.filter(bk=>bk.resource_id===selectedRes.id) : []);
        } catch { setBookings([]); }
      };

      useEffect(()=>{ if(user) loadBase(); else setLoading(false); }, []);
      useEffect(()=>{ if(selectedRes) loadBookings(); }, [selectedRes, weekStart]);

      if (!user)     return null;
      if (loading)   return <div style={{padding:32,color:"#64748b"}}>Loading…</div>;
      if (loadError) return (
        <div style={{padding:32,display:"flex",flexDirection:"column",gap:12,alignItems:"flex-start"}}>
          <div style={{color:"#ef4444"}}>{loadError}</div>
          <button onClick={loadBase} style={{fontSize:13,padding:"6px 14px",borderRadius:6,background:"#2563eb",color:"#fff",border:"none",cursor:"pointer"}}>Retry</button>
        </div>
      );

      const currentFields = selectedRes ? (allFields[selectedRes.id]||[]) : [];
      const weekLabel = `${weekStart.toLocaleDateString("en",{month:"short",day:"numeric"})} – ${addDays(weekStart,6).toLocaleDateString("en",{month:"short",day:"numeric",year:"numeric"})}`;

      return (
        <div style={{fontFamily:"system-ui,sans-serif",height:"100vh",display:"flex",flexDirection:"column"}}>
          {showAdmin && <AdminPanel resources={resources} members={members} onUpdate={()=>{loadBase();loadBookings();}} onClose={()=>setShowAdmin(false)}/>}

          <Navbar user={user} />

          {/* Week nav sub-bar */}
          <div style={{background:"#0f172a",padding:"6px 24px",display:"flex",alignItems:"center",gap:8,borderTop:"1px solid #1e293b",flexShrink:0}}>
            <button onClick={()=>setWeekStart(addDays(weekStart,-7))} style={{fontSize:13,padding:"3px 10px",borderRadius:5,border:"1px solid #334155",background:"#1e293b",color:"#94a3b8",cursor:"pointer"}}>‹</button>
            <span style={{fontSize:12,color:"#f1f5f9",fontWeight:600,minWidth:200,textAlign:"center"}}>{weekLabel}</span>
            <button onClick={()=>setWeekStart(addDays(weekStart,7))} style={{fontSize:13,padding:"3px 10px",borderRadius:5,border:"1px solid #334155",background:"#1e293b",color:"#94a3b8",cursor:"pointer"}}>›</button>
            <button onClick={()=>{const d=new Date();d.setDate(d.getDate()-d.getDay());d.setHours(0,0,0,0);setWeekStart(d);}} style={{fontSize:11,padding:"3px 10px",borderRadius:5,border:"1px solid #334155",background:"#1e293b",color:"#94a3b8",cursor:"pointer"}}>Today</button>
            {isAdmin && <button onClick={()=>setShowAdmin(true)} style={{fontSize:11,padding:"3px 12px",borderRadius:5,border:"1px solid #334155",background:"#1e293b",color:"#94a3b8",cursor:"pointer",marginLeft:8}}>⚙ Admin</button>}
          </div>

          <div style={{display:"flex",flex:1,overflow:"hidden"}}>
            <div style={{width:200,minWidth:200,background:"#1e293b",padding:"12px 0",overflowY:"auto",flexShrink:0}}>
              <div style={{padding:"4px 14px 8px",fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:.5}}>Resources</div>
              {resources.length===0 && <div style={{padding:"8px 14px",fontSize:12,color:"#475569"}}>No resources yet.</div>}
              {resources.map((r,i)=>(
                <div key={r.id} onClick={()=>setSelectedRes(r)}
                  style={{padding:"10px 14px",cursor:"pointer",borderLeft:`3px solid ${selectedRes?.id===r.id?COLORS[i%COLORS.length]:"transparent"}`,background:selectedRes?.id===r.id?"#334155":"transparent"}}>
                  <div style={{fontSize:12,fontWeight:600,color:selectedRes?.id===r.id?"#f1f5f9":"#94a3b8"}}>{r.name}</div>
                  {r.description&&<div style={{fontSize:11,color:"#475569",marginTop:2}}>{r.description}</div>}
                  <div style={{fontSize:10,color:r.approval_required?"#ea580c":"#22c55e",marginTop:3}}>
                    {r.approval_required?"⚠ Approval required":"✓ Auto-confirm"}
                  </div>
                </div>
              ))}
            </div>

            {selectedRes
              ? <WeeklyCalendar
                  resource={selectedRes}
                  weekStart={weekStart}
                  bookings={bookings}
                  fields={currentFields}
                  user={user}
                  isAdmin={isAdmin}
                  canBook={canBook}
                  onRefresh={loadBookings}
                />
              : <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",fontSize:14}}>
                  {isAdmin
                    ? <span>No resources yet. <button onClick={()=>setShowAdmin(true)} style={{color:"#2563eb",background:"none",border:"none",cursor:"pointer",fontSize:14}}>Add one →</button></span>
                    : "No resources available."}
                </div>
            }
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
