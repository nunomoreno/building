<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerno — Domains</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="min-h-screen bg-slate-50 font-sans">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const WORKER      = "https://morning-mud-283c.moreno-a64.workers.dev";
    const SESSION_KEY = "kerno_session";

    const session = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
    if (!session || Date.now() > new Date(session.expires).getTime()) {
      localStorage.removeItem(SESSION_KEY);
      window.location.href = "index.html?expired=1";
    }
    if (session.role !== "admin") window.location.href = "dashboard.html";

    const authH  = () => ({ "Content-Type": "application/json", "X-Session-Token": session.token });
    const logout = () => { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html"; };

    const api = {
      list:   ()       => fetch(`${WORKER}/domains`,       { headers: authH() }).then(r => r.json()),
      create: (d)      => fetch(`${WORKER}/domains`,       { method: "POST",   headers: authH(), body: JSON.stringify(d) }).then(r => r.json()),
      update: (id, d)  => fetch(`${WORKER}/domains/${id}`, { method: "PUT",    headers: authH(), body: JSON.stringify(d) }).then(r => r.json()),
      remove: (id)     => fetch(`${WORKER}/domains/${id}`, { method: "DELETE", headers: authH() }).then(r => r.json()),
    };

    const inputCls = "w-full text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 font-sans bg-white";

    function App() {
      const [domains,   setDomains]  = useState([]);
      const [loading,   setLoading]  = useState(true);
      const [saving,    setSaving]   = useState(false);
      const [msg,       setMsg]      = useState(null);
      const [menuOpen,  setMenuOpen] = useState(false);
      // Form state for new domain
      const [newName,   setNewName]  = useState("");
      const [newColor,  setNewColor] = useState("#6366f1");
      // Edit state
      const [editId,    setEditId]   = useState(null);
      const [editName,  setEditName] = useState("");
      const [editColor, setEditColor]= useState("");

      const drop = "flex items-center gap-2 px-3 py-2 text-xs text-slate-300 hover:bg-slate-700 hover:text-white no-underline transition-colors";

      useEffect(() => {
        if (!menuOpen) return;
        const h = () => setMenuOpen(false);
        document.addEventListener("click", h);
        return () => document.removeEventListener("click", h);
      }, [menuOpen]);

      useEffect(() => {
        api.list().then(data => {
          setDomains(Array.isArray(data) ? data : []);
          setLoading(false);
        }).catch(() => setLoading(false));
      }, []);

      const showMsg = (text, ok) => { setMsg({ text, ok }); setTimeout(() => setMsg(null), 3000); };

      const addDomain = async () => {
        if (!newName.trim()) return;
        setSaving(true);
        const result = await api.create({ name: newName.trim(), color: newColor });
        if (result?.error) { showMsg(result.error, false); setSaving(false); return; }
        setDomains(prev => [...prev, result]);
        setNewName(""); setNewColor("#6366f1");
        showMsg("Domain added!", true);
        setSaving(false);
      };

      const startEdit = (d) => { setEditId(d.id); setEditName(d.name); setEditColor(d.color || "#6366f1"); };

      const saveEdit = async () => {
        if (!editName.trim()) return;
        setSaving(true);
        const result = await api.update(editId, { name: editName.trim(), color: editColor });
        if (result?.error) { showMsg(result.error, false); setSaving(false); return; }
        setDomains(prev => prev.map(d => d.id === editId ? { ...d, name: editName.trim(), color: editColor } : d));
        setEditId(null);
        showMsg("Saved!", true);
        setSaving(false);
      };

      const removeDomain = async (id, name) => {
        if (!confirm(`Remove domain "${name}"? Resources and request types using this domain will lose the assignment.`)) return;
        const result = await api.remove(id);
        if (result?.error) { showMsg(result.error, false); return; }
        setDomains(prev => prev.filter(d => d.id !== id));
        showMsg("Removed.", true);
      };

      return (
        <div className="min-h-screen bg-slate-50">
          <nav className="bg-slate-900 px-4 sm:px-6 py-3 flex items-center gap-3 flex-wrap">
            <a href="dashboard.html" className="text-[15px] font-bold text-white no-underline">⚙️ Kerno</a>
            <span className="text-slate-600">›</span>
            <span className="text-[13px] text-slate-400">Domains</span>
            <div className="ml-auto flex gap-2 items-center flex-wrap">
              <a href="kanban.html"   className="text-[11px] px-2.5 py-1 rounded-md border border-slate-700 bg-slate-800 text-slate-400 no-underline hover:bg-slate-700">📋 Kanban</a>
              <a href="booking.html"  className="text-[11px] px-2.5 py-1 rounded-md border border-slate-700 bg-slate-800 text-slate-400 no-underline hover:bg-slate-700">📅 Bookings</a>
              <a href="requests.html" className="text-[11px] px-2.5 py-1 rounded-md border border-slate-700 bg-slate-800 text-slate-400 no-underline hover:bg-slate-700">📝 Requests</a>
              <div className="relative" onClick={e => e.stopPropagation()}>
                <button onClick={() => setMenuOpen(o => !o)}
                  className="flex items-center gap-1.5 text-[11px] px-2.5 py-1 rounded-md border border-slate-700 bg-slate-700 text-white hover:bg-slate-600 cursor-pointer font-[inherit]">
                  {session.avatar_url
                    ? <img src={session.avatar_url} className="w-5 h-5 rounded-full object-cover" alt="" />
                    : <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-slate-600 text-slate-200 font-bold text-[10px]">{session.username[0].toUpperCase()}</span>}
                  {session.display_name || session.username}
                  <span className="text-[9px] bg-blue-600 text-white rounded-full px-1.5 py-0.5">admin</span>
                  <span className="text-[10px] text-slate-400">▾</span>
                </button>
                {menuOpen && (
                  <div className="absolute right-0 top-full mt-1 w-48 bg-slate-800 border border-slate-700 rounded-xl shadow-xl z-50 overflow-hidden">
                    <a href="profile.html" className={drop}>👤 My Profile</a>
                    <div className="border-t border-slate-700" />
                    <a href="users.html"   className={drop}>👥 Users & Groups</a>
                    <a href="pricing.html" className={drop}>💰 Pricing</a>
                    <a href="grants.html"  className={drop}>🏛 Grants</a>
                    <a href="domains.html" className="flex items-center gap-2 px-3 py-2 text-xs bg-slate-700 text-white no-underline">🗂 Domains</a>
                  </div>
                )}
              </div>
              <button onClick={logout} className="text-[11px] px-2.5 py-1 rounded-md border border-slate-700 bg-slate-800 text-slate-400 cursor-pointer font-[inherit] hover:bg-slate-700">Sign out</button>
            </div>
          </nav>

          <main className="max-w-3xl mx-auto px-4 py-10">
            <div className="mb-8">
              <h1 className="text-2xl font-bold text-slate-900 tracking-tight">Domains</h1>
              <p className="text-sm text-slate-400 mt-1">Research areas and service categories. Assign domains to resources and request types to enable filtering.</p>
            </div>

            <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mb-6">
              <div className="px-5 py-4 border-b border-slate-100">
                <span className="text-sm font-semibold text-slate-700">Research Domains</span>
              </div>

              {loading ? (
                <div className="p-8 text-center text-sm text-slate-400">Loading…</div>
              ) : (
                <div>
                  <table className="w-full text-sm border-collapse">
                    <thead>
                      <tr className="bg-slate-50 border-b border-slate-100">
                        <th className="text-left text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-4 py-3 w-10">Color</th>
                        <th className="text-left text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-4 py-3">Name</th>
                        <th className="w-24"></th>
                      </tr>
                    </thead>
                    <tbody>
                      {domains.map((d, i) => (
                        <tr key={d.id} className={i % 2 === 0 ? "bg-white" : "bg-slate-50/50"}>
                          {editId === d.id ? (
                            <>
                              <td className="px-4 py-2.5">
                                <input type="color" value={editColor} onChange={e => setEditColor(e.target.value)}
                                  className="w-8 h-8 rounded cursor-pointer border border-slate-200 p-0.5" />
                              </td>
                              <td className="px-4 py-2.5">
                                <input value={editName} onChange={e => setEditName(e.target.value)}
                                  onKeyDown={e => e.key === "Enter" && saveEdit()}
                                  className={inputCls} autoFocus />
                              </td>
                              <td className="px-3 py-2.5">
                                <div className="flex gap-1.5">
                                  <button onClick={saveEdit} disabled={saving}
                                    className="text-xs px-2.5 py-1 rounded-lg bg-blue-600 text-white border-none cursor-pointer hover:bg-blue-700 font-sans disabled:opacity-60">
                                    {saving ? "…" : "Save"}
                                  </button>
                                  <button onClick={() => setEditId(null)}
                                    className="text-xs px-2.5 py-1 rounded-lg border border-slate-200 bg-white text-slate-500 cursor-pointer hover:bg-slate-50 font-sans">
                                    Cancel
                                  </button>
                                </div>
                              </td>
                            </>
                          ) : (
                            <>
                              <td className="px-4 py-2.5">
                                <span className="inline-block w-5 h-5 rounded-full border border-slate-200"
                                  style={{ background: d.color || "#6366f1" }} />
                              </td>
                              <td className="px-4 py-2.5">
                                <span className="inline-flex items-center gap-2">
                                  <span className="text-xs font-semibold rounded-full px-2.5 py-0.5 text-white"
                                    style={{ background: d.color || "#6366f1" }}>
                                    {d.name}
                                  </span>
                                </span>
                              </td>
                              <td className="px-3 py-2.5">
                                <div className="flex gap-1.5 justify-end">
                                  <button onClick={() => startEdit(d)}
                                    className="text-xs px-2.5 py-1 rounded-lg border border-slate-200 bg-white text-slate-500 cursor-pointer hover:bg-slate-50 font-sans">
                                    Edit
                                  </button>
                                  <button onClick={() => removeDomain(d.id, d.name)}
                                    className="text-xs px-2.5 py-1 rounded-lg border border-red-200 bg-red-50 text-red-500 cursor-pointer hover:bg-red-100 font-sans">
                                    ×
                                  </button>
                                </div>
                              </td>
                            </>
                          )}
                        </tr>
                      ))}
                      {domains.length === 0 && (
                        <tr>
                          <td colSpan={3} className="text-center text-sm text-slate-400 py-8">
                            No domains yet. Add one below.
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>

                  {/* Add new domain row */}
                  <div className="px-4 py-4 border-t border-slate-100 flex items-center gap-3 flex-wrap">
                    <input type="color" value={newColor} onChange={e => setNewColor(e.target.value)}
                      className="w-9 h-9 rounded cursor-pointer border border-slate-200 p-0.5 shrink-0" />
                    <input value={newName} onChange={e => setNewName(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && addDomain()}
                      placeholder="Domain name (e.g. Genomics, Imaging…)"
                      className="flex-1 text-sm px-3.5 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 font-sans min-w-[180px]" />
                    <button onClick={addDomain} disabled={saving || !newName.trim()}
                      className="text-sm px-4 py-2 rounded-xl bg-blue-600 text-white border-none cursor-pointer hover:bg-blue-700 disabled:opacity-60 font-sans font-semibold shrink-0">
                      {saving ? "Adding…" : "+ Add Domain"}
                    </button>
                  </div>
                </div>
              )}
            </div>

            {msg && (
              <div className={`fixed bottom-5 right-5 px-4 py-2.5 rounded-xl shadow-lg text-sm font-medium z-50 ${msg.ok ? "bg-emerald-600 text-white" : "bg-red-600 text-white"}`}>
                {msg.ok ? "✓ " : "✗ "}{msg.text}
              </div>
            )}

            <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-xs text-amber-700">
              <strong>Tip:</strong> Assign domains to resources in Bookings → Admin → Resources, and to request types in Requests → Configure. Users can then filter by domain in both pages.
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
