<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerno — Grants</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="min-h-screen bg-slate-50 font-sans">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const WORKER      = "https://morning-mud-283c.moreno-a64.workers.dev";
    const SESSION_KEY = "kerno_session";

    const session = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
    if (!session || Date.now() > new Date(session.expires).getTime()) {
      localStorage.removeItem(SESSION_KEY);
      window.location.href = "index.html?expired=1";
    }
    if (session.role !== "admin") window.location.href = "dashboard.html";

    const authH  = () => ({ "Content-Type": "application/json", "X-Session-Token": session.token });
    const logout = () => { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html"; };

    const api = {
      list:    ()       => fetch(`${WORKER}/grants`,       { headers: authH() }).then(r => r.json()),
      create:  (g)      => fetch(`${WORKER}/grants`,       { method: "POST",   headers: authH(), body: JSON.stringify(g) }).then(r => r.json()),
      update:  (id, g)  => fetch(`${WORKER}/grants/${id}`, { method: "PUT",    headers: authH(), body: JSON.stringify(g) }).then(r => r.json()),
      remove:  (id)     => fetch(`${WORKER}/grants/${id}`, { method: "DELETE", headers: authH() }).then(r => r.json()),
      members: ()       => fetch(`${WORKER}/members`,      { headers: authH() }).then(r => r.json()),
    };

    const TIERS       = ["internal", "cracs", "academia", "industry"];
    const TIER_LABELS = { internal: "Internal", cracs: "CRACs", academia: "Academia", industry: "Industry" };
    const TIER_COLORS = { internal: "bg-slate-100 text-slate-600", cracs: "bg-blue-50 text-blue-600", academia: "bg-emerald-50 text-emerald-600", industry: "bg-amber-50 text-amber-700" };

    const newRow  = () => ({ _tempId: `_new_${Date.now()}`, code: "", name: "", funds: "", tier: "internal", members: [] });
    const inputCls = "w-full text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 font-sans bg-white";

    // ── Member picker modal ──────────────────────────────────────────────────
    function MemberModal({ title, allMembers, selected, onClose, onSave }) {
      const [search,   setSearch]   = useState("");
      const [checked,  setChecked]  = useState(new Set(selected));
      const inputRef = useRef(null);

      useEffect(() => { inputRef.current?.focus(); }, []);

      const filtered = allMembers.filter(m => {
        const q = search.toLowerCase();
        return !q || m.username.toLowerCase().includes(q) || (m.display_name || "").toLowerCase().includes(q);
      });

      const toggle = (username) =>
        setChecked(prev => { const s = new Set(prev); s.has(username) ? s.delete(username) : s.add(username); return s; });

      return (
        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm flex flex-col max-h-[80vh]" onClick={e => e.stopPropagation()}>
            <div className="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
              <div>
                <div className="text-sm font-semibold text-slate-800">Members</div>
                <div className="text-xs text-slate-400 mt-0.5">{title}</div>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600 bg-transparent border-none cursor-pointer text-xl leading-none font-sans">×</button>
            </div>
            <div className="px-4 pt-3 pb-2">
              <input
                ref={inputRef}
                value={search}
                onChange={e => setSearch(e.target.value)}
                placeholder="Search users…"
                className="w-full text-xs px-3 py-2 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 font-sans bg-slate-50"
              />
            </div>
            <div className="overflow-y-auto flex-1 px-2 pb-2">
              {filtered.length === 0 && (
                <div className="text-center text-xs text-slate-400 py-6">No users match "{search}"</div>
              )}
              {filtered.map(m => (
                <label key={m.id} className="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-50 cursor-pointer">
                  <input
                    type="checkbox"
                    checked={checked.has(m.username)}
                    onChange={() => toggle(m.username)}
                    className="rounded"
                  />
                  <div className="flex items-center gap-2 min-w-0">
                    <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-slate-200 text-slate-600 font-bold text-[10px] flex-shrink-0">
                      {m.username[0].toUpperCase()}
                    </span>
                    <div className="min-w-0">
                      <div className="text-xs font-medium text-slate-700 truncate">{m.display_name || m.username}</div>
                      {m.display_name && <div className="text-[10px] text-slate-400">{m.username}</div>}
                    </div>
                  </div>
                  {m.role === "admin" && <span className="ml-auto text-[9px] bg-blue-100 text-blue-600 rounded-full px-1.5 py-0.5 flex-shrink-0">admin</span>}
                </label>
              ))}
            </div>
            <div className="px-5 py-3 border-t border-slate-100 flex items-center justify-between">
              <span className="text-xs text-slate-400">{checked.size} selected</span>
              <div className="flex gap-2">
                <button onClick={onClose} className="text-xs px-3 py-1.5 rounded-lg border border-slate-200 bg-white text-slate-500 cursor-pointer hover:bg-slate-50 font-sans">Cancel</button>
                <button onClick={() => onSave([...checked])} className="text-xs px-4 py-1.5 rounded-lg bg-blue-600 text-white border-none cursor-pointer hover:bg-blue-700 font-sans font-semibold">Save</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Spending details modal ───────────────────────────────────────────────
    function DetailsModal({ grant, onClose }) {
      const bookings = grant.details?.bookings || [];
      const tasks    = grant.details?.tasks    || [];

      const bookingLink = (date) => {
        if (!date) return "booking.html";
        const d = new Date(date);
        if (isNaN(d.getTime())) return "booking.html";
        d.setDate(d.getDate() - d.getDay());
        return `booking.html?date=${d.toISOString().split("T")[0]}`;
      };

      return (
        <div className="fixed inset-0 bg-black/40 z-50 flex items-start justify-center p-4 pt-20" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg flex flex-col max-h-[70vh]" onClick={e => e.stopPropagation()}>
            <div className="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
              <div>
                <div className="text-sm font-semibold text-slate-800">Spending breakdown</div>
                <div className="text-xs text-slate-400 mt-0.5">{grant.code} — {grant.name}</div>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600 bg-transparent border-none cursor-pointer text-xl leading-none font-sans">×</button>
            </div>

            <div className="overflow-y-auto flex-1 px-5 py-3 space-y-4">
              {bookings.length > 0 && (
                <div>
                  <div className="text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-2">Bookings</div>
                  <div className="space-y-1">
                    {bookings.map((b, i) => (
                      <a key={i} href={bookingLink(b.date)} target="_blank"
                        className="flex items-center justify-between px-3 py-2 rounded-lg bg-slate-50 hover:bg-blue-50 no-underline group">
                        <div className="min-w-0">
                          <div className="text-xs font-medium text-slate-700 truncate group-hover:text-blue-700">
                            {b.resource_name}
                            <span className={`ml-1.5 text-[9px] rounded-full px-1.5 py-0.5 ${b.status === "approved" ? "bg-emerald-100 text-emerald-700" : "bg-amber-100 text-amber-700"}`}>{b.status}</span>
                          </div>
                          <div className="text-[10px] text-slate-400">{b.date} · {b.username} · {b.hours.toFixed(1)}h</div>
                        </div>
                        <div className="text-xs font-semibold text-slate-700 ml-3 flex-shrink-0">
                          €{b.cost.toLocaleString("en", {minimumFractionDigits:2,maximumFractionDigits:2})}
                          <span className="ml-1 text-[10px] text-blue-400 group-hover:text-blue-600">↗</span>
                        </div>
                      </a>
                    ))}
                  </div>
                </div>
              )}

              {tasks.length > 0 && (
                <div>
                  <div className="text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-2">Billed tasks</div>
                  <div className="space-y-1">
                    {tasks.map((t, i) => (
                      <a key={i} href={`kanban.html?project=${encodeURIComponent(t.project_id)}`} target="_blank"
                        className="flex items-center justify-between px-3 py-2 rounded-lg bg-slate-50 hover:bg-blue-50 no-underline group">
                        <div className="min-w-0">
                          <div className="text-xs font-medium text-slate-700 truncate group-hover:text-blue-700">{t.task_title}</div>
                          <div className="text-[10px] text-slate-400">{t.project_name}</div>
                        </div>
                        <div className="text-xs font-semibold text-slate-700 ml-3 flex-shrink-0">
                          €{t.total.toLocaleString("en", {minimumFractionDigits:2,maximumFractionDigits:2})}
                          <span className="ml-1 text-[10px] text-blue-400 group-hover:text-blue-600">↗</span>
                        </div>
                      </a>
                    ))}
                  </div>
                </div>
              )}

              {bookings.length === 0 && tasks.length === 0 && (
                <div className="text-center text-sm text-slate-400 py-6">No spending details available.</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [grants,       setGrants]       = useState([]);
      const [newRows,      setNewRows]      = useState([]);
      const [members,      setMembers]      = useState([]);
      const [loading,      setLoading]      = useState(true);
      const [saving,       setSaving]       = useState(false);
      const [msg,          setMsg]          = useState(null);
      const [menuOpen,     setMenuOpen]     = useState(false);
      const [modal,        setModal]        = useState(null); // { type: "existing"|"new", id, code }
      const [detailsModal, setDetailsModal] = useState(null); // grant object

      useEffect(() => {
        if (!menuOpen) return;
        const h = () => setMenuOpen(false);
        document.addEventListener("click", h);
        return () => document.removeEventListener("click", h);
      }, [menuOpen]);

      useEffect(() => {
        Promise.all([api.list(), api.members()])
          .then(([g, m]) => {
            setGrants((Array.isArray(g) ? g : []).map(gr => ({ ...gr, members: Array.isArray(gr.members) ? gr.members : [] })));
            setMembers(Array.isArray(m) ? m : []);
            setLoading(false);
          })
          .catch(() => setLoading(false));
      }, []);

      const updateGrant  = (id, field, val) => setGrants(prev => prev.map(g => g.id === id ? { ...g, [field]: val, _dirty: true } : g));
      const updateNewRow = (tid, field, val) => setNewRows(prev => prev.map(r => r._tempId === tid ? { ...r, [field]: val } : r));
      const addRow       = () => setNewRows(prev => [...prev, newRow()]);
      const removeNew    = (tid) => setNewRows(prev => prev.filter(r => r._tempId !== tid));

      const removeExisting = async (id) => {
        if (!confirm("Remove this grant?")) return;
        await api.remove(id);
        setGrants(prev => prev.filter(g => g.id !== id));
      };

      const openModal = (type, id, code, currentMembers) =>
        setModal({ type, id, code, currentMembers: currentMembers || [] });

      const saveModalMembers = (membersList) => {
        if (modal.type === "existing") {
          updateGrant(modal.id, "members", membersList);
        } else {
          updateNewRow(modal.id, "members", membersList);
        }
        setModal(null);
      };

      const save = async () => {
        setSaving(true); setMsg(null);
        try {
          const ops = [];
          for (const g of grants.filter(g => g._dirty && g.code?.trim())) {
            ops.push(api.update(g.id, { code: g.code.trim(), name: g.name?.trim() || "", funds: parseFloat(g.funds) || 0, tier: g.tier, members: g.members || [] }));
          }
          for (const r of newRows.filter(r => r.code.trim())) {
            ops.push(api.create({ code: r.code.trim(), name: r.name?.trim() || "", funds: parseFloat(r.funds) || 0, tier: r.tier, members: r.members || [] }));
          }
          await Promise.all(ops);
          const fresh = await api.list();
          setGrants((Array.isArray(fresh) ? fresh : []).map(gr => ({ ...gr, members: Array.isArray(gr.members) ? gr.members : [] })));
          setNewRows([]);
          setMsg({ text: "Saved!", ok: true });
        } catch (e) {
          setMsg({ text: e.message, ok: false });
        } finally {
          setSaving(false);
        }
      };

      const drop = "flex items-center gap-2 px-3 py-2 text-xs text-slate-300 hover:bg-slate-700 hover:text-white no-underline transition-colors";

      const MembersCell = ({ membersList, onManage }) => (
        <div className="flex items-center gap-1.5 flex-wrap">
          {membersList.slice(0, 4).map(u => (
            <span key={u} className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-slate-200 text-slate-600 font-bold text-[10px]" title={u}>
              {u[0].toUpperCase()}
            </span>
          ))}
          {membersList.length > 4 && (
            <span className="text-[10px] text-slate-400">+{membersList.length - 4}</span>
          )}
          <button
            onClick={onManage}
            className="text-[10px] px-2 py-0.5 rounded-md border border-slate-200 bg-slate-50 text-slate-500 hover:bg-slate-100 cursor-pointer font-sans ml-0.5">
            {membersList.length === 0 ? "Add members" : "Edit"}
          </button>
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-50">
          {detailsModal && (
            <DetailsModal grant={detailsModal} onClose={() => setDetailsModal(null)} />
          )}
          {modal && (
            <MemberModal
              title={modal.code || "New grant"}
              allMembers={members}
              selected={modal.currentMembers}
              onClose={() => setModal(null)}
              onSave={saveModalMembers}
            />
          )}

          <nav className="bg-slate-900 px-4 sm:px-6 py-3 flex items-center gap-3 flex-wrap">
            <a href="dashboard.html" className="text-[15px] font-bold text-white no-underline">⚙️ Kerno</a>
            <span className="text-slate-600">›</span>
            <span className="text-[13px] text-slate-400">Grants</span>
            <div className="ml-auto flex gap-2 items-center flex-wrap">
              <a href="kanban.html"   className="text-[11px] px-2.5 py-1 rounded-md border border-slate-700 bg-slate-800 text-slate-400 no-underline hover:bg-slate-700">📋 Kanban</a>
              <a href="booking.html"  className="text-[11px] px-2.5 py-1 rounded-md border border-slate-700 bg-slate-800 text-slate-400 no-underline hover:bg-slate-700">📅 Bookings</a>
              <a href="requests.html" className="text-[11px] px-2.5 py-1 rounded-md border border-slate-700 bg-slate-800 text-slate-400 no-underline hover:bg-slate-700">📝 Requests</a>
              <div className="relative" onClick={e => e.stopPropagation()}>
                <button onClick={() => setMenuOpen(o => !o)}
                  className="flex items-center gap-1.5 text-[11px] px-2.5 py-1 rounded-md border border-slate-700 bg-slate-700 text-white hover:bg-slate-600 cursor-pointer font-[inherit]">
                  {session.avatar_url
                    ? <img src={session.avatar_url} className="w-5 h-5 rounded-full object-cover" alt="" />
                    : <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-slate-600 text-slate-200 font-bold text-[10px]">{session.username[0].toUpperCase()}</span>}
                  {session.display_name || session.username}
                  <span className="text-[9px] bg-blue-600 text-white rounded-full px-1.5 py-0.5">admin</span>
                  <span className="text-[10px] text-slate-400">▾</span>
                </button>
                {menuOpen && (
                  <div className="absolute right-0 top-full mt-1 w-48 bg-slate-800 border border-slate-700 rounded-xl shadow-xl z-50 overflow-hidden">
                    <a href="profile.html" className={drop}>👤 My Profile</a>
                    <div className="border-t border-slate-700" />
                    <a href="users.html"   className={drop}>👥 Users & Groups</a>
                    <a href="pricing.html" className={drop}>💰 Pricing</a>
                    <a href="grants.html"  className="flex items-center gap-2 px-3 py-2 text-xs bg-slate-700 text-white no-underline">🏛 Grants</a>
                  </div>
                )}
              </div>
              <button onClick={logout} className="text-[11px] px-2.5 py-1 rounded-md border border-slate-700 bg-slate-800 text-slate-400 cursor-pointer font-[inherit] hover:bg-slate-700">Sign out</button>
            </div>
          </nav>

          <main className="max-w-5xl mx-auto px-4 py-10">
            <div className="mb-8">
              <h1 className="text-2xl font-bold text-slate-900 tracking-tight">Grants</h1>
              <p className="text-sm text-slate-400 mt-1">Manage research grants. The grant's tier sets the pricing category for bookings and requests. Members are the users who can charge to this grant.</p>
            </div>

            <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
              <div className="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
                <span className="text-sm font-semibold text-slate-700">Research Grants</span>
                <button onClick={addRow} className="text-xs px-3 py-1.5 rounded-lg bg-blue-600 text-white border-none cursor-pointer hover:bg-blue-700 font-sans">
                  + Add Grant
                </button>
              </div>

              {loading ? (
                <div className="p-8 text-center text-sm text-slate-400">Loading…</div>
              ) : (
                <div className="overflow-x-auto">
                  <table className="w-full text-sm border-collapse">
                    <thead>
                      <tr className="bg-slate-50 border-b border-slate-100">
                        <th className="text-left text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-4 py-3 w-36">Code</th>
                        <th className="text-left text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-4 py-3">Name</th>
                        <th className="text-right text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-4 py-3 w-36">Total Budget</th>
                        <th className="text-left text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-4 py-3 w-52">Usage</th>
                        <th className="text-left text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-4 py-3 w-32">Tier</th>
                        <th className="text-left text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-4 py-3">Members</th>
                        <th className="w-10"></th>
                      </tr>
                    </thead>
                    <tbody>
                      {grants.map((g, i) => {
                        const total     = parseFloat(g.funds) || 0;
                        const spent     = parseFloat(g.spent) || 0;
                        const remaining = total - spent;
                        const pct       = total > 0 ? Math.min(100, (spent / total) * 100) : 0;
                        const overBudget = remaining < 0;
                        return (
                        <tr key={g.id} className={i % 2 === 0 ? "bg-white" : "bg-slate-50/50"}>
                          <td className="px-4 py-2.5"><input value={g.code} onChange={e => updateGrant(g.id, "code", e.target.value)} className={inputCls} /></td>
                          <td className="px-4 py-2.5"><input value={g.name} onChange={e => updateGrant(g.id, "name", e.target.value)} placeholder="Grant name" className={inputCls} /></td>
                          <td className="px-4 py-2.5">
                            <input type="number" min="0" step="0.01" value={g.funds} onChange={e => updateGrant(g.id, "funds", e.target.value)}
                              className="w-full text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 font-sans text-right bg-white" />
                          </td>
                          <td className="px-4 py-2.5">
                            {total > 0 ? (
                              <div>
                                <div className="flex items-center justify-between text-[10px] mb-1">
                                  <span className={overBudget ? "text-red-600 font-semibold" : "text-slate-500"}>
                                    {overBudget ? "Over budget!" : `€${remaining.toLocaleString("en", {minimumFractionDigits:2,maximumFractionDigits:2})} left`}
                                  </span>
                                  <button onClick={() => setDetailsModal(g)} className="text-slate-400 hover:text-blue-600 hover:underline bg-transparent border-none cursor-pointer font-sans p-0 text-[10px]">
                                    €{spent.toLocaleString("en", {minimumFractionDigits:2,maximumFractionDigits:2})} spent ↗
                                  </button>
                                </div>
                                <div className="h-1.5 rounded-full bg-slate-100 overflow-hidden">
                                  <div className="h-full rounded-full transition-all"
                                    style={{width:`${pct}%`, background: overBudget ? "#dc2626" : pct > 80 ? "#f59e0b" : "#10b981"}} />
                                </div>
                              </div>
                            ) : (
                              <span className="text-[10px] text-slate-400 italic">no budget set</span>
                            )}
                          </td>
                          <td className="px-4 py-2.5">
                            <select value={g.tier} onChange={e => updateGrant(g.id, "tier", e.target.value)} className={inputCls}>
                              {TIERS.map(t => <option key={t} value={t}>{TIER_LABELS[t]}</option>)}
                            </select>
                          </td>
                          <td className="px-4 py-2.5">
                            <MembersCell
                              membersList={g.members || []}
                              onManage={() => openModal("existing", g.id, g.code, g.members || [])}
                            />
                          </td>
                          <td className="px-3 py-2.5">
                            <button onClick={() => removeExisting(g.id)} className="text-slate-300 hover:text-red-400 bg-transparent border-none cursor-pointer text-lg leading-none font-sans" title="Remove">×</button>
                          </td>
                        </tr>
                        );
                      })}
                      {newRows.map((r, i) => (
                        <tr key={r._tempId} className="border-l-2 border-blue-400 bg-blue-50/20">
                          <td className="px-4 py-2.5"><input value={r.code} onChange={e => updateNewRow(r._tempId, "code", e.target.value)} placeholder="e.g. FCT-2024-001" className={`${inputCls} border-blue-200`} /></td>
                          <td className="px-4 py-2.5"><input value={r.name} onChange={e => updateNewRow(r._tempId, "name", e.target.value)} placeholder="Grant name" className={`${inputCls} border-blue-200`} /></td>
                          <td className="px-4 py-2.5">
                            <input type="number" min="0" step="0.01" value={r.funds} onChange={e => updateNewRow(r._tempId, "funds", e.target.value)}
                              className="w-full text-xs px-2.5 py-1.5 rounded-lg border border-blue-200 outline-none focus:ring-2 focus:ring-blue-500 font-sans text-right bg-blue-50/30" />
                          </td>
                          <td className="px-4 py-2.5">
                            <span className="text-[10px] text-slate-400 italic">save to track usage</span>
                          </td>
                          <td className="px-4 py-2.5">
                            <select value={r.tier} onChange={e => updateNewRow(r._tempId, "tier", e.target.value)} className={`${inputCls} border-blue-200 bg-blue-50/30`}>
                              {TIERS.map(t => <option key={t} value={t}>{TIER_LABELS[t]}</option>)}
                            </select>
                          </td>
                          <td className="px-4 py-2.5">
                            <MembersCell
                              membersList={r.members || []}
                              onManage={() => openModal("new", r._tempId, r.code || "New grant", r.members || [])}
                            />
                          </td>
                          <td className="px-3 py-2.5">
                            <button onClick={() => removeNew(r._tempId)} className="text-slate-300 hover:text-red-400 bg-transparent border-none cursor-pointer text-lg leading-none font-sans" title="Remove">×</button>
                          </td>
                        </tr>
                      ))}
                      {grants.length === 0 && newRows.length === 0 && (
                        <tr><td colSpan={7} className="text-center text-sm text-slate-400 py-8">No grants yet. Click "+ Add Grant" to start.</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              )}

              <div className="px-5 py-4 border-t border-slate-100 flex items-center justify-between gap-3">
                {msg
                  ? <span className={`text-sm ${msg.ok ? "text-emerald-600" : "text-red-600"}`}>{msg.ok ? "✓ " : "✗ "}{msg.text}</span>
                  : <span />}
                <button onClick={save} disabled={saving}
                  className="text-sm px-5 py-2 rounded-xl bg-blue-600 text-white border-none cursor-pointer hover:bg-blue-700 disabled:opacity-60 font-sans font-semibold">
                  {saving ? "Saving…" : "Save Grants"}
                </button>
              </div>
            </div>

            <div className="mt-6 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-xs text-amber-700">
              <strong>Note:</strong> Select a grant when creating bookings or submitting requests to automatically apply the correct pricing tier. Only grant members will see the grant in their selector.
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
