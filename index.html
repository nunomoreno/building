<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerno — Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center p-4">

  <div class="w-full max-w-sm">

    <!-- Logo mark -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-blue-600 flex items-center justify-center shadow-lg mb-4 text-2xl select-none">⚙️</div>
      <h1 class="text-2xl font-bold text-white tracking-tight">Kerno</h1>
      <p class="text-sm text-slate-400 mt-1">CaixaResearch platform</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">

      <!-- Session expired banner -->
      <div id="expired-banner" style="display:none"
        class="flex items-start gap-2.5 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 mb-6">
        <span class="text-amber-500 text-base leading-none mt-0.5">⚠</span>
        <p class="text-sm text-amber-800">Your session has expired. Please sign in again.</p>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Username</label>
          <input id="username" type="text" autocomplete="username" placeholder="your username"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-900 placeholder:text-slate-300 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Password</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-900 placeholder:text-slate-300 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow" />
        </div>
      </div>

      <!-- Error message -->
      <div id="error" style="display:none"
        class="flex items-center gap-2 mt-4 bg-red-50 border border-red-100 rounded-xl px-4 py-2.5 text-sm text-red-600">
        <span class="text-base leading-none">⚠</span>
        <span id="error-text"></span>
      </div>

      <button id="btn"
        class="mt-5 w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 disabled:opacity-60 disabled:cursor-not-allowed text-white font-semibold py-2.5 rounded-xl text-sm transition-colors shadow-sm">
        Sign in
      </button>

      <p class="mt-5 text-center text-xs text-slate-400">Contact your administrator to get access.</p>
    </div>

  </div>

  <script>
    const WORKER = "https://morning-mud-283c.moreno-a64.workers.dev";
    const SESSION_KEY = "kerno_session";

    // If already logged in and session valid, skip straight to dashboard
    const existing = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
    if (existing && Date.now() < new Date(existing.expires).getTime()) {
      window.location.href = "dashboard.html";
    }

    // Show expiry banner if redirected here after session expired
    if (new URLSearchParams(location.search).get("expired") === "1") {
      document.getElementById("expired-banner").style.display = "flex";
    }

    const btn        = document.getElementById("btn");
    const errEl      = document.getElementById("error");
    const errText    = document.getElementById("error-text");
    const usernameEl = document.getElementById("username");
    const passwordEl = document.getElementById("password");

    async function login() {
      const username = usernameEl.value.trim();
      const password = passwordEl.value.trim();
      if (!username || !password) return;

      btn.disabled = true;
      btn.textContent = "Please wait…";
      errEl.style.display = "none";

      try {
        const res  = await fetch(`${WORKER}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (data.error) {
          errText.textContent = "Invalid username or password.";
          errEl.style.display = "flex";
        } else {
          localStorage.setItem(SESSION_KEY, JSON.stringify({
            token:        data.token,
            expires:      data.expires,
            username:     data.username,
            role:         data.role,
            group_id:     data.group_id     || null,
            group_role:   data.group_role   || null,
            display_name: data.display_name || null,
            avatar_url:   data.avatar_url   || null,
          }));
          window.location.href = data.role === "admin" ? "dashboard.html" : "booking.html";
        }
      } catch {
        errText.textContent = "Network error — please try again.";
        errEl.style.display = "flex";
      }

      btn.disabled = false;
      btn.textContent = "Sign in";
    }

    btn.addEventListener("click", login);
    passwordEl.addEventListener("keydown", e => e.key === "Enter" && login());
  </script>
</body>
</html>
