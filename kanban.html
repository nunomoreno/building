<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerno — Kanban</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; }
    .msg-bubble { white-space: pre-wrap; line-height: 1.5; font-size: 13px; padding: 10px 14px; border-radius: 12px; max-width: 80%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const COLUMNS   = ["To Do", "In Progress", "Blocked", "Done"];
    const COL_STYLE = {
      "To Do":       { bg: "#f1f5f9", border: "#cbd5e1", badge: "#64748b" },
      "In Progress": { bg: "#eff6ff", border: "#93c5fd", badge: "#2563eb" },
      "Blocked":     { bg: "#fff7ed", border: "#fdba74", badge: "#ea580c" },
      "Done":        { bg: "#f0fdf4", border: "#86efac", badge: "#16a34a" },
    };

    const WORKER      = "https://morning-mud-283c.moreno-a64.workers.dev";
    const SESSION_KEY  = "kerno_session";
    const SCOPES       = ["mine", "mentioned", "group"];

    // ── Session ──────────────────────────────────────────────────────────────
    function getSession() {
      const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
      if (!s || Date.now() > new Date(s.expires).getTime()) {
        localStorage.removeItem(SESSION_KEY);
        window.location.href = "index.html?expired=1";
        return null;
      }
      return s;
    }

    // ── API ──────────────────────────────────────────────────────────────────
    const authHeaders = () => ({
      "Content-Type": "application/json",
      "X-Session-Token": getSession()?.token || "",
    });

    const apiFetch = async (path, opts = {}) => {
      const res = await fetch(`${WORKER}${path}`, {
        ...opts,
        headers: { ...authHeaders(), ...(opts.headers || {}) },
      });
      if (res.status === 401) {
        localStorage.removeItem(SESSION_KEY);
        window.location.href = "index.html?expired=1";
        return null;
      }
      return res.json().catch(() => ({}));
    };

    const api = {
      register:      (u, p, e) => fetch(`${WORKER}/register`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: u, password: p, email: e }) }).then(r => r.json()),
      getProjects:   (scope)   => apiFetch(`/projects${scope ? `?scope=${scope}` : ""}`),
      saveProject:   (p)       => p._id
        ? apiFetch(`/projects/${p._id}`, { method: "PUT",    body: JSON.stringify(p) })
        : apiFetch("/projects",           { method: "POST",   body: JSON.stringify(p) }),
      deleteProject: (id)      => apiFetch(`/projects/${id}`, { method: "DELETE" }),
      log:           (u, a, d) => apiFetch("/logs",            { method: "POST", body: JSON.stringify({ username: u, action: a, details: d, timestamp: new Date().toISOString() }) }),
      getLogs:       ()        => apiFetch("/logs"),
      getMembers:    ()        => apiFetch("/members"),
      deleteMember:  (id)      => apiFetch(`/members/${id}`,   { method: "DELETE" }),
      getGroups:     ()        => apiFetch("/groups"),
      saveGroup:     (g)       => g.id
        ? apiFetch(`/groups/${g.id}`, { method: "PUT",    body: JSON.stringify(g) })
        : apiFetch("/groups",          { method: "POST",   body: JSON.stringify(g) }),
      deleteGroup:   (id)      => apiFetch(`/groups/${id}`,    { method: "DELETE" }),
      addGroupMember:(gid,mid,role) => apiFetch(`/groups/${gid}/members`, { method: "POST", body: JSON.stringify({ member_id: mid, role }) }),
      removeGroupMember:(gid,mid)   => apiFetch(`/groups/${gid}/members/${mid}`, { method: "DELETE" }),
      notify:        (actor, taskTitle, projectName, mentionsWithEmails) =>
                                  apiFetch("/notify", { method: "POST", body: JSON.stringify({ actor, taskTitle, projectName, mentionsWithEmails }) }),
      ai:            (body)    => apiFetch("/ai", { method: "POST", body: JSON.stringify(body) }),
    };

    function extractMentions(text) {
      return [...new Set([...(text.matchAll(/@(\w+)/g))].map(m => m[1]))];
    }

    // ── Mention Textarea ─────────────────────────────────────────────────────
    function MentionTextarea({ value, onChange, members, style, onKeyDown }) {
      const [showDropdown, setShowDropdown] = useState(false);
      const [mentionQuery, setMentionQuery] = useState("");
      const [mentionStart, setMentionStart] = useState(null);
      const ref = useRef(null);

      useEffect(() => { ref.current?.focus(); }, []);

      const filtered = members.filter(m => m.toLowerCase().startsWith(mentionQuery.toLowerCase()));

      const handleChange = (e) => {
        const val = e.target.value, pos = e.target.selectionStart;
        onChange(val);
        const match = val.slice(0, pos).match(/@(\w*)$/);
        if (match) { setShowDropdown(true); setMentionQuery(match[1]); setMentionStart(pos - match[0].length); }
        else setShowDropdown(false);
      };

      const selectMention = (username) => {
        const pos = ref.current?.selectionStart || value.length;
        onChange(`${value.slice(0, mentionStart)}@${username} ${value.slice(pos)}`);
        setShowDropdown(false);
        setTimeout(() => ref.current?.focus(), 0);
      };

      return (
        <div style={{ position: "relative" }}>
          <textarea ref={ref} value={value} onChange={handleChange} onKeyDown={onKeyDown} style={style} />
          {showDropdown && filtered.length > 0 && (
            <div style={{ position: "absolute", bottom: "100%", left: 0, zIndex: 100, minWidth: 140 }}
              className="bg-white border border-slate-200 rounded-lg shadow-md">
              {filtered.map(m => (
                <div key={m} onMouseDown={() => selectMention(m)}
                  className="px-3 py-1.5 text-xs cursor-pointer text-slate-800 hover:bg-slate-100">
                  @{m}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── Navbar ───────────────────────────────────────────────────────────────
    function Navbar({ user }) {
      const [menuOpen, setMenuOpen] = React.useState(false);
      const logout = () => { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html"; };
      const isAdmin = user.role === "admin";
      React.useEffect(() => {
        if (!menuOpen) return;
        const h = () => setMenuOpen(false);
        document.addEventListener("click", h);
        return () => document.removeEventListener("click", h);
      }, [menuOpen]);
      const nav  = "text-xs px-2.5 py-1 rounded border border-slate-600 bg-slate-700 text-slate-300 no-underline hover:bg-slate-600";
      const navA = "text-xs px-2.5 py-1 rounded border border-blue-500 bg-blue-600 text-white no-underline";
      const drop = "flex items-center gap-2 px-3 py-2 text-xs text-slate-300 hover:bg-slate-700 hover:text-white no-underline transition-colors";
      return (
        <nav className="bg-slate-900 px-6 py-2.5 flex items-center gap-3 shrink-0">
          <a href="dashboard.html" className="text-sm font-bold text-white no-underline">⚙️ Kerno</a>
          <span className="text-slate-600">›</span>
          <span className="text-xs text-slate-400">Kanban</span>
          <div className="ml-auto flex items-center gap-2">
            <a href="kanban.html"   className={navA}>📋 Kanban</a>
            <a href="booking.html"  className={nav}>📅 Bookings</a>
            <a href="requests.html" className={nav}>📝 Requests</a>
            <div className="relative" onClick={e => e.stopPropagation()}>
              <button onClick={() => setMenuOpen(o => !o)}
                className="flex items-center gap-1.5 text-xs px-2.5 py-1 rounded border border-slate-600 bg-slate-700 text-slate-300 hover:bg-slate-600 cursor-pointer font-[inherit]">
                {user.avatar_url
                  ? <img src={user.avatar_url} className="w-5 h-5 rounded-full object-cover" alt="" />
                  : <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-slate-600 text-slate-200 font-bold text-[10px]">{user.username[0].toUpperCase()}</span>}
                {user.display_name || user.username}
                {isAdmin && <span className="text-[9px] bg-blue-600 text-white rounded-full px-1.5 py-0.5">admin</span>}
                <span className="text-[10px] text-slate-500">▾</span>
              </button>
              {menuOpen && (
                <div className="absolute right-0 top-full mt-1 w-48 bg-slate-800 border border-slate-700 rounded-xl shadow-xl z-50 overflow-hidden">
                  <a href="profile.html" className={drop}>👤 My Profile</a>
                  {isAdmin && <div className="border-t border-slate-700" />}
                  {isAdmin && <a href="users.html"   className={drop}>👥 Users & Groups</a>}
                  {isAdmin && <a href="pricing.html" className={drop}>💰 Pricing</a>}
                </div>
              )}
            </div>
            <button onClick={logout} className="text-xs px-2.5 py-1 rounded border border-slate-600 bg-slate-700 text-slate-300 cursor-pointer hover:bg-slate-600 font-[inherit]">Sign out</button>
          </div>
        </nav>
      );
    }

    // ── Audit Log ────────────────────────────────────────────────────────────
    function AuditLog() {
      const [logs,    setLogs]    = useState([]);
      const [loading, setLoading] = useState(true);
      const [error,   setError]   = useState(null);

      useEffect(() => {
        api.getLogs()
          .then(data => setLogs(Array.isArray(data) ? data : []))
          .catch(() => setError("Could not load logs."))
          .finally(() => setLoading(false));
      }, []);

      return (
        <div className="flex flex-col h-full">
          <div className="px-4 py-3 border-b border-slate-100 text-sm font-bold text-slate-900 bg-white">📋 Audit Log</div>
          <div className="flex-1 overflow-y-auto p-3">
            {loading && <div className="text-slate-400 text-xs">Loading…</div>}
            {error   && <div className="text-red-500 text-xs">{error}</div>}
            {!loading && !error && logs.length === 0 && <div className="text-slate-400 text-xs">No activity yet.</div>}
            {logs.map((l, i) => (
              <div key={i} className="mb-2.5 p-2.5 bg-white rounded-lg border border-slate-200 text-xs">
                <div className="flex justify-between mb-1">
                  <span className="font-semibold text-slate-800">{l.username}</span>
                  <span className="text-slate-400">{new Date(l.timestamp).toLocaleString()}</span>
                </div>
                <div className="text-slate-500"><span className="font-semibold text-blue-600">{l.action}</span> — {l.details}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── AI Chat ──────────────────────────────────────────────────────────────
    function AIChat({ scope, onRefresh, username }) {
      const [messages,      setMessages]      = useState([]);
      const [input,         setInput]         = useState("");
      const [asking,        setAsking]        = useState(false);
      const [error,         setError]         = useState(null);
      const [scopedProjects,setScopedProjects]= useState([]);
      const bottomRef = useRef(null);

      // Fetch projects filtered to the current scope every time the panel opens or scope changes
      useEffect(() => {
        api.getProjects(scope).then(data => setScopedProjects(Array.isArray(data) ? data : []));
      }, [scope]);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, asking]);

      const executeAction = async (action) => {
        const record = scopedProjects.find(r => r.id === action.projectId);
        if (!record) return "❌ Project not found.";
        let updatedTasks = [...(record.tasks || [])];
        let logDetails = "";
        if (action.type === "add_task")    { updatedTasks.push({ id: Date.now(), ...action.task }); logDetails = `Added task "${action.task.title}" to ${record.name} as ${action.task.col}`; }
        else if (action.type === "move_task")   { const t = updatedTasks.find(t => t.id === action.taskId); logDetails = `Moved "${t?.title}" to ${action.col} in ${record.name}`; updatedTasks = updatedTasks.map(t => t.id === action.taskId ? { ...t, col: action.col } : t); }
        else if (action.type === "update_task") { const t = updatedTasks.find(t => t.id === action.taskId); logDetails = `Updated "${t?.title}" in ${record.name}`; updatedTasks = updatedTasks.map(t => t.id === action.taskId ? { ...t, ...action.updates } : t); }
        else if (action.type === "delete_task") { const t = updatedTasks.find(t => t.id === action.taskId); logDetails = `Deleted "${t?.title}" from ${record.name}`; updatedTasks = updatedTasks.filter(t => t.id !== action.taskId); }
        await api.saveProject({ ...record, tasks: updatedTasks });
        await api.log(username, action.type, logDetails);
        await onRefresh();
        return "✅ Done!";
      };

      const ask = async () => {
        if (!input.trim()) return;
        setAsking(true); setError(null);
        const userMsg     = input;
        const newMessages = [...messages, { role: "user", content: userMsg }];
        setMessages(newMessages); setInput("");
        try {
          const result = await api.ai({
            model: "claude-sonnet-4-20250514", max_tokens: 1000,
            system: `You are a helpful assistant managing a Kanban board. Current data:\n\n${JSON.stringify(scopedProjects, null, 2)}\n\nSupported actions:\n- add_task: { type, projectId, task: { col, title, notes } }\n- move_task: { type, projectId, taskId, col }\n- update_task: { type, projectId, taskId, updates }\n- delete_task: { type, projectId, taskId }\n\nIf performing a write operation, append at the very end:\n<ACTION>{"type":"...","projectId":"...",...}</ACTION>\n\nUse the project's id field for projectId.`,
            messages: newMessages,
          });
          if (!result) { setError("No response — please try again."); setAsking(false); return; }
          let reply = result.content?.[0]?.text || "No response.";
          const actionMatch = reply.match(/<ACTION>(.*?)<\/ACTION>/s);
          let actionResult = "";
          if (actionMatch) {
            reply = reply.replace(/<ACTION>.*?<\/ACTION>/s, "").trim();
            try { actionResult = await executeAction(JSON.parse(actionMatch[1])); }
            catch { actionResult = "❌ Could not parse action."; }
          }
          setMessages(prev => [...prev, { role: "assistant", content: actionResult ? `${reply}\n\n${actionResult}` : reply }]);
        } catch (e) {
          setError("Network error — please try again.");
        }
        setAsking(false);
      };

      return (
        <div className="flex flex-col h-full bg-slate-50">
          <div className="px-4 py-3 border-b border-slate-100 text-sm font-bold text-slate-900 bg-white">🤖 AI Assistant</div>
          <div className="flex-1 overflow-y-auto p-3 flex flex-col gap-2.5">
            {messages.length === 0 && <div className="text-slate-400 text-center mt-8 text-xs">Ask me anything or give me instructions!<br/><em>"Add a blocked task…" · "What's in progress?"</em></div>}
            {messages.map((m, i) => (
              <div key={i} className="msg-bubble"
                style={{
                  alignSelf: m.role === "user" ? "flex-end" : "flex-start",
                  background: m.role === "user" ? "#2563eb" : "#fff",
                  color: m.role === "user" ? "#fff" : "#1e293b",
                  borderRadius: m.role === "user" ? "12px 12px 2px 12px" : "12px 12px 12px 2px",
                  boxShadow: "0 1px 3px #0001",
                  border: m.role === "assistant" ? "1px solid #e2e8f0" : "none",
                }}>{m.content}</div>
            ))}
            {asking && <div className="msg-bubble text-slate-400" style={{ alignSelf: "flex-start", background: "#fff", border: "1px solid #e2e8f0", borderRadius: "12px 12px 12px 2px" }}>Thinking…</div>}
            {error  && <div className="text-xs text-red-500 text-center">{error}</div>}
            <div ref={bottomRef} />
          </div>
          <div className="px-4 py-2.5 border-t border-slate-200 bg-white flex gap-2">
            <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter") ask(); }} placeholder="Ask or give instructions…"
              className="flex-1 text-sm px-2.5 py-1.5 rounded-lg border border-slate-300 outline-none focus:border-blue-400 font-sans" />
            <button onClick={ask} disabled={asking || !input.trim()}
              className="text-sm px-3.5 py-1.5 rounded-lg bg-blue-600 text-white border-none cursor-pointer font-semibold hover:bg-blue-700 disabled:opacity-60 font-sans">Send</button>
          </div>
        </div>
      );
    }

    // ── Mentioned Board (read-only mini kanban) ──────────────────────────────
    function MentionedBoard({ project, currentUser }) {
      if (!project.tasks.length) return (
        <div className="text-slate-400 mt-10 text-center">No tasks mention you.</div>
      );
      return (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10 }}>
            {COLUMNS.map(col => {
              const s = COL_STYLE[col];
              const colTasks = project.tasks.filter(t => t.col === col);
              return (
                <div key={col} style={{ background: s.bg, border: `1.5px solid ${s.border}`, borderRadius: 10, padding: "10px 10px 8px" }}>
                  <div className="flex items-center justify-between mb-2.5">
                    <span className="text-xs font-bold tracking-wide uppercase" style={{ color: s.badge }}>{col}</span>
                    <span className="text-xs text-white rounded-full px-2 py-0.5" style={{ background: s.badge }}>{colTasks.length}</span>
                  </div>
                  {colTasks.length === 0 && <div className="text-xs text-slate-300 text-center py-2">—</div>}
                  {colTasks.map(task => (
                    <div key={task.id} className="bg-white rounded-lg p-2 mb-2 shadow-sm border border-slate-200">
                      <div className="text-xs text-slate-400 mb-1 italic">{task._projectName}</div>
                      <div className="text-xs font-semibold text-slate-800 mb-1 leading-snug">{task.title}</div>
                      {task.notes && (
                        <div className="text-xs text-slate-500 leading-snug">
                          {task.notes.replace(/@(\w+)/g, (_, u) => `@${u}`)}
                        </div>
                      )}
                      {task.assignee && (
                        <div className={`mt-1.5 text-xs font-semibold rounded-full px-2 py-0.5 inline-block border ${task.assignee.toLowerCase() === currentUser?.username.toLowerCase() ? "bg-green-50 text-green-700 border-green-200" : "bg-slate-50 text-slate-500 border-slate-200"}`}>
                          {task.assignee}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── Board ────────────────────────────────────────────────────────────────
    function Board({ project, onUpdate, username, members, membersRef, currentUser }) {
      const isOwner = !project.owner_username || project.owner_username === currentUser?.username || currentUser?.role === "admin";
      const canEditTask = (task) => isOwner || task.assignee?.toLowerCase() === currentUser?.username?.toLowerCase();

      // Non-owners only see tasks assigned to them
      const visibleTasks = isOwner
        ? project.tasks
        : project.tasks.filter(t => t.assignee?.toLowerCase() === currentUser?.username?.toLowerCase());
      const [editing,   setEditing]   = useState(null);
      const [draft,     setDraft]     = useState("");
      const [addingTo,  setAddingTo]  = useState(null);
      const [newTitle,  setNewTitle]  = useState("");
      const [saving,    setSaving]    = useState(false);
      const mentionTimers = useRef({});

      const moveTask = async (id, dir) => {
        const t  = project.tasks.find(t => t.id === id);
        const ci = COLUMNS.indexOf(t.col), ni = ci + dir;
        if (ni < 0 || ni >= COLUMNS.length) return;
        await onUpdate({ ...project, tasks: project.tasks.map(t => t.id === id ? { ...t, col: COLUMNS[ni] } : t) });
        api.log(username, "move_task", `Moved "${t.title}" to ${COLUMNS[ni]} in ${project.name}`);
      };

      const startEdit  = (id, field, val) => { setEditing({ id, field }); setDraft(val); };

      const commitEdit = async () => {
        if (!editing) return;
        const t = project.tasks.find(t => t.id === editing.id);
        setSaving(true);
        await onUpdate({ ...project, tasks: project.tasks.map(t => t.id === editing.id ? { ...t, [editing.field]: draft } : t) });
        api.log(username, "update_task", `Updated ${editing.field} of "${t.title}" in ${project.name}`);
        if (editing.field === "notes") {
          const mentions = extractMentions(draft);
          if (mentions.length) {
            const key = `${project.id}-${editing.id}`;
            clearTimeout(mentionTimers.current[key]);
            mentionTimers.current[key] = setTimeout(() => {
              const mentionsWithEmails = mentions.map(u => ({
                username: u,
                email: (membersRef.current || []).find(m => m.username === u)?.email || null,
              }));
              api.notify(username, t.title, project.name, mentionsWithEmails);
            }, 30000);
          }
        }
        setSaving(false);
        setEditing(null);
      };

      const deleteTask = async (id) => {
        const t = project.tasks.find(t => t.id === id);
        await onUpdate({ ...project, tasks: project.tasks.filter(t => t.id !== id) });
        api.log(username, "delete_task", `Deleted "${t.title}" from ${project.name}`);
      };

      const addTask = async (col) => {
        if (!newTitle.trim()) return;
        const task = { id: Date.now(), col, title: newTitle.trim(), notes: "", assignee: "" };
        setSaving(true);
        await onUpdate({ ...project, tasks: [...project.tasks, task] });
        api.log(username, "add_task", `Added "${task.title}" to ${project.name} as ${col}`);
        setSaving(false);
        setNewTitle(""); setAddingTo(null);
      };

      return (
        <div className="relative">
          {saving && <div className="absolute -top-7 right-0 text-xs text-slate-400">Saving…</div>}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10 }}>
            {COLUMNS.map(col => {
              const s = COL_STYLE[col], colTasks = visibleTasks.filter(t => t.col === col);
              return (
                <div key={col} style={{ background: s.bg, border: `1.5px solid ${s.border}`, borderRadius: 10, padding: "10px 10px 8px" }}>
                  <div className="flex items-center justify-between mb-2.5">
                    <span className="text-xs font-bold tracking-wide uppercase" style={{ color: s.badge }}>{col}</span>
                    <span className="text-xs text-white rounded-full px-2 py-0.5" style={{ background: s.badge }}>{colTasks.length}</span>
                  </div>
                  {colTasks.map(task => {
                    const ci = COLUMNS.indexOf(col);
                    const isMe = task.assignee?.toLowerCase() === currentUser?.username?.toLowerCase();
                    return (
                      <div key={task.id} className={`bg-white rounded-xl p-3 mb-2 shadow-sm border ${isMe ? "border-emerald-200" : "border-slate-200"}`}>
                        {editing?.id === task.id && editing.field === "title"
                          ? <input autoFocus value={draft} onChange={e => setDraft(e.target.value)}
                              onBlur={commitEdit} onKeyDown={e => { if (e.key === "Enter") commitEdit(); if (e.key === "Escape") setEditing(null); }}
                              className="w-full text-xs font-semibold border border-blue-300 rounded px-1 py-0.5 outline-none font-sans" />
                          : <div onClick={() => canEditTask(task) && startEdit(task.id, "title", task.title)}
                              className={`text-xs font-semibold text-slate-800 mb-1 leading-snug ${canEditTask(task) ? "cursor-text" : "cursor-default"}`}>{task.title}</div>
                        }
                        {editing?.id === task.id && editing.field === "notes"
                          ? <div>
                              <MentionTextarea members={members} value={draft} onChange={setDraft}
                                onKeyDown={e => { if (e.key === "Escape") setEditing(null); }}
                                style={{ width: "100%", fontSize: 11, border: "1px solid #93c5fd", borderRadius: 4, padding: "2px 5px", resize: "vertical", boxSizing: "border-box", minHeight: 44 }} />
                              <div className="flex gap-1 mt-1">
                                <button onClick={commitEdit} disabled={saving} className="text-xs px-2 py-0.5 rounded bg-blue-600 text-white border-none cursor-pointer disabled:opacity-60 font-sans">Save</button>
                                <button onClick={() => setEditing(null)} className="text-xs px-2 py-0.5 rounded bg-slate-100 border border-slate-200 cursor-pointer text-slate-500 font-sans">Cancel</button>
                              </div>
                            </div>
                          : <div onClick={() => canEditTask(task) && startEdit(task.id, "notes", task.notes || "")}
                              className={`text-xs leading-snug min-h-3.5 ${canEditTask(task) ? "cursor-text" : "cursor-default"} ${task.notes ? "text-slate-500" : "text-slate-400"}`}>
                              {task.notes || (canEditTask(task) ? <em>add note…</em> : "")}
                            </div>
                        }
                        {/* Assignee — only owner/admin can reassign */}
                        {editing?.id === task.id && editing.field === "notes"
                          ? null
                          : <div className="mt-1.5">
                              {isOwner
                                ? <select
                                    value={task.assignee || ""}
                                    onChange={async e => {
                                      const assignee = e.target.value;
                                      await onUpdate({ ...project, tasks: project.tasks.map(t => t.id === task.id ? { ...t, assignee } : t) });
                                      api.log(username, "assign_task", `Assigned "${task.title}" to ${assignee || "nobody"} in ${project.name}`);
                                    }}
                                    className={`w-full text-xs px-1.5 py-1 rounded-md border border-slate-200 cursor-pointer font-sans ${isMe ? "bg-green-50 text-green-700" : "bg-slate-50 text-slate-400"}`}>
                                    <option value="">Unassigned</option>
                                    {members.map(m => <option key={m} value={m}>{m}</option>)}
                                  </select>
                                : task.assignee
                                  ? <span className={`text-xs font-semibold rounded-full px-2 py-0.5 border inline-block ${isMe ? "bg-green-50 text-green-700 border-green-200" : "bg-slate-50 text-slate-500 border-slate-200"}`}>{task.assignee}</span>
                                  : null
                              }
                            </div>
                        }
                        <div className="flex gap-1 mt-1.5 items-center">
                          <button onClick={() => moveTask(task.id, -1)} disabled={ci === 0 || !canEditTask(task)}
                            className={`text-xs px-1.5 py-0.5 rounded border border-slate-200 bg-slate-50 font-sans ${ci === 0 || !canEditTask(task) ? "cursor-not-allowed text-slate-300" : "cursor-pointer text-slate-500 hover:bg-slate-100"}`}>←</button>
                          <button onClick={() => moveTask(task.id, 1)} disabled={ci === COLUMNS.length - 1 || !canEditTask(task)}
                            className={`text-xs px-1.5 py-0.5 rounded border border-slate-200 bg-slate-50 font-sans ${ci === COLUMNS.length - 1 || !canEditTask(task) ? "cursor-not-allowed text-slate-300" : "cursor-pointer text-slate-500 hover:bg-slate-100"}`}>→</button>
                          {isOwner && <button onClick={() => deleteTask(task.id)} className="text-xs px-1.5 py-0.5 rounded border border-red-200 bg-red-50 cursor-pointer text-red-500 ml-auto font-sans">✕</button>}
                        </div>
                      </div>
                    );
                  })}
                  {addingTo === col && isOwner
                    ? <div className="mt-1">
                        <input autoFocus value={newTitle} onChange={e => setNewTitle(e.target.value)}
                          onKeyDown={e => { if (e.key === "Enter") addTask(col); if (e.key === "Escape") { setAddingTo(null); setNewTitle(""); } }}
                          placeholder="Task title…" className="w-full text-xs px-2 py-1 rounded-md border border-blue-300 outline-none font-sans" />
                        <div className="flex gap-1 mt-1">
                          <button onClick={() => addTask(col)} disabled={saving}
                            className="text-xs px-2.5 py-0.5 rounded border-none cursor-pointer text-white disabled:opacity-60 font-sans"
                            style={{ background: s.badge }}>Add</button>
                          <button onClick={() => { setAddingTo(null); setNewTitle(""); }} className="text-xs px-2 py-0.5 rounded bg-slate-100 border border-slate-200 cursor-pointer text-slate-500 font-sans">Cancel</button>
                        </div>
                      </div>
                    : isOwner && <button onClick={() => setAddingTo(col)}
                        className="w-full text-xs py-1 rounded-md border-dashed border bg-transparent cursor-pointer mt-0.5 font-sans"
                        style={{ borderColor: s.border, color: s.badge }}>+ Add</button>
                  }
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [user] = useState(() => {
        const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
        if (!s || Date.now() > new Date(s.expires).getTime()) {
          localStorage.removeItem(SESSION_KEY);
          window.location.href = "index.html?expired=1";
          return null;
        }
        return { username: s.username, role: s.role, token: s.token, group_id: s.group_id, group_role: s.group_role, avatar_url: s.avatar_url || null, display_name: s.display_name || null };
      });

      const [projects,        setProjects]        = useState([]);
      const [members,         setMembers]         = useState([]);
      const membersRef                            = useRef([]);
      const [active,          setActive]          = useState(null);
      const [loading,         setLoading]         = useState(true);
      const [loadError,       setLoadError]       = useState(null);
      const [addingProject,   setAddingProject]   = useState(false);
      const [newProjectName,  setNewProjectName]  = useState("");
      const [panel,           setPanel]           = useState(null);
      const isElevated = user?.role === "admin" || ["leader","manager"].includes(user?.group_role);
      const [scope, setScope] = useState("mine");

      const handleLogout = () => {
        localStorage.removeItem(SESSION_KEY);
        window.location.href = "index.html";
      };

      const loadData = async () => {
        setLoading(true); setLoadError(null);
        try {
          const [data, m] = await Promise.all([
            api.getProjects(scope),
            api.getMembers(),
          ]);
          const p = Array.isArray(data) ? data : [];
          setProjects(p);
          const memberList = Array.isArray(m) ? m : [];
          setMembers(memberList.map(u => u.username));
          membersRef.current = memberList;
          setActive(a => a || p[0]?.id || null);
        } catch {
          setLoadError("Could not load data. Please refresh.");
        }
        setLoading(false);
      };

      useEffect(() => { if (user) loadData(); else setLoading(false); }, [scope]);

      const updateProject = async (updated) => {
        await api.saveProject(updated);
        setProjects(prev => prev.map(p => p.id === updated.id ? updated : p));
      };

      const addProject = async () => {
        if (!newProjectName.trim()) return;
        const id  = "proj-" + Date.now();
        const p   = { id, name: newProjectName.trim(), tasks: [] };
        const res = await api.saveProject(p);
        setProjects(prev => [...prev, { ...p, _id: res?._id }]);
        api.log(user.username, "add_project", `Created project "${p.name}"`);
        setActive(id); setNewProjectName(""); setAddingProject(false);
      };

      const deleteProject = async (id) => {
        const p = projects.find(p => p.id === id);
        if (p?._id) await api.deleteProject(p._id);
        api.log(user.username, "delete_project", `Deleted project "${p?.name}"`);
        const updated = projects.filter(p => p.id !== id);
        setProjects(updated);
        if (active === id) setActive(updated[0]?.id || null);
      };

      if (!user)     return null; // redirecting
      if (loading)   return <div className="p-8 text-slate-500">Loading…</div>;
      if (loadError) return (
        <div className="p-8 flex flex-col gap-3 items-start">
          <div className="text-red-500">{loadError}</div>
          <button onClick={loadData} className="text-sm px-3.5 py-1.5 rounded-md bg-blue-600 text-white border-none cursor-pointer hover:bg-blue-700 font-sans">Retry</button>
        </div>
      );

      const isAdmin       = user.role === "admin";
      const activeProject = projects.find(p => p.id === active);
      const inProgress    = projects.flatMap(p => (p.tasks || []).filter(t => t.col === "In Progress"));
      const blocked       = projects.flatMap(p => (p.tasks || []).filter(t => t.col === "Blocked"));

      return (
        <div className="font-sans min-h-screen bg-slate-50">
          <Navbar user={user} />
          {/* Scope toggle + stats sub-bar */}
          <div className="bg-slate-800 border-b border-slate-900 px-4 sm:px-6 py-2 flex items-center gap-3 flex-wrap">
            <div className="bg-slate-900 rounded-lg p-1 flex gap-1">
              {[["mine","👤 Mine"], ["mentioned","@ Mentioned"], ...(isElevated ? [["group","👥 Group"]] : [])].map(([s, label]) => (
                <button key={s} onClick={() => setScope(s)}
                  className={`text-xs px-2.5 py-1 rounded-md border-none cursor-pointer font-sans transition-colors ${scope === s ? "bg-blue-600 text-white font-semibold" : "bg-transparent text-slate-400 font-normal hover:text-slate-200"}`}>
                  {label}
                </button>
              ))}
            </div>
            <span className="text-xs text-slate-500">{projects.length} projects · {inProgress.length} in progress · {blocked.length} blocked</span>
            <div className="ml-auto flex gap-1.5">
              <button onClick={() => setPanel(panel === "log" ? null : "log")}
                className={`text-xs px-3 py-1.5 rounded-lg border border-slate-600 cursor-pointer font-sans transition-colors ${panel === "log" ? "bg-blue-600 text-white border-blue-600" : "bg-slate-700 text-slate-300 hover:bg-slate-600"}`}>📋 Log</button>
              <button onClick={() => setPanel(panel === "ai" ? null : "ai")}
                className={`text-xs px-3 py-1.5 rounded-lg border border-slate-600 cursor-pointer font-semibold font-sans transition-colors ${panel === "ai" ? "bg-blue-600 text-white border-blue-600" : "bg-slate-700 text-slate-300 hover:bg-slate-600"}`}>🤖 AI</button>
            </div>
          </div>

          <div className="flex" style={{ height: "calc(100vh - 86px)" }}>
            {scope !== "mentioned" && (
              <div className="bg-slate-800 w-48 shrink-0 flex flex-col py-3 overflow-y-auto">
                {projects.map(p => (
                  <div key={p.id} onClick={() => setActive(p.id)}
                    className={`px-3.5 py-2 cursor-pointer flex items-center justify-between gap-1.5 border-l-2 transition-colors ${active === p.id ? "bg-slate-700 border-blue-400" : "border-transparent hover:bg-slate-700/50"}`}>
                    <span className={`text-xs leading-snug flex-1 ${active === p.id ? "text-slate-100 font-semibold" : "text-slate-400 font-normal"}`}>{p.name}</span>
                    {(p.owner_username === user.username || user.role === "admin") && (
                      <button onClick={e => { e.stopPropagation(); deleteProject(p.id); }} className="text-xs text-slate-600 bg-transparent border-none cursor-pointer px-0.5 hover:text-slate-400">✕</button>
                    )}
                  </div>
                ))}
                <div className="px-3.5 py-2 mt-1">
                  {addingProject
                    ? <div>
                        <input autoFocus value={newProjectName} onChange={e => setNewProjectName(e.target.value)}
                          onKeyDown={e => { if (e.key === "Enter") addProject(); if (e.key === "Escape") { setAddingProject(false); setNewProjectName(""); } }}
                          placeholder="Project name…" className="w-full text-xs px-1.5 py-1 rounded border border-slate-600 bg-slate-900 text-slate-100 outline-none font-sans" />
                        <div className="flex gap-1 mt-1">
                          <button onClick={addProject} className="text-xs px-2 py-0.5 rounded bg-blue-600 text-white border-none cursor-pointer font-sans">Add</button>
                          <button onClick={() => { setAddingProject(false); setNewProjectName(""); }} className="text-xs px-1.5 py-0.5 rounded bg-slate-700 text-slate-400 border-none cursor-pointer font-sans">✕</button>
                        </div>
                      </div>
                    : <button onClick={() => setAddingProject(true)} className="text-xs text-blue-400 bg-transparent border-none cursor-pointer p-0 hover:text-blue-300 font-sans">+ New project</button>
                  }
                </div>
              </div>
            )}

            <div className="flex-1 p-5 overflow-y-auto">
              {scope === "mentioned" ? (
                <>
                  <h2 className="mb-3.5 text-lg font-bold text-slate-900">
                    Tasks mentioning you
                    <span className="ml-2.5 text-sm font-normal text-slate-400">read-only</span>
                  </h2>
                  <MentionedBoard project={projects[0] || { tasks: [] }} currentUser={user} />
                </>
              ) : activeProject ? (
                <>
                  <h2 className="mb-3.5 text-lg font-bold text-slate-900">{activeProject.name}</h2>
                  <Board project={activeProject} onUpdate={updateProject} username={user.username} members={members} membersRef={membersRef} currentUser={user} />
                </>
              ) : (
                <div className="text-slate-400 mt-10 text-center">Select or create a project to get started</div>
              )}
            </div>

            {panel && (
              <div className="w-80 shrink-0 border-l border-slate-200 flex flex-col bg-white">
                {panel === "ai"    && <AIChat scope={scope} onRefresh={loadData} username={user.username} />}
                {panel === "log"   && <AuditLog />}

              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
