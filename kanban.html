<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerno — Kanban</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; }
    .msg-bubble { white-space: pre-wrap; line-height: 1.5; font-size: 13px; padding: 10px 14px; border-radius: 12px; max-width: 80%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const COLUMNS   = ["To Do", "In Progress", "Blocked", "Done"];
    const COL_STYLE = {
      "To Do":       { bg: "#f1f5f9", border: "#cbd5e1", badge: "#64748b" },
      "In Progress": { bg: "#eff6ff", border: "#93c5fd", badge: "#2563eb" },
      "Blocked":     { bg: "#fff7ed", border: "#fdba74", badge: "#ea580c" },
      "Done":        { bg: "#f0fdf4", border: "#86efac", badge: "#16a34a" },
    };

    const WORKER      = "https://morning-mud-283c.moreno-a64.workers.dev";
    const SESSION_KEY  = "kerno_session";
    const SCOPES       = ["mine", "mentioned", "group"];

    // ── Session ──────────────────────────────────────────────────────────────
    function getSession() {
      const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
      if (!s || Date.now() > new Date(s.expires).getTime()) {
        localStorage.removeItem(SESSION_KEY);
        window.location.href = "index.html?expired=1";
        return null;
      }
      return s;
    }

    // ── API ──────────────────────────────────────────────────────────────────
    const authHeaders = () => ({
      "Content-Type": "application/json",
      "X-Session-Token": getSession()?.token || "",
    });

    const apiFetch = async (path, opts = {}) => {
      const res = await fetch(`${WORKER}${path}`, {
        ...opts,
        headers: { ...authHeaders(), ...(opts.headers || {}) },
      });
      if (res.status === 401) {
        localStorage.removeItem(SESSION_KEY);
        window.location.href = "index.html?expired=1";
        return null;
      }
      return res.json().catch(() => ({}));
    };

    const api = {
      register:      (u, p, e) => fetch(`${WORKER}/register`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: u, password: p, email: e }) }).then(r => r.json()),
      getProjects:   (scope)   => apiFetch(`/projects${scope ? `?scope=${scope}` : ""}`),
      saveProject:   (p)       => p._id
        ? apiFetch(`/projects/${p._id}`, { method: "PUT",    body: JSON.stringify(p) })
        : apiFetch("/projects",           { method: "POST",   body: JSON.stringify(p) }),
      deleteProject: (id)      => apiFetch(`/projects/${id}`, { method: "DELETE" }),
      log:           (u, a, d) => apiFetch("/logs",            { method: "POST", body: JSON.stringify({ username: u, action: a, details: d, timestamp: new Date().toISOString() }) }),
      getLogs:       ()        => apiFetch("/logs"),
      getMembers:    ()        => apiFetch("/members"),
      deleteMember:  (id)      => apiFetch(`/members/${id}`,   { method: "DELETE" }),
      getGroups:     ()        => apiFetch("/groups"),
      saveGroup:     (g)       => g.id
        ? apiFetch(`/groups/${g.id}`, { method: "PUT",    body: JSON.stringify(g) })
        : apiFetch("/groups",          { method: "POST",   body: JSON.stringify(g) }),
      deleteGroup:   (id)      => apiFetch(`/groups/${id}`,    { method: "DELETE" }),
      addGroupMember:(gid,mid,role) => apiFetch(`/groups/${gid}/members`, { method: "POST", body: JSON.stringify({ member_id: mid, role }) }),
      removeGroupMember:(gid,mid)   => apiFetch(`/groups/${gid}/members/${mid}`, { method: "DELETE" }),
      notify:        (actor, taskTitle, projectName, mentionsWithEmails) =>
                                  apiFetch("/notify", { method: "POST", body: JSON.stringify({ actor, taskTitle, projectName, mentionsWithEmails }) }),
      ai:            (body)    => apiFetch("/ai", { method: "POST", body: JSON.stringify(body) }),
    };

    function extractMentions(text) {
      return [...new Set([...(text.matchAll(/@(\w+)/g))].map(m => m[1]))];
    }

    // ── Mention Textarea ─────────────────────────────────────────────────────
    function MentionTextarea({ value, onChange, members, style, onKeyDown }) {
      const [showDropdown, setShowDropdown] = useState(false);
      const [mentionQuery, setMentionQuery] = useState("");
      const [mentionStart, setMentionStart] = useState(null);
      const ref = useRef(null);

      useEffect(() => { ref.current?.focus(); }, []);

      const filtered = members.filter(m => m.toLowerCase().startsWith(mentionQuery.toLowerCase()));

      const handleChange = (e) => {
        const val = e.target.value, pos = e.target.selectionStart;
        onChange(val);
        const match = val.slice(0, pos).match(/@(\w*)$/);
        if (match) { setShowDropdown(true); setMentionQuery(match[1]); setMentionStart(pos - match[0].length); }
        else setShowDropdown(false);
      };

      const selectMention = (username) => {
        const pos = ref.current?.selectionStart || value.length;
        onChange(`${value.slice(0, mentionStart)}@${username} ${value.slice(pos)}`);
        setShowDropdown(false);
        setTimeout(() => ref.current?.focus(), 0);
      };

      return (
        <div style={{ position: "relative" }}>
          <textarea ref={ref} value={value} onChange={handleChange} onKeyDown={onKeyDown} style={style} />
          {showDropdown && filtered.length > 0 && (
            <div style={{ position: "absolute", bottom: "100%", left: 0, background: "#fff", border: "1px solid #e2e8f0", borderRadius: 6, boxShadow: "0 2px 8px #0002", zIndex: 100, minWidth: 140 }}>
              {filtered.map(m => (
                <div key={m} onMouseDown={() => selectMention(m)}
                  style={{ padding: "6px 12px", fontSize: 12, cursor: "pointer", color: "#1e293b" }}
                  onMouseEnter={e => e.currentTarget.style.background = "#f1f5f9"}
                  onMouseLeave={e => e.currentTarget.style.background = ""}>@{m}</div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── Navbar ───────────────────────────────────────────────────────────────
    function Navbar({ user }) {
      const logout = () => { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html"; };
      const isAdmin = user.role === "admin";
      const btn = { fontSize:11, padding:"4px 10px", borderRadius:5, border:"1px solid #334155", background:"#1e293b", color:"#94a3b8", textDecoration:"none", cursor:"pointer", fontFamily:"inherit" };
      const active = { ...btn, background:"#2563eb", color:"#fff", border:"1px solid #2563eb" };
      return (
        <div style={{ background:"#0f172a", padding:"10px 24px", display:"flex", alignItems:"center", gap:12, flexShrink:0 }}>
          <a href="dashboard.html" style={{ fontSize:15, fontWeight:700, color:"#fff", textDecoration:"none" }}>⚙️ Kerno</a>
          <span style={{ color:"#475569" }}>›</span>
          <span style={{ fontSize:13, color:"#94a3b8" }}>Kanban</span>
          <div style={{ marginLeft:"auto", display:"flex", gap:8, alignItems:"center" }}>
            <a href="kanban.html"   style={active}>📋 Kanban</a>
            <a href="booking.html"  style={btn}>📅 Bookings</a>
            <a href="requests.html" style={btn}>📝 Requests</a>
            {isAdmin && <a href="users.html" style={btn}>👥 Users</a>}
            <span style={{ fontSize:12, color:"#64748b" }}>👤 {user.username}{isAdmin && <span style={{ marginLeft:5, fontSize:10, background:"#2563eb", color:"#fff", borderRadius:99, padding:"1px 6px" }}>admin</span>}</span>
            <a href="profile.html" style={btn}>🔑 Password</a>
            <button onClick={logout} style={btn}>Sign out</button>
          </div>
        </div>
      );
    }
    function AuditLog() {
      const [logs,    setLogs]    = useState([]);
      const [loading, setLoading] = useState(true);
      const [error,   setError]   = useState(null);

      useEffect(() => {
        api.getLogs()
          .then(data => setLogs(Array.isArray(data) ? data : []))
          .catch(() => setError("Could not load logs."))
          .finally(() => setLoading(false));
      }, []);

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          <div style={{ padding: "10px 14px", borderBottom: "1px solid #e2e8f0", background: "#fff", fontSize: 13, fontWeight: 700, color: "#0f172a" }}>📋 Audit Log</div>
          <div style={{ flex: 1, overflowY: "auto", padding: "12px 14px" }}>
            {loading && <div style={{ color: "#94a3b8", fontSize: 12 }}>Loading…</div>}
            {error   && <div style={{ color: "#ef4444", fontSize: 12 }}>{error}</div>}
            {!loading && !error && logs.length === 0 && <div style={{ color: "#94a3b8", fontSize: 12 }}>No activity yet.</div>}
            {logs.map((l, i) => (
              <div key={i} style={{ marginBottom: 10, padding: "8px 10px", background: "#fff", borderRadius: 7, border: "1px solid #e2e8f0", fontSize: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                  <span style={{ fontWeight: 600, color: "#1e293b" }}>{l.username}</span>
                  <span style={{ color: "#94a3b8" }}>{new Date(l.timestamp).toLocaleString()}</span>
                </div>
                <div style={{ color: "#475569" }}><span style={{ fontWeight: 600, color: "#2563eb" }}>{l.action}</span> — {l.details}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── Users & Groups Panel ─────────────────────────────────────────────────
    function UsersPanel() {
      const [tab,      setTab]      = useState("users");
      const [members,  setMembers]  = useState([]);
      const [groups,   setGroups]   = useState([]);
      const [loading,  setLoading]  = useState(true);
      const [newUser,  setNewUser]  = useState("");
      const [newPass,  setNewPass]  = useState("");
      const [newEmail, setNewEmail] = useState("");
      const [error,    setError]    = useState("");
      const [saving,   setSaving]   = useState(false);
      // Group editing
      const [editGroup,    setEditGroup]    = useState(null); // null | group obj
      const [newGroupName, setNewGroupName] = useState("");

      const load = async () => {
        const [m, g] = await Promise.all([api.getMembers(), api.getGroups()]);
        setMembers(Array.isArray(m) ? m : []);
        setGroups(Array.isArray(g) ? g : []);
        setLoading(false);
      };
      useEffect(() => { load(); }, []);

      const addMember = async () => {
        if (!newUser.trim() || !newPass.trim()) return;
        setSaving(true); setError("");
        const res = await api.register(newUser.trim(), newPass.trim(), newEmail.trim());
        if (res?.error) setError(res.error);
        else { setNewUser(""); setNewPass(""); setNewEmail(""); await load(); }
        setSaving(false);
      };

      const removeMember = async (id, username) => {
        if (!confirm(`Remove user "${username}"?`)) return;
        await api.deleteMember(id); await load();
      };

      const saveGroup = async () => {
        if (!editGroup?.name?.trim()) return;
        setSaving(true);
        await api.saveGroup(editGroup);
        setSaving(false); setEditGroup(null); await load();
      };

      const deleteGroup = async (id, name) => {
        if (!confirm(`Delete group "${name}"? Members will be unassigned.`)) return;
        await api.deleteGroup(id); await load();
      };

      const assignMember = async (groupId, memberId, role) => {
        await api.addGroupMember(groupId, memberId, role); await load();
      };

      const unassignMember = async (groupId, memberId) => {
        await api.removeGroupMember(groupId, memberId); await load();
      };

      const GROUP_ROLES = ["member", "leader", "manager"];

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          <div style={{ padding: "10px 14px", borderBottom: "1px solid #e2e8f0", background: "#fff", fontSize: 13, fontWeight: 700, color: "#0f172a" }}>👥 Users & Groups</div>
          {/* Sub-tabs */}
          <div style={{ display: "flex", borderBottom: "1px solid #e2e8f0", background: "#fff" }}>
            {["users", "groups"].map(t => (
              <button key={t} onClick={() => setTab(t)}
                style={{ flex: 1, fontSize: 12, padding: "7px", border: "none", borderBottom: `2px solid ${tab === t ? "#2563eb" : "transparent"}`, background: "none", cursor: "pointer", color: tab === t ? "#2563eb" : "#64748b", fontWeight: tab === t ? 600 : 400, textTransform: "capitalize" }}>
                {t}
              </button>
            ))}
          </div>

          <div style={{ flex: 1, overflowY: "auto", padding: "12px 14px" }}>
            {loading ? <div style={{ color: "#94a3b8", fontSize: 12 }}>Loading…</div> : tab === "users" ? (
              <>
                {members.map((m, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "7px 10px", background: "#fff", borderRadius: 7, border: "1px solid #e2e8f0", marginBottom: 8, fontSize: 13 }}>
                    <div>
                      <span style={{ fontWeight: 600, color: "#1e293b" }}>{m.username}</span>
                      {m.role === "admin" && <span style={{ marginLeft: 6, fontSize: 10, background: "#2563eb", color: "#fff", borderRadius: 99, padding: "1px 7px" }}>admin</span>}
                      {m.group_id && (
                        <span style={{ marginLeft: 6, fontSize: 10, background: "#f0fdf4", color: "#16a34a", borderRadius: 99, padding: "1px 7px", border: "1px solid #86efac" }}>
                          {groups.find(g => g.id === m.group_id)?.name || "group"} · {m.group_role}
                        </span>
                      )}
                      {m.email && <div style={{ fontSize: 11, color: "#94a3b8" }}>{m.email}</div>}
                    </div>
                    {m.role !== "admin" && (
                      <button onClick={() => removeMember(m.id, m.username)} style={{ fontSize: 11, padding: "2px 8px", borderRadius: 4, border: "1px solid #fecaca", background: "#fff5f5", color: "#ef4444", cursor: "pointer" }}>Remove</button>
                    )}
                  </div>
                ))}
                <div style={{ marginTop: 16, borderTop: "1px solid #e2e8f0", paddingTop: 14 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 8 }}>Add new user</div>
                  <input value={newUser}  onChange={e => setNewUser(e.target.value)}  placeholder="Username" style={{ width: "100%", fontSize: 12, padding: "6px 9px", borderRadius: 6, border: "1px solid #cbd5e1", marginBottom: 6, boxSizing: "border-box" }} />
                  <input type="password" value={newPass}  onChange={e => setNewPass(e.target.value)}  placeholder="Password" style={{ width: "100%", fontSize: 12, padding: "6px 9px", borderRadius: 6, border: "1px solid #cbd5e1", marginBottom: 6, boxSizing: "border-box" }} />
                  <input type="email"    value={newEmail} onChange={e => setNewEmail(e.target.value)} placeholder="Email" style={{ width: "100%", fontSize: 12, padding: "6px 9px", borderRadius: 6, border: "1px solid #cbd5e1", marginBottom: 8, boxSizing: "border-box" }} />
                  {error && <div style={{ fontSize: 11, color: "#ef4444", marginBottom: 6 }}>{error}</div>}
                  <button onClick={addMember} disabled={saving} style={{ width: "100%", fontSize: 12, padding: "6px", borderRadius: 6, background: "#2563eb", color: "#fff", border: "none", cursor: "pointer", fontWeight: 600 }}>
                    {saving ? "Adding…" : "Add user"}
                  </button>
                </div>
              </>
            ) : (
              <>
                {/* Group list */}
                {groups.map(g => (
                  <div key={g.id} style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, marginBottom: 10, overflow: "hidden" }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 12px", borderBottom: "1px solid #f1f5f9" }}>
                      <div>
                        <span style={{ fontSize: 13, fontWeight: 700, color: "#1e293b" }}>{g.name}</span>
                        {g.description && <span style={{ fontSize: 11, color: "#94a3b8", marginLeft: 8 }}>{g.description}</span>}
                        <span style={{ fontSize: 11, color: "#64748b", marginLeft: 8 }}>{(g.members||[]).length} member{(g.members||[]).length !== 1 ? "s" : ""}</span>
                      </div>
                      <div style={{ display: "flex", gap: 5 }}>
                        <button onClick={() => setEditGroup(g)} style={{ fontSize: 11, padding: "2px 8px", borderRadius: 4, border: "1px solid #e2e8f0", background: "#f8fafc", cursor: "pointer", color: "#475569" }}>Edit</button>
                        <button onClick={() => deleteGroup(g.id, g.name)} style={{ fontSize: 11, padding: "2px 8px", borderRadius: 4, border: "1px solid #fecaca", background: "#fff5f5", cursor: "pointer", color: "#ef4444" }}>Delete</button>
                      </div>
                    </div>
                    {/* Members in group */}
                    <div style={{ padding: "6px 12px" }}>
                      {(g.members || []).map(m => (
                        <div key={m.member_id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "4px 0", fontSize: 12 }}>
                          <span style={{ color: "#1e293b", fontWeight: 500 }}>{m.username}</span>
                          <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                            <select value={m.role} onChange={e => assignMember(g.id, m.member_id, e.target.value)}
                              style={{ fontSize: 11, padding: "2px 5px", borderRadius: 4, border: "1px solid #e2e8f0" }}>
                              {GROUP_ROLES.map(r => <option key={r} value={r}>{r}</option>)}
                            </select>
                            <button onClick={() => unassignMember(g.id, m.member_id)} style={{ fontSize: 11, padding: "1px 6px", borderRadius: 4, border: "1px solid #fecaca", background: "#fff5f5", cursor: "pointer", color: "#ef4444" }}>✕</button>
                          </div>
                        </div>
                      ))}
                      {/* Add member to group */}
                      <div style={{ marginTop: 6, display: "flex", gap: 5 }}>
                        <select id={`add-member-${g.id}`} defaultValue=""
                          style={{ flex: 1, fontSize: 11, padding: "3px 6px", borderRadius: 5, border: "1px solid #cbd5e1" }}>
                          <option value="" disabled>Add member…</option>
                          {members.filter(m => !g.members?.find(gm => gm.member_id === m.id)).map(m => (
                            <option key={m.id} value={m.id}>{m.username}</option>
                          ))}
                        </select>
                        <button onClick={() => {
                          const sel = document.getElementById(`add-member-${g.id}`);
                          if (sel.value) { assignMember(g.id, sel.value, "member"); sel.value = ""; }
                        }} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 5, background: "#2563eb", color: "#fff", border: "none", cursor: "pointer" }}>Add</button>
                      </div>
                    </div>
                  </div>
                ))}

                {/* Edit group form */}
                {editGroup && (
                  <div style={{ background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 8, padding: 12, marginBottom: 10 }}>
                    <input value={editGroup.name || ""} onChange={e => setEditGroup({ ...editGroup, name: e.target.value })} placeholder="Group name"
                      style={{ width: "100%", fontSize: 12, padding: "6px 9px", borderRadius: 6, border: "1px solid #cbd5e1", marginBottom: 6, boxSizing: "border-box" }} />
                    <input value={editGroup.description || ""} onChange={e => setEditGroup({ ...editGroup, description: e.target.value })} placeholder="Description (optional)"
                      style={{ width: "100%", fontSize: 12, padding: "6px 9px", borderRadius: 6, border: "1px solid #cbd5e1", marginBottom: 8, boxSizing: "border-box" }} />
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={saveGroup} disabled={saving} style={{ fontSize: 12, padding: "4px 14px", borderRadius: 6, background: "#2563eb", color: "#fff", border: "none", cursor: "pointer" }}>Save</button>
                      <button onClick={() => setEditGroup(null)} style={{ fontSize: 12, padding: "4px 10px", borderRadius: 6, background: "#f1f5f9", border: "1px solid #e2e8f0", cursor: "pointer", color: "#64748b" }}>Cancel</button>
                    </div>
                  </div>
                )}

                {/* New group */}
                <div style={{ marginTop: 8 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 6 }}>New group</div>
                  <input value={newGroupName} onChange={e => setNewGroupName(e.target.value)} placeholder="Group name"
                    onKeyDown={e => { if (e.key === "Enter" && newGroupName.trim()) { api.saveGroup({ name: newGroupName.trim() }).then(() => { setNewGroupName(""); load(); }); } }}
                    style={{ width: "100%", fontSize: 12, padding: "6px 9px", borderRadius: 6, border: "1px solid #cbd5e1", marginBottom: 6, boxSizing: "border-box" }} />
                  <button onClick={() => { if (newGroupName.trim()) api.saveGroup({ name: newGroupName.trim() }).then(() => { setNewGroupName(""); load(); }); }}
                    style={{ width: "100%", fontSize: 12, padding: "6px", borderRadius: 6, background: "#2563eb", color: "#fff", border: "none", cursor: "pointer", fontWeight: 600 }}>
                    Create group
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ── AI Chat ──────────────────────────────────────────────────────────────
    function AIChat({ scope, onRefresh, username }) {
      const [messages,      setMessages]      = useState([]);
      const [input,         setInput]         = useState("");
      const [asking,        setAsking]        = useState(false);
      const [error,         setError]         = useState(null);
      const [scopedProjects,setScopedProjects]= useState([]);
      const bottomRef = useRef(null);

      // Fetch projects filtered to the current scope every time the panel opens or scope changes
      useEffect(() => {
        api.getProjects(scope).then(data => setScopedProjects(Array.isArray(data) ? data : []));
      }, [scope]);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, asking]);

      const executeAction = async (action) => {
        const record = scopedProjects.find(r => r.id === action.projectId);
        if (!record) return "❌ Project not found.";
        let updatedTasks = [...(record.tasks || [])];
        let logDetails = "";
        if (action.type === "add_task")    { updatedTasks.push({ id: Date.now(), ...action.task }); logDetails = `Added task "${action.task.title}" to ${record.name} as ${action.task.col}`; }
        else if (action.type === "move_task")   { const t = updatedTasks.find(t => t.id === action.taskId); logDetails = `Moved "${t?.title}" to ${action.col} in ${record.name}`; updatedTasks = updatedTasks.map(t => t.id === action.taskId ? { ...t, col: action.col } : t); }
        else if (action.type === "update_task") { const t = updatedTasks.find(t => t.id === action.taskId); logDetails = `Updated "${t?.title}" in ${record.name}`; updatedTasks = updatedTasks.map(t => t.id === action.taskId ? { ...t, ...action.updates } : t); }
        else if (action.type === "delete_task") { const t = updatedTasks.find(t => t.id === action.taskId); logDetails = `Deleted "${t?.title}" from ${record.name}`; updatedTasks = updatedTasks.filter(t => t.id !== action.taskId); }
        await api.saveProject({ ...record, tasks: updatedTasks });
        await api.log(username, action.type, logDetails);
        await onRefresh();
        return "✅ Done!";
      };

      const ask = async () => {
        if (!input.trim()) return;
        setAsking(true); setError(null);
        const userMsg     = input;
        const newMessages = [...messages, { role: "user", content: userMsg }];
        setMessages(newMessages); setInput("");
        try {
          const result = await api.ai({
            model: "claude-sonnet-4-20250514", max_tokens: 1000,
            system: `You are a helpful assistant managing a Kanban board. Current data:\n\n${JSON.stringify(scopedProjects, null, 2)}\n\nSupported actions:\n- add_task: { type, projectId, task: { col, title, notes } }\n- move_task: { type, projectId, taskId, col }\n- update_task: { type, projectId, taskId, updates }\n- delete_task: { type, projectId, taskId }\n\nIf performing a write operation, append at the very end:\n<ACTION>{"type":"...","projectId":"...",...}</ACTION>\n\nUse the project's id field for projectId.`,
            messages: newMessages,
          });
          if (!result) { setError("No response — please try again."); setAsking(false); return; }
          let reply = result.content?.[0]?.text || "No response.";
          const actionMatch = reply.match(/<ACTION>(.*?)<\/ACTION>/s);
          let actionResult = "";
          if (actionMatch) {
            reply = reply.replace(/<ACTION>.*?<\/ACTION>/s, "").trim();
            try { actionResult = await executeAction(JSON.parse(actionMatch[1])); }
            catch { actionResult = "❌ Could not parse action."; }
          }
          setMessages(prev => [...prev, { role: "assistant", content: actionResult ? `${reply}\n\n${actionResult}` : reply }]);
        } catch (e) {
          setError("Network error — please try again.");
        }
        setAsking(false);
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%", background: "#f8fafc" }}>
          <div style={{ padding: "10px 14px", borderBottom: "1px solid #e2e8f0", background: "#fff", fontSize: 13, fontWeight: 700, color: "#0f172a" }}>🤖 AI Assistant</div>
          <div style={{ flex: 1, overflowY: "auto", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 10 }}>
            {messages.length === 0 && <div style={{ color: "#94a3b8", textAlign: "center", marginTop: 30, fontSize: 12 }}>Ask me anything or give me instructions!<br/><em>"Add a blocked task…" · "What's in progress?"</em></div>}
            {messages.map((m, i) => (
              <div key={i} className="msg-bubble" style={{ alignSelf: m.role === "user" ? "flex-end" : "flex-start", background: m.role === "user" ? "#2563eb" : "#fff", color: m.role === "user" ? "#fff" : "#1e293b", borderRadius: m.role === "user" ? "12px 12px 2px 12px" : "12px 12px 12px 2px", boxShadow: "0 1px 3px #0001", border: m.role === "assistant" ? "1px solid #e2e8f0" : "none" }}>{m.content}</div>
            ))}
            {asking && <div className="msg-bubble" style={{ alignSelf: "flex-start", background: "#fff", border: "1px solid #e2e8f0", borderRadius: "12px 12px 12px 2px", color: "#94a3b8" }}>Thinking…</div>}
            {error  && <div style={{ fontSize: 12, color: "#ef4444", textAlign: "center" }}>{error}</div>}
            <div ref={bottomRef} />
          </div>
          <div style={{ padding: "10px 14px", borderTop: "1px solid #e2e8f0", background: "#fff", display: "flex", gap: 8 }}>
            <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter") ask(); }} placeholder="Ask or give instructions…" style={{ flex: 1, fontSize: 13, padding: "7px 10px", borderRadius: 7, border: "1px solid #cbd5e1", outline: "none" }} />
            <button onClick={ask} disabled={asking || !input.trim()} style={{ fontSize: 13, padding: "7px 14px", borderRadius: 7, background: "#2563eb", color: "#fff", border: "none", cursor: "pointer", fontWeight: 600, opacity: asking ? 0.6 : 1 }}>Send</button>
          </div>
        </div>
      );
    }

    // ── Mentioned Board (read-only mini kanban) ──────────────────────────────
    function MentionedBoard({ project }) {
      if (!project.tasks.length) return (
        <div style={{ color: "#94a3b8", marginTop: 40, textAlign: "center" }}>No tasks mention you.</div>
      );
      return (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10 }}>
            {COLUMNS.map(col => {
              const s = COL_STYLE[col];
              const colTasks = project.tasks.filter(t => t.col === col);
              return (
                <div key={col} style={{ background: s.bg, border: `1.5px solid ${s.border}`, borderRadius: 10, padding: "10px 10px 8px" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                    <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: .5, color: s.badge, textTransform: "uppercase" }}>{col}</span>
                    <span style={{ fontSize: 11, background: s.badge, color: "#fff", borderRadius: 99, padding: "1px 7px" }}>{colTasks.length}</span>
                  </div>
                  {colTasks.length === 0 && <div style={{ fontSize: 11, color: "#cbd5e1", textAlign: "center", padding: "8px 0" }}>—</div>}
                  {colTasks.map(task => (
                    <div key={task.id} style={{ background: "#fff", borderRadius: 7, padding: "8px 9px", marginBottom: 7, boxShadow: "0 1px 3px #0001", border: "1px solid #e2e8f0" }}>
                      {/* Project source label */}
                      <div style={{ fontSize: 10, color: "#94a3b8", marginBottom: 3, fontStyle: "italic" }}>{task._projectName}</div>
                      <div style={{ fontSize: 12, fontWeight: 600, color: "#1e293b", marginBottom: 3, lineHeight: 1.35 }}>{task.title}</div>
                      {task.notes && (
                        <div style={{ fontSize: 11, color: "#475569", lineHeight: 1.4 }}>
                          {task.notes.replace(/@(\w+)/g, (_, u) => `@${u}`)}
                        </div>
                      )}
                      {task.assignee && (
                        <div style={{ marginTop: 5, fontSize: 10, fontWeight: 600, background: "#f0fdf4", color: "#16a34a", border: "1px solid #86efac", borderRadius: 99, padding: "1px 8px", display: "inline-block" }}>
                          {task.assignee}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        </div>
      );
    }
    function Board({ project, onUpdate, username, members, membersRef }) {
      const [editing,   setEditing]   = useState(null);
      const [draft,     setDraft]     = useState("");
      const [addingTo,  setAddingTo]  = useState(null);
      const [newTitle,  setNewTitle]  = useState("");
      const [saving,    setSaving]    = useState(false);
      const mentionTimers = useRef({});

      const moveTask = async (id, dir) => {
        const t  = project.tasks.find(t => t.id === id);
        const ci = COLUMNS.indexOf(t.col), ni = ci + dir;
        if (ni < 0 || ni >= COLUMNS.length) return;
        await onUpdate({ ...project, tasks: project.tasks.map(t => t.id === id ? { ...t, col: COLUMNS[ni] } : t) });
        api.log(username, "move_task", `Moved "${t.title}" to ${COLUMNS[ni]} in ${project.name}`);
      };

      const startEdit  = (id, field, val) => { setEditing({ id, field }); setDraft(val); };

      const commitEdit = async () => {
        if (!editing) return;
        const t = project.tasks.find(t => t.id === editing.id);
        setSaving(true);
        await onUpdate({ ...project, tasks: project.tasks.map(t => t.id === editing.id ? { ...t, [editing.field]: draft } : t) });
        api.log(username, "update_task", `Updated ${editing.field} of "${t.title}" in ${project.name}`);
        if (editing.field === "notes") {
          const mentions = extractMentions(draft);
          if (mentions.length) {
            const key = `${project.id}-${editing.id}`;
            clearTimeout(mentionTimers.current[key]);
            mentionTimers.current[key] = setTimeout(() => {
              const mentionsWithEmails = mentions.map(u => ({
                username: u,
                email: (membersRef.current || []).find(m => m.username === u)?.email || null,
              }));
              api.notify(username, t.title, project.name, mentionsWithEmails);
            }, 30000);
          }
        }
        setSaving(false);
        setEditing(null);
      };

      const deleteTask = async (id) => {
        const t = project.tasks.find(t => t.id === id);
        await onUpdate({ ...project, tasks: project.tasks.filter(t => t.id !== id) });
        api.log(username, "delete_task", `Deleted "${t.title}" from ${project.name}`);
      };

      const addTask = async (col) => {
        if (!newTitle.trim()) return;
        const task = { id: Date.now(), col, title: newTitle.trim(), notes: "", assignee: "" };
        setSaving(true);
        await onUpdate({ ...project, tasks: [...project.tasks, task] });
        api.log(username, "add_task", `Added "${task.title}" to ${project.name} as ${col}`);
        setSaving(false);
        setNewTitle(""); setAddingTo(null);
      };

      return (
        <div style={{ position: "relative" }}>
          {saving && <div style={{ position: "absolute", top: -28, right: 0, fontSize: 11, color: "#94a3b8" }}>Saving…</div>}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10 }}>
            {COLUMNS.map(col => {
              const s = COL_STYLE[col], colTasks = project.tasks.filter(t => t.col === col);
              return (
                <div key={col} style={{ background: s.bg, border: `1.5px solid ${s.border}`, borderRadius: 10, padding: "10px 10px 8px" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                    <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: .5, color: s.badge, textTransform: "uppercase" }}>{col}</span>
                    <span style={{ fontSize: 11, background: s.badge, color: "#fff", borderRadius: 99, padding: "1px 7px" }}>{colTasks.length}</span>
                  </div>
                  {colTasks.map(task => {
                    const ci = COLUMNS.indexOf(col);
                    return (
                      <div key={task.id} style={{ background: "#fff", borderRadius: 7, padding: "8px 9px", marginBottom: 7, boxShadow: "0 1px 3px #0001", border: `1px solid ${task.assignee === user.username ? "#86efac" : "#e2e8f0"}` }}>
                        {editing?.id === task.id && editing.field === "title"
                          ? <input autoFocus value={draft} onChange={e => setDraft(e.target.value)}
                              onBlur={commitEdit} onKeyDown={e => { if (e.key === "Enter") commitEdit(); if (e.key === "Escape") setEditing(null); }}
                              style={{ width: "100%", fontSize: 12, fontWeight: 600, border: "1px solid #93c5fd", borderRadius: 4, padding: "2px 5px", boxSizing: "border-box" }} />
                          : <div onClick={() => startEdit(task.id, "title", task.title)}
                              style={{ fontSize: 12, fontWeight: 600, color: "#1e293b", cursor: "text", marginBottom: 3, lineHeight: 1.35 }}>{task.title}</div>
                        }
                        {editing?.id === task.id && editing.field === "notes"
                          ? <div>
                              <MentionTextarea members={members} value={draft} onChange={setDraft}
                                onKeyDown={e => { if (e.key === "Escape") setEditing(null); }}
                                style={{ width: "100%", fontSize: 11, border: "1px solid #93c5fd", borderRadius: 4, padding: "2px 5px", resize: "vertical", boxSizing: "border-box", minHeight: 44 }} />
                              <div style={{ display: "flex", gap: 4, marginTop: 4 }}>
                                <button onClick={commitEdit} disabled={saving} style={{ fontSize: 11, padding: "2px 8px", borderRadius: 4, background: "#2563eb", color: "#fff", border: "none", cursor: "pointer", opacity: saving ? 0.6 : 1 }}>Save</button>
                                <button onClick={() => setEditing(null)} style={{ fontSize: 11, padding: "2px 8px", borderRadius: 4, background: "#f1f5f9", border: "1px solid #e2e8f0", cursor: "pointer", color: "#64748b" }}>Cancel</button>
                              </div>
                            </div>
                          : <div onClick={() => startEdit(task.id, "notes", task.notes || "")}
                              style={{ fontSize: 11, color: task.notes ? "#475569" : "#94a3b8", cursor: "text", lineHeight: 1.4, minHeight: 14 }}>
                              {task.notes || <em>add note…</em>}
                            </div>
                        }
                        {/* Assignee */}
                        {editing?.id === task.id && editing.field === "notes"
                          ? null
                          : <div style={{ marginTop: 5 }}>
                              <select
                                value={task.assignee || ""}
                                onChange={async e => {
                                  const assignee = e.target.value;
                                  await onUpdate({ ...project, tasks: project.tasks.map(t => t.id === task.id ? { ...t, assignee } : t) });
                                  api.log(username, "assign_task", `Assigned "${task.title}" to ${assignee || "nobody"} in ${project.name}`);
                                }}
                                style={{ width: "100%", fontSize: 11, padding: "3px 6px", borderRadius: 5, border: "1px solid #e2e8f0", background: task.assignee ? "#f0fdf4" : "#f8fafc", color: task.assignee ? "#16a34a" : "#94a3b8", cursor: "pointer" }}>
                                <option value="">Unassigned</option>
                                {members.map(m => <option key={m} value={m}>{m}</option>)}
                              </select>
                            </div>
                        }
                        <div style={{ display: "flex", gap: 4, marginTop: 7, alignItems: "center" }}>
                          <button onClick={() => moveTask(task.id, -1)} disabled={ci === 0} style={{ fontSize: 11, padding: "2px 6px", borderRadius: 4, border: "1px solid #e2e8f0", background: "#f8fafc", cursor: ci === 0 ? "not-allowed" : "pointer", color: ci === 0 ? "#cbd5e1" : "#475569" }}>←</button>
                          <button onClick={() => moveTask(task.id, 1)} disabled={ci === COLUMNS.length - 1} style={{ fontSize: 11, padding: "2px 6px", borderRadius: 4, border: "1px solid #e2e8f0", background: "#f8fafc", cursor: ci === COLUMNS.length - 1 ? "not-allowed" : "pointer", color: ci === COLUMNS.length - 1 ? "#cbd5e1" : "#475569" }}>→</button>
                          <button onClick={() => deleteTask(task.id)} style={{ fontSize: 11, padding: "2px 6px", borderRadius: 4, border: "1px solid #fecaca", background: "#fff5f5", cursor: "pointer", color: "#ef4444", marginLeft: "auto" }}>✕</button>
                        </div>
                      </div>
                    );
                  })}
                  {addingTo === col
                    ? <div style={{ marginTop: 4 }}>
                        <input autoFocus value={newTitle} onChange={e => setNewTitle(e.target.value)}
                          onKeyDown={e => { if (e.key === "Enter") addTask(col); if (e.key === "Escape") { setAddingTo(null); setNewTitle(""); } }}
                          placeholder="Task title…" style={{ width: "100%", fontSize: 12, padding: "4px 7px", borderRadius: 5, border: "1px solid #93c5fd", boxSizing: "border-box" }} />
                        <div style={{ display: "flex", gap: 4, marginTop: 4 }}>
                          <button onClick={() => addTask(col)} disabled={saving} style={{ fontSize: 11, padding: "2px 10px", borderRadius: 4, background: s.badge, color: "#fff", border: "none", cursor: "pointer", opacity: saving ? 0.6 : 1 }}>Add</button>
                          <button onClick={() => { setAddingTo(null); setNewTitle(""); }} style={{ fontSize: 11, padding: "2px 8px", borderRadius: 4, background: "#f1f5f9", border: "1px solid #e2e8f0", cursor: "pointer", color: "#64748b" }}>Cancel</button>
                        </div>
                      </div>
                    : <button onClick={() => setAddingTo(col)} style={{ width: "100%", fontSize: 11, padding: "4px", borderRadius: 5, border: `1px dashed ${s.border}`, background: "transparent", cursor: "pointer", color: s.badge, marginTop: 2 }}>+ Add</button>
                  }
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [user] = useState(() => {
        const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
        if (!s || Date.now() > new Date(s.expires).getTime()) {
          localStorage.removeItem(SESSION_KEY);
          window.location.href = "index.html?expired=1";
          return null;
        }
        return { username: s.username, role: s.role, token: s.token, group_id: s.group_id, group_role: s.group_role };
      });

      const [projects,        setProjects]        = useState([]);
      const [members,         setMembers]         = useState([]);
      const membersRef                            = useRef([]);
      const [active,          setActive]          = useState(null);
      const [loading,         setLoading]         = useState(true);
      const [loadError,       setLoadError]       = useState(null);
      const [addingProject,   setAddingProject]   = useState(false);
      const [newProjectName,  setNewProjectName]  = useState("");
      const [panel,           setPanel]           = useState(null);
      const isElevated = user?.role === "admin" || ["leader","manager"].includes(user?.group_role);
      const [scope, setScope] = useState("mine");

      const handleLogout = () => {
        localStorage.removeItem(SESSION_KEY);
        window.location.href = "index.html";
      };

      const loadData = async () => {
        setLoading(true); setLoadError(null);
        try {
          const [data, m] = await Promise.all([
            api.getProjects(scope),
            api.getMembers(),
          ]);
          const p = Array.isArray(data) ? data : [];
          setProjects(p);
          const memberList = Array.isArray(m) ? m : [];
          setMembers(memberList.map(u => u.username));
          membersRef.current = memberList;
          setActive(a => a || p[0]?.id || null);
        } catch {
          setLoadError("Could not load data. Please refresh.");
        }
        setLoading(false);
      };

      useEffect(() => { if (user) loadData(); else setLoading(false); }, [scope]);

      const updateProject = async (updated) => {
        await api.saveProject(updated);
        setProjects(prev => prev.map(p => p.id === updated.id ? updated : p));
      };

      const addProject = async () => {
        if (!newProjectName.trim()) return;
        const id  = "proj-" + Date.now();
        const p   = { id, name: newProjectName.trim(), tasks: [] };
        const res = await api.saveProject(p);
        setProjects(prev => [...prev, { ...p, _id: res?._id }]);
        api.log(user.username, "add_project", `Created project "${p.name}"`);
        setActive(id); setNewProjectName(""); setAddingProject(false);
      };

      const deleteProject = async (id) => {
        const p = projects.find(p => p.id === id);
        if (p?._id) await api.deleteProject(p._id);
        api.log(user.username, "delete_project", `Deleted project "${p?.name}"`);
        const updated = projects.filter(p => p.id !== id);
        setProjects(updated);
        if (active === id) setActive(updated[0]?.id || null);
      };

      if (!user)     return null; // redirecting
      if (loading)   return <div style={{ padding: 32, color: "#64748b" }}>Loading…</div>;
      if (loadError) return (
        <div style={{ padding: 32, display: "flex", flexDirection: "column", gap: 12, alignItems: "flex-start" }}>
          <div style={{ color: "#ef4444" }}>{loadError}</div>
          <button onClick={loadData} style={{ fontSize: 13, padding: "6px 14px", borderRadius: 6, background: "#2563eb", color: "#fff", border: "none", cursor: "pointer" }}>Retry</button>
        </div>
      );

      const isAdmin       = user.role === "admin";
      const activeProject = projects.find(p => p.id === active);
      const inProgress    = projects.flatMap(p => (p.tasks || []).filter(t => t.col === "In Progress"));
      const blocked       = projects.flatMap(p => (p.tasks || []).filter(t => t.col === "Blocked"));

      return (
        <div style={{ fontFamily: "system-ui,sans-serif", minHeight: "100vh", background: "#f8fafc" }}>
          <Navbar user={user} />
          {/* Scope toggle + stats sub-bar */}
          <div style={{ background: "#1e293b", padding: "6px 24px", display: "flex", alignItems: "center", gap: 6, borderBottom: "1px solid #0f172a" }}>
            <div style={{ display: "flex", gap: 4, background: "#0f172a", borderRadius: 6, padding: 3 }}>
              {[["mine","👤 Mine"], ["mentioned","@ Mentioned"], ...(isElevated ? [["group","👥 Group"]] : [])].map(([s, label]) => (
                <button key={s} onClick={() => setScope(s)}
                  style={{ fontSize: 11, padding: "3px 10px", borderRadius: 4, border: "none", background: scope === s ? "#2563eb" : "transparent", color: scope === s ? "#fff" : "#64748b", cursor: "pointer", fontWeight: scope === s ? 600 : 400 }}>
                  {label}
                </button>
              ))}
            </div>
            <span style={{ fontSize: 11, color: "#64748b", marginLeft: 4 }}>{projects.length} projects · {inProgress.length} in progress · {blocked.length} blocked</span>
            <div style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
              <button onClick={() => setPanel(panel === "log" ? null : "log")} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 4, border: "none", background: panel === "log" ? "#2563eb" : "#334155", color: panel === "log" ? "#fff" : "#94a3b8", cursor: "pointer" }}>📋 Log</button>
              <button onClick={() => setPanel(panel === "ai" ? null : "ai")} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 4, border: "none", background: panel === "ai" ? "#2563eb" : "#334155", color: panel === "ai" ? "#fff" : "#94a3b8", cursor: "pointer", fontWeight: 600 }}>🤖 AI</button>
              {isAdmin && <button onClick={() => setPanel(panel === "users" ? null : "users")} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 4, border: "none", background: panel === "users" ? "#2563eb" : "#334155", color: panel === "users" ? "#fff" : "#94a3b8", cursor: "pointer" }}>👥 Team</button>}
            </div>
          </div>

          <div style={{ display: "flex", height: "calc(100vh - 86px)" }}>
            {scope !== "mentioned" && (
            <div style={{ width: 200, minWidth: 200, background: "#1e293b", padding: "12px 0", display: "flex", flexDirection: "column" }}>
              {projects.map(p => (
                <div key={p.id} onClick={() => setActive(p.id)} style={{ padding: "8px 14px", cursor: "pointer", background: active === p.id ? "#334155" : "transparent", borderLeft: active === p.id ? "3px solid #60a5fa" : "3px solid transparent", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 6 }}>
                  <span style={{ fontSize: 12, color: active === p.id ? "#f1f5f9" : "#94a3b8", fontWeight: active === p.id ? 600 : 400, lineHeight: 1.3, flex: 1 }}>{p.name}</span>
                  <button onClick={e => { e.stopPropagation(); deleteProject(p.id); }} style={{ fontSize: 10, color: "#64748b", background: "none", border: "none", cursor: "pointer", padding: "0 2px" }}>✕</button>
                </div>
              ))}
              <div style={{ padding: "8px 14px", marginTop: 4 }}>
                {addingProject
                  ? <div>
                      <input autoFocus value={newProjectName} onChange={e => setNewProjectName(e.target.value)}
                        onKeyDown={e => { if (e.key === "Enter") addProject(); if (e.key === "Escape") { setAddingProject(false); setNewProjectName(""); } }}
                        placeholder="Project name…" style={{ width: "100%", fontSize: 12, padding: "4px 6px", borderRadius: 4, border: "1px solid #475569", background: "#0f172a", color: "#f1f5f9", boxSizing: "border-box" }} />
                      <div style={{ display: "flex", gap: 4, marginTop: 4 }}>
                        <button onClick={addProject} style={{ fontSize: 11, padding: "2px 8px", borderRadius: 4, background: "#2563eb", color: "#fff", border: "none", cursor: "pointer" }}>Add</button>
                        <button onClick={() => { setAddingProject(false); setNewProjectName(""); }} style={{ fontSize: 11, padding: "2px 6px", borderRadius: 4, background: "#334155", color: "#94a3b8", border: "none", cursor: "pointer" }}>✕</button>
                      </div>
                    </div>
                  : <button onClick={() => setAddingProject(true)} style={{ fontSize: 12, color: "#60a5fa", background: "none", border: "none", cursor: "pointer", padding: 0 }}>+ New project</button>
                }
              </div>
            </div>
            )}

            <div style={{ flex: 1, padding: "16px 20px", overflowY: "auto" }}>
              {scope === "mentioned" ? (
                <>
                  <h2 style={{ margin: "0 0 14px", fontSize: 18, fontWeight: 700, color: "#0f172a" }}>
                    Tasks mentioning you
                    <span style={{ marginLeft: 10, fontSize: 13, fontWeight: 400, color: "#94a3b8" }}>read-only</span>
                  </h2>
                  <MentionedBoard project={projects[0] || { tasks: [] }} />
                </>
              ) : activeProject ? (
                <>
                  <h2 style={{ margin: "0 0 14px", fontSize: 18, fontWeight: 700, color: "#0f172a" }}>{activeProject.name}</h2>
                  <Board project={activeProject} onUpdate={updateProject} username={user.username} members={members} membersRef={membersRef} />
                </>
              ) : (
                <div style={{ color: "#94a3b8", marginTop: 40, textAlign: "center" }}>Select or create a project to get started</div>
              )}
            </div>

            {panel && (
              <div style={{ width: 320, minWidth: 320, borderLeft: "1px solid #e2e8f0", display: "flex", flexDirection: "column" }}>
                {panel === "ai"    && <AIChat scope={scope} onRefresh={loadData} username={user.username} />}
                {panel === "log"   && <AuditLog />}
                {panel === "users" && isAdmin && <UsersPanel />}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
