<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerno — Kanban</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .md-notes h1,.md-notes h2,.md-notes h3{font-weight:600;margin-bottom:2px}
    .md-notes h1{font-size:13px}.md-notes h2{font-size:12px}.md-notes h3{font-size:11px}
    .md-notes p{margin-bottom:3px}.md-notes ul{list-style-type:disc;padding-left:14px;margin-bottom:3px}.md-notes ol{list-style-type:decimal;padding-left:14px;margin-bottom:3px}
    .md-notes li{margin-bottom:1px}.md-notes code{background:#f1f5f9;border-radius:3px;padding:0 3px;font-family:monospace}
    .md-notes pre{background:#f1f5f9;border-radius:4px;padding:4px 6px;overflow-x:auto;margin-bottom:3px}
    .md-notes a{color:#2563eb;text-decoration:underline}.md-notes strong{font-weight:600}
    .md-notes em{font-style:italic}.md-notes blockquote{border-left:2px solid #cbd5e1;padding-left:6px;color:#64748b}
    .md-notes mark{background:#fef08a;border-radius:2px;padding:0 2px}
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; }
    .msg-bubble { white-space: pre-wrap; line-height: 1.5; font-size: 13px; padding: 10px 14px; border-radius: 12px; max-width: 80%; }
    /* ── Button system ───────────────────────────────────────────────── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:1px solid transparent;border-radius:8px;font-weight:500;line-height:1.2;transition:background .12s,border-color .12s;font-family:inherit;white-space:nowrap}
    .btn:disabled,.btn[disabled]{opacity:.55;cursor:not-allowed;pointer-events:none}
    .btn-xs{font-size:11px;padding:4px 10px} .btn-sm{font-size:12px;padding:6px 13px}
    .btn-md{font-size:13px;padding:9px 18px;font-weight:600} .btn-block{width:100%;justify-content:center}
    .btn-primary{background:#2563eb;color:#fff} .btn-primary:hover{background:#1d4ed8}
    .btn-secondary{background:#fff;color:#475569;border-color:#e2e8f0} .btn-secondary:hover{background:#f8fafc;border-color:#cbd5e1}
    .btn-danger{background:#fef2f2;color:#dc2626;border-color:#fecaca} .btn-danger:hover{background:#fee2e2;border-color:#fca5a5}
    .btn-danger-fill{background:#dc2626;color:#fff} .btn-danger-fill:hover{background:#b91c1c}
    .btn-warning{background:#fffbeb;color:#b45309;border-color:#fde68a} .btn-warning:hover{background:#fef3c7}
    .btn-success{background:#059669;color:#fff} .btn-success:hover{background:#047857}
    .btn-violet{background:#7c3aed;color:#fff} .btn-violet:hover{background:#6d28d9}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    if (typeof marked !== 'undefined') marked.use({ gfm: true, breaks: false });

    const COLUMNS   = ["To Do", "In Progress", "Blocked", "Done"];
    const COL_STYLE = {
      "To Do":       { bg: "#f1f5f9", border: "#cbd5e1", badge: "#64748b" },
      "In Progress": { bg: "#eff6ff", border: "#93c5fd", badge: "#2563eb" },
      "Blocked":     { bg: "#fff7ed", border: "#fdba74", badge: "#ea580c" },
      "Done":        { bg: "#f0fdf4", border: "#86efac", badge: "#16a34a" },
    };

    const WORKER      = "https://morning-mud-283c.moreno-a64.workers.dev";
    const SESSION_KEY  = "kerno_session";
    const SCOPES       = ["mine", "mentioned", "group"];

    // ── Session ──────────────────────────────────────────────────────────────
    function getSession() {
      const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
      if (!s || Date.now() > new Date(s.expires).getTime()) {
        localStorage.removeItem(SESSION_KEY);
        window.location.href = "index.html?expired=1";
        return null;
      }
      return s;
    }

    // ── API ──────────────────────────────────────────────────────────────────
    const authHeaders = () => ({
      "Content-Type": "application/json",
      "X-Session-Token": getSession()?.token || "",
    });

    const apiFetch = async (path, opts = {}) => {
      const res = await fetch(`${WORKER}${path}`, {
        ...opts,
        headers: { ...authHeaders(), ...(opts.headers || {}) },
      });
      if (res.status === 401) {
        localStorage.removeItem(SESSION_KEY);
        window.location.href = "index.html?expired=1";
        return null;
      }
      return res.json().catch(() => ({}));
    };

    const api = {
      register:      (u, p, e) => fetch(`${WORKER}/register`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: u, password: p, email: e }) }).then(r => r.json()),
      getProjects:   (scope)   => apiFetch(`/projects${scope ? `?scope=${scope}` : ""}`),
      saveProject:   (p)       => p._id
        ? apiFetch(`/projects/${p._id}`, { method: "PUT",    body: JSON.stringify(p) })
        : apiFetch("/projects",           { method: "POST",   body: JSON.stringify(p) }),
      deleteProject: (id)      => apiFetch(`/projects/${id}`, { method: "DELETE" }),
      log:           (u, a, d) => apiFetch("/logs",            { method: "POST", body: JSON.stringify({ username: u, action: a, details: d, timestamp: new Date().toISOString() }) }),
      getLogs:       ()        => apiFetch("/logs"),
      getMembers:    ()        => apiFetch("/members"),
      deleteMember:  (id)      => apiFetch(`/members/${id}`,   { method: "DELETE" }),
      getGroups:     ()        => apiFetch("/groups"),
      saveGroup:     (g)       => g.id
        ? apiFetch(`/groups/${g.id}`, { method: "PUT",    body: JSON.stringify(g) })
        : apiFetch("/groups",          { method: "POST",   body: JSON.stringify(g) }),
      deleteGroup:   (id)      => apiFetch(`/groups/${id}`,    { method: "DELETE" }),
      addGroupMember:(gid,mid,role) => apiFetch(`/groups/${gid}/members`, { method: "POST", body: JSON.stringify({ member_id: mid, role }) }),
      removeGroupMember:(gid,mid)   => apiFetch(`/groups/${gid}/members/${mid}`, { method: "DELETE" }),
      notify:        (actor, taskTitle, projectName, mentionsWithEmails) =>
                                  apiFetch("/notify", { method: "POST", body: JSON.stringify({ actor, taskTitle, projectName, mentionsWithEmails }) }),
      ai:            (body)    => apiFetch("/ai", { method: "POST", body: JSON.stringify(body) }),
      getSettings:   (key)     => fetch(`${WORKER}/settings/${key}`, { headers: authHeaders() }).then(r => r.json()),
      getGrants:     ()        => apiFetch("/grants"),
    };

    function extractMentions(text) {
      return [...new Set([...(text.matchAll(/@(\w+)/g))].map(m => m[1]))];
    }

    // ── Markdown Toolbar ─────────────────────────────────────────────────────
    function MarkdownToolbar({ value, onChange, taRef }) {
      const b = "flex items-center justify-center min-w-[22px] h-[22px] px-1 rounded hover:bg-slate-200 cursor-pointer text-slate-500 hover:text-slate-800 border-none bg-transparent font-sans transition-colors text-[11px] select-none";

      const wrap = (before, after, ph) => {
        const el = taRef.current;
        const s = el ? el.selectionStart : value.length;
        const e = el ? el.selectionEnd   : value.length;
        const sel = value.slice(s, e) || ph || "";
        onChange(value.slice(0, s) + before + sel + after + value.slice(e));
        requestAnimationFrame(() => { el?.focus(); el?.setSelectionRange(s + before.length, s + before.length + sel.length); });
      };

      const line = (prefix) => {
        const el = taRef.current;
        const pos = el ? el.selectionStart : value.length;
        const ls = value.lastIndexOf('\n', pos - 1) + 1;
        const has = value.slice(ls).startsWith(prefix);
        onChange(has ? value.slice(0, ls) + value.slice(ls + prefix.length) : value.slice(0, ls) + prefix + value.slice(ls));
        requestAnimationFrame(() => { el?.focus(); });
      };

      const sep = <span style={{width:1,height:14,background:"#cbd5e1",margin:"0 2px",alignSelf:"center",display:"inline-block"}} />;

      return (
        <div onMouseDown={e => e.preventDefault()} style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:1,border:"1px solid #e2e8f0",borderBottom:"none",borderRadius:"4px 4px 0 0",background:"#f8fafc",padding:"3px 4px"}}>
          <button className={b} title="Bold"          onClick={() => wrap("**","**","bold")}><strong>B</strong></button>
          <button className={b} title="Italic"        onClick={() => wrap("_","_","italic")}><em>I</em></button>
          <button className={b} title="Strikethrough" onClick={() => wrap("~~","~~","text")} style={{textDecoration:"line-through"}}>S</button>
          {sep}
          <button className={b} title="Heading 1"    onClick={() => line("# ")}  style={{fontWeight:700}}>H1</button>
          <button className={b} title="Heading 2"    onClick={() => line("## ")} style={{fontWeight:700,fontSize:10}}>H2</button>
          {sep}
          <button className={b} title="Bullet list"    onClick={() => line("- ")}  style={{letterSpacing:-1}}>• —</button>
          <button className={b} title="Numbered list" onClick={() => line("1. ")} style={{letterSpacing:-1}}>1. —</button>
          {sep}
          <button className={b} title="Inline code"  onClick={() => wrap("`","`","code")} style={{fontFamily:"monospace",fontWeight:600}}>&lt;/&gt;</button>
          <button className={b} title="Blockquote"   onClick={() => line("> ")} style={{fontWeight:700,fontSize:13}}>&ldquo;</button>
          <button className={b} title="Divider"      onClick={() => { const nl = value.endsWith('\n') ? '' : '\n'; onChange(value + nl + '---\n'); requestAnimationFrame(() => taRef.current?.focus()); }}>—</button>
          {sep}
          <button className={b} title="Link"         onClick={() => wrap("[","](url)","text")}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
          </button>
          <button className={b} title="Highlight"    onClick={() => wrap("==","==","text")} style={{background:"#fef08a",color:"#713f12"}}>★</button>
        </div>
      );
    }

    // ── Mention Textarea ─────────────────────────────────────────────────────
    function MentionTextarea({ value, onChange, members, style, onKeyDown, inputRef }) {
      const [showDropdown, setShowDropdown] = useState(false);
      const [mentionQuery, setMentionQuery] = useState("");
      const [mentionStart, setMentionStart] = useState(null);
      const internalRef = useRef(null);
      const ref = inputRef || internalRef;

      useEffect(() => { ref.current?.focus(); }, []);

      const filtered = members.filter(m => m.toLowerCase().startsWith(mentionQuery.toLowerCase()));

      const handleChange = (e) => {
        const val = e.target.value, pos = e.target.selectionStart;
        onChange(val);
        const match = val.slice(0, pos).match(/@(\w*)$/);
        if (match) { setShowDropdown(true); setMentionQuery(match[1]); setMentionStart(pos - match[0].length); }
        else setShowDropdown(false);
      };

      const selectMention = (username) => {
        const pos = ref.current?.selectionStart || value.length;
        onChange(`${value.slice(0, mentionStart)}@${username} ${value.slice(pos)}`);
        setShowDropdown(false);
        setTimeout(() => ref.current?.focus(), 0);
      };

      return (
        <div style={{ position: "relative" }}>
          <textarea ref={ref} value={value} onChange={handleChange} onKeyDown={onKeyDown} style={{ ...style, borderTopLeftRadius: 0, borderTopRightRadius: 0 }} />
          {showDropdown && filtered.length > 0 && (
            <div style={{ position: "absolute", bottom: "100%", left: 0, zIndex: 100, minWidth: 140 }}
              className="bg-white border border-slate-200 rounded-lg shadow-md">
              {filtered.map(m => (
                <div key={m} onMouseDown={() => selectMention(m)}
                  className="px-3 py-1.5 text-xs cursor-pointer text-slate-800 hover:bg-slate-100">
                  @{m}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── Navbar ───────────────────────────────────────────────────────────────
    function Navbar({ user }) {
      const [menuOpen, setMenuOpen] = React.useState(false);
      const logout = () => { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html"; };
      const isAdmin = user.role === "admin";
      React.useEffect(() => {
        if (!menuOpen) return;
        const h = () => setMenuOpen(false);
        document.addEventListener("click", h);
        return () => document.removeEventListener("click", h);
      }, [menuOpen]);
      const nav  = "text-xs px-3.5 py-1.5 rounded-full border border-slate-700 text-slate-300 no-underline hover:text-white hover:border-slate-500 transition";
      const navA = "text-xs px-3.5 py-1.5 rounded-full bg-blue-600 border border-blue-500 text-white no-underline";
      const drop = "flex items-center gap-2 px-3 py-2 text-xs text-slate-300 hover:bg-slate-700 hover:text-white no-underline transition-colors";
      return (
        <nav className="bg-slate-900 px-4 sm:px-6 py-2.5 flex items-center gap-3 shrink-0">
          <a href="dashboard.html" className="text-sm font-bold text-white no-underline">⚙️ Kerno</a>
          <span className="text-slate-600 hidden sm:inline">›</span>
          <span className="text-xs text-slate-400 hidden sm:inline">Kanban</span>
          <div className="ml-auto flex items-center gap-2">
            <a href="kanban.html"   className={`${navA} hidden sm:inline-flex`}>📋 Kanban</a>
            <a href="booking.html"  className={`${nav} hidden sm:inline-flex`}>📅 Bookings</a>
            <a href="requests.html" className={`${nav} hidden sm:inline-flex`}>📝 Requests</a>
            <div className="relative" onClick={e => e.stopPropagation()}>
              <button onClick={() => setMenuOpen(o => !o)}
                className="flex items-center gap-1.5 text-xs px-3.5 py-1.5 rounded-full border border-slate-700 text-slate-300 hover:text-white hover:border-slate-500 transition cursor-pointer font-[inherit]">
                {user.avatar_url
                  ? <img src={user.avatar_url} className="w-5 h-5 rounded-full object-cover" alt="" />
                  : <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-slate-600 text-slate-200 font-bold text-[10px]">{user.username[0].toUpperCase()}</span>}
                <span className="hidden sm:inline">{user.display_name || user.username}</span>
                {isAdmin && <span className="text-[9px] bg-blue-600 text-white rounded-full px-1.5 py-0.5 hidden sm:inline">admin</span>}
                <span className="text-[10px] text-slate-500">▾</span>
              </button>
              {menuOpen && (
                <div className="absolute right-0 top-full mt-1 w-48 bg-slate-800 border border-slate-700 rounded-xl shadow-xl z-50 overflow-hidden">
                  <a href="profile.html" className={drop}>👤 My Profile</a>
                  <a href="guide.html"   className={drop}>📖 User Guide</a>
                  <div className="border-t border-slate-700 sm:hidden" />
                  <a href="kanban.html"   className={`${drop} sm:hidden`}>📋 Kanban</a>
                  <a href="booking.html"  className={`${drop} sm:hidden`}>📅 Bookings</a>
                  <a href="requests.html" className={`${drop} sm:hidden`}>📝 Requests</a>
                  {isAdmin && <div className="border-t border-slate-700" />}
                  {isAdmin && <a href="users.html"   className={drop}>👥 Users & Groups</a>}
                  {isAdmin && <a href="pricing.html" className={drop}>💰 Pricing</a>}
                  {isAdmin && <a href="grants.html"  className={drop}>🏛 Grants</a>}
                </div>
              )}
            </div>
            <button onClick={logout} className="text-xs px-3.5 py-1.5 rounded-full border border-slate-700 text-slate-300 hover:text-white hover:border-slate-500 transition cursor-pointer font-[inherit]">Sign out</button>
          </div>
        </nav>
      );
    }

    // ── Audit Log ────────────────────────────────────────────────────────────
    function AuditLog() {
      const [logs,    setLogs]    = useState([]);
      const [loading, setLoading] = useState(true);
      const [error,   setError]   = useState(null);

      useEffect(() => {
        api.getLogs()
          .then(data => setLogs(Array.isArray(data) ? data : []))
          .catch(() => setError("Could not load logs."))
          .finally(() => setLoading(false));
      }, []);

      return (
        <div className="flex flex-col h-full">
          <div className="px-4 py-3 border-b border-slate-100 text-sm font-bold text-slate-900 bg-white">📋 Audit Log</div>
          <div className="flex-1 overflow-y-auto p-3">
            {loading && <div className="text-slate-400 text-xs">Loading…</div>}
            {error   && <div className="text-red-500 text-xs">{error}</div>}
            {!loading && !error && logs.length === 0 && <div className="text-slate-400 text-xs">No activity yet.</div>}
            {logs.map((l, i) => (
              <div key={i} className="mb-2.5 p-2.5 bg-white rounded-lg border border-slate-200 text-xs">
                <div className="flex justify-between mb-1">
                  <span className="font-semibold text-slate-800">{l.username}</span>
                  <span className="text-slate-400">{new Date(l.timestamp).toLocaleString()}</span>
                </div>
                <div className="text-slate-500"><span className="font-semibold text-blue-600">{l.action}</span> — {l.details}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── AI Chat ──────────────────────────────────────────────────────────────
    function AIChat({ scope, onRefresh, username, activeProject }) {
      const [messages,      setMessages]      = useState([]);
      const [input,         setInput]         = useState("");
      const [asking,        setAsking]        = useState(false);
      const [error,         setError]         = useState(null);
      const [scopedProjects,setScopedProjects]= useState([]);
      const bottomRef = useRef(null);

      // Fetch projects filtered to the current scope every time the panel opens or scope changes
      useEffect(() => {
        api.getProjects(scope).then(data => setScopedProjects(Array.isArray(data) ? data : []));
      }, [scope]);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, asking]);

      const executeAction = async (action) => {
        const record = scopedProjects.find(r => r.id === action.projectId);
        if (!record) return "❌ Project not found.";
        let updatedTasks = [...(record.tasks || [])];
        let logDetails = "";
        if (action.type === "add_task")    { updatedTasks.push({ id: Date.now(), ...action.task }); logDetails = `Added task "${action.task.title}" to ${record.name} as ${action.task.col}`; }
        else if (action.type === "move_task")   { const t = updatedTasks.find(t => t.id === action.taskId); logDetails = `Moved "${t?.title}" to ${action.col} in ${record.name}`; updatedTasks = updatedTasks.map(t => t.id === action.taskId ? { ...t, col: action.col } : t); }
        else if (action.type === "update_task") { const t = updatedTasks.find(t => t.id === action.taskId); logDetails = `Updated "${t?.title}" in ${record.name}`; updatedTasks = updatedTasks.map(t => t.id === action.taskId ? { ...t, ...action.updates } : t); }
        else if (action.type === "delete_task") { const t = updatedTasks.find(t => t.id === action.taskId); logDetails = `Deleted "${t?.title}" from ${record.name}`; updatedTasks = updatedTasks.filter(t => t.id !== action.taskId); }
        await api.saveProject({ ...record, tasks: updatedTasks });
        await api.log(username, action.type, logDetails);
        await onRefresh();
        return "✅ Done!";
      };

      const ask = async () => {
        if (!input.trim()) return;
        setAsking(true); setError(null);
        const userMsg     = input;
        const newMessages = [...messages, { role: "user", content: userMsg }];
        setMessages(newMessages); setInput("");
        try {
          const projectContext = activeProject
            ? JSON.stringify({ id: activeProject.id, name: activeProject.name, owner: activeProject.owner_username, tasks: (activeProject.tasks || []).filter(t => t.col !== "Billed") }, null, 2)
            : JSON.stringify(scopedProjects.map(p => ({ id: p.id, name: p.name, taskCount: (p.tasks||[]).length })), null, 2);
          const result = await api.ai({
            model: "claude-sonnet-4-20250514", max_tokens: 1000,
            system: `You are a helpful assistant for a Kanban board used by a research core facility.\n\n${activeProject ? `Current project:\n${projectContext}` : `No project selected. All projects:\n${projectContext}`}\n\nSupported actions (only for the current project):\n- add_task: { type, projectId, task: { col, title, notes } }\n- move_task: { type, projectId, taskId, col }\n- update_task: { type, projectId, taskId, updates }\n- delete_task: { type, projectId, taskId }\n\nIf performing a write operation, append at the very end:\n<ACTION>{"type":"...","projectId":"...",...}</ACTION>\n\nUse the project's id field for projectId. Cols: "To Do", "In Progress", "Blocked", "Done".`,
            messages: newMessages,
          });
          if (!result) { setError("No response — please try again."); setAsking(false); return; }
          let reply = result.content?.[0]?.text || "No response.";
          const actionMatch = reply.match(/<ACTION>(.*?)<\/ACTION>/s);
          let actionResult = "";
          if (actionMatch) {
            reply = reply.replace(/<ACTION>.*?<\/ACTION>/s, "").trim();
            try { actionResult = await executeAction(JSON.parse(actionMatch[1])); }
            catch { actionResult = "❌ Could not parse action."; }
          }
          setMessages(prev => [...prev, { role: "assistant", content: actionResult ? `${reply}\n\n${actionResult}` : reply }]);
        } catch (e) {
          setError("Network error — please try again.");
        }
        setAsking(false);
      };

      return (
        <div className="flex flex-col h-full bg-slate-50">
          <div className="px-4 py-3 border-b border-slate-100 text-sm font-bold text-slate-900 bg-white">🤖 AI Assistant</div>
          <div className="flex-1 overflow-y-auto p-3 flex flex-col gap-2.5">
            {messages.length === 0 && <div className="text-slate-400 text-center mt-8 text-xs">Ask me anything or give me instructions!<br/><em>"Add a blocked task…" · "What's in progress?"</em></div>}
            {messages.map((m, i) => (
              <div key={i} className="msg-bubble"
                style={{
                  alignSelf: m.role === "user" ? "flex-end" : "flex-start",
                  background: m.role === "user" ? "#2563eb" : "#fff",
                  color: m.role === "user" ? "#fff" : "#1e293b",
                  borderRadius: m.role === "user" ? "12px 12px 2px 12px" : "12px 12px 12px 2px",
                  boxShadow: "0 1px 3px #0001",
                  border: m.role === "assistant" ? "1px solid #e2e8f0" : "none",
                }}>{m.content}</div>
            ))}
            {asking && <div className="msg-bubble text-slate-400" style={{ alignSelf: "flex-start", background: "#fff", border: "1px solid #e2e8f0", borderRadius: "12px 12px 12px 2px" }}>Thinking…</div>}
            {error  && <div className="text-xs text-red-500 text-center">{error}</div>}
            <div ref={bottomRef} />
          </div>
          <div className="px-4 py-2.5 border-t border-slate-200 bg-white flex gap-2">
            <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter") ask(); }} placeholder="Ask or give instructions…"
              className="flex-1 text-sm px-2.5 py-1.5 rounded-lg border border-slate-300 outline-none focus:border-blue-400 font-sans" />
            <button onClick={ask} disabled={asking || !input.trim()}
              className="btn btn-sm btn-primary">Send</button>
          </div>
        </div>
      );
    }

    // ── Mentioned Board (read-only mini kanban) ──────────────────────────────
    function MentionedBoard({ project, currentUser }) {
      if (!project.tasks.length) return (
        <div className="text-slate-400 mt-10 text-center">No tasks mention you.</div>
      );
      return (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10 }}>
            {COLUMNS.map(col => {
              const s = COL_STYLE[col];
              const colTasks = project.tasks.filter(t => t.col === col);
              return (
                <div key={col} style={{ background: s.bg, border: `1.5px solid ${s.border}`, borderRadius: 10, padding: "10px 10px 8px" }}>
                  <div className="flex items-center justify-between mb-2.5">
                    <span className="text-xs font-bold tracking-wide uppercase" style={{ color: s.badge }}>{col}</span>
                    <span className="text-xs text-white rounded-full px-2 py-0.5" style={{ background: s.badge }}>{colTasks.length}</span>
                  </div>
                  {colTasks.length === 0 && <div className="text-xs text-slate-300 text-center py-2">—</div>}
                  {colTasks.map(task => (
                    <div key={task.id} className="bg-white rounded-lg p-2 mb-2 shadow-sm border border-slate-200">
                      <div className="text-xs text-slate-400 mb-1 italic">{task._projectName}</div>
                      <div className="text-xs font-semibold text-slate-800 mb-1 leading-snug">{task.title}</div>
                      {task.notes && (
                        <div className="text-xs text-slate-500 leading-snug">
                          {task.notes.replace(/@(\w+)/g, (_, u) => `@${u}`)}
                        </div>
                      )}
                      {task.assignee && (
                        <div className={`mt-1.5 text-xs font-semibold rounded-full px-2 py-0.5 inline-block border ${task.assignee.toLowerCase() === currentUser?.username.toLowerCase() ? "bg-green-50 text-green-700 border-green-200" : "bg-slate-50 text-slate-500 border-slate-200"}`}>
                          {task.assignee}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── Store Order Editor ────────────────────────────────────────────────────
    function StoreOrderEditor({ items, onChange, skus, disabled }) {
      const newLine = () => ({ id: Date.now(), sku_id: "", sku_name: "", qty: 1, unit_price: 0, comment: "", line_total: 0 });

      const updateLine = (id, field, val) => {
        onChange(items.map(item => {
          if (item.id !== id) return item;
          const u = { ...item, [field]: val };
          if (field === "sku_id") {
            const sku = skus.find(s => s.id === val);
            u.sku_name   = sku?.name || "";
            u.unit_price = parseFloat(sku?.internal || 0);
          }
          if (field === "qty" || field === "unit_price" || field === "sku_id") {
            u.line_total = Math.max(0, parseFloat(u.qty || 0)) * Math.max(0, parseFloat(u.unit_price || 0));
          }
          return u;
        }));
      };

      const total = items.reduce((s, i) => s + (i.line_total || 0), 0);
      const inp   = "text-xs px-1.5 py-1 rounded border border-slate-200 outline-none focus:ring-1 focus:ring-blue-500 w-full font-sans";

      return (
        <div className="mt-2 border-t border-slate-100 pt-2">
          <div className="text-xs font-semibold text-slate-500 mb-1.5">📦 Order Items</div>
          <table className="w-full text-xs border-collapse mb-1.5">
            <thead>
              <tr className="text-left text-slate-400 border-b border-slate-100">
                <th className="py-1 pr-1.5 font-semibold">Item</th>
                <th className="py-1 pr-1.5 font-semibold w-12">Qty</th>
                <th className="py-1 pr-1.5 font-semibold w-16">€/unit</th>
                <th className="py-1 pr-1.5 font-semibold w-16 text-right">Total</th>
                {!disabled && <th className="py-1 w-4"></th>}
              </tr>
            </thead>
            <tbody>
              {items.map(item => (
                <tr key={item.id} className="border-b border-slate-50">
                  <td className="py-1 pr-1.5">
                    {disabled
                      ? <span className="text-slate-700">{item.sku_name || item.sku_id || "—"}</span>
                      : <select value={item.sku_id} onChange={e => updateLine(item.id, "sku_id", e.target.value)} className={inp}>
                          <option value="">Select…</option>
                          {skus.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                        </select>}
                    {item.comment && <div className="text-slate-400 text-[10px] mt-0.5 italic">{item.comment}</div>}
                  </td>
                  <td className="py-1 pr-1.5">
                    {disabled
                      ? <span className="text-slate-600">{item.qty}</span>
                      : <input type="number" min="1" value={item.qty}
                          onChange={e => updateLine(item.id, "qty", Math.max(1, parseInt(e.target.value)||1))}
                          className={inp + " text-right"} />}
                  </td>
                  <td className="py-1 pr-1.5">
                    {disabled
                      ? <span className="text-slate-600">€{parseFloat(item.unit_price||0).toFixed(2)}</span>
                      : <input type="number" min="0" step="0.01" value={item.unit_price}
                          onChange={e => updateLine(item.id, "unit_price", parseFloat(e.target.value)||0)}
                          className={inp + " text-right"} />}
                  </td>
                  <td className="py-1 pr-1.5 text-right font-semibold text-violet-600">
                    €{(item.line_total||0).toFixed(2)}
                  </td>
                  {!disabled && (
                    <td className="py-1">
                      <button onClick={() => onChange(items.filter(i => i.id !== item.id))}
                        className="text-red-400 hover:text-red-600 cursor-pointer bg-transparent border-0 p-0 font-sans text-sm">✕</button>
                    </td>
                  )}
                </tr>
              ))}
            </tbody>
          </table>
          <div className="flex items-center justify-between">
            {!disabled
              ? <button onClick={() => onChange([...items, newLine()])}
                  className="text-xs px-2 py-1 rounded border border-blue-200 bg-blue-50 text-blue-600 cursor-pointer hover:bg-blue-100 font-sans border-0">+ Add line</button>
              : <span />}
            <div className="text-xs font-bold text-slate-700">
              Total: <span className="text-violet-600">€{total.toFixed(2)}</span>
            </div>
          </div>
        </div>
      );
    }

    // ── Board ────────────────────────────────────────────────────────────────
    function Board({ project, onUpdate, username, members, membersRef, currentUser, pricing, grants = [] }) {
      const isOwner = !project.owner_username || project.owner_username === currentUser?.username || currentUser?.role === "admin";
      const canEditTask = (task) => isOwner || task.assignee?.toLowerCase() === currentUser?.username?.toLowerCase();

      // Non-owners only see tasks assigned to them; billed tasks go to the Billed section
      const activeTasks  = project.tasks.filter(t => t.col !== "Billed");
      const billedTasks  = project.tasks.filter(t => t.col === "Billed");
      const visibleTasks = isOwner
        ? activeTasks
        : activeTasks.filter(t => t.assignee?.toLowerCase() === currentUser?.username?.toLowerCase());
      const [editing,         setEditing]         = useState(null);
      const [draft,           setDraft]           = useState("");
      const [addingTo,        setAddingTo]        = useState(null);
      const [newTitle,        setNewTitle]        = useState("");
      const [saving,          setSaving]          = useState(false);
      const [editingOrder,    setEditingOrder]    = useState(null);
      const [draftOrder,      setDraftOrder]      = useState(null);
      const [draftGrantId,    setDraftGrantId]    = useState("");
      const [finalizeModal,   setFinalizeModal]   = useState(null);
      const mentionTimers = useRef({});
      const notesTaRef   = useRef(null);

      const finalizeTask = async (taskId, includeFinancial) => {
        const t = project.tasks.find(t => t.id === taskId);
        const updatedTasks = project.tasks.map(t =>
          t.id === taskId ? { ...t, col: "Billed", finalized: true, exclude_from_financial: !includeFinancial } : t
        );
        await onUpdate({ ...project, tasks: updatedTasks });
        setFinalizeModal(null);
        api.log(username, "bill_task", `Billed "${t?.title}" in ${project.name}`);
      };

      const unbillTask = async (taskId) => {
        const t = project.tasks.find(t => t.id === taskId);
        const updatedTasks = project.tasks.map(t =>
          t.id === taskId ? { ...t, col: "Done", finalized: false, exclude_from_financial: false } : t
        );
        await onUpdate({ ...project, tasks: updatedTasks });
        api.log(username, "unbill_task", `Reopened "${t?.title}" in ${project.name}`);
      };

      const moveTask = async (id, dir) => {
        const t  = project.tasks.find(t => t.id === id);
        const ci = COLUMNS.indexOf(t.col), ni = ci + dir;
        if (ni < 0 || ni >= COLUMNS.length) return;
        await onUpdate({ ...project, tasks: project.tasks.map(t => t.id === id ? { ...t, col: COLUMNS[ni] } : t) });
        api.log(username, "move_task", `Moved "${t.title}" to ${COLUMNS[ni]} in ${project.name}`);
      };

      const startEdit  = (id, field, val) => { setEditing({ id, field }); setDraft(val); };

      const commitEdit = async () => {
        if (!editing) return;
        const t = project.tasks.find(t => t.id === editing.id);
        setSaving(true);
        await onUpdate({ ...project, tasks: project.tasks.map(t => t.id === editing.id ? { ...t, [editing.field]: draft } : t) });
        api.log(username, "update_task", `Updated ${editing.field} of "${t.title}" in ${project.name}`);
        if (editing.field === "notes") {
          const mentions = extractMentions(draft);
          if (mentions.length) {
            const key = `${project.id}-${editing.id}`;
            clearTimeout(mentionTimers.current[key]);
            mentionTimers.current[key] = setTimeout(() => {
              const mentionsWithEmails = mentions.map(u => ({
                username: u,
                email: (membersRef.current || []).find(m => m.username === u)?.email || null,
              }));
              api.notify(username, t.title, project.name, mentionsWithEmails);
            }, 30000);
          }
        }
        setSaving(false);
        setEditing(null);
      };

      const deleteTask = async (id) => {
        const t = project.tasks.find(t => t.id === id);
        await onUpdate({ ...project, tasks: project.tasks.filter(t => t.id !== id) });
        api.log(username, "delete_task", `Deleted "${t.title}" from ${project.name}`);
      };

      const addTask = async (col) => {
        if (!newTitle.trim()) return;
        const task = { id: Date.now(), col, title: newTitle.trim(), notes: "", assignee: "" };
        setSaving(true);
        await onUpdate({ ...project, tasks: [...project.tasks, task] });
        api.log(username, "add_task", `Added "${task.title}" to ${project.name} as ${col}`);
        setSaving(false);
        setNewTitle(""); setAddingTo(null);
      };

      return (
        <div className="relative">
          {saving && <div className="absolute -top-7 right-0 text-xs text-slate-400">Saving…</div>}
          <div className="overflow-x-auto pb-2">
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,minmax(200px,1fr))", gap: 10, minWidth: 720 }}>
            {COLUMNS.map(col => {
              const s = COL_STYLE[col], colTasks = visibleTasks.filter(t => t.col === col);
              return (
                <div key={col} style={{ background: s.bg, border: `1.5px solid ${s.border}`, borderRadius: 10, padding: "10px 10px 8px" }}>
                  <div className="flex items-center justify-between mb-2.5">
                    <span className="text-xs font-bold tracking-wide uppercase" style={{ color: s.badge }}>{col}</span>
                    <span className="text-xs text-white rounded-full px-2 py-0.5" style={{ background: s.badge }}>{colTasks.length}</span>
                  </div>
                  {colTasks.map(task => {
                    const ci = COLUMNS.indexOf(col);
                    const isMe = task.assignee?.toLowerCase() === currentUser?.username?.toLowerCase();
                    return (
                      <div key={task.id} className={`bg-white rounded-xl p-3 mb-2 shadow-sm border ${isMe ? "border-emerald-200" : "border-slate-200"}`}>
                        {editing?.id === task.id && editing.field === "title"
                          ? <input autoFocus value={draft} onChange={e => setDraft(e.target.value)}
                              onBlur={commitEdit} onKeyDown={e => { if (e.key === "Enter") commitEdit(); if (e.key === "Escape") setEditing(null); }}
                              className="w-full text-xs font-semibold border border-blue-300 rounded px-1 py-0.5 outline-none font-sans" />
                          : <div onClick={() => canEditTask(task) && startEdit(task.id, "title", task.title)}
                              className={`text-xs font-semibold text-slate-800 mb-1 leading-snug ${canEditTask(task) ? "cursor-text" : "cursor-default"}`}>{task.title}</div>
                        }
                        {editing?.id === task.id && editing.field === "notes"
                          ? <div>
                              <MarkdownToolbar value={draft} onChange={setDraft} taRef={notesTaRef} />
                              <MentionTextarea members={members} value={draft} onChange={setDraft} inputRef={notesTaRef}
                                onKeyDown={e => { if (e.key === "Escape") setEditing(null); }}
                                style={{ width: "100%", fontSize: 11, border: "1px solid #93c5fd", borderRadius: 4, padding: "2px 5px", resize: "vertical", boxSizing: "border-box", minHeight: 44 }} />
                              <div className="flex gap-1 mt-1">
                                <button onClick={commitEdit} disabled={saving} className="text-xs px-2 py-0.5 rounded bg-blue-600 text-white border-none cursor-pointer disabled:opacity-60 font-sans">Save</button>
                                <button onClick={() => setEditing(null)} className="text-xs px-2 py-0.5 rounded bg-slate-100 border border-slate-200 cursor-pointer text-slate-500 font-sans">Cancel</button>
                              </div>
                            </div>
                          : <div onClick={() => canEditTask(task) && startEdit(task.id, "notes", task.notes || "")}
                              className={`text-xs leading-snug min-h-3.5 ${canEditTask(task) ? "cursor-text" : "cursor-default"} ${task.notes ? "text-slate-600" : "text-slate-400"}`}>
                              {task.notes
                                ? <div className="md-notes" dangerouslySetInnerHTML={{ __html: (typeof marked !== 'undefined') ? marked.parse(task.notes.replace(/==(.+?)==/g, '<mark>$1</mark>')) : task.notes }} />
                                : (canEditTask(task) ? <em>add note…</em> : "")}
                            </div>
                        }
                        {editingOrder === task.id
                          ? <div className="mt-1.5">
                              {grants.length > 0 && (
                                <div className="mb-1.5">
                                  <label className="text-[10px] text-slate-500 font-medium uppercase tracking-wide">Grant</label>
                                  <select
                                    value={draftGrantId}
                                    onChange={e => setDraftGrantId(e.target.value)}
                                    className="w-full text-xs px-1.5 py-1 rounded-md border border-slate-200 bg-white font-sans mt-0.5">
                                    <option value="">— no grant —</option>
                                    {grants.map(g => {
                                      const rem = g.funds > 0 ? (g.funds - (g.spent||0)) : null;
                                      return (
                                        <option key={g.id} value={g.id}>
                                          {g.code} — {g.name} ({g.tier}){rem !== null ? ` · €${rem.toFixed(2)} avail.` : ""}
                                        </option>
                                      );
                                    })}
                                  </select>
                                  {draftGrantId && (() => {
                                    const g = grants.find(x => x.id === draftGrantId);
                                    if (!g || !g.funds) return null;
                                    const rem = g.funds - (g.spent || 0);
                                    const over = rem < 0;
                                    return (
                                      <div className={`mt-1 text-[10px] px-1.5 py-0.5 rounded ${over ? "text-red-600 bg-red-50" : "text-slate-500"}`}>
                                        {over ? "Over budget — " : ""}Available: €{rem.toFixed(2)} of €{g.funds.toLocaleString()}
                                      </div>
                                    );
                                  })()}
                                </div>
                              )}
                              <StoreOrderEditor
                                items={draftOrder || []}
                                onChange={setDraftOrder}
                                skus={(pricing?.skus || [])}
                                disabled={false}
                              />
                              <div className="flex gap-1 mt-1.5">
                                <button onClick={async () => {
                                  const updated = { ...task, store_order: { ...(task.store_order||{}), items: draftOrder, total: draftOrder.reduce((s,i)=>s+(i.line_total||0),0), requested_by: task.store_order?.requested_by || project.owner_username, grant_id: draftGrantId || null } };
                                  setSaving(true);
                                  await onUpdate({ ...project, tasks: project.tasks.map(t => t.id === task.id ? updated : t) });
                                  setSaving(false); setEditingOrder(null); setDraftOrder(null); setDraftGrantId("");
                                }} disabled={saving} className="text-xs px-2 py-0.5 rounded bg-blue-600 text-white border-none cursor-pointer disabled:opacity-60 font-sans">Save</button>
                                <button onClick={() => { setEditingOrder(null); setDraftOrder(null); setDraftGrantId(""); }} className="text-xs px-2 py-0.5 rounded bg-slate-100 border border-slate-200 cursor-pointer text-slate-500 font-sans">Cancel</button>
                              </div>
                            </div>
                          : task.store_order?.items?.length > 0
                            ? <>
                                {task.store_order.grant_id && grants.length > 0 && (() => {
                                  const g = grants.find(g => g.id === task.store_order.grant_id);
                                  return g ? (
                                    <div className="mt-1 mb-0.5">
                                      <span className="text-[10px] bg-violet-50 text-violet-700 border border-violet-200 rounded-full px-2 py-0.5">{g.code} · {g.tier}</span>
                                    </div>
                                  ) : null;
                                })()}
                                <StoreOrderEditor
                                  items={task.store_order.items}
                                  onChange={() => {}}
                                  skus={pricing?.skus || []}
                                  disabled={true}
                                />
                              </>
                            : null
                        }
                        {canEditTask(task) && editingOrder !== task.id && (task.store_order?.items?.length > 0 || project.source === "request") && (
                          <button onClick={() => { setEditingOrder(task.id); setDraftOrder(task.store_order?.items ? JSON.parse(JSON.stringify(task.store_order.items)) : []); setDraftGrantId(task.store_order?.grant_id || ""); }}
                            className="text-[10px] px-2 py-0.5 rounded border border-slate-200 bg-slate-50 text-slate-500 cursor-pointer hover:bg-slate-100 mt-1 font-sans">
                            {task.store_order?.items?.length > 0 ? "Edit order" : "Add order"}
                          </button>
                        )}
                        {/* Assignee — only owner/admin can reassign */}
                        {editing?.id === task.id && editing.field === "notes"
                          ? null
                          : <div className="mt-1.5">
                              {isOwner
                                ? <select
                                    value={task.assignee || ""}
                                    onChange={async e => {
                                      const assignee = e.target.value;
                                      await onUpdate({ ...project, tasks: project.tasks.map(t => t.id === task.id ? { ...t, assignee } : t) });
                                      api.log(username, "assign_task", `Assigned "${task.title}" to ${assignee || "nobody"} in ${project.name}`);
                                    }}
                                    className={`w-full text-xs px-1.5 py-1 rounded-md border border-slate-200 cursor-pointer font-sans ${isMe ? "bg-green-50 text-green-700" : "bg-slate-50 text-slate-400"}`}>
                                    <option value="">Unassigned</option>
                                    {members.map(m => <option key={m} value={m}>{m}</option>)}
                                  </select>
                                : task.assignee
                                  ? <span className={`text-xs font-semibold rounded-full px-2 py-0.5 border inline-block ${isMe ? "bg-green-50 text-green-700 border-green-200" : "bg-slate-50 text-slate-500 border-slate-200"}`}>{task.assignee}</span>
                                  : null
                              }
                            </div>
                        }
                        <div className="flex gap-1 mt-1.5 items-center">
                          <button onClick={() => moveTask(task.id, -1)} disabled={ci === 0 || !canEditTask(task)}
                            className={`text-xs px-1.5 py-0.5 rounded border border-slate-200 bg-slate-50 font-sans ${ci === 0 || !canEditTask(task) ? "cursor-not-allowed text-slate-300" : "cursor-pointer text-slate-500 hover:bg-slate-100"}`}>←</button>
                          <button onClick={() => moveTask(task.id, 1)} disabled={ci === COLUMNS.length - 1 || !canEditTask(task)}
                            className={`text-xs px-1.5 py-0.5 rounded border border-slate-200 bg-slate-50 font-sans ${ci === COLUMNS.length - 1 || !canEditTask(task) ? "cursor-not-allowed text-slate-300" : "cursor-pointer text-slate-500 hover:bg-slate-100"}`}>→</button>
                          {isOwner && task.store_order?.items?.length > 0 && (
                            <button onClick={() => setFinalizeModal(task)}
                              className="text-xs px-1.5 py-0.5 rounded border border-violet-200 bg-violet-50 cursor-pointer text-violet-600 hover:bg-violet-100 font-sans ml-auto">Bill →</button>
                          )}
                          {isOwner && <button onClick={() => deleteTask(task.id)} className="text-xs px-1.5 py-0.5 rounded border border-red-200 bg-red-50 cursor-pointer text-red-500 font-sans">✕</button>}
                        </div>
                      </div>
                    );
                  })}
                  {addingTo === col && isOwner
                    ? <div className="mt-1">
                        <input autoFocus value={newTitle} onChange={e => setNewTitle(e.target.value)}
                          onKeyDown={e => { if (e.key === "Enter") addTask(col); if (e.key === "Escape") { setAddingTo(null); setNewTitle(""); } }}
                          placeholder="Task title…" className="w-full text-xs px-2 py-1 rounded-md border border-blue-300 outline-none font-sans" />
                        <div className="flex gap-1 mt-1">
                          <button onClick={() => addTask(col)} disabled={saving}
                            className="text-xs px-2.5 py-0.5 rounded border-none cursor-pointer text-white disabled:opacity-60 font-sans"
                            style={{ background: s.badge }}>Add</button>
                          <button onClick={() => { setAddingTo(null); setNewTitle(""); }} className="text-xs px-2 py-0.5 rounded bg-slate-100 border border-slate-200 cursor-pointer text-slate-500 font-sans">Cancel</button>
                        </div>
                      </div>
                    : isOwner && <button onClick={() => setAddingTo(col)}
                        className="w-full text-xs py-1 rounded-md border-dashed border bg-transparent cursor-pointer mt-0.5 font-sans"
                        style={{ borderColor: s.border, color: s.badge }}>+ Add</button>
                  }
                </div>
              );
            })}
          </div>
          </div>{/* end overflow-x-auto */}
          {billedTasks.length > 0 && (
            <div className="mt-5 border-t border-violet-100 pt-3">
              <div className="text-[11px] font-semibold text-violet-500 uppercase tracking-wider mb-2">Billed ({billedTasks.length})</div>
              <div className="flex flex-col gap-1.5">
                {billedTasks.map(t => (
                  <div key={t.id} className="flex items-center gap-2 bg-violet-50 border border-violet-100 rounded-lg px-3 py-2 group">
                    <span className="text-xs font-medium text-slate-700 flex-1 truncate">{t.title}</span>
                    {t.store_order?.total > 0 && (
                      <span className="text-xs text-violet-700 font-semibold shrink-0">EUR {Number(t.store_order.total).toFixed(2)}</span>
                    )}
                    {t.exclude_from_financial && (
                      <span className="text-[10px] text-slate-400 bg-white border border-slate-200 rounded px-1.5 py-0.5 shrink-0">excl. report</span>
                    )}
                    {isOwner && (
                      <button onClick={() => unbillTask(t.id)}
                        className="text-[10px] text-slate-400 hover:text-slate-600 bg-transparent border-none cursor-pointer font-sans shrink-0" title="Reopen">↩ reopen</button>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}
          {finalizeModal && (
            <FinalizeTaskModal
              task={finalizeModal}
              onClose={() => setFinalizeModal(null)}
              onConfirm={includeFinancial => finalizeTask(finalizeModal.id, includeFinancial)}
            />
          )}
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────────────────
    function ArchiveModal({ project, onClose, onConfirm }) {
      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" onClick={onClose}>
          <div className="bg-white rounded-xl p-5 w-80 shadow-2xl" onClick={e => e.stopPropagation()}>
            <h3 className="text-sm font-semibold text-slate-800 mb-1">Close project</h3>
            <p className="text-xs text-slate-500 mb-4">
              <span className="font-medium text-slate-700">{project.name}</span> will be removed from the active board. Individual tasks can still be finalized for the financial report.
            </p>
            <div className="flex gap-2 justify-end">
              <button onClick={onClose} className="btn btn-sm btn-secondary">Cancel</button>
              <button onClick={onConfirm} className="btn btn-sm btn-primary">Close project</button>
            </div>
          </div>
        </div>
      );
    }

    function FinalizeTaskModal({ task, onClose, onConfirm }) {
      const hasBillable = task.store_order?.items?.length > 0;
      const [includeFinancial, setIncludeFinancial] = useState(hasBillable);
      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" onClick={onClose}>
          <div className="bg-white rounded-xl p-5 w-80 shadow-2xl" onClick={e => e.stopPropagation()}>
            <h3 className="text-sm font-semibold text-slate-800 mb-1">Bill task</h3>
            <p className="text-xs text-slate-500 mb-4">
              <span className="font-medium text-slate-700">{task.title}</span> will be moved to Billed and removed from the active board.
            </p>
            <div className="flex items-center justify-between bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 mb-4">
              <div>
                <div className="text-xs font-medium text-slate-700">Include in financial report</div>
                <div className="text-[10px] text-slate-400 mt-0.5">{hasBillable ? "Store orders will appear in the expense dashboard" : "No store orders — will be recorded but not billed"}</div>
              </div>
              <button onClick={() => setIncludeFinancial(v => !v)}
                className={`relative w-9 h-5 rounded-full transition-colors border-none cursor-pointer flex-shrink-0 ml-3 ${includeFinancial ? "bg-blue-600" : "bg-slate-300"}`}>
                <span className={`absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-all ${includeFinancial ? "left-[18px]" : "left-0.5"}`} />
              </button>
            </div>
            <div className="flex gap-2 justify-end">
              <button onClick={onClose} className="btn btn-sm btn-secondary">Cancel</button>
              <button onClick={() => onConfirm(includeFinancial)}
                className="btn btn-sm btn-violet">Bill →</button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [user] = useState(() => {
        const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
        if (!s || Date.now() > new Date(s.expires).getTime()) {
          localStorage.removeItem(SESSION_KEY);
          window.location.href = "index.html?expired=1";
          return null;
        }
        return { username: s.username, role: s.role, token: s.token, group_id: s.group_id, group_role: s.group_role, avatar_url: s.avatar_url || null, display_name: s.display_name || null };
      });

      const [projects,        setProjects]        = useState([]);
      const [members,         setMembers]         = useState([]);
      const membersRef                            = useRef([]);
      const [active,          setActive]          = useState(null);
      const [loading,         setLoading]         = useState(true);
      const [loadError,       setLoadError]       = useState(null);
      const [addingProject,   setAddingProject]   = useState(false);
      const [newProjectName,  setNewProjectName]  = useState("");
      const [panel,           setPanel]           = useState(null);
      const [pricing,         setPricing]         = useState({ skus: [] });
      const [grants,          setGrants]          = useState([]);
      const [showArchived,    setShowArchived]     = useState(false);
      const [archiveModal,    setArchiveModal]     = useState(null); // project object
      const [sidebarOpen,     setSidebarOpen]      = useState(false);
      const isElevated = user?.role === "admin" || ["leader","manager"].includes(user?.group_role);
      const [scope, setScope] = useState("mine");

      const handleLogout = () => {
        localStorage.removeItem(SESSION_KEY);
        window.location.href = "index.html";
      };

      const loadData = async () => {
        setLoading(true); setLoadError(null);
        try {
          const [data, m, pricingRaw, grantsRaw] = await Promise.all([
            api.getProjects(scope),
            api.getMembers(),
            api.getSettings("pricing"),
            api.getGrants(),
          ]);
          const p = Array.isArray(data) ? data : [];
          setProjects(p);
          const memberList = Array.isArray(m) ? m : [];
          setMembers(memberList.map(u => u.username));
          membersRef.current = memberList;
          setPricing(pricingRaw?.skus ? pricingRaw : { skus: [] });
          setGrants(Array.isArray(grantsRaw) ? grantsRaw : []);
          const urlProject = new URLSearchParams(location.search).get("project");
          setActive(a => urlProject || a || p[0]?.id || null);
        } catch {
          setLoadError("Could not load data. Please refresh.");
        }
        setLoading(false);
      };

      useEffect(() => { if (user) loadData(); else setLoading(false); }, [scope]);

      const updateProject = async (updated) => {
        await api.saveProject(updated);
        setProjects(prev => prev.map(p => p.id === updated.id ? updated : p));
      };

      const addProject = async () => {
        if (!newProjectName.trim()) return;
        const id  = "proj-" + Date.now();
        const p   = { id, name: newProjectName.trim(), tasks: [] };
        const res = await api.saveProject(p);
        setProjects(prev => [...prev, { ...p, _id: res?._id }]);
        api.log(user.username, "add_project", `Created project "${p.name}"`);
        setActive(id); setNewProjectName(""); setAddingProject(false);
      };

      const deleteProject = async (id) => {
        const p = projects.find(p => p.id === id);
        if (p?._id) await api.deleteProject(p._id);
        api.log(user.username, "delete_project", `Deleted project "${p?.name}"`);
        const updated = projects.filter(p => p.id !== id);
        setProjects(updated);
        if (active === id) setActive(updated[0]?.id || null);
      };

      const archiveProject = async (id) => {
        const p = projects.find(p => p.id === id);
        if (!p) return;
        const updated = { ...p, archived: true };
        await api.saveProject(updated);
        setProjects(prev => prev.map(x => x.id === id ? updated : x));
        setArchiveModal(null);
        api.log(user.username, "archive_project", `Archived project "${p.name}"`);
        if (active === id) {
          const next = projects.find(x => x.id !== id && !x.archived);
          setActive(next?.id || null);
        }
      };

      const unarchiveProject = async (id) => {
        const p = projects.find(p => p.id === id);
        if (!p) return;
        const updated = { ...p, archived: false };
        await api.saveProject(updated);
        setProjects(prev => prev.map(x => x.id === id ? updated : x));
        api.log(user.username, "unarchive_project", `Unarchived project "${p.name}"`);
      };

      if (!user)     return null; // redirecting
      if (loading)   return <div className="p-8 text-slate-500">Loading…</div>;
      if (loadError) return (
        <div className="p-8 flex flex-col gap-3 items-start">
          <div className="text-red-500">{loadError}</div>
          <button onClick={loadData} className="text-sm px-3.5 py-1.5 rounded-md bg-blue-600 text-white border-none cursor-pointer hover:bg-blue-700 font-sans">Retry</button>
        </div>
      );

      const isAdmin         = user.role === "admin";
      const activeProject   = projects.find(p => p.id === active);
      const activeProjects  = projects.filter(p => !p.archived);
      const archivedCount   = projects.filter(p => p.archived).length;
      const visibleProjects = showArchived ? projects.filter(p => p.archived) : activeProjects;
      const inProgress      = activeProjects.flatMap(p => (p.tasks || []).filter(t => t.col === "In Progress"));
      const blocked         = activeProjects.flatMap(p => (p.tasks || []).filter(t => t.col === "Blocked"));

      return (
        <div className="font-sans h-screen flex flex-col bg-slate-50">
          <Navbar user={user} />
          {/* Scope toggle + stats sub-bar */}
          <div className="bg-slate-800 border-b border-slate-900 px-3 sm:px-6 py-2 flex items-center gap-2 flex-wrap shrink-0">
            {scope !== "mentioned" && (
              <button onClick={() => setSidebarOpen(o => !o)}
                className="md:hidden text-slate-400 hover:text-white bg-transparent border-none cursor-pointer font-sans text-lg leading-none px-1 shrink-0">☰</button>
            )}
            <div className="bg-slate-900 rounded-lg p-1 flex gap-1">
              {[["mine","👤 Mine"], ["mentioned","@ Mentioned"], ...(isElevated ? [["group","👥 Group"]] : [])].map(([s, label]) => (
                <button key={s} onClick={() => setScope(s)}
                  className={`text-xs px-2.5 py-1 rounded-md border-none cursor-pointer font-sans transition-colors ${scope === s ? "bg-blue-600 text-white font-semibold" : "bg-transparent text-slate-400 font-normal hover:text-slate-200"}`}>
                  {label}
                </button>
              ))}
            </div>
            <span className="text-xs text-slate-500 hidden sm:inline">{activeProjects.length} projects · {inProgress.length} in progress · {blocked.length} blocked</span>
            <div className="ml-auto flex gap-1.5">
              <button onClick={() => { setPanel(panel === "log" ? null : "log"); setSidebarOpen(false); }}
                className={`text-xs px-3 py-1.5 rounded-lg border border-slate-600 cursor-pointer font-sans transition-colors ${panel === "log" ? "bg-blue-600 text-white border-blue-600" : "bg-slate-700 text-slate-300 hover:bg-slate-600"}`}>📋 Log</button>
              <button onClick={() => { setPanel(panel === "ai" ? null : "ai"); setSidebarOpen(false); }}
                className={`text-xs px-3 py-1.5 rounded-lg border border-slate-600 cursor-pointer font-semibold font-sans transition-colors ${panel === "ai" ? "bg-blue-600 text-white border-blue-600" : "bg-slate-700 text-slate-300 hover:bg-slate-600"}`}>🤖 AI</button>
            </div>
          </div>

          <div className="flex flex-1 overflow-hidden relative">
            {scope !== "mentioned" && (
              <>
              {sidebarOpen && (
                <div className="fixed inset-0 z-30 bg-black/50 md:hidden" onClick={() => setSidebarOpen(false)} />
              )}
              <div className={`bg-slate-800 shrink-0 flex-col py-3 overflow-y-auto z-40
                ${sidebarOpen ? "flex fixed inset-y-0 left-0 w-64 top-0" : "hidden md:flex md:w-56 md:relative"}`}>
                <div className="md:hidden flex items-center justify-between px-3.5 pb-2 mb-1 border-b border-slate-700 shrink-0">
                  <span className="text-[11px] font-semibold text-slate-400 uppercase tracking-wide">Projects</span>
                  <button onClick={() => setSidebarOpen(false)} className="text-slate-400 hover:text-white bg-transparent border-none cursor-pointer font-sans text-lg leading-none">✕</button>
                </div>
                {showArchived && (
                  <div className="px-3.5 pb-2 border-b border-slate-700 mb-1">
                    <span className="text-[10px] text-amber-400 font-semibold uppercase tracking-wide">Finalized</span>
                  </div>
                )}
                {visibleProjects.map(p => (
                  <div key={p.id} onClick={() => { setActive(p.id); setSidebarOpen(false); }}
                    className={`px-3.5 py-2 cursor-pointer flex items-center justify-between gap-1.5 border-l-2 transition-colors group ${active === p.id ? "bg-slate-700 border-blue-400" : "border-transparent hover:bg-slate-700/50"}`}>
                    <span className={`text-xs leading-snug flex-1 break-words line-clamp-2 ${active === p.id ? "text-slate-100 font-semibold" : showArchived ? "text-slate-500" : "text-slate-400 font-normal"}`}>{p.name}</span>
                    <span className="text-[10px] text-slate-500 shrink-0">{(p.tasks||[]).filter(t=>t.col!=='Billed').length}</span>
                    <div className="flex gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
                      {(p.owner_username === user.username || user.role === "admin") && (
                        showArchived
                          ? <button onClick={e => { e.stopPropagation(); unarchiveProject(p.id); }} title="Reopen" className="text-[10px] text-amber-400 bg-transparent border-none cursor-pointer px-0.5 hover:text-amber-300 font-sans">reopen</button>
                          : <button onClick={e => { e.stopPropagation(); setArchiveModal(p); }} title="Finalize" className="text-[10px] text-slate-400 bg-transparent border-none cursor-pointer px-0.5 hover:text-amber-400 font-sans">finalize</button>
                      )}
                    </div>
                  </div>
                ))}
                {!showArchived && (
                  <div className="px-3.5 py-2 mt-1">
                    {addingProject
                      ? <div>
                          <input autoFocus value={newProjectName} onChange={e => setNewProjectName(e.target.value)}
                            onKeyDown={e => { if (e.key === "Enter") addProject(); if (e.key === "Escape") { setAddingProject(false); setNewProjectName(""); } }}
                            placeholder="Project name…" className="w-full text-xs px-1.5 py-1 rounded border border-slate-600 bg-slate-900 text-slate-100 outline-none font-sans" />
                          <div className="flex gap-1 mt-1">
                            <button onClick={addProject} className="text-xs px-2 py-0.5 rounded bg-blue-600 text-white border-none cursor-pointer font-sans">Add</button>
                            <button onClick={() => { setAddingProject(false); setNewProjectName(""); }} className="text-xs px-1.5 py-0.5 rounded bg-slate-700 text-slate-400 border-none cursor-pointer font-sans">✕</button>
                          </div>
                        </div>
                      : <button onClick={() => setAddingProject(true)} className="text-xs text-blue-400 bg-transparent border-none cursor-pointer p-0 hover:text-blue-300 font-sans">+ New project</button>
                    }
                  </div>
                )}
                {archivedCount > 0 && (
                  <div className="mt-auto px-3.5 pt-2 border-t border-slate-700">
                    <button onClick={() => { setShowArchived(s => !s); setActive(null); setSidebarOpen(false); }}
                      className="text-[10px] text-slate-500 hover:text-slate-300 bg-transparent border-none cursor-pointer p-0 font-sans w-full text-left">
                      {showArchived ? "← Back to active" : `${archivedCount} finalized`}
                    </button>
                  </div>
                )}
              </div>
              </>
            )}

            <div className="flex-1 p-3 sm:p-5 overflow-y-auto min-w-0">
              {scope === "mentioned" ? (
                <>
                  <h2 className="mb-3.5 text-lg font-bold text-slate-900">
                    Tasks mentioning you
                    <span className="ml-2.5 text-sm font-normal text-slate-400">read-only</span>
                  </h2>
                  <MentionedBoard project={projects[0] || { tasks: [] }} currentUser={user} />
                </>
              ) : activeProject ? (
                <>
                  <div className="flex items-center justify-between mb-3.5">
                    <h2 className="text-lg font-bold text-slate-900">{activeProject.name}</h2>
                    {(activeProject.owner_username === user.username || user.role === "admin") && (
                      <button onClick={() => setArchiveModal(activeProject)}
                        className="text-xs px-3 py-1 rounded-lg border border-slate-200 bg-white text-slate-500 hover:bg-amber-50 hover:border-amber-300 hover:text-amber-700 cursor-pointer font-sans transition-colors">
                        Finalize project →
                      </button>
                    )}
                  </div>
                  <Board project={activeProject} onUpdate={updateProject} username={user.username} members={members} membersRef={membersRef} currentUser={user} pricing={pricing} grants={grants} />
                </>
              ) : (
                <div className="text-slate-400 mt-10 text-center">Select or create a project to get started</div>
              )}
            </div>

            {panel && (
              <div className="flex flex-col bg-white fixed inset-0 z-40 md:relative md:inset-auto md:z-auto md:w-80 md:shrink-0 md:border-l md:border-slate-200">
                <div className="flex items-center justify-between px-4 py-2.5 border-b border-slate-200 md:hidden shrink-0">
                  <span className="text-sm font-semibold text-slate-700">{panel === "ai" ? "🤖 AI Assistant" : "📋 Audit Log"}</span>
                  <button onClick={() => setPanel(null)} className="text-slate-400 hover:text-slate-700 bg-transparent border-none cursor-pointer text-xl font-sans leading-none">✕</button>
                </div>
                {panel === "ai"    && <AIChat scope={scope} onRefresh={loadData} username={user.username} activeProject={activeProject} />}
                {panel === "log"   && <AuditLog />}
              </div>
            )}
          </div>
          {archiveModal && (
            <ArchiveModal
              project={archiveModal}
              onClose={() => setArchiveModal(null)}
              onConfirm={() => archiveProject(archiveModal.id)}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
