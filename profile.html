<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerno — My Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 font-sans">

<nav id="navbar"></nav>

<main class="max-w-2xl mx-auto px-4 py-10">
  <div class="flex items-center gap-4 mb-8">
    <div id="avatar-initials"
      class="w-14 h-14 rounded-2xl bg-blue-600 flex items-center justify-center text-white text-xl font-bold shrink-0"></div>
    <img id="avatar-preview" style="display:none" class="w-14 h-14 rounded-2xl object-cover shrink-0" src="" alt="Avatar" />
    <div>
      <h1 id="display-heading" class="text-2xl font-bold text-slate-900 tracking-tight"></h1>
      <p class="text-sm text-slate-400">@<span id="username-sub"></span></p>
    </div>
  </div>

  <!-- Tabs -->
  <div class="flex gap-1 mb-6 border-b border-slate-200">
    <button data-tab="profile"  class="tab-btn px-4 py-2 text-sm font-semibold rounded-t-lg border-b-2 border-blue-600 text-blue-600 bg-white -mb-px cursor-pointer">Profile</button>
    <button data-tab="research" class="tab-btn px-4 py-2 text-sm font-medium rounded-t-lg border-b-2 border-transparent text-slate-500 hover:text-slate-800 cursor-pointer">Research IDs</button>
    <button data-tab="security" class="tab-btn px-4 py-2 text-sm font-medium rounded-t-lg border-b-2 border-transparent text-slate-500 hover:text-slate-800 cursor-pointer">Security</button>
  </div>

  <!-- ── Profile Tab ──────────────────────────────────────────────── -->
  <div id="tab-profile" class="tab-panel">

    <!-- Avatar Picker -->
    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm mb-4">
      <h2 class="text-sm font-bold text-slate-700 mb-1">Choose Avatar</h2>
      <p class="text-xs text-slate-400 mb-4">Pick one of the generated avatars or paste a custom image URL below.</p>
      <div id="avatar-grid" class="grid grid-cols-6 sm:grid-cols-10 gap-2 mb-4"></div>
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Custom Avatar URL</label>
        <input id="custom-avatar-url" type="url" placeholder="https://example.com/avatar.png"
          class="w-full text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition" />
      </div>
    </div>

    <!-- Personal Information -->
    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
      <h2 class="text-sm font-bold text-slate-700 mb-5">Personal Information</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Display Name</label>
          <input id="display-name" type="text" placeholder="Your full name"
            class="w-full text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Email</label>
          <input id="email" type="email" placeholder="your@email.com"
            class="w-full text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Phone</label>
          <input id="phone" type="tel" placeholder="+351 …"
            class="w-full text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition" />
        </div>
      </div>
      <div id="msg-profile" style="display:none" class="flex items-center gap-2 mt-5 rounded-xl px-4 py-2.5 text-sm"></div>
      <button id="save-profile"
        class="mt-5 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl text-sm transition-colors shadow-sm cursor-pointer border-0">
        Save Profile
      </button>
    </div>
  </div>

  <!-- ── Research IDs Tab ─────────────────────────────────────────── -->
  <div id="tab-research" class="tab-panel hidden">
    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
      <h2 class="text-sm font-bold text-slate-700 mb-1">Research Identifiers</h2>
      <p class="text-xs text-slate-400 mb-5">Link your academic profiles so colleagues can find your work.</p>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">
            ORCID iD
            <span class="normal-case font-normal text-slate-400 ml-1">orcid.org/0000-0000-0000-0000</span>
          </label>
          <div class="flex gap-2 items-center">
            <span class="shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-base font-bold text-white text-xs" style="background:#a6ce39">iD</span>
            <input id="orcid-id" type="text" placeholder="0000-0001-2345-6789"
              class="flex-1 text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Google Scholar</label>
          <div class="flex gap-2 items-center">
            <span class="shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-base bg-blue-50">🎓</span>
            <input id="google-scholar" type="url" placeholder="https://scholar.google.com/citations?user=…"
              class="flex-1 text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">LinkedIn</label>
          <div class="flex gap-2 items-center">
            <span class="shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-white text-xs font-bold rounded-lg" style="background:#0077b5">in</span>
            <input id="linkedin" type="url" placeholder="https://linkedin.com/in/…"
              class="flex-1 text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition" />
          </div>
        </div>
      </div>
      <div id="msg-research" style="display:none" class="flex items-center gap-2 mt-5 rounded-xl px-4 py-2.5 text-sm"></div>
      <button id="save-research"
        class="mt-5 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl text-sm transition-colors shadow-sm cursor-pointer border-0">
        Save Research IDs
      </button>
    </div>
  </div>

  <!-- ── Security Tab ─────────────────────────────────────────────── -->
  <div id="tab-security" class="tab-panel hidden">
    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
      <h2 class="text-sm font-bold text-slate-700 mb-5">Change Password</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Current Password</label>
          <input id="current-pwd" type="password" placeholder="Current password"
            class="w-full text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">New Password</label>
          <input id="new-pwd" type="password" placeholder="New password"
            class="w-full text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition" />
          <div class="mt-2 h-1.5 rounded-full bg-slate-100 overflow-hidden">
            <div id="strength-fill" class="h-full rounded-full transition-all duration-200" style="width:0%"></div>
          </div>
          <div id="strength-label" class="text-xs mt-1 text-slate-400"></div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Confirm New Password</label>
          <input id="confirm-pwd" type="password" placeholder="Confirm new password"
            class="w-full text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition" />
        </div>
      </div>
      <div id="msg-security" style="display:none" class="flex items-center gap-2 mt-5 rounded-xl px-4 py-2.5 text-sm"></div>
      <button id="save-security"
        class="mt-5 w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-60 disabled:cursor-not-allowed text-white font-semibold py-2.5 rounded-xl text-sm transition-colors shadow-sm cursor-pointer border-0">
        Update Password
      </button>
    </div>
  </div>
</main>

<script>
  const WORKER      = "https://morning-mud-283c.moreno-a64.workers.dev";
  const SESSION_KEY = "kerno_session";

  const session = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
  if (!session || Date.now() > new Date(session.expires).getTime()) {
    localStorage.removeItem(SESSION_KEY);
    window.location.href = "index.html?expired=1";
  }

  const authHeaders = () => ({ "Content-Type": "application/json", "X-Session-Token": session.token });

  // Track selected avatar URL
  let selectedAvatarUrl = "";

  // ── Navbar ──────────────────────────────────────────────────────────────────
  (function buildNavbar() {
    const isAdmin = session.role === "admin";
    const link   = `style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid #475569;background:#1e293b;color:#94a3b8;text-decoration:none"`;
    const active = `style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid #2563eb;background:#2563eb;color:#fff;text-decoration:none;display:inline-flex;align-items:center;gap:6px"`;
    document.getElementById("navbar").innerHTML = `
      <div style="background:#0f172a;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <a href="dashboard.html" style="font-size:15px;font-weight:700;color:#fff;text-decoration:none">⚙️ Kerno</a>
        <span style="color:#475569;font-size:12px">›</span>
        <span style="font-size:12px;color:#94a3b8">My Profile</span>
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <a href="kanban.html"   ${link}>📋 Kanban</a>
          <a href="booking.html"  ${link}>📅 Bookings</a>
          <a href="requests.html" ${link}>📝 Requests</a>
          ${isAdmin ? `<a href="users.html"   ${link}>👥 Users</a>` : ""}
          ${isAdmin ? `<a href="pricing.html" ${link}>💰 Pricing</a>` : ""}
          <a href="profile.html" ${active}>
            <span style="width:18px;height:18px;border-radius:50%;background:#1e40af;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff">${session.username[0].toUpperCase()}</span>
            ${session.display_name || session.username}
          </a>
          <button onclick="localStorage.removeItem('${SESSION_KEY}');window.location.href='index.html'"
            style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid #475569;background:#1e293b;color:#94a3b8;cursor:pointer;font-family:inherit">Sign out</button>
        </div>
      </div>`;
  })();

  // ── Avatar grid ──────────────────────────────────────────────────────────────
  const AVATAR_STYLES = [
    "avataaars", "adventurer", "lorelei", "personas", "open-peeps",
    "big-smile", "micah", "notionists", "croodles", "miniavs"
  ];
  const AVATAR_COLORS = [
    "e74c3c", "3498db", "2ecc71", "f39c12", "9b59b6",
    "1abc9c", "e91e63", "ff9800", "607d8b", "00acc1"
  ];

  function avatarUrl(style, seed, bg) {
    return `https://api.dicebear.com/9.x/${style}/svg?seed=${encodeURIComponent(seed)}&backgroundColor=${bg}`;
  }

  function buildAvatarGrid(username, currentUrl) {
    const grid = document.getElementById("avatar-grid");
    grid.innerHTML = "";
    for (let i = 1; i <= 30; i++) {
      const style = AVATAR_STYLES[(i - 1) % 10];
      const bg    = AVATAR_COLORS[(i - 1) % 10];
      const seed  = `${username}-${i}`;
      const url   = avatarUrl(style, seed, bg);
      const isSelected = currentUrl && currentUrl === url;

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "p-0 rounded-xl border-2 cursor-pointer transition-all focus:outline-none " +
        (isSelected ? "border-blue-500" : "border-transparent hover:border-slate-300");
      btn.dataset.url = url;

      const img = document.createElement("img");
      img.src = url;
      img.alt = `Avatar ${i}`;
      img.className = "w-12 h-12 rounded-xl block";

      btn.appendChild(img);
      btn.addEventListener("click", () => {
        // Deselect all
        grid.querySelectorAll("button").forEach(b => {
          b.classList.remove("border-blue-500");
          b.classList.add("border-transparent", "hover:border-slate-300");
        });
        // Select this one
        btn.classList.add("border-blue-500");
        btn.classList.remove("border-transparent", "hover:border-slate-300");

        selectedAvatarUrl = url;
        document.getElementById("custom-avatar-url").value = "";
        updateAvatarPreview(url);
      });

      grid.appendChild(btn);
    }
  }

  function updateAvatarPreview(url) {
    const preview  = document.getElementById("avatar-preview");
    const initials = document.getElementById("avatar-initials");
    if (url) {
      preview.src = url;
      preview.style.display = "block";
      initials.style.display = "none";
    } else {
      preview.style.display = "none";
      initials.style.display = "";
    }
  }

  // Custom avatar URL input
  document.getElementById("custom-avatar-url").addEventListener("input", function () {
    const url = this.value.trim();
    if (url) {
      // Deselect all grid avatars
      document.getElementById("avatar-grid").querySelectorAll("button").forEach(b => {
        b.classList.remove("border-blue-500");
        b.classList.add("border-transparent", "hover:border-slate-300");
      });
      selectedAvatarUrl = url;
      updateAvatarPreview(url);
    } else {
      selectedAvatarUrl = "";
      updateAvatarPreview("");
    }
  });

  // ── Load profile ─────────────────────────────────────────────────────────────
  async function loadProfile() {
    try {
      const res  = await fetch(`${WORKER}/members`, { headers: authHeaders() });
      const list = await res.json();
      const data = (Array.isArray(list) ? list.find(m => m.username === session.username) : null) || {};

      const displayName = data.display_name || data.username || session.username;
      document.getElementById("display-heading").textContent = displayName;
      document.getElementById("username-sub").textContent    = data.username || session.username;
      document.getElementById("avatar-initials").textContent = (data.display_name || data.username || session.username)[0].toUpperCase();
      document.getElementById("display-name").value   = data.display_name  || "";
      document.getElementById("email").value           = data.email         || "";
      document.getElementById("phone").value           = data.phone         || "";
      document.getElementById("orcid-id").value        = data.orcid_id      || "";
      document.getElementById("google-scholar").value  = data.google_scholar || "";
      document.getElementById("linkedin").value        = data.linkedin       || "";
      window._profileId = data.id;

      selectedAvatarUrl = data.avatar_url || "";

      if (selectedAvatarUrl) {
        document.getElementById("avatar-preview").src = selectedAvatarUrl;
        document.getElementById("avatar-preview").style.display = "block";
        document.getElementById("avatar-initials").style.display = "none";
        // If it's a custom URL not matching a grid avatar, populate the custom input
        document.getElementById("custom-avatar-url").value = selectedAvatarUrl;
      }

      buildAvatarGrid(data.username || session.username, selectedAvatarUrl);
    } catch (e) {
      console.error("Failed to load profile", e);
      buildAvatarGrid(session.username, "");
    }
  }
  loadProfile();

  // ── Tabs ─────────────────────────────────────────────────────────────────────
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.add("hidden"));
      document.getElementById(`tab-${tab}`).classList.remove("hidden");
      document.querySelectorAll(".tab-btn").forEach(b => {
        b.classList.remove("border-blue-600", "text-blue-600", "bg-white");
        b.classList.add("border-transparent", "text-slate-500");
      });
      btn.classList.add("border-blue-600", "text-blue-600", "bg-white");
      btn.classList.remove("border-transparent", "text-slate-500");
    });
  });

  // ── Msg helper ───────────────────────────────────────────────────────────────
  function showMsg(id, text, isError) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `flex items-center gap-2 mt-5 rounded-xl px-4 py-2.5 text-sm ${isError
      ? "bg-red-50 border border-red-100 text-red-600"
      : "bg-emerald-50 border border-emerald-200 text-emerald-600"}`;
    el.style.display = "flex";
  }

  // ── Save profile ──────────────────────────────────────────────────────────────
  document.getElementById("save-profile").addEventListener("click", async () => {
    const btn = document.getElementById("save-profile");
    btn.disabled = true; btn.textContent = "Saving…";
    try {
      const body = {
        display_name: document.getElementById("display-name").value.trim() || null,
        email:        document.getElementById("email").value.trim()         || null,
        phone:        document.getElementById("phone").value.trim()         || null,
        avatar_url:   selectedAvatarUrl || null,
      };
      const res  = await fetch(`${WORKER}/members/${window._profileId}`, {
        method: "PUT", headers: authHeaders(), body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.error) return showMsg("msg-profile", data.error, true);
      session.display_name = body.display_name;
      session.avatar_url   = body.avatar_url;
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
      document.getElementById("display-heading").textContent = body.display_name || session.username;
      const newInitial = (body.display_name || session.username)[0].toUpperCase();
      document.getElementById("avatar-initials").textContent = newInitial;
      showMsg("msg-profile", "Profile saved!", false);
    } catch (e) {
      showMsg("msg-profile", e.message, true);
    } finally {
      btn.disabled = false; btn.textContent = "Save Profile";
    }
  });

  // ── Save research IDs ─────────────────────────────────────────────────────────
  document.getElementById("save-research").addEventListener("click", async () => {
    const btn = document.getElementById("save-research");
    btn.disabled = true; btn.textContent = "Saving…";
    try {
      const body = {
        orcid_id:       document.getElementById("orcid-id").value.trim()       || null,
        google_scholar: document.getElementById("google-scholar").value.trim() || null,
        linkedin:       document.getElementById("linkedin").value.trim()       || null,
      };
      const res  = await fetch(`${WORKER}/members/${window._profileId}`, {
        method: "PUT", headers: authHeaders(), body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.error) return showMsg("msg-research", data.error, true);
      showMsg("msg-research", "Research IDs saved!", false);
    } catch (e) {
      showMsg("msg-research", e.message, true);
    } finally {
      btn.disabled = false; btn.textContent = "Save Research IDs";
    }
  });

  // ── Password strength ─────────────────────────────────────────────────────────
  function scorePassword(pwd) {
    if (!pwd) return { score: 0, label: "", color: "" };
    let score = 0;
    if (pwd.length >= 10) score++;
    if (pwd.length >= 14) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[a-z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;
    if (score <= 2) return { score, pct: 20,  label: "Too weak",   color: "#ef4444" };
    if (score <= 3) return { score, pct: 40,  label: "Weak",       color: "#f97316" };
    if (score <= 4) return { score, pct: 65,  label: "Fair",       color: "#eab308" };
    if (score <= 5) return { score, pct: 85,  label: "Strong",     color: "#22c55e" };
    return             { score, pct: 100, label: "Very strong", color: "#16a34a" };
  }

  document.getElementById("new-pwd").addEventListener("input", e => {
    const { pct, label, color } = scorePassword(e.target.value);
    const fill = document.getElementById("strength-fill");
    const lbl  = document.getElementById("strength-label");
    fill.style.width      = e.target.value ? `${pct}%` : "0%";
    fill.style.background = color;
    lbl.textContent       = label;
    lbl.style.color       = color || "#94a3b8";
  });

  async function sha256(message) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(message));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  document.getElementById("save-security").addEventListener("click", async () => {
    const current = document.getElementById("current-pwd").value;
    const newPwd  = document.getElementById("new-pwd").value;
    const confirm = document.getElementById("confirm-pwd").value;

    if (!current || !newPwd || !confirm) return showMsg("msg-security", "Please fill in all fields.", true);
    const { score } = scorePassword(newPwd);
    if (score <= 2) return showMsg("msg-security", "Password is too weak. Use 10+ characters with uppercase, lowercase, numbers and a special character.", true);
    if (newPwd !== confirm) return showMsg("msg-security", "New passwords do not match.", true);

    const btn = document.getElementById("save-security");
    btn.disabled = true; btn.textContent = "Updating…";

    const loginRes = await fetch(`${WORKER}/login`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: session.username, password: current }),
    }).then(r => r.json());

    if (loginRes.error) {
      btn.disabled = false; btn.textContent = "Update Password";
      return showMsg("msg-security", "Current password is incorrect.", true);
    }

    const updateRes = await fetch(`${WORKER}/members/${window._profileId}`, {
      method: "PUT", headers: authHeaders(),
      body: JSON.stringify({ password: newPwd }),
    }).then(r => r.json());

    btn.disabled = false; btn.textContent = "Update Password";
    if (updateRes.error) return showMsg("msg-security", "Failed to update password: " + updateRes.error, true);
    showMsg("msg-security", "Password updated successfully!", false);
    document.getElementById("current-pwd").value = "";
    document.getElementById("new-pwd").value     = "";
    document.getElementById("confirm-pwd").value = "";
  });
</script>
</body>
</html>
