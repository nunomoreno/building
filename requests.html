<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerno — Requests</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen bg-slate-50">
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect } = React;

  const WORKER      = "https://morning-mud-283c.moreno-a64.workers.dev";
  const SESSION_KEY = "kerno_session";

  // ── Session ────────────────────────────────────────────────────────────────
  function getSession() {
    const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
    if (!s || Date.now() > new Date(s.expires).getTime()) {
      localStorage.removeItem(SESSION_KEY);
      window.location.href = "index.html?expired=1";
      return null;
    }
    return s;
  }

  const authHeaders = () => ({
    "Content-Type": "application/json",
    "X-Session-Token": getSession()?.token || "",
  });

  const apiFetch = async (path, opts = {}) => {
    const res = await fetch(`${WORKER}${path}`, {
      ...opts, headers: { ...authHeaders(), ...(opts.headers || {}) },
    });
    if (res.status === 401) { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html?expired=1"; return null; }
    return res.json().catch(() => ({}));
  };

  const api = {
    getRequestTypes:  ()         => apiFetch("/settings/request-types"),
    saveRequestTypes: (val)      => apiFetch("/settings/request-types", { method: "POST", body: JSON.stringify(val) }),
    getRequests:      ()         => apiFetch("/requests"),
    submitRequest:    (body)     => apiFetch("/requests", { method: "POST", body: JSON.stringify(body) }),
    reviewRequest:    (id, body) => apiFetch(`/requests/${id}`, { method: "PUT", body: JSON.stringify(body) }),
  };

  const STATUS_CLASSES = {
    pending:  "bg-amber-50 text-amber-600 border border-amber-200",
    approved: "bg-emerald-50 text-emerald-600 border border-emerald-200",
    rejected: "bg-red-50 text-red-500 border border-red-100",
  };

  const CARD_BORDER = {
    pending:  "border-amber-200",
    approved: "border-slate-200",
    rejected: "border-slate-200",
  };

  // ── Navbar ─────────────────────────────────────────────────────────────────
  function Navbar({ user }) {
    const logout  = () => { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html"; };
    const isAdmin = user.role === "admin";
    const link    = "text-xs px-3 py-1.5 rounded-lg border border-slate-600 bg-slate-800 text-slate-300 hover:text-white hover:border-slate-400 transition no-underline";
    const active  = "text-xs px-3 py-1.5 rounded-lg border border-blue-500 bg-blue-600 text-white no-underline";
    return (
      <div className="bg-slate-900 px-4 sm:px-6 py-3 flex items-center gap-3 flex-wrap">
        <a href="dashboard.html" className="text-base font-bold text-white no-underline mr-1">⚙️ Kerno</a>
        <span className="text-slate-600 text-xs hidden sm:inline">›</span>
        <span className="text-slate-400 text-xs hidden sm:inline">Requests</span>
        <div className="ml-auto flex items-center gap-2 flex-wrap">
          <a href="kanban.html"   className={link}>📋 Kanban</a>
          <a href="booking.html"  className={link}>📅 Bookings</a>
          <a href="requests.html" className={active}>📝 Requests</a>
          {isAdmin && <a href="users.html" className={link}>👥 Users</a>}
          <span className="text-xs text-slate-500 flex items-center gap-1.5">
            <span className="w-6 h-6 rounded-full bg-slate-700 flex items-center justify-center text-xs font-bold text-slate-200">{user.username[0].toUpperCase()}</span>
            {user.username}
            {isAdmin && <span className="text-[10px] bg-blue-600 text-white rounded-full px-1.5 py-0.5 font-semibold">admin</span>}
          </span>
          <a href="profile.html" className={link}>🔑 Password</a>
          <button onClick={logout} className="text-xs px-3 py-1.5 rounded-lg border border-slate-600 bg-slate-800 text-slate-300 hover:text-white hover:border-slate-400 transition cursor-pointer font-sans">Sign out</button>
        </div>
      </div>
    );
  }

  // ── Options tag editor ─────────────────────────────────────────────────────
  function OptionsEditor({ options, onChange }) {
    const [input, setInput] = useState("");
    const add = () => {
      const v = input.trim();
      if (!v || options.includes(v)) return;
      onChange([...options, v]); setInput("");
    };
    return (
      <div className="mt-2">
        <div className="flex flex-wrap gap-1.5 mb-2">
          {options.map(o => (
            <span key={o} className="inline-flex items-center gap-1 text-xs bg-blue-50 text-blue-600 border border-blue-200 rounded-full px-2.5 py-0.5">
              {o}
              <button onMouseDown={() => onChange(options.filter(x => x !== o))}
                className="text-blue-300 hover:text-blue-500 leading-none cursor-pointer bg-transparent border-0 p-0">×</button>
            </span>
          ))}
        </div>
        <div className="flex gap-2">
          <input value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" || e.key === ",") { e.preventDefault(); add(); }}}
            placeholder="Type option, press Enter…"
            className="flex-1 text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
          <button onMouseDown={add}
            className="text-xs px-3 py-1.5 rounded-lg bg-blue-600 text-white border-0 cursor-pointer">Add</button>
        </div>
      </div>
    );
  }

  // ── Field renderer ─────────────────────────────────────────────────────────
  function FieldInput({ field, value, onChange, disabled }) {
    const inputCls = "w-full text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition disabled:bg-slate-50 disabled:text-slate-400";

    if (field.type === "dropdown") return (
      <select value={value || ""} onChange={e => onChange(e.target.value)} disabled={disabled} className={inputCls}>
        <option value="">Select…</option>
        {(field.options || []).map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    );

    if (field.type === "multiselect") {
      const selected = Array.isArray(value) ? value : [];
      return (
        <div className="flex flex-wrap gap-2">
          {(field.options || []).map(o => {
            const on = selected.includes(o);
            return (
              <button key={o} type="button" disabled={disabled}
                onClick={() => onChange(on ? selected.filter(x => x !== o) : [...selected, o])}
                className={`text-sm px-3.5 py-1.5 rounded-full border transition font-medium cursor-pointer ${on ? "border-blue-500 bg-blue-50 text-blue-600" : "border-slate-200 bg-white text-slate-500 hover:border-slate-300"}`}>
                {o}
              </button>
            );
          })}
        </div>
      );
    }

    return (
      <input value={value || ""} onChange={e => onChange(e.target.value)} disabled={disabled} className={inputCls} />
    );
  }

  // ── Submit form ────────────────────────────────────────────────────────────
  function RequestForm({ user, requestTypes, onSubmitted }) {
    const typeKeys = Object.keys(requestTypes || {});
    const [type,    setType]    = useState(typeKeys[0] || "");
    const [meta,    setMeta]    = useState({});
    const [notes,   setNotes]   = useState("");
    const [saving,  setSaving]  = useState(false);
    const [success, setSuccess] = useState(false);
    const [error,   setError]   = useState(null);

    const typeConfig = requestTypes?.[type];
    const fields     = typeConfig?.fields || [];

    const handleTypeChange = (t) => { setType(t); setMeta({}); setError(null); };

    const submit = async () => {
      setError(null);
      for (const f of fields) {
        const v = meta[f.id];
        if (!v || (Array.isArray(v) && v.length === 0) || v === "") {
          setError(`Please fill in "${f.label}"`); return;
        }
      }
      setSaving(true);
      const res = await api.submitRequest({ type, metadata: meta, notes, email: user.email || null });
      setSaving(false);
      if (res?.error) { setError(res.error); return; }
      setSuccess(true);
      setTimeout(() => { setSuccess(false); setMeta({}); setNotes(""); onSubmitted(); }, 2500);
    };

    return (
      <div className="max-w-xl mx-auto bg-white rounded-2xl border border-slate-200 shadow-sm p-8">
        <h2 className="text-base font-bold text-slate-900 mb-1">New Request</h2>
        <p className="text-sm text-slate-400 mb-6">Submit a service request to the platforms team.</p>

        {/* Type selector */}
        <div className="flex gap-2 flex-wrap mb-6">
          {typeKeys.map(k => (
            <button key={k} onClick={() => handleTypeChange(k)}
              className={`text-sm px-4 py-1.5 rounded-full border transition font-medium cursor-pointer ${type === k ? "border-blue-500 bg-blue-50 text-blue-600 font-semibold" : "border-slate-200 bg-white text-slate-500 hover:border-slate-300"}`}>
              {requestTypes[k].label}
            </button>
          ))}
        </div>

        {/* Dynamic fields */}
        <div className="space-y-4">
          {fields.map(f => (
            <div key={f.id}>
              <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">{f.label}</label>
              <FieldInput field={f} value={meta[f.id]} onChange={v => setMeta({ ...meta, [f.id]: v })} disabled={saving} />
            </div>
          ))}

          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Additional Notes</label>
            <textarea value={notes} onChange={e => setNotes(e.target.value)} disabled={saving} rows={3}
              placeholder="Any additional context, deadlines, or special requirements…"
              className="w-full text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-y disabled:bg-slate-50" />
          </div>
        </div>

        {error   && <div className="flex items-center gap-2 mt-4 bg-red-50 border border-red-100 rounded-xl px-4 py-2.5 text-sm text-red-600">⚠ {error}</div>}
        {success && <div className="flex items-center gap-2 mt-4 bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-2.5 text-sm text-emerald-600">✅ Request submitted successfully!</div>}

        <button onClick={submit} disabled={saving || success}
          className="mt-5 w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-60 disabled:cursor-not-allowed text-white font-semibold py-2.5 rounded-xl text-sm transition-colors shadow-sm cursor-pointer">
          {saving ? "Submitting…" : "Submit Request"}
        </button>
      </div>
    );
  }

  // ── My requests ────────────────────────────────────────────────────────────
  function MyRequests({ requests, requestTypes }) {
    if (!requests.length) return (
      <div className="text-center py-16 text-slate-400 text-sm">You haven't submitted any requests yet.</div>
    );

    return (
      <div className="space-y-3 max-w-xl mx-auto">
        {requests.map(r => {
          const typeLabel = requestTypes?.[r.type]?.label || r.type;
          const fields    = requestTypes?.[r.type]?.fields || [];
          return (
            <div key={r.id} className={`bg-white border rounded-2xl p-5 ${CARD_BORDER[r.status] || "border-slate-200"}`}>
              <div className="flex items-start justify-between gap-3 mb-3">
                <div>
                  <span className="text-sm font-bold text-slate-900">{typeLabel}</span>
                  <span className="text-xs text-slate-400 ml-2">{new Date(r.created_at).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" })}</span>
                </div>
                <span className={`text-[10px] font-semibold rounded-full px-2.5 py-0.5 capitalize shrink-0 ${STATUS_CLASSES[r.status] || "bg-slate-100 text-slate-500"}`}>{r.status}</span>
              </div>
              <div className="flex flex-wrap gap-x-4 gap-y-1 text-xs text-slate-500">
                {fields.map(f => {
                  const v = r.metadata?.[f.id];
                  if (!v || (Array.isArray(v) && !v.length)) return null;
                  return <span key={f.id}><strong className="text-slate-700">{f.label}:</strong> {Array.isArray(v) ? v.join(", ") : v}</span>;
                })}
              </div>
              {r.notes && <p className="text-xs text-slate-400 mt-2">{r.notes}</p>}
              {r.reviewed_by && <p className="text-xs text-slate-400 mt-2">Reviewed by <strong>{r.reviewed_by}</strong> · {new Date(r.reviewed_at).toLocaleDateString("en-GB")}</p>}
            </div>
          );
        })}
      </div>
    );
  }

  // ── Admin queue ────────────────────────────────────────────────────────────
  function AdminQueue({ requests, requestTypes, onRefresh }) {
    const [filter,    setFilter]    = useState("pending");
    const [reviewing, setReviewing] = useState(null);
    const [reason,    setReason]    = useState("");
    const [saving,    setSaving]    = useState(false);
    const [error,     setError]     = useState(null);

    const visible = requests.filter(r => filter === "all" ? true : r.status === filter);

    const review = async (status) => {
      setSaving(true); setError(null);
      const res = await api.reviewRequest(reviewing.id, { status, rejection_reason: reason });
      setSaving(false);
      if (res?.error) { setError(res.error); return; }
      setReviewing(null); setReason(""); onRefresh();
    };

    const filterLabels = ["pending", "approved", "rejected", "all"];

    return (
      <div className="max-w-2xl mx-auto">
        {/* Filter tabs */}
        <div className="flex gap-2 flex-wrap mb-5">
          {filterLabels.map(f => {
            const count = requests.filter(r => r.status === f).length;
            return (
              <button key={f} onClick={() => setFilter(f)}
                className={`text-xs px-3.5 py-1.5 rounded-full border transition font-medium cursor-pointer capitalize flex items-center gap-1.5 ${filter === f ? "border-blue-500 bg-blue-50 text-blue-600 font-semibold" : "border-slate-200 bg-white text-slate-500 hover:border-slate-300"}`}>
                {f}
                {f !== "all" && <span className={`text-[10px] rounded-full px-1.5 py-0.5 font-bold ${filter === f ? "bg-blue-600 text-white" : "bg-slate-100 text-slate-400"}`}>{count}</span>}
              </button>
            );
          })}
        </div>

        {visible.length === 0 && (
          <div className="text-center py-16 text-slate-400 text-sm">No {filter === "all" ? "" : filter} requests.</div>
        )}

        <div className="space-y-3">
          {visible.map(r => {
            const typeLabel = requestTypes?.[r.type]?.label || r.type;
            const fields    = requestTypes?.[r.type]?.fields || [];
            return (
              <div key={r.id} className={`bg-white border rounded-2xl p-5 ${CARD_BORDER[r.status] || "border-slate-200"}`}>
                <div className="flex items-start justify-between gap-3 mb-3">
                  <div>
                    <span className="text-sm font-bold text-slate-900">{typeLabel}</span>
                    <span className="text-xs text-slate-500 ml-2">by <strong>{r.username}</strong></span>
                    <span className="text-xs text-slate-400 ml-2">{new Date(r.created_at).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" })}</span>
                  </div>
                  <span className={`text-[10px] font-semibold rounded-full px-2.5 py-0.5 capitalize shrink-0 ${STATUS_CLASSES[r.status] || "bg-slate-100 text-slate-500"}`}>{r.status}</span>
                </div>

                <div className="flex flex-col gap-1 text-xs text-slate-500 mb-3">
                  {fields.map(f => {
                    const v = r.metadata?.[f.id];
                    if (!v || (Array.isArray(v) && !v.length)) return null;
                    return <div key={f.id}><strong className="text-slate-700">{f.label}:</strong> {Array.isArray(v) ? v.join(", ") : v}</div>;
                  })}
                  {r.notes && <div><strong className="text-slate-700">Notes:</strong> {r.notes}</div>}
                  {r.email  && <div className="text-slate-400">📧 {r.email}</div>}
                </div>

                {r.status === "pending" && (
                  reviewing?.id === r.id ? (
                    <div className="mt-2 p-4 bg-slate-50 rounded-xl border border-slate-200">
                      <textarea value={reason} onChange={e => setReason(e.target.value)} rows={2}
                        placeholder="Rejection reason (optional)…"
                        className="w-full text-xs px-3 py-2 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 resize-none mb-3" />
                      {error && <div className="text-xs text-red-600 mb-2">⚠ {error}</div>}
                      <div className="flex gap-2">
                        <button onClick={() => review("approved")} disabled={saving}
                          className="flex-1 text-xs py-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white font-semibold border-0 cursor-pointer disabled:opacity-60">
                          {saving ? "…" : "✅ Approve"}
                        </button>
                        <button onClick={() => review("rejected")} disabled={saving}
                          className="flex-1 text-xs py-2 rounded-lg bg-red-500 hover:bg-red-600 text-white font-semibold border-0 cursor-pointer disabled:opacity-60">
                          {saving ? "…" : "❌ Reject"}
                        </button>
                        <button onClick={() => { setReviewing(null); setReason(""); setError(null); }}
                          className="text-xs px-3 py-2 rounded-lg bg-white border border-slate-200 text-slate-500 cursor-pointer hover:border-slate-300">Cancel</button>
                      </div>
                    </div>
                  ) : (
                    <button onClick={() => { setReviewing(r); setReason(""); setError(null); }}
                      className="text-xs px-4 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold border-0 cursor-pointer mt-1 transition">
                      Review →
                    </button>
                  )
                )}

                {r.reviewed_by && (
                  <p className="text-xs text-slate-400 mt-3">Reviewed by <strong>{r.reviewed_by}</strong> · {new Date(r.reviewed_at).toLocaleDateString("en-GB")}</p>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Admin config panel ─────────────────────────────────────────────────────
  function ConfigPanel({ requestTypes, onSaved }) {
    const [types,   setTypes]   = useState(() => JSON.parse(JSON.stringify(requestTypes || {})));
    const [selType, setSelType] = useState(Object.keys(requestTypes || {})[0] || "");
    const [saving,  setSaving]  = useState(false);
    const [newKey,  setNewKey]  = useState("");

    const cfg    = types[selType] || { label: "", approver_role: "admin", fields: [] };
    const setcfg = (c) => setTypes({ ...types, [selType]: c });

    const addType = () => {
      const k = newKey.trim().toLowerCase().replace(/\s+/g, "_");
      if (!k || types[k]) return;
      setTypes({ ...types, [k]: { label: newKey.trim(), approver_role: "admin", fields: [] } });
      setSelType(k); setNewKey("");
    };

    const addField = () => setcfg({ ...cfg, fields: [...cfg.fields, { id: `f${Date.now()}`, label: "New Field", type: "text", options: [] }] });
    const updField = (id, key, val) => setcfg({ ...cfg, fields: cfg.fields.map(f => f.id === id ? { ...f, [key]: val } : f) });
    const delField = (id) => setcfg({ ...cfg, fields: cfg.fields.filter(f => f.id !== id) });

    const save = async () => {
      setSaving(true);
      await api.saveRequestTypes(types);
      setSaving(false); onSaved(types);
    };

    const inputCls = "w-full text-sm px-3.5 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition";

    return (
      <div className="max-w-2xl mx-auto bg-white rounded-2xl border border-slate-200 shadow-sm p-8">
        <h2 className="text-base font-bold text-slate-900 mb-5">⚙️ Configure Request Types</h2>

        {/* Type selector */}
        <div className="flex gap-2 flex-wrap mb-6">
          {Object.keys(types).map(k => (
            <button key={k} onClick={() => setSelType(k)}
              className={`text-xs px-3.5 py-1.5 rounded-full border transition cursor-pointer capitalize ${selType === k ? "border-blue-500 bg-blue-50 text-blue-600 font-semibold" : "border-slate-200 bg-white text-slate-500 hover:border-slate-300"}`}>
              {types[k].label || k}
            </button>
          ))}
          <div className="flex gap-1.5">
            <input value={newKey} onChange={e => setNewKey(e.target.value)} placeholder="New type…"
              className="text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 w-28"
              onKeyDown={e => e.key === "Enter" && addType()} />
            <button onClick={addType} className="text-xs px-3 py-1.5 rounded-lg bg-blue-600 text-white border-0 cursor-pointer">+</button>
          </div>
        </div>

        {selType && (
          <>
            <div className="grid grid-cols-2 gap-4 mb-5">
              <div>
                <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Label</label>
                <input value={cfg.label} onChange={e => setcfg({ ...cfg, label: e.target.value })} className={inputCls} />
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Approver Role</label>
                <input value={cfg.approver_role} onChange={e => setcfg({ ...cfg, approver_role: e.target.value })} className={inputCls} />
              </div>
            </div>

            <div className="flex items-center justify-between mb-3">
              <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Fields</span>
              <button onClick={addField} className="text-xs px-3 py-1.5 rounded-lg bg-blue-600 text-white border-0 cursor-pointer">+ Add field</button>
            </div>

            <div className="space-y-2 mb-5">
              {cfg.fields.map(f => (
                <div key={f.id} className="bg-slate-50 border border-slate-200 rounded-xl p-3">
                  <div className="flex gap-2 mb-2">
                    <input value={f.label} onChange={e => updField(f.id, "label", e.target.value)} placeholder="Label"
                      className="flex-1 text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500" />
                    <select value={f.type} onChange={e => updField(f.id, "type", e.target.value)}
                      className="text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500">
                      <option value="text">Text</option>
                      <option value="dropdown">Dropdown</option>
                      <option value="multiselect">Multiselect</option>
                    </select>
                    <button onClick={() => delField(f.id)}
                      className="text-xs px-2.5 py-1.5 rounded-lg border border-red-100 bg-red-50 text-red-500 cursor-pointer hover:bg-red-100">✕</button>
                  </div>
                  {(f.type === "dropdown" || f.type === "multiselect") && (
                    <OptionsEditor options={f.options || []} onChange={opts => updField(f.id, "options", opts)} />
                  )}
                </div>
              ))}
            </div>
          </>
        )}

        <button onClick={save} disabled={saving}
          className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white font-semibold py-2.5 rounded-xl text-sm transition-colors shadow-sm cursor-pointer border-0">
          {saving ? "Saving…" : "Save Configuration"}
        </button>
      </div>
    );
  }

  // ── App ────────────────────────────────────────────────────────────────────
  function App() {
    const [user] = useState(() => {
      const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
      if (!s || Date.now() > new Date(s.expires).getTime()) {
        localStorage.removeItem(SESSION_KEY); window.location.href = "index.html?expired=1"; return null;
      }
      return { username: s.username, role: s.role, token: s.token };
    });

    const [tab,          setTab]          = useState("submit");
    const [requestTypes, setRequestTypes] = useState({});
    const [requests,     setRequests]     = useState([]);
    const [loading,      setLoading]      = useState(true);
    const [loadError,    setLoadError]    = useState(null);

    const isAdmin = user?.role === "admin";

    const loadAll = async () => {
      setLoadError(null);
      try {
        const [types, reqs] = await Promise.all([api.getRequestTypes(), api.getRequests()]);
        setRequestTypes(types && typeof types === "object" && !types.error ? types : {});
        setRequests(Array.isArray(reqs) ? reqs : []);
      } catch { setLoadError("Could not load data. Please refresh."); }
      setLoading(false);
    };

    useEffect(() => { if (user) loadAll(); else setLoading(false); }, []);

    if (!user)     return null;
    if (loading)   return <div className="p-8 text-slate-400 text-sm">Loading…</div>;
    if (loadError) return (
      <div className="p-8 flex flex-col gap-3 items-start">
        <div className="text-red-500 text-sm">{loadError}</div>
        <button onClick={loadAll} className="text-sm px-4 py-2 rounded-xl bg-blue-600 text-white border-0 cursor-pointer">Retry</button>
      </div>
    );

    const myRequests   = requests.filter(r => r.username === user.username);
    const pendingCount = requests.filter(r => r.status === "pending").length;

    const tabs = [
      { key: "submit", label: "📝 New Request" },
      { key: "mine",   label: `My Requests${myRequests.length ? ` (${myRequests.length})` : ""}` },
      ...(isAdmin ? [
        { key: "queue",  label: `📥 Review Queue${pendingCount ? ` · ${pendingCount} pending` : ""}` },
        { key: "config", label: "⚙️ Configure" },
      ] : []),
    ];

    return (
      <div className="min-h-screen bg-slate-50 font-sans">
        <Navbar user={user} />

        {/* Tab bar */}
        <div className="bg-white border-b border-slate-200 px-4 sm:px-6 flex gap-0 overflow-x-auto">
          {tabs.map(t => (
            <button key={t.key} onClick={() => setTab(t.key)}
              className={`text-sm px-5 py-3.5 border-b-2 whitespace-nowrap transition cursor-pointer bg-transparent font-sans ${tab === t.key ? "border-blue-600 text-blue-600 font-semibold" : "border-transparent text-slate-500 hover:text-slate-700"}`}>
              {t.label}
            </button>
          ))}
        </div>

        {/* Content */}
        <div className="max-w-3xl mx-auto px-4 sm:px-6 py-8">
          {tab === "submit" && <RequestForm user={user} requestTypes={requestTypes} onSubmitted={() => { loadAll(); setTab("mine"); }} />}
          {tab === "mine"   && <MyRequests requests={myRequests} requestTypes={requestTypes} />}
          {tab === "queue"  && isAdmin && <AdminQueue requests={requests} requestTypes={requestTypes} onRefresh={loadAll} />}
          {tab === "config" && isAdmin && <ConfigPanel requestTypes={requestTypes} onSaved={(t) => setRequestTypes(t)} />}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
