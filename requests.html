<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerno — Requests</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>if (typeof marked !== 'undefined') marked.use({ gfm: true });</script>
  <style>
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    /* ── Button system ───────────────────────────────────────────────── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:1px solid transparent;border-radius:8px;font-weight:500;line-height:1.2;transition:background .12s,border-color .12s;font-family:inherit;white-space:nowrap}
    .btn:disabled,.btn[disabled]{opacity:.55;cursor:not-allowed;pointer-events:none}
    .btn-xs{font-size:11px;padding:4px 10px} .btn-sm{font-size:12px;padding:6px 13px}
    .btn-md{font-size:13px;padding:9px 18px;font-weight:600} .btn-block{width:100%;justify-content:center}
    .btn-primary{background:#2563eb;color:#fff} .btn-primary:hover{background:#1d4ed8}
    .btn-secondary{background:#fff;color:#475569;border-color:#e2e8f0} .btn-secondary:hover{background:#f8fafc;border-color:#cbd5e1}
    .btn-danger{background:#fef2f2;color:#dc2626;border-color:#fecaca} .btn-danger:hover{background:#fee2e2;border-color:#fca5a5}
    .btn-danger-fill{background:#dc2626;color:#fff} .btn-danger-fill:hover{background:#b91c1c}
    .btn-warning{background:#fffbeb;color:#b45309;border-color:#fde68a} .btn-warning:hover{background:#fef3c7}
    .btn-success{background:#059669;color:#fff} .btn-success:hover{background:#047857}
    .btn-violet{background:#7c3aed;color:#fff} .btn-violet:hover{background:#6d28d9}
    .md-content h1{font-size:1.15em;font-weight:700;margin-bottom:.4em}
    .md-content h2{font-size:1em;font-weight:700;margin-bottom:.3em}
    .md-content p{margin-bottom:.5em} .md-content ul{list-style-type:disc;padding-left:1.4em;margin-bottom:.5em} .md-content ol{list-style-type:decimal;padding-left:1.4em;margin-bottom:.5em} .md-content li{margin-bottom:.2em}
    .md-content code{background:#f1f5f9;padding:1px 4px;border-radius:3px;font-size:.85em}
    .md-content strong{font-weight:700} mark{background:#fef08a;padding:1px 2px;border-radius:2px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef, useLayoutEffect } = React;

  const WORKER      = "https://morning-mud-283c.moreno-a64.workers.dev";
  const SESSION_KEY = "kerno_session";

  // ── Session ────────────────────────────────────────────────────────────────
  function getSession() {
    const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
    if (!s || Date.now() > new Date(s.expires).getTime()) {
      localStorage.removeItem(SESSION_KEY);
      window.location.href = "index.html?expired=1";
      return null;
    }
    return s;
  }

  const authHeaders = () => ({
    "Content-Type": "application/json",
    "X-Session-Token": getSession()?.token || "",
  });

  const apiFetch = async (path, opts = {}) => {
    const res = await fetch(`${WORKER}${path}`, {
      ...opts, headers: { ...authHeaders(), ...(opts.headers || {}) },
    });
    if (res.status === 401) { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html?expired=1"; return null; }
    return res.json().catch(() => ({}));
  };

  const api = {
    getRequestTypes:  ()         => apiFetch("/settings/request-types"),
    saveRequestTypes: (val)      => apiFetch("/settings/request-types", { method: "POST", body: JSON.stringify(val) }),
    getRequests:      ()         => apiFetch("/requests"),
    getProjects:      ()         => apiFetch("/projects"),
    submitRequest:    (body)     => apiFetch("/requests", { method: "POST", body: JSON.stringify(body) }),
    reviewRequest:    (id, body) => apiFetch(`/requests/${id}`, { method: "PUT", body: JSON.stringify(body) }),
    getPricing:       ()         => apiFetch("/settings/pricing"),
    getGrants:        ()         => apiFetch("/grants"),
    getDomains:       ()         => apiFetch("/domains"),
  };

  const STATUS_CLASSES = {
    pending:  "bg-amber-50 text-amber-600 border border-amber-200",
    approved: "bg-emerald-50 text-emerald-600 border border-emerald-200",
    rejected: "bg-red-50 text-red-500 border border-red-100",
  };

  const CARD_BORDER = {
    pending:  "border-amber-200",
    approved: "border-slate-200",
    rejected: "border-slate-200",
  };

  // ── Navbar ─────────────────────────────────────────────────────────────────
  function Navbar({ user }) {
    const [menuOpen, setMenuOpen] = React.useState(false);
    const logout  = () => { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html"; };
    const isAdmin = user.role === "admin";
    React.useEffect(() => {
      if (!menuOpen) return;
      const h = () => setMenuOpen(false);
      document.addEventListener("click", h);
      return () => document.removeEventListener("click", h);
    }, [menuOpen]);
    const nav  = "text-xs px-3.5 py-1.5 rounded-full border border-slate-700 text-slate-300 hover:text-white hover:border-slate-500 transition no-underline";
    const navA = "text-xs px-3.5 py-1.5 rounded-full bg-blue-600 border border-blue-500 text-white no-underline";
    const drop = "flex items-center gap-2 px-3 py-2 text-xs text-slate-300 hover:bg-slate-700 hover:text-white no-underline transition-colors";
    return (
      <div className="bg-slate-900 px-4 sm:px-6 py-3 flex items-center gap-3">
        <a href="dashboard.html" className="text-base font-bold text-white no-underline mr-1">⚙️ Kerno</a>
        <span className="text-slate-600 text-xs hidden sm:inline">›</span>
        <span className="text-slate-400 text-xs hidden sm:inline">Requests</span>
        <div className="ml-auto flex items-center gap-2">
          <a href="kanban.html"   className={`${nav} hidden sm:inline-flex`}>📋 Kanban</a>
          <a href="booking.html"  className={`${nav} hidden sm:inline-flex`}>📅 Bookings</a>
          <a href="requests.html" className={`${navA} hidden sm:inline-flex`}>📝 Requests</a>
          <div className="relative" onClick={e => e.stopPropagation()}>
            <button onClick={() => setMenuOpen(o => !o)}
              className="flex items-center gap-1.5 text-xs px-3.5 py-1.5 rounded-full border border-slate-700 text-slate-300 hover:text-white hover:border-slate-500 transition cursor-pointer font-[inherit]">
              {user.avatar_url
                ? <img src={user.avatar_url} className="w-5 h-5 rounded-full object-cover" alt="" />
                : <span className="w-5 h-5 rounded-full bg-slate-600 flex items-center justify-center text-[10px] font-bold text-slate-200">{user.username[0].toUpperCase()}</span>}
              <span className="hidden sm:inline">{user.display_name || user.username}</span>
              {isAdmin && <span className="text-[9px] bg-blue-600 text-white rounded-full px-1.5 py-0.5 font-semibold hidden sm:inline">admin</span>}
              <span className="text-[10px] text-slate-500">▾</span>
            </button>
            {menuOpen && (
              <div className="absolute right-0 top-full mt-1 w-48 bg-slate-800 border border-slate-700 rounded-xl shadow-xl z-50 overflow-hidden">
                <a href="profile.html" className={drop}>👤 My Profile</a>
                <a href="guide.html"   className={drop}>📖 User Guide</a>
                <div className="border-t border-slate-700 sm:hidden" />
                <a href="kanban.html"   className={`${drop} sm:hidden`}>📋 Kanban</a>
                <a href="booking.html"  className={`${drop} sm:hidden`}>📅 Bookings</a>
                <a href="requests.html" className={`${drop} sm:hidden`}>📝 Requests</a>
                {isAdmin && <div className="border-t border-slate-700" />}
                {isAdmin && <a href="users.html"   className={drop}>👥 Users & Groups</a>}
                {isAdmin && <a href="pricing.html" className={drop}>💰 Pricing</a>}
                {isAdmin && <a href="grants.html"  className={drop}>🏛 Grants</a>}
                {isAdmin && <a href="domains.html" className={drop}>🗂 Domains</a>}
              </div>
            )}
          </div>
          <button onClick={logout} className="text-xs px-3.5 py-1.5 rounded-full border border-slate-700 text-slate-300 hover:text-white hover:border-slate-500 transition cursor-pointer font-[inherit]">Sign out</button>
        </div>
      </div>
    );
  }

  // ── Markdown editor ────────────────────────────────────────────────────────
  function MdEditor({ value, onChange, placeholder, rows = 4 }) {
    const [preview, setPreview] = useState(false);
    const ref = React.useRef(null);
    const b = "flex items-center justify-center min-w-[22px] h-[22px] px-1 rounded hover:bg-slate-200 cursor-pointer text-slate-500 hover:text-slate-800 border-none bg-transparent font-sans transition-colors text-[11px] select-none";
    const sep = <span style={{width:1,height:12,background:"#e2e8f0",margin:"0 2px",display:"inline-block",alignSelf:"center"}}/>;

    const wrap = (before, after, ph) => {
      const el = ref.current; if (!el) return;
      const s = el.selectionStart, e = el.selectionEnd;
      const sel = value.slice(s, e) || ph || "";
      onChange(value.slice(0, s) + before + sel + after + value.slice(e));
      requestAnimationFrame(() => { el.focus(); el.setSelectionRange(s + before.length, s + before.length + sel.length); });
    };
    const line = (prefix) => {
      const el = ref.current; if (!el) return;
      const pos = el.selectionStart;
      const ls = value.lastIndexOf('\n', pos - 1) + 1;
      const has = value.slice(ls).startsWith(prefix);
      onChange(has ? value.slice(0, ls) + value.slice(ls + prefix.length) : value.slice(0, ls) + prefix + value.slice(ls));
      requestAnimationFrame(() => el.focus());
    };
    const md = e => e.preventDefault();
    const html = () => typeof marked !== 'undefined'
      ? marked.parse((value || "").replace(/==(.+?)==/g, '<mark>$1</mark>'))
      : (value || "");

    return (
      <div style={{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:1,background:"#f8fafc",padding:"3px 4px",borderBottom:"1px solid #e2e8f0"}}>
          <button className={b} title="Bold"          onMouseDown={e=>{md(e);wrap("**","**","bold")}}><strong>B</strong></button>
          <button className={b} title="Italic"        onMouseDown={e=>{md(e);wrap("_","_","italic")}} style={{fontStyle:"italic"}}>I</button>
          <button className={b} title="Strikethrough" onMouseDown={e=>{md(e);wrap("~~","~~","text")}} style={{textDecoration:"line-through"}}>S</button>
          {sep}
          <button className={b} title="Heading 1"    onMouseDown={e=>{md(e);line("# ")}}  style={{fontWeight:700}}>H1</button>
          <button className={b} title="Heading 2"    onMouseDown={e=>{md(e);line("## ")}} style={{fontWeight:700,fontSize:10}}>H2</button>
          {sep}
          <button className={b} title="Bullet list"   onMouseDown={e=>{md(e);line("- ")}}  style={{letterSpacing:-1}}>• —</button>
          <button className={b} title="Numbered list" onMouseDown={e=>{md(e);line("1. ")}} style={{letterSpacing:-1}}>1. —</button>
          {sep}
          <button className={b} title="Inline code"  onMouseDown={e=>{md(e);wrap("`","`","code")}} style={{fontFamily:"monospace",fontWeight:600}}>&lt;/&gt;</button>
          <button className={b} title="Blockquote"   onMouseDown={e=>{md(e);line("> ")}} style={{fontWeight:700,fontSize:13}}>&ldquo;</button>
          <button className={b} title="Highlight"    onMouseDown={e=>{md(e);wrap("==","==","text")}} style={{background:"#fef08a",color:"#713f12"}}>★</button>
          <div style={{flex:1}}/>
          <button className={b} title={preview?"Switch to edit":"Preview rendered"} onMouseDown={e=>{md(e);setPreview(p=>!p);}}
            style={preview?{background:"#eff6ff",color:"#2563eb"}:{}}>
            {preview ? "Edit" : "Preview"}
          </button>
        </div>
        {preview
          ? <div className="md-content" style={{padding:"8px 12px",fontSize:13,color:"#334155",minHeight:80}} dangerouslySetInnerHTML={{ __html: html() }}/>
          : <textarea ref={ref} value={value || ""} onChange={e => onChange(e.target.value)}
              rows={rows} placeholder={placeholder}
              style={{width:"100%",fontSize:13,padding:"6px 10px",outline:"none",resize:"vertical",border:"none",boxSizing:"border-box"}}/>
        }
      </div>
    );
  }

  // ── Options tag editor ─────────────────────────────────────────────────────
  function OptionsEditor({ options, onChange }) {
    const [input, setInput] = useState("");
    const add = () => {
      const v = input.trim();
      if (!v || options.includes(v)) return;
      onChange([...options, v]); setInput("");
    };
    return (
      <div className="mt-2">
        <div className="flex flex-wrap gap-1.5 mb-2">
          {options.map(o => (
            <span key={o} className="inline-flex items-center gap-1 text-xs bg-blue-50 text-blue-600 border border-blue-200 rounded-full px-2.5 py-0.5">
              {o}
              <button onMouseDown={() => onChange(options.filter(x => x !== o))}
                className="text-blue-300 hover:text-blue-500 leading-none cursor-pointer bg-transparent border-0 p-0">×</button>
            </span>
          ))}
        </div>
        <div className="flex gap-2">
          <input value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" || e.key === ",") { e.preventDefault(); add(); }}}
            placeholder="Type option, press Enter…"
            className="flex-1 text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
          <button onMouseDown={add} className="btn btn-xs btn-primary">Add</button>
        </div>
      </div>
    );
  }

  // ── PillSelect ─────────────────────────────────────────────────────────────
  function PillSelect({ options, value, onChange, disabled, single }) {
    const containerRef = useRef(null);
    const [showSearch, setShowSearch] = useState(false);
    const [search, setSearch] = useState("");
    useLayoutEffect(() => {
      const el = containerRef.current;
      if (!el) return;
      const check = () => setShowSearch(el.scrollHeight > 46);
      check();
      if (window.ResizeObserver) {
        const ro = new ResizeObserver(check);
        ro.observe(el);
        return () => ro.disconnect();
      }
    }, [options.length]);
    const filtered = search ? options.filter(o => o.toLowerCase().includes(search.toLowerCase())) : options;
    const isOn = (o) => single ? value === o : (Array.isArray(value) ? value.includes(o) : false);
    const toggle = (o) => {
      if (disabled) return;
      if (single) onChange(value === o ? "" : o);
      else { const a = Array.isArray(value) ? value : []; onChange(a.includes(o) ? a.filter(x=>x!==o) : [...a, o]); }
    };
    return (
      <div>
        {showSearch && (
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search options…"
            className="w-full text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 mb-2"/>
        )}
        <div ref={containerRef} className="flex flex-wrap gap-2">
          {filtered.map(o=>(
            <button key={o} type="button" disabled={disabled} onClick={()=>toggle(o)}
              className={`text-sm px-3.5 py-1.5 rounded-full border transition font-medium cursor-pointer ${isOn(o)?"border-blue-500 bg-blue-50 text-blue-600":"border-slate-200 bg-white text-slate-500 hover:border-slate-300"}`}>
              {o}
            </button>
          ))}
          {filtered.length===0 && search && <span className="text-xs text-slate-400 self-center">No match for "{search}"</span>}
        </div>
      </div>
    );
  }

  // ── Field renderer ─────────────────────────────────────────────────────────
  function FieldInput({ field, value, onChange, disabled }) {
    const inputCls = "w-full text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition disabled:bg-slate-50 disabled:text-slate-400";
    if (field.type === "dropdown") return (
      <PillSelect options={field.options||[]} value={value||""} onChange={onChange} disabled={disabled} single={true}/>
    );
    if (field.type === "multiselect") return (
      <PillSelect options={field.options||[]} value={Array.isArray(value)?value:[]} onChange={onChange} disabled={disabled} single={false}/>
    );
    return <input value={value||""} onChange={e=>onChange(e.target.value)} disabled={disabled} className={inputCls}/>;
  }

  // ── Store Order Editor ──────────────────────────────────────────────────────
  function StoreOrderEditor({ items, onChange, skus, disabled }) {
    const newLine = () => ({ id: Date.now(), sku_id: "", sku_name: "", qty: 1, unit_price: 0, comment: "", line_total: 0 });

    const updateLine = (id, field, val) => {
      onChange(items.map(item => {
        if (item.id !== id) return item;
        const u = { ...item, [field]: val };
        if (field === "sku_id") {
          const sku = skus.find(s => s.id === val);
          u.sku_name   = sku?.name || "";
          u.unit_price = parseFloat(sku?.internal || 0);
        }
        if (field === "qty" || field === "unit_price" || field === "sku_id") {
          u.line_total = Math.max(0, parseFloat(u.qty || 0)) * Math.max(0, parseFloat(u.unit_price || 0));
        }
        return u;
      }));
    };

    const total = items.reduce((s, i) => s + (i.line_total || 0), 0);
    const inp   = "text-xs px-2 py-1 rounded border border-slate-200 outline-none focus:ring-1 focus:ring-blue-500 w-full";

    return (
      <div>
        <div className="overflow-x-auto">
          <table className="w-full text-xs border-collapse mb-2" style={{ minWidth: 560 }}>
            <thead>
              <tr className="text-left text-slate-400 border-b border-slate-100">
                <th className="py-2 pr-2 font-semibold">SKU / Item</th>
                <th className="py-2 pr-2 font-semibold w-16">Qty</th>
                <th className="py-2 pr-2 font-semibold w-20">€/unit</th>
                <th className="py-2 pr-2 font-semibold w-20 text-right">Line total</th>
                <th className="py-2 pr-2 font-semibold">Comment</th>
                {!disabled && <th className="py-2 w-5"></th>}
              </tr>
            </thead>
            <tbody>
              {items.map(item => (
                <tr key={item.id} className="border-b border-slate-50">
                  <td className="py-1.5 pr-2">
                    <select value={item.sku_id} onChange={e => updateLine(item.id, "sku_id", e.target.value)} disabled={disabled} className={inp}>
                      <option value="">Select item…</option>
                      {skus.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                    </select>
                  </td>
                  <td className="py-1.5 pr-2">
                    <input type="number" min="1" value={item.qty}
                      onChange={e => updateLine(item.id, "qty", Math.max(1, parseInt(e.target.value) || 1))}
                      disabled={disabled} className={inp + " text-right"} />
                  </td>
                  <td className="py-1.5 pr-2">
                    <input type="number" min="0" step="0.01" value={item.unit_price}
                      onChange={e => updateLine(item.id, "unit_price", parseFloat(e.target.value) || 0)}
                      disabled={disabled} className={inp + " text-right"} />
                  </td>
                  <td className="py-1.5 pr-2 text-right font-semibold text-slate-700">
                    €{(item.line_total || 0).toFixed(2)}
                  </td>
                  <td className="py-1.5 pr-2">
                    <input value={item.comment} onChange={e => updateLine(item.id, "comment", e.target.value)}
                      disabled={disabled} placeholder="Comment…" className={inp} />
                  </td>
                  {!disabled && (
                    <td className="py-1.5 pl-1">
                      <button onClick={() => onChange(items.filter(i => i.id !== item.id))}
                        className="text-red-400 hover:text-red-600 cursor-pointer bg-transparent border-0 p-0 leading-none text-sm">✕</button>
                    </td>
                  )}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="flex items-center justify-between mt-1">
          {!disabled
            ? <button onClick={() => onChange([...items, newLine()])}
                className="text-xs px-3 py-1.5 rounded-lg border border-blue-200 bg-blue-50 text-blue-600 cursor-pointer hover:bg-blue-100 border-0">+ Add line</button>
            : <span />}
          <div className="text-sm font-bold text-slate-800">
            Order total: <span className="text-violet-600">€{total.toFixed(2)}</span>
          </div>
        </div>
      </div>
    );
  }

  // ── Submit form ────────────────────────────────────────────────────────────
  function RequestForm({ user, requestTypes, domains, domainFilter, setDomainFilter, onSubmitted }) {
    const typeKeys = Object.keys(requestTypes || {});
    const [type,       setType]       = useState(typeKeys[0] || "");
    const [meta,       setMeta]       = useState({});
    const [notes,      setNotes]      = useState("");
    const [saving,     setSaving]     = useState(false);
    const [success,    setSuccess]    = useState(false);
    const [error,      setError]      = useState(null);
    const [skus,       setSkus]       = useState([]);
    const [storeItems, setStoreItems] = useState([{ id: Date.now(), sku_id: "", sku_name: "", qty: 1, unit_price: 0, comment: "", line_total: 0 }]);
    const [grants,     setGrants]     = useState([]);
    const [grantId,    setGrantId]    = useState("");
    const [showDesc,   setShowDesc]   = useState(false);

    const TIER_LABELS = { internal: "Internal", cracs: "CRACs", academia: "Academia", industry: "Industry" };

    const filteredTypeKeys = typeKeys.filter(k => domainFilter === "all" || (requestTypes[k]?.domain_id === domainFilter));
    const effectiveType  = filteredTypeKeys.includes(type) ? type : "";
    const typeConfig = requestTypes?.[effectiveType];
    const fields     = typeConfig?.fields || [];
    const isStore    = !!typeConfig?.is_store;

    useEffect(() => {
      api.getGrants().then(data => {
        if (!Array.isArray(data)) return;
        setGrants(user.role === "admin" ? data : data.filter(g => (g.members || []).includes(user.username)));
      });
    }, []);

    useEffect(() => {
      if (isStore) {
        api.getPricing().then(data => { if (data?.skus) setSkus(data.skus); });
      }
    }, [type]);

    const handleTypeChange = (t) => {
      setType(t); setMeta({}); setError(null); setShowDesc(false);
      setStoreItems([{ id: Date.now(), sku_id: "", sku_name: "", qty: 1, unit_price: 0, comment: "", line_total: 0 }]);
    };

    const submit = async () => {
      if (!effectiveType) return;
      setError(null);
      if (isStore) {
        if (!storeItems.some(i => i.sku_id)) { setError("Please add at least one item."); return; }
      } else {
        for (const f of fields) {
          const v = meta[f.id];
          if (!v || (Array.isArray(v) && v.length === 0) || v === "") {
            setError(`Please fill in "${f.label}"`); return;
          }
        }
      }
      setSaving(true);
      const validItems = storeItems.filter(i => i.sku_id);
      const baseMetadata = isStore
        ? { store_order: { items: validItems, total: validItems.reduce((s, i) => s + (i.line_total || 0), 0) } }
        : { ...meta };
      const res = await api.submitRequest({ type: effectiveType, metadata: baseMetadata, notes, email: user.email || null, grant_id: grantId || null });
      setSaving(false);
      if (res?.error) { setError(res.error); return; }
      setSuccess(true);
      setTimeout(() => { setSuccess(false); setMeta({}); setNotes(""); setGrantId(""); setStoreItems([{ id: Date.now(), sku_id: "", sku_name: "", qty: 1, unit_price: 0, comment: "", line_total: 0 }]); onSubmitted(); }, 2500);
    };

    const renderDesc = (md) => typeof marked !== 'undefined'
      ? marked.parse(md.replace(/==(.+?)==/g, '<mark>$1</mark>'))
      : md;

    return (
      <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 sm:p-8">
        <div className="flex items-start justify-between mb-1">
          <h2 className="text-base font-bold text-slate-900">New Request</h2>
        </div>
        <div className="flex items-center gap-2 mb-5">
          <p className="text-sm text-slate-400">Submit a service request to the platforms team.</p>
          <button onClick={() => setShowDesc(d => !d)} title={typeConfig?.description ? "About this request type" : "No description yet — admin can add one in ⚙ Configure"}
            style={{fontSize:18,lineHeight:1,background:"none",border:"none",cursor:"pointer",padding:2,borderRadius:"50%",transition:"color .15s"}}
            className={showDesc ? "text-blue-500" : "text-slate-400 hover:text-blue-500"}>ⓘ</button>
        </div>
        {showDesc && (
          typeConfig?.description
            ? <div className="md-content mb-5 text-sm text-slate-700 bg-blue-50 border border-blue-100 rounded-xl px-4 py-3"
                dangerouslySetInnerHTML={{ __html: renderDesc(typeConfig.description) }}/>
            : <div className="mb-5 text-sm text-slate-400 italic bg-slate-50 border border-slate-200 rounded-xl px-4 py-3">
                No description configured for this request type. Admins can add one in ⚙ Configure.
              </div>
        )}

        <div className="flex gap-2 flex-wrap mb-6">
          {filteredTypeKeys.map(k => (
            <button key={k} onClick={() => handleTypeChange(k)}
              className={`text-sm px-4 py-1.5 rounded-full border transition font-medium cursor-pointer ${effectiveType === k ? "border-blue-500 bg-blue-50 text-blue-600 font-semibold" : "border-slate-200 bg-white text-slate-500 hover:border-slate-300"}`}>
              {requestTypes[k].label}
              {requestTypes[k].is_store && <span className="ml-1.5 text-[10px] bg-violet-100 text-violet-600 rounded-full px-1.5 py-0.5">order</span>}
            </button>
          ))}
          {filteredTypeKeys.length === 0 && (
            <span className="text-xs text-slate-400 self-center">No request types in this domain.</span>
          )}
        </div>

        {effectiveType && (<>
        {grants.length > 0 && (
          <div className="mb-5">
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Grant</label>
            <select value={grantId} onChange={e => setGrantId(e.target.value)} disabled={saving}
              className="w-full text-sm px-3 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 bg-white">
              <option value="">— none —</option>
              {grants.map(g => (
                <option key={g.id} value={g.id}>{g.code} · {g.name}</option>
              ))}
            </select>
            {grantId && (() => { const g = grants.find(x => x.id === grantId); return g ? (
              <div className="mt-1.5 flex gap-2 flex-wrap">
                <span className="text-[11px] bg-slate-100 rounded px-2 py-0.5 text-slate-500">Tier: <strong className="text-slate-700">{TIER_LABELS[g.tier] || g.tier}</strong></span>
                {g.funds > 0 && <span className="text-[11px] bg-slate-100 rounded px-2 py-0.5 text-slate-500">Budget: <strong className="text-slate-700">€{g.funds.toLocaleString()}</strong></span>}
                {(g.members||[]).length > 0 && <span className="text-[11px] bg-slate-100 rounded px-2 py-0.5 text-slate-500">{g.members.length} member{g.members.length !== 1 ? "s" : ""}</span>}
              </div>
            ) : null; })()}
          </div>
        )}

        <div className="space-y-4">
          {isStore ? (
            <div>
              <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Order Items</label>
              {skus.length === 0
                ? <p className="text-xs text-slate-400">No SKUs configured yet. Ask an admin to add items in Pricing.</p>
                : <StoreOrderEditor items={storeItems} onChange={setStoreItems} skus={skus} disabled={saving} />}
            </div>
          ) : (
            fields.map(f => (
              <div key={f.id}>
                <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">{f.label}</label>
                <FieldInput field={f} value={meta[f.id]} onChange={v => setMeta({ ...meta, [f.id]: v })} disabled={saving} />
              </div>
            ))
          )}
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Additional Notes</label>
            <textarea value={notes} onChange={e => setNotes(e.target.value)} disabled={saving} rows={3}
              placeholder="Any additional context, deadlines, or special requirements…"
              className="w-full text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-y disabled:bg-slate-50" />
          </div>
        </div>

        {error   && <div className="flex items-center gap-2 mt-4 bg-red-50 border border-red-100 rounded-xl px-4 py-2.5 text-sm text-red-600">⚠ {error}</div>}
        {success && <div className="flex items-center gap-2 mt-4 bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-2.5 text-sm text-emerald-600">✅ Request submitted successfully!</div>}

        <button onClick={submit} disabled={saving || success} className="btn btn-md btn-primary btn-block mt-5">
          {saving ? "Submitting…" : "Submit Request"}
        </button>
        </>)}
      </div>
    );
  }

  // ── getReqId helper ────────────────────────────────────────────────────────
  const getReqId = (r) => r.metadata?.request_id || String(Math.abs(new Date(r.created_at||Date.now()).getTime()) % 1000000).padStart(6,'0');

  // ── My requests ────────────────────────────────────────────────────────────
  function MyRequests({ requests, requestTypes, search, projects = [] }) {
    const [selectedId, setSelectedId] = useState(null);
    const [showCompleted, setShowCompleted] = useState(false);
    const pillsRef = useRef(null);
    const [showPillSearch, setShowPillSearch] = useState(false);
    useLayoutEffect(() => {
      const el = pillsRef.current; if (!el) return;
      const check = () => setShowPillSearch(el.scrollHeight > 46);
      check();
      if (window.ResizeObserver) { const ro = new ResizeObserver(check); ro.observe(el); return ()=>ro.disconnect(); }
    }, [requests.length]);

    const archivedProjectIds = new Set(projects.filter(p => p.archived).map(p => p.id));
    const isCompleted = (r) => archivedProjectIds.has('req-' + r.id);

    const filtered = search
      ? requests.filter(r => {
          const q = search.toLowerCase();
          return (requestTypes?.[r.type]?.label||r.type).toLowerCase().includes(q) || r.status.toLowerCase().includes(q) || (r.notes||"").toLowerCase().includes(q);
        })
      : requests;

    const visible = showCompleted ? filtered : filtered.filter(r => !isCompleted(r));

    const effectiveId = selectedId && visible.find(r=>r.id===selectedId) ? selectedId : visible[0]?.id;
    const selected = visible.find(r=>r.id===effectiveId);

    if (!requests.length) return <div className="text-center py-16 text-slate-400 text-sm">You haven't submitted any requests yet.</div>;
    if (search && !filtered.length) return <div className="text-center py-16 text-slate-400 text-sm">No requests match "{search}".</div>;

    return (
      <div>
        {/* Show completed toggle */}
        {(archivedProjectIds.size > 0 || showCompleted) && (
          <div className="flex items-center gap-2 mb-3 text-xs text-slate-500">
            <label className="flex items-center gap-1.5 cursor-pointer select-none">
              <div onClick={() => setShowCompleted(s => !s)} className={`relative inline-block w-8 h-4 rounded-full transition-colors cursor-pointer ${showCompleted ? 'bg-blue-500' : 'bg-slate-200'}`}>
                <span className={`absolute top-0.5 left-0.5 w-3 h-3 rounded-full bg-white shadow transition-transform ${showCompleted ? 'translate-x-4' : ''}`} />
              </div>
              Show completed
            </label>
            {!showCompleted && archivedProjectIds.size > 0 && (
              <span className="text-slate-400">({archivedProjectIds.size} hidden)</span>
            )}
          </div>
        )}
        {/* Request pills */}
        <div ref={pillsRef} className="flex flex-wrap gap-2 mb-5">
          {visible.map(r => {
            const typeLabel = requestTypes?.[r.type]?.label || r.type;
            const reqId = getReqId(r);
            const isActive = r.id === effectiveId;
            return (
              <button key={r.id} onClick={()=>setSelectedId(r.id)}
                className={`text-xs px-3.5 py-1.5 rounded-full border transition font-medium cursor-pointer flex items-center gap-1.5 ${isActive?"border-blue-500 bg-blue-50 text-blue-600 font-semibold":"border-slate-200 bg-white text-slate-500 hover:border-slate-300"}`}>
                <span className="font-mono">#{reqId}</span>
                <span>{typeLabel}</span>
                <span className={`text-[10px] rounded-full px-1.5 py-0.5 font-bold ${r.status==="approved"?"bg-emerald-100 text-emerald-600":r.status==="rejected"?"bg-red-100 text-red-500":"bg-amber-100 text-amber-600"}`}>{r.status}</span>
              </button>
            );
          })}
        </div>

        {/* All-completed empty state */}
        {!showCompleted && filtered.length > 0 && visible.length === 0 && (
          <div className="text-center py-10 text-slate-400 text-sm">
            All your requests are completed.{" "}
            <button onClick={() => setShowCompleted(true)} className="text-blue-500 underline cursor-pointer bg-transparent border-none font-sans text-sm">Show them</button>
          </div>
        )}
        {/* Selected detail */}
        {selected && (() => {
          const typeLabel = requestTypes?.[selected.type]?.label || selected.type;
          const fields = requestTypes?.[selected.type]?.fields || [];
          return (
            <div className={`bg-white border rounded-2xl p-5 ${CARD_BORDER[selected.status]||"border-slate-200"}`}>
              <div className="flex items-start justify-between gap-3 mb-3">
                <div>
                  <span className="font-mono text-xs text-slate-400 mr-2">#{getReqId(selected)}</span>
                  <span className="text-sm font-bold text-slate-900">{typeLabel}</span>
                  <span className="text-xs text-slate-400 ml-2">{new Date(selected.created_at).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</span>
                </div>
                <span className={`text-[10px] font-semibold rounded-full px-2.5 py-0.5 capitalize shrink-0 ${STATUS_CLASSES[selected.status]||"bg-slate-100 text-slate-500"}`}>{selected.status}</span>
              </div>
              {selected.metadata?.store_order ? (
                <div className="text-xs mt-1">
                  <table className="w-full border-collapse text-slate-500">
                    <thead><tr className="border-b border-slate-100 text-slate-400">
                      <th className="text-left py-1 pr-2 font-semibold">Item</th>
                      <th className="text-right py-1 pr-2 font-semibold">Qty</th>
                      <th className="text-right py-1 pr-2 font-semibold">€/unit</th>
                      <th className="text-right py-1 font-semibold">Total</th>
                    </tr></thead>
                    <tbody>{(selected.metadata.store_order.items||[]).map((item,i)=>(
                      <tr key={i} className="border-b border-slate-50">
                        <td className="py-1 pr-2">{item.sku_name||item.sku_id}{item.comment&&<span className="text-slate-400 ml-1">— {item.comment}</span>}</td>
                        <td className="py-1 pr-2 text-right">{item.qty}</td>
                        <td className="py-1 pr-2 text-right">€{parseFloat(item.unit_price||0).toFixed(2)}</td>
                        <td className="py-1 text-right font-semibold text-slate-700">€{parseFloat(item.line_total||0).toFixed(2)}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                  <div className="text-right font-bold text-sm text-violet-600 mt-1">Total: €{parseFloat(selected.metadata.store_order.total||0).toFixed(2)}</div>
                </div>
              ) : (
                <div className="flex flex-wrap gap-x-4 gap-y-1 text-xs text-slate-500">
                  {fields.map(f => { const v = selected.metadata?.[f.id]; if (!v||(Array.isArray(v)&&!v.length)) return null; return <span key={f.id}><strong className="text-slate-700">{f.label}:</strong> {Array.isArray(v)?v.join(", "):v}</span>; })}
                </div>
              )}
              {selected.notes && <p className="text-xs text-slate-400 mt-2">{selected.notes}</p>}
              {selected.reviewed_by && <p className="text-xs text-slate-400 mt-2">Reviewed by <strong>{selected.reviewed_by}</strong> · {new Date(selected.reviewed_at).toLocaleDateString("en-GB")}</p>}
            </div>
          );
        })()}
      </div>
    );
  }

  // ── Admin queue ────────────────────────────────────────────────────────────
  function AdminQueue({ requests, requestTypes, onRefresh, search }) {
    const [filter, setFilter] = useState("pending");
    const [selectedId, setSelectedId] = useState(null);
    const [reviewing, setReviewing] = useState(false);
    const [reason, setReason] = useState("");
    const [saving, setSaving] = useState(false);
    const [error, setError] = useState(null);
    const [reviewOrder, setReviewOrder] = useState(null);
    const [skus, setSkus] = useState([]);
    const pillsRef = useRef(null);
    const [showPillSearch, setShowPillSearch] = useState(false);
    useLayoutEffect(() => {
      const el = pillsRef.current; if (!el) return;
      const check = () => setShowPillSearch(el.scrollHeight > 46);
      check();
      if (window.ResizeObserver) { const ro = new ResizeObserver(check); ro.observe(el); return ()=>ro.disconnect(); }
    }, [requests.length, filter]);

    const base = requests.filter(r => filter === "all" || r.status === filter).filter(r => {
      if (!search) return true;
      const q = search.toLowerCase();
      return (requestTypes?.[r.type]?.label||r.type).toLowerCase().includes(q) || (r.username||"").toLowerCase().includes(q) || (r.notes||"").toLowerCase().includes(q);
    });

    const effectiveId = selectedId && base.find(r=>r.id===selectedId) ? selectedId : base[0]?.id;
    const selected = base.find(r=>r.id===effectiveId);

    const openReview = (r) => {
      setSelectedId(r.id); setReviewing(true); setReason(""); setError(null);
      if (r.metadata?.store_order) { setReviewOrder(JSON.parse(JSON.stringify(r.metadata.store_order))); api.getPricing().then(d=>{ if(d?.skus) setSkus(d.skus); }); }
      else setReviewOrder(null);
    };

    const doReview = async (status) => {
      setSaving(true); setError(null);
      const body = { status, rejection_reason: reason };
      if (status === "approved" && reviewOrder) body.store_order = reviewOrder;
      const res = await api.reviewRequest(effectiveId, body);
      setSaving(false);
      if (res?.error) { setError(res.error); return; }
      setReviewing(false); setReviewOrder(null); setReason(""); onRefresh();
    };

    const filterLabels = ["pending","approved","rejected","all"];

    return (
      <div>
        {/* Status filter tabs */}
        <div className="flex gap-2 flex-wrap mb-4">
          {filterLabels.map(f => {
            const count = requests.filter(r=>r.status===f).length;
            return (
              <button key={f} onClick={()=>{ setFilter(f); setSelectedId(null); setReviewing(false); }}
                className={`text-xs px-3.5 py-1.5 rounded-full border transition font-medium cursor-pointer capitalize flex items-center gap-1.5 ${filter===f?"border-blue-500 bg-blue-50 text-blue-600 font-semibold":"border-slate-200 bg-white text-slate-500 hover:border-slate-300"}`}>
                {f}
                {f!=="all" && <span className={`text-[10px] rounded-full px-1.5 py-0.5 font-bold ${filter===f?"bg-blue-600 text-white":"bg-slate-100 text-slate-400"}`}>{count}</span>}
              </button>
            );
          })}
        </div>

        {base.length === 0 && <div className="text-center py-16 text-slate-400 text-sm">No {filter==="all"?"":filter} requests.</div>}

        {base.length > 0 && <>
          {/* Request pills */}
          <div ref={pillsRef} className="flex flex-wrap gap-2 mb-5">
            {base.map(r => {
              const typeLabel = requestTypes?.[r.type]?.label || r.type;
              const reqId = getReqId(r);
              const isActive = r.id === effectiveId;
              return (
                <button key={r.id} onClick={()=>{ setSelectedId(r.id); setReviewing(false); }}
                  className={`text-xs px-3.5 py-1.5 rounded-full border transition font-medium cursor-pointer flex items-center gap-1.5 ${isActive?"border-blue-500 bg-blue-50 text-blue-600 font-semibold":"border-slate-200 bg-white text-slate-500 hover:border-slate-300"}`}>
                  <span className="font-mono">#{reqId}</span>
                  <span className="hidden sm:inline">{r.username} ·</span>
                  <span>{typeLabel}</span>
                  <span className={`text-[10px] rounded-full px-1.5 py-0.5 font-bold ${r.status==="approved"?"bg-emerald-100 text-emerald-600":r.status==="rejected"?"bg-red-100 text-red-500":"bg-amber-100 text-amber-600"}`}>{r.status}</span>
                </button>
              );
            })}
          </div>

          {/* Selected detail + review */}
          {selected && (() => {
            const typeLabel = requestTypes?.[selected.type]?.label || selected.type;
            const fields = requestTypes?.[selected.type]?.fields || [];
            return (
              <div className={`bg-white border rounded-2xl p-5 ${CARD_BORDER[selected.status]||"border-slate-200"}`}>
                <div className="flex items-start justify-between gap-3 mb-3">
                  <div>
                    <span className="font-mono text-xs text-slate-400 mr-2">#{getReqId(selected)}</span>
                    <span className="text-sm font-bold text-slate-900">{typeLabel}</span>
                    <span className="text-xs text-slate-500 ml-2">by <strong>{selected.username}</strong></span>
                    <span className="text-xs text-slate-400 ml-2">{new Date(selected.created_at).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</span>
                  </div>
                  <span className={`text-[10px] font-semibold rounded-full px-2.5 py-0.5 capitalize shrink-0 ${STATUS_CLASSES[selected.status]||"bg-slate-100 text-slate-500"}`}>{selected.status}</span>
                </div>
                <div className="flex flex-col gap-1 text-xs text-slate-500 mb-3">
                  {fields.map(f=>{ const v=selected.metadata?.[f.id]; if(!v||(Array.isArray(v)&&!v.length)) return null; return <div key={f.id}><strong className="text-slate-700">{f.label}:</strong> {Array.isArray(v)?v.join(", "):v}</div>; })}
                  {selected.metadata?.store_order && !reviewing && (
                    <div className="mt-1">
                      <table className="w-full border-collapse">
                        <thead><tr className="border-b border-slate-100 text-slate-400">
                          <th className="text-left py-1 pr-2 font-semibold">Item</th>
                          <th className="text-right py-1 pr-2 font-semibold">Qty</th>
                          <th className="text-right py-1 pr-2 font-semibold">€/unit</th>
                          <th className="text-right py-1 font-semibold">Total</th>
                        </tr></thead>
                        <tbody>{(selected.metadata.store_order.items||[]).map((item,i)=>(
                          <tr key={i} className="border-b border-slate-50">
                            <td className="py-1 pr-2">{item.sku_name||item.sku_id}{item.comment&&<span className="text-slate-400 ml-1">— {item.comment}</span>}</td>
                            <td className="py-1 pr-2 text-right">{item.qty}</td>
                            <td className="py-1 pr-2 text-right">€{parseFloat(item.unit_price||0).toFixed(2)}</td>
                            <td className="py-1 text-right font-semibold text-slate-700">€{parseFloat(item.line_total||0).toFixed(2)}</td>
                          </tr>
                        ))}</tbody>
                      </table>
                      <div className="text-right font-bold text-xs text-violet-600 mt-1">Total: €{parseFloat(selected.metadata.store_order.total||0).toFixed(2)}</div>
                    </div>
                  )}
                  {selected.notes && <div><strong className="text-slate-700">Notes:</strong> {selected.notes}</div>}
                  {selected.email  && <div className="text-slate-400">📧 {selected.email}</div>}
                </div>
                {selected.status === "pending" && (
                  reviewing ? (
                    <div className="mt-2 p-4 bg-slate-50 rounded-xl border border-slate-200">
                      <textarea value={reason} onChange={e=>setReason(e.target.value)} rows={2}
                        placeholder="Rejection reason (optional)…"
                        className="w-full text-xs px-3 py-2 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 resize-none mb-3"/>
                      {reviewOrder && (
                        <div className="mb-3">
                          <div className="text-xs font-semibold text-slate-500 mb-2">Edit Order (optional)</div>
                          <StoreOrderEditor items={reviewOrder.items||[]} onChange={items=>setReviewOrder({...reviewOrder,items,total:items.reduce((s,i)=>s+(i.line_total||0),0)})} skus={skus} disabled={false}/>
                        </div>
                      )}
                      {error && <div className="text-xs text-red-600 mb-2">⚠ {error}</div>}
                      <div className="flex gap-2">
                        <button onClick={()=>doReview("approved")} disabled={saving} className="btn btn-sm btn-success flex-1">{saving?"…":"✅ Approve"}</button>
                        <button onClick={()=>doReview("rejected")} disabled={saving} className="btn btn-sm btn-danger-fill flex-1">{saving?"…":"❌ Reject"}</button>
                        <button onClick={()=>{ setReviewing(false); setReason(""); setError(null); }} className="btn btn-sm btn-secondary">Cancel</button>
                      </div>
                    </div>
                  ) : (
                    <button onClick={()=>openReview(selected)} className="btn btn-sm btn-primary mt-1">Review →</button>
                  )
                )}
                {selected.reviewed_by && <p className="text-xs text-slate-400 mt-3">Reviewed by <strong>{selected.reviewed_by}</strong> · {new Date(selected.reviewed_at).toLocaleDateString("en-GB")}</p>}
              </div>
            );
          })()}
        </>}
      </div>
    );
  }

  // ── Admin config panel ─────────────────────────────────────────────────────
  function ConfigPanel({ requestTypes, domains, onSaved }) {
    const [types,   setTypes]   = useState(() => JSON.parse(JSON.stringify(requestTypes || {})));
    const [selType, setSelType] = useState(Object.keys(requestTypes || {})[0] || "");
    const [saving,  setSaving]  = useState(false);
    const [newKey,  setNewKey]  = useState("");

    const cfg    = types[selType] || { label: "", approver_role: "admin", fields: [] };
    const setcfg = (c) => setTypes({ ...types, [selType]: c });

    const addType = () => {
      const k = newKey.trim().toLowerCase().replace(/\s+/g, "_");
      if (!k || types[k]) return;
      setTypes({ ...types, [k]: { label: newKey.trim(), approver_role: "admin", fields: [] } });
      setSelType(k); setNewKey("");
    };

    const addField = () => setcfg({ ...cfg, fields: [...cfg.fields, { id: `f${Date.now()}`, label: "New Field", type: "text", options: [] }] });
    const updField = (id, key, val) => setcfg({ ...cfg, fields: cfg.fields.map(f => f.id === id ? { ...f, [key]: val } : f) });
    const delField = (id) => setcfg({ ...cfg, fields: cfg.fields.filter(f => f.id !== id) });

    const save = async () => {
      setSaving(true);
      await api.saveRequestTypes(types);
      setSaving(false); onSaved(types);
    };

    const inputCls = "w-full text-sm px-3.5 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition";

    return (
      <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 sm:p-8">
        <h2 className="text-base font-bold text-slate-900 mb-5">⚙️ Configure Request Types</h2>

        {/* Type selector */}
        <div className="flex gap-2 flex-wrap mb-6">
          {Object.keys(types).map(k => (
            <button key={k} onClick={() => setSelType(k)}
              className={`text-xs px-3.5 py-1.5 rounded-full border transition cursor-pointer capitalize ${selType === k ? "border-blue-500 bg-blue-50 text-blue-600 font-semibold" : "border-slate-200 bg-white text-slate-500 hover:border-slate-300"}`}>
              {types[k].label || k}
            </button>
          ))}
          <div className="flex gap-1.5">
            <input value={newKey} onChange={e => setNewKey(e.target.value)} placeholder="New type…"
              className="text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 w-28"
              onKeyDown={e => e.key === "Enter" && addType()} />
            <button onClick={addType} className="btn btn-xs btn-primary">+</button>
          </div>
        </div>

        {selType && (
          <>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
              <div>
                <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Label</label>
                <input value={cfg.label} onChange={e => setcfg({ ...cfg, label: e.target.value })} className={inputCls} />
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Approver Role</label>
                <input value={cfg.approver_role} onChange={e => setcfg({ ...cfg, approver_role: e.target.value })} className={inputCls} />
              </div>
              {(domains||[]).length > 0 && (
                <div>
                  <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Domain</label>
                  <select value={cfg.domain_id || ""} onChange={e => setcfg({ ...cfg, domain_id: e.target.value || undefined })} className={inputCls}>
                    <option value="">— None —</option>
                    {(domains||[]).map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                  </select>
                </div>
              )}
            </div>
            <div className="mb-4">
              <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Description (markdown — shown via ⓘ in the submission form)</label>
              <MdEditor value={cfg.description || ""} onChange={v => setcfg({ ...cfg, description: v })}
                placeholder="Describe this request type… (markdown supported)" rows={3}/>
            </div>
            <label className="flex items-center gap-3 mb-5 cursor-pointer select-none">
              <div className={`relative w-10 h-5 rounded-full transition-colors ${cfg.is_store ? "bg-violet-600" : "bg-slate-200"}`}>
                <div className={`absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-all ${cfg.is_store ? "left-5" : "left-0.5"}`} />
              </div>
              <input type="checkbox" className="hidden" checked={!!cfg.is_store} onChange={e => setcfg({ ...cfg, is_store: e.target.checked, fields: e.target.checked ? [] : cfg.fields })} />
              <span className="text-sm text-slate-600">Store-style order <span className="text-xs text-slate-400">(replaces custom fields with a SKU order table)</span></span>
            </label>

            {!cfg.is_store && (
              <>
                <div className="flex items-center justify-between mb-3">
                  <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Fields</span>
                  <button onClick={addField} className="btn btn-xs btn-primary">+ Add field</button>
                </div>
                <div className="space-y-2 mb-5">
                  {cfg.fields.map(f => (
                    <div key={f.id} className="bg-slate-50 border border-slate-200 rounded-xl p-3">
                      <div className="flex gap-2 mb-2">
                        <input value={f.label} onChange={e => updField(f.id, "label", e.target.value)} placeholder="Label"
                          className="flex-1 text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500" />
                        <select value={f.type} onChange={e => updField(f.id, "type", e.target.value)}
                          className="text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500">
                          <option value="text">Text</option>
                          <option value="dropdown">Dropdown</option>
                          <option value="multiselect">Multiselect</option>
                        </select>
                        <button onClick={() => delField(f.id)} className="btn btn-xs btn-danger">✕</button>
                      </div>
                      {(f.type === "dropdown" || f.type === "multiselect") && (
                        <OptionsEditor options={f.options || []} onChange={opts => updField(f.id, "options", opts)} />
                      )}
                    </div>
                  ))}
                </div>
              </>
            )}
          </>
        )}

        <button onClick={save} disabled={saving} className="btn btn-md btn-primary btn-block">
          {saving ? "Saving…" : "Save Configuration"}
        </button>
      </div>
    );
  }

  // ── App ────────────────────────────────────────────────────────────────────
  function App() {
    const [user] = useState(() => {
      const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
      if (!s || Date.now() > new Date(s.expires).getTime()) {
        localStorage.removeItem(SESSION_KEY); window.location.href = "index.html?expired=1"; return null;
      }
      return { username: s.username, role: s.role, token: s.token, avatar_url: s.avatar_url || null, display_name: s.display_name || null };
    });

    const [tab,          setTab]          = useState("submit");
    const [search,       setSearch]       = useState("");
    const [requestTypes, setRequestTypes] = useState({});
    const [requests,     setRequests]     = useState([]);
    const [projects,     setProjects]     = useState([]);
    const [domains,      setDomains]      = useState([]);
    const [domainFilter, setDomainFilter] = useState("all");
    const [loading,      setLoading]      = useState(true);
    const [loadError,    setLoadError]    = useState(null);

    const isAdmin = user?.role === "admin";

    const loadAll = async () => {
      setLoadError(null);
      try {
        const [types, reqs, projs, dom] = await Promise.all([api.getRequestTypes(), api.getRequests(), api.getProjects(), api.getDomains()]);
        setRequestTypes(types && typeof types === "object" && !types.error ? types : {});
        setRequests(Array.isArray(reqs) ? reqs : []);
        setProjects(Array.isArray(projs) ? projs : []);
        setDomains(Array.isArray(dom) ? dom : []);
      } catch { setLoadError("Could not load data. Please refresh."); }
      setLoading(false);
    };

    useEffect(() => { if (user) loadAll(); else setLoading(false); }, []);

    if (!user)     return null;
    if (loading)   return <div className="p-8 text-slate-400 text-sm">Loading…</div>;
    if (loadError) return (
      <div className="p-8 flex flex-col gap-3 items-start">
        <div className="text-red-500 text-sm">{loadError}</div>
        <button onClick={loadAll} className="text-sm px-4 py-2 rounded-xl bg-blue-600 text-white border-0 cursor-pointer">Retry</button>
      </div>
    );

    const myRequests   = requests.filter(r => r.username === user.username);
    const pendingCount = requests.filter(r => r.status === "pending").length;

    const tabs = [
      { key: "submit", label: "📝 New Request" },
      { key: "mine",   label: `My Requests${myRequests.length ? ` (${myRequests.length})` : ""}` },
      ...(isAdmin ? [
        { key: "queue",  label: `📥 Review Queue${pendingCount ? ` · ${pendingCount} pending` : ""}` },
      ] : []),
    ];

    const handleTabChange = (key) => { setTab(key); setSearch(""); };

    return (
      <div className="h-screen flex flex-col bg-slate-50 font-sans">
        <Navbar user={user} />

        {/* Header bar */}
        <div className="bg-white border-b border-slate-200 px-4 sm:px-6 py-3 shrink-0">
          <div className="flex items-center justify-between gap-3 mb-2.5">
            <div>
              <h1 className="text-base font-bold text-slate-900">Requests</h1>
              <p className="text-xs text-slate-400">
                {tab === "submit" ? "Submit a service request to the platforms team." : tab === "mine" ? `${myRequests.length} request${myRequests.length !== 1 ? "s" : ""}` : `${requests.filter(r => r.status === "pending").length} pending review`}
              </p>
            </div>
            <div className="flex items-center gap-2">
              {(tab === "queue" || tab === "mine") && (
                <input value={search} onChange={e => setSearch(e.target.value)}
                  placeholder="Search requests…"
                  className="text-xs px-3 py-1.5 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 w-36 sm:w-48"/>
              )}
              {isAdmin && (
                <button onClick={() => handleTabChange("config")}
                  className="btn btn-sm btn-secondary">
                  ⚙ Configure
                </button>
              )}
            </div>
          </div>
          {/* Domain filter — right-aligned, only on submit tab */}
          {tab === "submit" && domains.length > 0 && (
            <div className="flex items-center gap-3 mb-2.5 flex-wrap justify-end">
              {domains.map(d => (
                <label key={d.id} className="flex items-center gap-1.5 cursor-pointer select-none text-xs text-slate-500">
                  <div onClick={() => setDomainFilter(domainFilter === d.id ? "all" : d.id)}
                    className="relative inline-block w-7 h-3.5 rounded-full transition-colors cursor-pointer"
                    style={{ background: domainFilter === d.id ? (d.color || "#6366f1") : "#e2e8f0" }}>
                    <span className={`absolute top-0.5 left-0.5 w-2.5 h-2.5 rounded-full bg-white shadow transition-transform ${domainFilter === d.id ? "translate-x-3" : ""}`} />
                  </div>
                  <span style={{ color: domainFilter === d.id ? (d.color || "#6366f1") : undefined }}>{d.name}</span>
                </label>
              ))}
            </div>
          )}
          <div className="flex gap-2 flex-wrap">
            {tabs.map(t => (
              <button key={t.key} onClick={() => handleTabChange(t.key)}
                className={`text-sm px-4 py-1.5 rounded-full border transition font-medium cursor-pointer whitespace-nowrap ${tab === t.key ? "border-blue-500 bg-blue-50 text-blue-600 font-semibold" : "border-slate-200 bg-white text-slate-500 hover:border-slate-300"}`}>
                {t.label}
              </button>
            ))}
          </div>
        </div>

        {/* Content */}
        <div className="flex-1 overflow-y-auto px-4 sm:px-6 py-5">
          {tab === "submit" && <RequestForm user={user} requestTypes={requestTypes} domains={domains} domainFilter={domainFilter} setDomainFilter={setDomainFilter} onSubmitted={() => { loadAll(); handleTabChange("mine"); }} />}
          {tab === "mine"   && <MyRequests requests={myRequests} requestTypes={requestTypes} search={search} projects={projects} />}
          {tab === "queue"  && isAdmin && <AdminQueue requests={requests} requestTypes={requestTypes} onRefresh={loadAll} search={search} />}
          {tab === "config" && isAdmin && <ConfigPanel requestTypes={requestTypes} domains={domains} onSaved={(t) => setRequestTypes(t)} />}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
