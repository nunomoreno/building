<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerno — Users & Groups</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 font-sans">
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect } = React;

  const WORKER      = "https://morning-mud-283c.moreno-a64.workers.dev";
  const SESSION_KEY = "kerno_session";

  function getSession() {
    const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
    if (!s || Date.now() > new Date(s.expires).getTime()) {
      localStorage.removeItem(SESSION_KEY);
      window.location.href = "index.html?expired=1";
      return null;
    }
    return s;
  }

  const authHeaders = () => ({
    "Content-Type": "application/json",
    "X-Session-Token": getSession()?.token || "",
  });

  const apiFetch = async (path, opts = {}) => {
    const res = await fetch(`${WORKER}${path}`, {
      ...opts, headers: { ...authHeaders(), ...(opts.headers || {}) },
    });
    if (res.status === 401) { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html?expired=1"; return null; }
    return res.json().catch(() => ({}));
  };

  const api = {
    register:         (u, p, e) => fetch(`${WORKER}/register`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: u, password: p, email: e }) }).then(r => r.json()),
    getMembers:       ()        => apiFetch("/members"),
    deleteMember:     (id)      => apiFetch(`/members/${id}`,              { method: "DELETE" }),
    updateMember:     (id, data) => apiFetch(`/members/${id}`,             { method: "PUT",    body: JSON.stringify(data) }),
    getGroups:        ()        => apiFetch("/groups"),
    saveGroup:        (g)       => g.id
      ? apiFetch(`/groups/${g.id}`, { method: "PUT",  body: JSON.stringify(g) })
      : apiFetch("/groups",         { method: "POST", body: JSON.stringify(g) }),
    deleteGroup:      (id)      => apiFetch(`/groups/${id}`,               { method: "DELETE" }),
    addGroupMember:   (gid, mid, role) => apiFetch(`/groups/${gid}/members`,          { method: "POST",   body: JSON.stringify({ member_id: mid, role }) }),
    removeGroupMember:(gid, mid)       => apiFetch(`/groups/${gid}/members/${mid}`,   { method: "DELETE" }),
  };

  function scorePassword(pwd) {
    if (!pwd) return { score: 0, pct: 0, label: "", color: "" };
    let score = 0;
    if (pwd.length >= 10) score++;
    if (pwd.length >= 14) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[a-z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;
    if (score <= 2) return { score, pct: 20,  label: "Too weak",   color: "#ef4444" };
    if (score <= 3) return { score, pct: 40,  label: "Weak",       color: "#f97316" };
    if (score <= 4) return { score, pct: 65,  label: "Fair",       color: "#eab308" };
    if (score <= 5) return { score, pct: 85,  label: "Strong",     color: "#22c55e" };
    return             { score, pct: 100, label: "Very strong", color: "#16a34a" };
  }

  function PasswordStrengthBar({ password }) {
    const { pct, label, color } = scorePassword(password);
    if (!password) return null;
    return (
      <div className="mt-1.5 mb-1">
        <div className="h-1.5 rounded-full bg-slate-100 overflow-hidden">
          <div style={{ width: `${pct}%`, background: color }} className="h-full rounded-full transition-all duration-200" />
        </div>
        <div style={{ color }} className="text-xs mt-1">{label}</div>
      </div>
    );
  }

  // ── Navbar ─────────────────────────────────────────────────────────────────
  function Navbar({ user }) {
    const logout  = () => { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html"; };
    const isAdmin = user.role === "admin";
    const link    = "text-xs px-3 py-1.5 rounded-lg border border-slate-600 bg-slate-800 text-slate-300 hover:text-white hover:border-slate-400 transition no-underline";
    const active  = "text-xs px-3 py-1.5 rounded-lg border border-blue-500 bg-blue-600 text-white no-underline";
    return (
      <div className="bg-slate-900 px-4 sm:px-6 py-3 flex items-center gap-3 flex-wrap shrink-0">
        <a href="dashboard.html" className="text-base font-bold text-white no-underline mr-1">⚙️ Kerno</a>
        <span className="text-slate-600 text-xs hidden sm:inline">›</span>
        <span className="text-slate-400 text-xs hidden sm:inline">Users & Groups</span>
        <div className="ml-auto flex items-center gap-2 flex-wrap">
          <a href="kanban.html"   className={link}>📋 Kanban</a>
          <a href="booking.html"  className={link}>📅 Bookings</a>
          <a href="requests.html" className={link}>📝 Requests</a>
          {isAdmin && <a href="users.html"   className={active}>👥 Users</a>}
          {isAdmin && <a href="pricing.html" className={link}>💰 Pricing</a>}
          <a href="profile.html" className={`${link} flex items-center gap-1.5`}>
            {user.avatar_url
              ? <img src={user.avatar_url} className="w-5 h-5 rounded-full object-cover" alt="" />
              : <span className="w-5 h-5 rounded-full bg-slate-600 flex items-center justify-center text-[10px] font-bold text-slate-200">{user.username[0].toUpperCase()}</span>}
            {user.display_name || user.username}
            {isAdmin && <span className="text-[9px] bg-blue-600 text-white rounded-full px-1.5 py-0.5 font-semibold">admin</span>}
          </a>
          <button onClick={logout} className="text-xs px-3 py-1.5 rounded-lg border border-slate-600 bg-slate-800 text-slate-300 hover:text-white transition cursor-pointer font-sans">Sign out</button>
        </div>
      </div>
    );
  }

  const inputCls = "w-full text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition";

  // ── Users tab ──────────────────────────────────────────────────────────────
  function UsersTab({ members, groups, onReload }) {
    const [newUser,   setNewUser]   = useState("");
    const [newPass,   setNewPass]   = useState("");
    const [newEmail,  setNewEmail]  = useState("");
    const [error,     setError]     = useState("");
    const [saving,    setSaving]    = useState(false);
    const [editId,    setEditId]    = useState(null);
    const [editData,  setEditData]  = useState({});
    const [editMsg,   setEditMsg]   = useState("");
    const [resetPwd,  setResetPwd]  = useState("");

    const addMember = async () => {
      if (!newUser.trim() || !newPass.trim()) return;
      setSaving(true); setError("");
      const res = await api.register(newUser.trim(), newPass.trim(), newEmail.trim());
      if (res?.error) setError(res.error);
      else { setNewUser(""); setNewPass(""); setNewEmail(""); await onReload(); }
      setSaving(false);
    };

    const removeMember = async (id, username) => {
      if (!confirm(`Remove user "${username}"?`)) return;
      await api.deleteMember(id); await onReload();
    };

    const startEdit = (m) => {
      setEditId(m.id);
      setEditData({ display_name: m.display_name||"", email: m.email||"", phone: m.phone||"", role: m.role||"user" });
      setEditMsg(""); setResetPwd("");
    };
    const cancelEdit = () => { setEditId(null); setEditMsg(""); setResetPwd(""); };

    const saveEdit = async (id) => {
      setSaving(true); setEditMsg("");
      const body = {
        display_name: editData.display_name.trim() || null,
        email:        editData.email.trim()        || null,
        phone:        editData.phone.trim()        || null,
        role:         editData.role,
      };
      const res = await api.updateMember(id, body);
      if (res?.error) setEditMsg("Error: " + res.error);
      else { setEditMsg("Saved!"); await onReload(); setTimeout(cancelEdit, 1000); }
      setSaving(false);
    };

    const doReset = async (id) => {
      if (!resetPwd.trim()) return;
      const { score } = scorePassword(resetPwd);
      if (score <= 2) { setEditMsg("Password too weak — add uppercase, numbers and special characters."); return; }
      setSaving(true); setEditMsg("");
      const res = await api.updateMember(id, { password: resetPwd.trim() });
      if (res?.error) setEditMsg("Error: " + res.error);
      else { setEditMsg("Password updated."); setResetPwd(""); }
      setSaving(false);
    };

    return (
      <div className="max-w-2xl space-y-2">
        {members.map(m => (
          <div key={m.id} className="bg-white border border-slate-200 rounded-2xl overflow-hidden">
            {/* Header row */}
            <div className="flex items-center justify-between gap-3 px-5 py-4">
              <div className="min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="text-sm font-semibold text-slate-800">{m.display_name || m.username}</span>
                  {m.display_name && <span className="text-xs text-slate-400">@{m.username}</span>}
                  {m.role === "admin" && <span className="text-[10px] bg-blue-600 text-white rounded-full px-2 py-0.5 font-semibold">admin</span>}
                  {m.group_id && (
                    <span className="text-[10px] bg-emerald-50 text-emerald-600 border border-emerald-200 rounded-full px-2 py-0.5">
                      {groups.find(g => g.id === m.group_id)?.name || "group"} · {m.group_role}
                    </span>
                  )}
                </div>
                {m.email && <div className="text-xs text-slate-400 mt-0.5">{m.email}</div>}
              </div>
              <div className="flex gap-2 shrink-0">
                <button onClick={() => editId === m.id ? cancelEdit() : startEdit(m)}
                  className={`text-xs px-3 py-1.5 rounded-lg border cursor-pointer transition ${editId === m.id ? "border-slate-300 bg-slate-100 text-slate-600" : "border-slate-200 bg-slate-50 text-slate-500 hover:border-slate-300"}`}>
                  {editId === m.id ? "Cancel" : "Edit"}
                </button>
                {m.role !== "admin" && (
                  <button onClick={() => removeMember(m.id, m.username)}
                    className="text-xs px-3 py-1.5 rounded-lg border border-red-100 bg-red-50 text-red-500 cursor-pointer hover:bg-red-100">Remove</button>
                )}
              </div>
            </div>

            {/* Edit panel */}
            {editId === m.id && (
              <div className="border-t border-slate-100 bg-slate-50 px-5 py-4 space-y-3">
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1">Display Name</label>
                    <input value={editData.display_name} onChange={e => setEditData({...editData, display_name: e.target.value})}
                      placeholder="Full name" className={inputCls} />
                  </div>
                  <div>
                    <label className="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1">Email</label>
                    <input type="email" value={editData.email} onChange={e => setEditData({...editData, email: e.target.value})}
                      placeholder="email@example.com" className={inputCls} />
                  </div>
                  <div>
                    <label className="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1">Phone</label>
                    <input type="tel" value={editData.phone} onChange={e => setEditData({...editData, phone: e.target.value})}
                      placeholder="+351 …" className={inputCls} />
                  </div>
                  <div>
                    <label className="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1">Role</label>
                    <select value={editData.role} onChange={e => setEditData({...editData, role: e.target.value})} className={inputCls}>
                      <option value="user">user</option>
                      <option value="admin">admin</option>
                    </select>
                  </div>
                </div>
                <button onClick={() => saveEdit(m.id)} disabled={saving}
                  className="text-xs px-4 py-1.5 rounded-lg bg-blue-600 text-white border-0 cursor-pointer disabled:opacity-60 font-sans">
                  Save changes
                </button>

                <div className="border-t border-slate-200 pt-3">
                  <label className="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1">Reset Password</label>
                  <div className="flex gap-2 items-start">
                    <div className="flex-1">
                      <input type="password" value={resetPwd}
                        onChange={e => { setResetPwd(e.target.value); setEditMsg(""); }}
                        placeholder="New password"
                        className="w-full text-sm px-3 py-1.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500" />
                      <PasswordStrengthBar password={resetPwd} />
                    </div>
                    <button onClick={() => doReset(m.id)} disabled={saving || !resetPwd}
                      className="text-xs px-3.5 py-1.5 rounded-lg bg-slate-700 text-white border-0 cursor-pointer disabled:opacity-50 font-sans mt-0.5 shrink-0">
                      Reset
                    </button>
                  </div>
                </div>

                {editMsg && (
                  <div className={`text-xs ${editMsg.startsWith("Error") || editMsg.includes("weak") ? "text-red-500" : "text-emerald-600"}`}>
                    {editMsg}
                  </div>
                )}
              </div>
            )}
          </div>
        ))}

        {/* Add user */}
        <div className="bg-white border border-slate-200 rounded-2xl px-5 py-5 mt-4">
          <h3 className="text-sm font-bold text-slate-800 mb-4">Add new user</h3>
          <div className="flex gap-3 flex-wrap mb-3">
            <input value={newUser} onChange={e => setNewUser(e.target.value)} placeholder="Username"
              className="text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 flex-1 min-w-36" />
            <input type="email" value={newEmail} onChange={e => setNewEmail(e.target.value)} placeholder="Email (optional)"
              className="text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 flex-1 min-w-44" />
          </div>
          <div className="mb-3">
            <input type="password" value={newPass} onChange={e => setNewPass(e.target.value)} placeholder="Password"
              className={inputCls} />
            <PasswordStrengthBar password={newPass} />
          </div>
          {error && <div className="text-xs text-red-500 mb-3">{error}</div>}
          <button onClick={addMember} disabled={saving}
            className="text-sm px-5 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold border-0 cursor-pointer disabled:opacity-60 transition">
            {saving ? "Adding…" : "Add user"}
          </button>
        </div>
      </div>
    );
  }

  // ── Groups tab ─────────────────────────────────────────────────────────────
  function GroupsTab({ members, groups, onReload }) {
    const [saving,       setSaving]       = useState(false);
    const [editGroup,    setEditGroup]    = useState(null);
    const [newGroupName, setNewGroupName] = useState("");
    const GROUP_ROLES = ["member", "leader", "manager"];

    const saveGroup = async () => {
      if (!editGroup?.name?.trim()) return;
      setSaving(true);
      await api.saveGroup(editGroup);
      setSaving(false); setEditGroup(null); await onReload();
    };

    const deleteGroup = async (id, name) => {
      if (!confirm(`Delete group "${name}"? Members will be unassigned.`)) return;
      await api.deleteGroup(id); await onReload();
    };

    const assignMember   = async (groupId, memberId, role) => { await api.addGroupMember(groupId, memberId, role); await onReload(); };
    const unassignMember = async (groupId, memberId)       => { await api.removeGroupMember(groupId, memberId); await onReload(); };

    const createGroup = async () => {
      if (!newGroupName.trim()) return;
      setSaving(true);
      await api.saveGroup({ name: newGroupName.trim() });
      setNewGroupName(""); setSaving(false); await onReload();
    };

    return (
      <div className="max-w-2xl space-y-3">
        {groups.map(g => (
          <div key={g.id} className="bg-white border border-slate-200 rounded-2xl overflow-hidden">
            <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
              <div className="min-w-0">
                <span className="text-sm font-bold text-slate-800">{g.name}</span>
                {g.description && <span className="text-xs text-slate-400 ml-2">{g.description}</span>}
                <span className="text-xs text-slate-400 ml-2">{(g.members || []).length} member{(g.members || []).length !== 1 ? "s" : ""}</span>
              </div>
              <div className="flex gap-2 shrink-0">
                <button onClick={() => setEditGroup(editGroup?.id === g.id ? null : g)}
                  className="text-xs px-3 py-1.5 rounded-lg border border-slate-200 bg-slate-50 text-slate-500 cursor-pointer hover:border-slate-300">
                  {editGroup?.id === g.id ? "Cancel" : "Edit"}
                </button>
                <button onClick={() => deleteGroup(g.id, g.name)}
                  className="text-xs px-3 py-1.5 rounded-lg border border-red-100 bg-red-50 text-red-500 cursor-pointer hover:bg-red-100">Delete</button>
              </div>
            </div>

            {editGroup?.id === g.id && (
              <div className="px-5 py-4 bg-slate-50 border-b border-slate-200 space-y-2">
                <input value={editGroup.name || ""} onChange={e => setEditGroup({ ...editGroup, name: e.target.value })} placeholder="Group name" className={inputCls} />
                <input value={editGroup.description || ""} onChange={e => setEditGroup({ ...editGroup, description: e.target.value })} placeholder="Description (optional)" className={inputCls} />
                <button onClick={saveGroup} disabled={saving}
                  className="text-xs px-4 py-1.5 rounded-lg bg-blue-600 text-white border-0 cursor-pointer disabled:opacity-60">Save</button>
              </div>
            )}

            <div className="px-5 py-3">
              {(g.members || []).map(m => (
                <div key={m.member_id} className="flex items-center justify-between py-2 border-b border-slate-50 last:border-0 text-sm">
                  <span className="font-medium text-slate-700">{m.username}</span>
                  <div className="flex items-center gap-2">
                    <select value={m.role} onChange={e => assignMember(g.id, m.member_id, e.target.value)}
                      className="text-xs px-2 py-1 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500">
                      {GROUP_ROLES.map(r => <option key={r} value={r}>{r}</option>)}
                    </select>
                    <button onClick={() => unassignMember(g.id, m.member_id)}
                      className="text-xs px-2 py-1 rounded-lg border border-red-100 bg-red-50 text-red-500 cursor-pointer hover:bg-red-100">✕</button>
                  </div>
                </div>
              ))}
              <div className="flex gap-2 mt-3">
                <select id={`add-member-${g.id}`} defaultValue=""
                  className="flex-1 text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="" disabled>Add member…</option>
                  {members.filter(m => !g.members?.find(gm => gm.member_id === m.id)).map(m => (
                    <option key={m.id} value={m.id}>{m.username}</option>
                  ))}
                </select>
                <button onClick={() => {
                  const sel = document.getElementById(`add-member-${g.id}`);
                  if (sel.value) { assignMember(g.id, sel.value, "member"); sel.value = ""; }
                }} className="text-xs px-3 py-1.5 rounded-lg bg-blue-600 text-white border-0 cursor-pointer">Add</button>
              </div>
            </div>
          </div>
        ))}

        {/* New group */}
        <div className="bg-white border border-slate-200 rounded-2xl px-5 py-5">
          <h3 className="text-sm font-bold text-slate-800 mb-3">New group</h3>
          <div className="flex gap-3">
            <input value={newGroupName} onChange={e => setNewGroupName(e.target.value)} placeholder="Group name"
              onKeyDown={e => { if (e.key === "Enter") createGroup(); }}
              className="flex-1 text-sm px-3.5 py-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500" />
            <button onClick={createGroup} disabled={saving}
              className="text-sm px-5 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold border-0 cursor-pointer disabled:opacity-60 transition shrink-0">
              {saving ? "Creating…" : "Create group"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── App ────────────────────────────────────────────────────────────────────
  function App() {
    const user = getSession();
    const [tab,     setTab]     = useState("users");
    const [members, setMembers] = useState([]);
    const [groups,  setGroups]  = useState([]);
    const [loading, setLoading] = useState(true);

    if (!user) return null;
    if (user.role !== "admin") { window.location.href = "dashboard.html"; return null; }

    const load = async () => {
      setLoading(true);
      const [m, g] = await Promise.all([api.getMembers(), api.getGroups()]);
      setMembers(Array.isArray(m) ? m : []);
      setGroups(Array.isArray(g) ? g : []);
      setLoading(false);
    };

    useEffect(() => { load(); }, []);

    return (
      <div className="min-h-screen bg-slate-50 font-sans">
        <Navbar user={user} />
        <main className="max-w-4xl mx-auto px-4 sm:px-6 py-10">
          <h1 className="text-2xl font-bold text-slate-900 tracking-tight mb-1">Users & Groups</h1>
          <p className="text-sm text-slate-400 mb-8">Manage platform members, roles and team groups.</p>

          {/* Tab bar */}
          <div className="flex border-b border-slate-200 mb-8">
            <button onClick={() => setTab("users")}
              className={`text-sm px-5 py-3 border-b-2 transition cursor-pointer bg-transparent font-sans ${tab === "users" ? "border-blue-600 text-blue-600 font-semibold" : "border-transparent text-slate-500 hover:text-slate-700"}`}>
              👤 Users ({members.length})
            </button>
            <button onClick={() => setTab("groups")}
              className={`text-sm px-5 py-3 border-b-2 transition cursor-pointer bg-transparent font-sans ${tab === "groups" ? "border-blue-600 text-blue-600 font-semibold" : "border-transparent text-slate-500 hover:text-slate-700"}`}>
              👥 Groups ({groups.length})
            </button>
          </div>

          {loading ? (
            <div className="text-sm text-slate-400">Loading…</div>
          ) : tab === "users" ? (
            <UsersTab members={members} groups={groups} onReload={load} />
          ) : (
            <GroupsTab members={members} groups={groups} onReload={load} />
          )}
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
