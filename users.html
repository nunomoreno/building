<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerno — Users & Groups</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect } = React;

  const WORKER      = "https://morning-mud-283c.moreno-a64.workers.dev";
  const SESSION_KEY = "kerno_session";

  function getSession() {
    const s = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
    if (!s || Date.now() > new Date(s.expires).getTime()) {
      localStorage.removeItem(SESSION_KEY);
      window.location.href = "index.html?expired=1";
      return null;
    }
    return s;
  }

  const authHeaders = () => ({
    "Content-Type": "application/json",
    "X-Session-Token": getSession()?.token || "",
  });

  const apiFetch = async (path, opts = {}) => {
    const res = await fetch(`${WORKER}${path}`, {
      ...opts, headers: { ...authHeaders(), ...(opts.headers || {}) },
    });
    if (res.status === 401) { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html?expired=1"; return null; }
    return res.json().catch(() => ({}));
  };

  const api = {
    register:         (u, p, e) => fetch(`${WORKER}/register`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: u, password: p, email: e }) }).then(r => r.json()),
    getMembers:       ()        => apiFetch("/members"),
    deleteMember:     (id)      => apiFetch(`/members/${id}`,              { method: "DELETE" }),
    updateMember:     (id, data) => apiFetch(`/members/${id}`,             { method: "PUT",    body: JSON.stringify(data) }),
    getGroups:        ()        => apiFetch("/groups"),
    saveGroup:        (g)       => g.id
      ? apiFetch(`/groups/${g.id}`, { method: "PUT",  body: JSON.stringify(g) })
      : apiFetch("/groups",         { method: "POST", body: JSON.stringify(g) }),
    deleteGroup:      (id)      => apiFetch(`/groups/${id}`,               { method: "DELETE" }),
    addGroupMember:   (gid, mid, role) => apiFetch(`/groups/${gid}/members`,          { method: "POST",   body: JSON.stringify({ member_id: mid, role }) }),
    removeGroupMember:(gid, mid)       => apiFetch(`/groups/${gid}/members/${mid}`,   { method: "DELETE" }),
  };

  // ── Password strength ──────────────────────────────────────────────────────
  function scorePassword(pwd) {
    if (!pwd) return { score: 0, pct: 0, label: "", color: "" };
    let score = 0;
    if (pwd.length >= 10) score++;
    if (pwd.length >= 14) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[a-z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;
    if (score <= 2) return { score, pct: 20,  label: "Too weak",    color: "#ef4444" };
    if (score <= 3) return { score, pct: 40,  label: "Weak",        color: "#f97316" };
    if (score <= 4) return { score, pct: 65,  label: "Fair",        color: "#eab308" };
    if (score <= 5) return { score, pct: 85,  label: "Strong",      color: "#22c55e" };
    return             { score, pct: 100, label: "Very strong",  color: "#16a34a" };
  }

  function PasswordStrengthBar({ password }) {
    const { pct, label, color } = scorePassword(password);
    if (!password) return null;
    return (
      <div style={{ marginTop: 4, marginBottom: 6 }}>
        <div style={{ height: 4, borderRadius: 2, background: "#e2e8f0", overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${pct}%`, background: color, transition: "width .2s, background .2s" }} />
        </div>
        <div style={{ fontSize: 11, color, marginTop: 3 }}>{label}</div>
      </div>
    );
  }

  // ── Navbar ─────────────────────────────────────────────────────────────────
  function Navbar({ user }) {
    const logout = () => { localStorage.removeItem(SESSION_KEY); window.location.href = "index.html"; };
    const isAdmin = user.role === "admin";
    const btn    = { fontSize:11, padding:"4px 10px", borderRadius:5, border:"1px solid #334155", background:"#1e293b", color:"#94a3b8", textDecoration:"none", cursor:"pointer", fontFamily:"inherit" };
    const active = { ...btn, background:"#2563eb", color:"#fff", border:"1px solid #2563eb" };
    return (
      <div style={{ background:"#0f172a", padding:"10px 24px", display:"flex", alignItems:"center", gap:12, flexShrink:0 }}>
        <a href="dashboard.html" style={{ fontSize:15, fontWeight:700, color:"#fff", textDecoration:"none" }}>⚙️ Kerno</a>
        <span style={{ color:"#475569" }}>›</span>
        <span style={{ fontSize:13, color:"#94a3b8" }}>Users & Groups</span>
        <div style={{ marginLeft:"auto", display:"flex", gap:8, alignItems:"center" }}>
          <a href="kanban.html"   style={btn}>📋 Kanban</a>
          <a href="booking.html"  style={btn}>📅 Bookings</a>
          <a href="requests.html" style={btn}>📝 Requests</a>
          {isAdmin && <a href="users.html" style={active}>👥 Users</a>}
          <span style={{ fontSize:12, color:"#64748b" }}>
            👤 {user.username}
            {isAdmin && <span style={{ marginLeft:5, fontSize:10, background:"#2563eb", color:"#fff", borderRadius:99, padding:"1px 6px" }}>admin</span>}
          </span>
          <a href="profile.html" style={btn}>🔑 Password</a>
          <button onClick={logout} style={btn}>Sign out</button>
        </div>
      </div>
    );
  }

  // ── Users tab ──────────────────────────────────────────────────────────────
  function UsersTab({ members, groups, onReload }) {
    const [newUser,  setNewUser]  = useState("");
    const [newPass,  setNewPass]  = useState("");
    const [newEmail, setNewEmail] = useState("");
    const [error,    setError]    = useState("");
    const [saving,   setSaving]   = useState(false);
    const [resetId,  setResetId]  = useState(null);
    const [resetPwd, setResetPwd] = useState("");
    const [resetMsg, setResetMsg] = useState("");

    const addMember = async () => {
      if (!newUser.trim() || !newPass.trim()) return;
      setSaving(true); setError("");
      const res = await api.register(newUser.trim(), newPass.trim(), newEmail.trim());
      if (res?.error) setError(res.error);
      else { setNewUser(""); setNewPass(""); setNewEmail(""); await onReload(); }
      setSaving(false);
    };

    const removeMember = async (id, username) => {
      if (!confirm(`Remove user "${username}"?`)) return;
      await api.deleteMember(id); await onReload();
    };

    const startReset  = (id) => { setResetId(id); setResetPwd(""); setResetMsg(""); };
    const cancelReset = ()   => { setResetId(null); setResetPwd(""); setResetMsg(""); };

    const doReset = async (id) => {
      if (!resetPwd.trim()) return;
      // Client-side strength check for immediate feedback
      const { score } = scorePassword(resetPwd);
      if (score <= 2) { setResetMsg("Password too weak — add uppercase, numbers and special characters."); return; }
      setSaving(true); setResetMsg("");
      const res = await api.updateMember(id, { password: resetPwd.trim() });
      if (res?.error) setResetMsg("Error: " + res.error);
      else { setResetMsg("Password updated."); setTimeout(() => cancelReset(), 1200); }
      setSaving(false);
    };

    return (
      <div style={{ maxWidth: 700 }}>
        {members.map(m => (
          <div key={m.id} style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: "12px 16px", marginBottom: 10 }}>
            {resetId === m.id ? (
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#1e293b" }}>{m.username}</span>
                  <input
                    type="password" autoFocus value={resetPwd}
                    onChange={e => { setResetPwd(e.target.value); setResetMsg(""); }}
                    placeholder="New password"
                    onKeyDown={e => { if (e.key === "Enter") doReset(m.id); if (e.key === "Escape") cancelReset(); }}
                    style={{ fontSize: 12, padding: "5px 9px", borderRadius: 6, border: "1px solid #93c5fd", flex: 1, minWidth: 160 }}
                  />
                  <button onClick={() => doReset(m.id)} disabled={saving}
                    style={{ fontSize: 12, padding: "5px 12px", borderRadius: 6, background: "#2563eb", color: "#fff", border: "none", cursor: "pointer" }}>Save</button>
                  <button onClick={cancelReset}
                    style={{ fontSize: 12, padding: "5px 10px", borderRadius: 6, background: "#f1f5f9", border: "1px solid #e2e8f0", cursor: "pointer", color: "#64748b" }}>Cancel</button>
                </div>
                <PasswordStrengthBar password={resetPwd} />
                {resetMsg && (
                  <div style={{ fontSize: 11, color: resetMsg.startsWith("Error") || resetMsg.includes("weak") ? "#ef4444" : "#16a34a", marginTop: 2 }}>
                    {resetMsg}
                  </div>
                )}
              </div>
            ) : (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div>
                  <span style={{ fontSize: 14, fontWeight: 600, color: "#1e293b" }}>{m.username}</span>
                  {m.role === "admin" && <span style={{ marginLeft: 8, fontSize: 10, background: "#2563eb", color: "#fff", borderRadius: 99, padding: "2px 8px" }}>admin</span>}
                  {m.group_id && (
                    <span style={{ marginLeft: 8, fontSize: 10, background: "#f0fdf4", color: "#16a34a", borderRadius: 99, padding: "2px 8px", border: "1px solid #86efac" }}>
                      {groups.find(g => g.id === m.group_id)?.name || "group"} · {m.group_role}
                    </span>
                  )}
                  {m.email && <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 2 }}>{m.email}</div>}
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <button onClick={() => startReset(m.id)}
                    style={{ fontSize: 12, padding: "4px 10px", borderRadius: 5, border: "1px solid #e2e8f0", background: "#f8fafc", cursor: "pointer", color: "#475569" }}>Reset password</button>
                  {m.role !== "admin" && (
                    <button onClick={() => removeMember(m.id, m.username)}
                      style={{ fontSize: 12, padding: "4px 10px", borderRadius: 5, border: "1px solid #fecaca", background: "#fff5f5", color: "#ef4444", cursor: "pointer" }}>Remove</button>
                  )}
                </div>
              </div>
            )}
          </div>
        ))}

        {/* Add user */}
        <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: "16px 20px", marginTop: 8 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#0f172a", marginBottom: 12 }}>Add new user</div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 8 }}>
            <input value={newUser} onChange={e => setNewUser(e.target.value)} placeholder="Username"
              style={{ fontSize: 13, padding: "7px 10px", borderRadius: 6, border: "1px solid #cbd5e1", flex: "1 1 140px" }} />
            <input type="email" value={newEmail} onChange={e => setNewEmail(e.target.value)} placeholder="Email (optional)"
              style={{ fontSize: 13, padding: "7px 10px", borderRadius: 6, border: "1px solid #cbd5e1", flex: "1 1 180px" }} />
          </div>
          <div style={{ marginBottom: 4 }}>
            <input type="password" value={newPass} onChange={e => setNewPass(e.target.value)} placeholder="Password"
              style={{ width: "100%", fontSize: 13, padding: "7px 10px", borderRadius: 6, border: "1px solid #cbd5e1", boxSizing: "border-box" }} />
            <PasswordStrengthBar password={newPass} />
          </div>
          {error && <div style={{ fontSize: 12, color: "#ef4444", marginBottom: 8 }}>{error}</div>}
          <button onClick={addMember} disabled={saving}
            style={{ fontSize: 13, padding: "7px 18px", borderRadius: 6, background: "#2563eb", color: "#fff", border: "none", cursor: "pointer", fontWeight: 600 }}>
            {saving ? "Adding…" : "Add user"}
          </button>
        </div>
      </div>
    );
  }

  // ── Groups tab ─────────────────────────────────────────────────────────────
  function GroupsTab({ members, groups, onReload }) {
    const [saving,       setSaving]       = useState(false);
    const [editGroup,    setEditGroup]    = useState(null);
    const [newGroupName, setNewGroupName] = useState("");
    const GROUP_ROLES = ["member", "leader", "manager"];

    const saveGroup = async () => {
      if (!editGroup?.name?.trim()) return;
      setSaving(true);
      await api.saveGroup(editGroup);
      setSaving(false); setEditGroup(null); await onReload();
    };

    const deleteGroup = async (id, name) => {
      if (!confirm(`Delete group "${name}"? Members will be unassigned.`)) return;
      await api.deleteGroup(id); await onReload();
    };

    const assignMember = async (groupId, memberId, role) => {
      await api.addGroupMember(groupId, memberId, role); await onReload();
    };

    const unassignMember = async (groupId, memberId) => {
      await api.removeGroupMember(groupId, memberId); await onReload();
    };

    const createGroup = async () => {
      if (!newGroupName.trim()) return;
      setSaving(true);
      await api.saveGroup({ name: newGroupName.trim() });
      setNewGroupName(""); setSaving(false); await onReload();
    };

    return (
      <div style={{ maxWidth: 700 }}>
        {groups.map(g => (
          <div key={g.id} style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, marginBottom: 12, overflow: "hidden" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", borderBottom: "1px solid #f1f5f9" }}>
              <div>
                <span style={{ fontSize: 14, fontWeight: 700, color: "#1e293b" }}>{g.name}</span>
                {g.description && <span style={{ fontSize: 12, color: "#94a3b8", marginLeft: 10 }}>{g.description}</span>}
                <span style={{ fontSize: 12, color: "#64748b", marginLeft: 10 }}>
                  {(g.members || []).length} member{(g.members || []).length !== 1 ? "s" : ""}
                </span>
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => setEditGroup(editGroup?.id === g.id ? null : g)}
                  style={{ fontSize: 12, padding: "4px 12px", borderRadius: 5, border: "1px solid #e2e8f0", background: "#f8fafc", cursor: "pointer", color: "#475569" }}>
                  {editGroup?.id === g.id ? "Cancel" : "Edit"}
                </button>
                <button onClick={() => deleteGroup(g.id, g.name)}
                  style={{ fontSize: 12, padding: "4px 12px", borderRadius: 5, border: "1px solid #fecaca", background: "#fff5f5", cursor: "pointer", color: "#ef4444" }}>Delete</button>
              </div>
            </div>

            {editGroup?.id === g.id && (
              <div style={{ padding: "12px 16px", background: "#f8fafc", borderBottom: "1px solid #e2e8f0" }}>
                <input value={editGroup.name || ""} onChange={e => setEditGroup({ ...editGroup, name: e.target.value })} placeholder="Group name"
                  style={{ width: "100%", fontSize: 13, padding: "7px 10px", borderRadius: 6, border: "1px solid #cbd5e1", marginBottom: 8, boxSizing: "border-box" }} />
                <input value={editGroup.description || ""} onChange={e => setEditGroup({ ...editGroup, description: e.target.value })} placeholder="Description (optional)"
                  style={{ width: "100%", fontSize: 13, padding: "7px 10px", borderRadius: 6, border: "1px solid #cbd5e1", marginBottom: 10, boxSizing: "border-box" }} />
                <button onClick={saveGroup} disabled={saving}
                  style={{ fontSize: 12, padding: "5px 16px", borderRadius: 6, background: "#2563eb", color: "#fff", border: "none", cursor: "pointer" }}>Save</button>
              </div>
            )}

            <div style={{ padding: "10px 16px" }}>
              {(g.members || []).map(m => (
                <div key={m.member_id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "5px 0", fontSize: 13, borderBottom: "1px solid #f8fafc" }}>
                  <span style={{ color: "#1e293b", fontWeight: 500 }}>{m.username}</span>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    <select value={m.role} onChange={e => assignMember(g.id, m.member_id, e.target.value)}
                      style={{ fontSize: 12, padding: "3px 6px", borderRadius: 5, border: "1px solid #e2e8f0" }}>
                      {GROUP_ROLES.map(r => <option key={r} value={r}>{r}</option>)}
                    </select>
                    <button onClick={() => unassignMember(g.id, m.member_id)}
                      style={{ fontSize: 11, padding: "2px 8px", borderRadius: 4, border: "1px solid #fecaca", background: "#fff5f5", cursor: "pointer", color: "#ef4444" }}>✕</button>
                  </div>
                </div>
              ))}
              <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
                <select id={`add-member-${g.id}`} defaultValue=""
                  style={{ flex: 1, fontSize: 12, padding: "5px 8px", borderRadius: 5, border: "1px solid #cbd5e1" }}>
                  <option value="" disabled>Add member…</option>
                  {members.filter(m => !g.members?.find(gm => gm.member_id === m.id)).map(m => (
                    <option key={m.id} value={m.id}>{m.username}</option>
                  ))}
                </select>
                <button onClick={() => {
                  const sel = document.getElementById(`add-member-${g.id}`);
                  if (sel.value) { assignMember(g.id, sel.value, "member"); sel.value = ""; }
                }} style={{ fontSize: 12, padding: "5px 14px", borderRadius: 5, background: "#2563eb", color: "#fff", border: "none", cursor: "pointer" }}>Add</button>
              </div>
            </div>
          </div>
        ))}

        {/* New group */}
        <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: "16px 20px", marginTop: 4 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#0f172a", marginBottom: 10 }}>New group</div>
          <div style={{ display: "flex", gap: 10 }}>
            <input value={newGroupName} onChange={e => setNewGroupName(e.target.value)} placeholder="Group name"
              onKeyDown={e => { if (e.key === "Enter") createGroup(); }}
              style={{ flex: 1, fontSize: 13, padding: "7px 10px", borderRadius: 6, border: "1px solid #cbd5e1" }} />
            <button onClick={createGroup} disabled={saving}
              style={{ fontSize: 13, padding: "7px 18px", borderRadius: 6, background: "#2563eb", color: "#fff", border: "none", cursor: "pointer", fontWeight: 600 }}>
              {saving ? "Creating…" : "Create group"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── App ────────────────────────────────────────────────────────────────────
  function App() {
    const user = getSession();
    const [tab,     setTab]     = useState("users");
    const [members, setMembers] = useState([]);
    const [groups,  setGroups]  = useState([]);
    const [loading, setLoading] = useState(true);

    if (!user) return null;
    if (user.role !== "admin") { window.location.href = "dashboard.html"; return null; }

    const load = async () => {
      setLoading(true);
      const [m, g] = await Promise.all([api.getMembers(), api.getGroups()]);
      setMembers(Array.isArray(m) ? m : []);
      setGroups(Array.isArray(g) ? g : []);
      setLoading(false);
    };

    useEffect(() => { load(); }, []);

    const tabStyle = (t) => ({
      fontSize: 13, fontWeight: 600, padding: "9px 20px", border: "none", cursor: "pointer",
      background: "none", borderBottom: `2px solid ${tab === t ? "#2563eb" : "transparent"}`,
      color: tab === t ? "#2563eb" : "#64748b",
    });

    return (
      <div style={{ fontFamily: "system-ui,sans-serif", minHeight: "100vh", background: "#f8fafc" }}>
        <Navbar user={user} />
        <div style={{ maxWidth: 900, margin: "0 auto", padding: "32px 24px" }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: "#0f172a", marginBottom: 4 }}>Users & Groups</div>
          <div style={{ fontSize: 13, color: "#64748b", marginBottom: 24 }}>Manage platform members, roles and team groups.</div>

          <div style={{ display: "flex", borderBottom: "1px solid #e2e8f0", marginBottom: 24 }}>
            <button style={tabStyle("users")}  onClick={() => setTab("users")}>👤 Users ({members.length})</button>
            <button style={tabStyle("groups")} onClick={() => setTab("groups")}>👥 Groups ({groups.length})</button>
          </div>

          {loading ? (
            <div style={{ color: "#94a3b8", fontSize: 13 }}>Loading…</div>
          ) : tab === "users" ? (
            <UsersTab members={members} groups={groups} onReload={load} />
          ) : (
            <GroupsTab members={members} groups={groups} onReload={load} />
          )}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
